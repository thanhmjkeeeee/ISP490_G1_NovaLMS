# ==============================================================
# PRODUCTION CONFIGURATION (Render)
# ==============================================================

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (OPTIMIZED FOR PRO ULTRA)
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ==============================================================
# PERFORMANCE OPTIMIZATION
# ==============================================================

# Thymeleaf (FIX CHẬM)
spring.thymeleaf.cache=true

# Enable GZIP
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,application/json,application/javascript

# Static resources cache
spring.web.resources.cache.period=3600

# ==============================================================
# Server & URL
# ==============================================================

server.port=${PORT:8080}
app.frontend.url=${APP_URL:}

# ==============================================================
# Google OAuth2
# ==============================================================

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.redirect-uri=${APP_URL:http://localhost:8080}/login/oauth2/code/google

# ==============================================================
# Email
# ==============================================================

spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

# ==============================================================
# PayOS
# ==============================================================

payos.client-id=${PAYOS_CLIENT_ID:}
payos.api-key=${PAYOS_API_KEY:}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:}
payos.frontend-url=${APP_URL:}

# ==============================================================
# AI (Groq)
# ==============================================================

ai.api.key=${AI_API_KEY:${GROQ_API_KEY:}}

# ==============================================================
# Cloudinary
# ==============================================================

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}