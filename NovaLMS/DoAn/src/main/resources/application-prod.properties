# ==============================================================
# PRODUCTION CONFIGURATION (Render)
# ==============================================================

# Database - Render sẽ tự động tiêm giá trị này nếu bạn dùng External Database URL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server & URL
server.port=${PORT:8080}
app.frontend.url=${APP_URL}

# Google OAuth2 (Cần đổi localhost thành URL của Render trong Google Console)
spring.security.oauth2.client.registration.google.redirect-uri=${APP_URL}/login/oauth2/code/google

# PayOS
payos.frontend-url=${APP_URL}

# Groq
groq.api.key=${GROQ_API_KEY}
