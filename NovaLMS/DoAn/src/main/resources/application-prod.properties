# ==============================================================
# PRODUCTION CONFIGURATION (Render)
# ==============================================================

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (Optimized for Stability)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.max-lifetime=1800000

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Logging for troubleshooting hangs
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.zaxxer.hikari=DEBUG

# ==============================================================
# PERFORMANCE OPTIMIZATION
# ==============================================================

spring.thymeleaf.cache=true

# Enable GZIP
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,application/json,application/javascript

# Static resources cache
spring.web.resources.cache.period=3600

# ==============================================================
# Server & URL
# ==============================================================

server.port=${PORT:8080}
app.frontend.url=${APP_URL:}

# ==============================================================
# Google OAuth2
# ==============================================================

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.redirect-uri=${APP_URL:http://localhost:8080}/login/oauth2/code/google

# ==============================================================
# Email
# ==============================================================

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==============================================================
# PayOS
# ==============================================================

payos.client-id=${PAYOS_CLIENT_ID:}
payos.api-key=${PAYOS_API_KEY:}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:}
payos.frontend-url=${APP_URL:}

# ==============================================================
# Cloudinary
# ==============================================================

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# JWT
app.jwt.secret=${JWT_SECRET:9a4f2c8d3b7a1e6f4g5h8i0j2k4l6m8n0p2q4r6s8t0u2v4w6x8y0z}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ==============================================================
# 9. AI CONFIGURATION (Split: Groq for Grading, 9Router for Generation)
# ==============================================================

# AI - Grading (Groq)
ai.grading.api.url=https://api.groq.com/openai/v1
ai.grading.api.key=${GROQ_API_KEY:}
ai.grading.model=llama-3.3-70b-versatile

# AI - Generation (9Router)
ai.generation.api.url=${AI_API_URL:https://rpkaeml.9router.com/v1}
ai.generation.api.key=${AI_API_KEY:}
ai.generation.model=${AI_MODEL:apilms}