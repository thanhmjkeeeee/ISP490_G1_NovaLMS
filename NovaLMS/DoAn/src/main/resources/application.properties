spring.application.name=DoAn

# ==============================================================
# 1. THYMELEAF CONFIGURATION
# ==============================================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ==============================================================
# 2. DATABASE CONFIGURATION (MySQL)
# ==============================================================
# Sử dụng biến môi trường cho Prod, mặc định là Local
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/nova_1?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:your_password_here}

# ==============================================================
# 3. JPA / HIBERNATE CONFIGURATION
# ==============================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=true

# ==============================================================
# 4. SERVER CONFIGURATION
# ==============================================================
server.port=${PORT:8080}
server.servlet.context-path=/
app.frontend.url=${FRONTEND_URL:http://localhost:8080}

# Prevent ERR_INCOMPLETE_CHUNKED_ENCODING on large Thymeleaf pages
server.tomcat.connection-timeout=60000
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.max-swallow-size=-1
spring.mvc.async.request-timeout=60000

# ==============================================================
# 5. JWT CONFIGURATION
# ==============================================================
app.jwt.secret=${JWT_SECRET:your_jwt_secret_here}
app.jwt.expiration-ms=86400000

# ==============================================================
# 6. GOOGLE OAUTH2 CONFIGURATION
# ==============================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your_google_client_id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your_google_client_secret}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}

# ==============================================================
# 7. EMAIL CONFIGURATION (SMTP)
# ==============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==============================================================
# 8. OPENAPI / SWAGGER & CLOUDINARY
# ==============================================================
springdoc.api-docs.path=/v3
springdoc.swagger-ui.path=/swagg
openapi.service.title=Nova Learning Management API
openapi.service.version=1.0.0
openapi.service.server-url=${SWAGGER_SERVER_URL:http://localhost:8080}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your_cloud_name}
cloudinary.api-key=${CLOUDINARY_API_KEY:your_api_key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your_api_secret}

# ==============================================================
# 9. AI CONFIGURATION
# ==============================================================
ai.api.url=https://rpkaeml.9router.com/v1
ai.api.key=${AI_API_KEY:your_ai_api_key}
ai.model=apilms

groq.api.key=${GROQ_API_KEY:your_groq_api_key}

# ==============================================================
# 10. PAYOS CONFIGURATION
# ==============================================================
payos.client-id=${PAYOS_CLIENT_ID:your_payos_client_id}
payos.api-key=${PAYOS_API_KEY:your_payos_api_key}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:your_payos_checksum_key}
payos.base-url=https://api-merchant.payos.vn
payos.frontend-url=${PAYOS_FRONTEND_URL:http://localhost:8080}

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
