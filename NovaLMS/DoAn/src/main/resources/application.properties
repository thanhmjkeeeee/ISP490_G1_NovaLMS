spring.application.name=DoAn

# ==============================================================
# 1. THYMELEAF CONFIGURATION
# ==============================================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ==============================================================
# 2. DATABASE CONFIGURATION (MySQL)
# ==============================================================
# Sử dụng biến môi trường cho Prod, mặc định là Local
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/nova_1?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:huuhuy123}

# ==============================================================
# 3. JPA / HIBERNATE CONFIGURATION
# ==============================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=true

# ==============================================================
# 4. SERVER CONFIGURATION
# ==============================================================
server.port=${PORT:8080}
server.servlet.context-path=/
app.frontend.url=${FRONTEND_URL:http://localhost:8080}

# Prevent ERR_INCOMPLETE_CHUNKED_ENCODING on large Thymeleaf pages
server.tomcat.connection-timeout=60000
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.max-swallow-size=-1
spring.mvc.async.request-timeout=60000

