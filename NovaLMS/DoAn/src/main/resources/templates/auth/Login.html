<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: common-head(pageTitle='Đăng nhập')}"></head>
<script th:inline="javascript">
    // Kiểm tra xem có param logout không, nếu có thì xóa redirect cũ
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('logout')) {
        sessionStorage.removeItem('loginRedirect');
    } else {
        // Lưu redirect URL vào sessionStorage nếu có
        const redirectUrl = urlParams.get('redirect');
        if (redirectUrl) {
            sessionStorage.setItem('loginRedirect', redirectUrl);
        }
    }
</script>

<body class="index-page">

<header th:replace="~{fragments/header :: header-fragment(currentPage='login')}"></header>

<main class="main">
    <section id="login" class="login-section" style="padding: 100px 0; background-color: #f9f9f9;">
        <div class="container" data-aos="fade-up">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-8">
                    <div class="card shadow-sm border-0" style="border-radius: 15px;">
                        <div class="card-body p-5">

                            <div class="text-center mb-4">
                                <h3 style="font-weight: 700; color: var(--heading-color);">Đăng Nhập</h3>
                                <p class="text-muted">Chào mừng bạn quay trở lại với Nova LMS</p>
                            </div>

                            <!-- Thông báo lỗi login -->
                            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                                Email hoặc mật khẩu không chính xác!
                            </div>

                            <div th:if="${success}" class="alert alert-success" role="alert" th:text="${success}"></div>

                            <!-- FORM LOGIN -->
                            <form th:action="@{/perform_login}" method="post">
                                <input type="hidden" id="redirectParam" name="redirect" value="">
                                <script th:inline="javascript">
                                    document.getElementById('redirectParam').value = sessionStorage.getItem('loginRedirect') || '';
                                </script>

                                <div class="mb-3">
                                    <label for="username" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="username" name="username" placeholder="name@example.com" required>
                                </div>

                                <div class="mb-3">
                                    <div class="d-flex justify-content-between">
                                        <label for="password" class="form-label">Mật khẩu</label>
                                        <!-- Link kích hoạt Modal Quên Mật Khẩu -->
                                        <a href="#" class="text-decoration-none" style="font-size: 0.9rem;" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">Quên mật khẩu?</a>
                                    </div>
                                    <input type="password" class="form-control" id="password" name="password" placeholder="Nhập mật khẩu" required>
                                </div>

                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
                                    <label class="form-check-label" for="remember-me">Ghi nhớ đăng nhập</label>
                                </div>

                                <button type="submit" class="btn btn-primary w-100 py-2" style="border-radius: 50px; font-weight: 600;">Đăng nhập</button>
                            </form>

                            <div class="d-flex align-items-center my-4">
                                <hr class="flex-grow-1">
                                <span class="px-2 text-muted">hoặc</span>
                                <hr class="flex-grow-1">
                            </div>

                            <a id="googleLoginLink" href="/oauth2/authorization/google" class="btn btn-outline-google w-100 py-2 d-flex align-items-center justify-content-center gap-2" style="border-radius: 50px;">
                                <i class="bi bi-google"></i> Đăng nhập bằng Google
                            </a>
                            <script th:inline="javascript">
                                const googleLink = document.getElementById('googleLoginLink');
                                const redirect = sessionStorage.getItem('loginRedirect');
                                if (redirect) {
                                    googleLink.href = '/oauth2/authorization/google?redirect_uri=' + encodeURIComponent(redirect);
                                }
                            </script>

                            <div class="text-center mt-4">
                                Bạn chưa có tài khoản? <a th:href="@{/register}" class="text-decoration-none fw-bold">Đăng ký ngay</a>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-labelledby="forgotPasswordModalLabel" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 15px;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold text-primary" id="forgotPasswordModalLabel">Khôi phục mật khẩu</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body pt-2 pb-4 px-4">
                <p class="text-muted small mb-4">Làm theo hướng dẫn để thiết lập lại mật khẩu tài khoản của bạn.</p>

                <div id="forgotModalAlert" class="alert d-none small" role="alert"></div>

                <form id="step1ForgotForm">
                    <div class="mb-4">
                        <label class="form-label fw-medium small">Email đã đăng ký <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-envelope text-muted"></i></span>
                            <input type="email" class="form-control" id="forgotEmail" placeholder="Ví dụ: hocvien@gmail.com" required>
                        </div>
                    </div>
                    <button type="submit" id="btnSendForgotCode" class="btn btn-primary w-100 fw-bold rounded-pill py-2">
                        Nhận mã xác minh
                    </button>
                </form>

                <form id="step2ForgotForm" class="d-none">
                    <div class="alert alert-info small text-center mb-3">
                        Mã xác minh 6 số đã gửi tới <br><strong id="forgotDisplayEmail" class="text-dark"></strong>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-medium small">Mã xác minh (6 số) <span class="text-danger">*</span></label>
                        <input type="text" class="form-control text-center fw-bold text-primary" id="forgotTokenCode" maxlength="6" style="letter-spacing: 5px; font-size: 1.2rem;" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-medium small">Mật khẩu mới <span class="text-danger">*</span></label>
                        <input type="password" class="form-control" id="forgotNewPassword" required placeholder="Ít nhất 6 ký tự, 1 viết hoa, 1 đặc biệt">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-medium small">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                        <input type="password" class="form-control" id="forgotConfirmPassword" required placeholder="Nhập lại mật khẩu mới">
                    </div>

                    <button type="submit" id="btnResetPass" class="btn btn-primary w-100 fw-bold rounded-pill py-2">
                        <i class="bi bi-shield-check me-1"></i> Đặt lại mật khẩu
                    </button>

                    <div class="text-center mt-3">
                        <button type="button" id="btnBackToEmail" class="btn btn-link text-decoration-none small text-muted p-0">
                            <i class="bi bi-arrow-left"></i> Nhập lại Email khác
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>


<footer th:replace="~{fragments/footer :: common-footer}"></footer>
<th:block th:replace="~{fragments/footer :: common-scripts}"></th:block>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const step1ForgotForm = document.getElementById('step1ForgotForm');
        const step2ForgotForm = document.getElementById('step2ForgotForm');
        const forgotModalAlert = document.getElementById('forgotModalAlert');
        const btnBackToEmail = document.getElementById('btnBackToEmail');

        function showForgotAlert(message, type) {
            forgotModalAlert.className = `alert alert-${type} small`;
            forgotModalAlert.innerHTML = `<i class="bi ${type === 'success' ? 'bi-check-circle' : 'bi-exclamation-triangle'} me-1"></i> ${message}`;
            forgotModalAlert.classList.remove('d-none');
        }

        if(btnBackToEmail) {
            btnBackToEmail.addEventListener('click', function() {
                step2ForgotForm.classList.add('d-none');
                step1ForgotForm.classList.remove('d-none');
                forgotModalAlert.classList.add('d-none');
            });
        }

        if(step1ForgotForm) {
            step1ForgotForm.addEventListener('submit', async function (e) {
                e.preventDefault(); // Chặn load lại trang
                forgotModalAlert.classList.add('d-none');

                const email = document.getElementById('forgotEmail').value.trim();
                const btn = document.getElementById('btnSendForgotCode');

                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Đang gửi...';

                try {
                    const response = await fetch('/api/v1/auth/forgot-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email })
                    });
                    const result = await response.json();

                    if (result.status === 200) {
                        step1ForgotForm.classList.add('d-none');
                        step2ForgotForm.classList.remove('d-none');
                        document.getElementById('forgotDisplayEmail').textContent = email;
                        showForgotAlert("Mã xác minh đã gửi đến email của bạn!", "success");
                    } else {
                        showForgotAlert(result.message, "danger");
                    }
                } catch (error) {
                    showForgotAlert("Lỗi kết nối máy chủ!", "danger");
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = 'Nhận mã xác minh';
                }
            });
        }

        if(step2ForgotForm) {
            step2ForgotForm.addEventListener('submit', async function (e) {
                e.preventDefault(); // Chặn load lại trang
                forgotModalAlert.classList.add('d-none');

                const token = document.getElementById('forgotTokenCode').value.trim();
                const newPassword = document.getElementById('forgotNewPassword').value;
                const confirmPassword = document.getElementById('forgotConfirmPassword').value;

                if (token.length !== 6) {
                    showForgotAlert("Vui lòng nhập đủ 6 số mã xác minh!", "danger");
                    return;
                }
                if (newPassword !== confirmPassword) {
                    showForgotAlert("Mật khẩu xác nhận không khớp!", "danger");
                    return;
                }

                const passwordRegex = /^(?=.*[A-Z])(?=.*[!@#$%^&*()_+-=<>?]).{6,}$/;
                if (!passwordRegex.test(newPassword)) {
                    showForgotAlert("Mật khẩu mới phải có ít nhất 6 ký tự, 1 chữ in hoa và 1 ký tự đặc biệt!", "danger");
                    return;
                }

                const btn = document.getElementById('btnResetPass');
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Đang xử lý...';

                try {
                    const response = await fetch('/api/v1/auth/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token: token, newPassword: newPassword, confirmPassword: confirmPassword })
                    });
                    const result = await response.json();

                    if (result.status === 200) {
                        showForgotAlert("Đổi mật khẩu thành công! Vui lòng đăng nhập lại.", "success");
                        setTimeout(() => {
                            const modalEl = document.getElementById('forgotPasswordModal');
                            const modal = bootstrap.Modal.getInstance(modalEl);
                            modal.hide();

                            step2ForgotForm.classList.add('d-none');
                            step1ForgotForm.classList.remove('d-none');
                            step1ForgotForm.reset();
                            step2ForgotForm.reset();
                            forgotModalAlert.classList.add('d-none');
                        }, 2000);
                    } else {
                        showForgotAlert(result.message, "danger");
                    }
                } catch (error) {
                    showForgotAlert("Lỗi kết nối máy chủ!", "danger");
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-shield-check me-1"></i> Đặt lại mật khẩu';
                }
            });
        }
    });
</script>

</body>
</html>
