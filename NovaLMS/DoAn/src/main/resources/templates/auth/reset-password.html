<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: common-head(pageTitle='Quên mật khẩu')}"></head>

<body class="index-page">

<header th:replace="~{fragments/header :: header-fragment(currentPage='login')}"></header>

<main class="main">
  <section class="mt-5 pt-5 mb-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="card shadow-lg border-0" style="border-radius: 15px;">
            <div class="card-body p-5">

              <div class="text-center mb-4">
                <h3 class="fw-bold" style="color: var(--dash-accent);">Khôi phục mật khẩu</h3>
                <p class="text-muted small">Làm theo hướng dẫn để thiết lập lại mật khẩu</p>
              </div>

              <div id="mainAlert" class="alert d-none small" role="alert"></div>

              <form id="step1Form">
                <div class="mb-4">
                  <label class="form-label fw-medium">Email đăng nhập <span class="text-danger">*</span></label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" id="forgotEmail" placeholder="Nhập email của bạn" required>
                  </div>
                </div>
                <button type="submit" id="btnSendCode" class="btn w-100 fw-bold text-white rounded-pill py-2" style="background-color: var(--dash-accent);">
                  Nhận mã xác minh
                </button>
                <div class="text-center mt-3">
                  <a th:href="@{/login.html}" class="text-decoration-none" style="font-size: 0.9rem;"><i class="bi bi-arrow-left"></i> Quay lại đăng nhập</a>
                </div>
              </form>

              <form id="step2Form" class="d-none">
                <div class="alert alert-info small text-center mb-4">
                  Mã xác minh 6 số đã được gửi tới <br><strong id="displayEmail"></strong>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-medium">Mã xác minh (6 số) <span class="text-danger">*</span></label>
                  <input type="text" class="form-control text-center fw-bold" id="tokenCode" maxlength="6" style="letter-spacing: 5px; font-size: 1.2rem;" required>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-medium">Mật khẩu mới <span class="text-danger">*</span></label>
                  <input type="password" class="form-control" id="newPassword" required placeholder="Nhập mật khẩu mới">
                </div>

                <div class="mb-4">
                  <label class="form-label fw-medium">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                  <input type="password" class="form-control" id="confirmPassword" required placeholder="Nhập lại mật khẩu mới">
                </div>

                <button type="submit" id="btnResetPass" class="btn btn-dark w-100 fw-bold rounded-pill py-2">
                  <i class="bi bi-shield-check"></i> Cập nhật mật khẩu
                </button>
              </form>

            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<footer th:replace="~{fragments/footer :: common-footer}"></footer>
<th:block th:replace="~{fragments/footer :: common-scripts}"></th:block>

<script>
  document.addEventListener("DOMContentLoaded", function () {
      const step1Form = document.getElementById('step1Form');
      const step2Form = document.getElementById('step2Form');
      const mainAlert = document.getElementById('mainAlert');

      function showAlert(message, type) {
          mainAlert.className = `alert alert-${type} small`;
          mainAlert.textContent = message;
          mainAlert.classList.remove('d-none');
      }

      // XỬ LÝ BƯỚC 1: GỬI EMAIL LẤY MÃ
      step1Form.addEventListener('submit', async function (e) {
          e.preventDefault();
          mainAlert.classList.add('d-none');

          const email = document.getElementById('forgotEmail').value.trim();
          const btn = document.getElementById('btnSendCode');
          btn.disabled = true;
          btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Đang gửi...';

          try {
              const response = await fetch('/api/v1/auth/forgot-password', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ email: email })
              });
              const result = await response.json();

              if (result.status === 200) {
                  // Chuyển sang Bước 2
                  step1Form.classList.add('d-none');
                  step2Form.classList.remove('d-none');
                  document.getElementById('displayEmail').textContent = email;
                  showAlert("Mã xác minh đã được gửi!", "success");
              } else {
                  showAlert(result.message, "danger");
              }
          } catch (error) {
              showAlert("Lỗi kết nối hệ thống!", "danger");
          } finally {
              btn.disabled = false;
              btn.innerHTML = 'Nhận mã xác minh';
          }
      });

      // XỬ LÝ BƯỚC 2: RESET MẬT KHẨU
      step2Form.addEventListener('submit', async function (e) {
          e.preventDefault();
          mainAlert.classList.add('d-none');

          const token = document.getElementById('tokenCode').value.trim();
          const newPassword = document.getElementById('newPassword').value;
          const confirmPassword = document.getElementById('confirmPassword').value;

          if (token.length !== 6) {
              showAlert("Vui lòng nhập đủ 6 số mã xác minh!", "warning");
              return;
          }

          if (newPassword !== confirmPassword) {
              showAlert("Mật khẩu xác nhận không khớp!", "danger");
              return;
          }

          // Regex giống lúc đăng ký (1 hoa, 1 đặc biệt, 6 ký tự)
          const passwordRegex = /^(?=.*[A-Z])(?=.*[!@#$%^&*()_+-=<>?]).{6,}$/;
          if (!passwordRegex.test(newPassword)) {
              showAlert("Mật khẩu mới phải có ít nhất 6 ký tự, 1 chữ in hoa và 1 ký tự đặc biệt!", "danger");
              return;
          }

          const btn = document.getElementById('btnResetPass');
          btn.disabled = true;
          btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Đang xử lý...';

          try {
              const response = await fetch('/api/v1/auth/reset-password', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                      token: token,
                      newPassword: newPassword
                  })
              });
              const result = await response.json();

              if (result.status === 200) {
                  showAlert("Đổi mật khẩu thành công! Đang chuyển hướng...", "success");
                  setTimeout(() => {
                      window.location.href = '/login.html';
                  }, 2000);
              } else {
                  showAlert(result.message, "danger");
                  btn.disabled = false;
                  btn.innerHTML = '<i class="bi bi-shield-check"></i> Cập nhật mật khẩu';
              }
          } catch (error) {
              showAlert("Lỗi kết nối hệ thống!", "danger");
              btn.disabled = false;
              btn.innerHTML = '<i class="bi bi-shield-check"></i> Cập nhật mật khẩu';
          }
      });
  });
</script>
</body>
</html>
