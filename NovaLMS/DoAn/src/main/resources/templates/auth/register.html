<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: common-head(pageTitle='Đăng ký')}"></head>

<body class="index-page">

<header th:replace="~{fragments/header :: header-fragment(currentPage='register')}"></header>

<main class="main">
    <section class="register-container">
        <div class="container">
            <div class="row justify-content-center">

                <div class="register-card">
                    <!-- Cột Trái: Banner Image -->
                    <div class="register-left">
                        <img th:src="@{/assets/img/hero-img.png}" alt="Nova LMS Mascot">
                        <h2>Nova LMS</h2>
                        <p>Hãy đăng ký tài khoản để trải nghiệm<br>cùng Nova ngay nhé!</p>
                    </div>

                    <!-- Cột Phải: Form Đăng Ký -->
                    <div class="register-right">
                        <h3 class="register-title">Đăng ký tài khoản</h3>

                        <!-- Thông báo lỗi/thành công -->
                        <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
                        <div th:if="${success}" class="alert alert-success" role="alert" th:text="${success}"></div>

                        <form th:action="@{/register}" method="post">
                            <!-- Họ tên -->
                            <div class="mb-3">
                                <label class="form-label">Tên <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control form-control-icon" name="fullName" placeholder="Nhập tên tại đây" required>
                                </div>
                            </div>

                            <!-- Email -->

                            <div class="mb-3">
                                <label class="form-label">Email <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <!-- ĐÃ SỬA: Đổi ID thành 'registerEmail' để tránh trùng lặp -->
                                    <input type="email" class="form-control form-control-icon" id="registerEmail" name="email" placeholder="Nhập email tại đây" required>
                                </div>
                            </div>

                            <!-- Số điện thoại -->
                            <div class="mb-3">
                                <label class="form-label">Số điện thoại</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                    <input type="tel" class="form-control form-control-icon" name="phone" placeholder="Nhập số điện thoại">
                                </div>
                            </div>

                            <!-- Giới tính & Nơi sinh sống (2 cột) -->
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Giới tính <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-gender-ambiguous"></i></span>
                                        <select class="form-select form-control-icon" name="gender">
                                            <option value="Male">Nam</option>
                                            <option value="Female">Nữ</option>
                                            <option value="Other">Khác</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Nơi sinh sống <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                                        <select class="form-select form-control-icon" name="city">
                                            <option value="">Chọn tỉnh/thành</option>
                                            <option value="Hanoi">Hà Nội</option>
                                            <option value="HCM">Hồ Chí Minh</option>
                                            <option value="Danang">Đà Nẵng</option>
                                            <option value="Other">Khác</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <!-- Mật khẩu -->
                            <div class="mb-3">
                                <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control form-control-icon" name="password" placeholder="Nhập mật khẩu tại đây" required>
                                </div>
                            </div>

                            <!-- Nhập lại mật khẩu -->
                            <div class="mb-3">
                                <label class="form-label">Nhập lại mật khẩu <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                    <input type="password" class="form-control form-control-icon" name="confirmPassword" placeholder="Nhập lại mật khẩu tại đây" required>
                                </div>
                            </div>

                            <!-- Mã xác minh -->
                            <div class="mb-3 verify-code-group">
                                <label class="form-label">Mã xác minh <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                                    <input type="text" class="form-control form-control-icon" name="verificationCode" placeholder="Nhập mã 6 số" required>
                                    <!-- Nút button type="button" -->
                                    <button type="button" class="btn-get-code" id="btnGetCode" style="z-index: 10; cursor: pointer;">Lấy mã xác minh</button>
                                </div>
                            </div>

                            <!-- Submit Button -->
                            <button type="submit" class="btn-register">Đăng Ký</button>

                            <div class="text-center mt-3 text-muted" style="font-size: 0.85rem;">
                                Hoặc đăng nhập nhanh
                            </div>

                            <!-- Social Buttons -->
                            <div class="social-login">
                                <a href="/oauth2/authorization/google" class="btn-social">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20" alt="Google">
                                    Google
                                </a>
                            </div>

                            <!-- Login Link -->
                            <div class="login-link">
                                Bạn đã có tài khoản? <a th:href="@{/login.html}">Đăng nhập</a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </section>
</main>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const btnGetCode = document.getElementById("btnGetCode");
        const registerForm = document.querySelector("form"); // Xóa thuộc tính action và method trên HTML

        // Gửi mã xác nhận
        btnGetCode.addEventListener("click", async function () {
            const email = document.getElementById("email").value;
            if (!email) return alert("Vui lòng nhập email trước!");

            btnGetCode.disabled = true;
            btnGetCode.innerText = "Đang gửi...";

            try {
                const response = await fetch(`/api/v1/auth/send-code?email=${encodeURIComponent(email)}`, { method: "POST" });
                const result = await response.json();

                if (result.status === 200) {
                    alert("Mã xác minh đã được gửi!");
                    startCountdown(60);
                } else {
                    alert(result.message);
                    resetButton("Lấy mã xác minh");
                }
            } catch (error) {
                alert("Lỗi kết nối máy chủ");
                resetButton("Lấy mã xác minh");
            }
        });

        // Xử lý form đăng ký
        registerForm.addEventListener("submit", async function (e) {
            e.preventDefault(); // CHẶN reload trang

            const formData = new FormData(registerForm);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/api/v1/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                if (result.status === 200) {
                    alert("Đăng ký thành công! Chuyển hướng đến đăng nhập...");
                    window.location.href = '/login.html';
                } else {
                    alert(result.message);
                }
            } catch (error) {
                alert("Lỗi hệ thống khi đăng ký!");
            }
        });
    });
</script>

<footer th:replace="~{fragments/footer :: common-footer}"></footer>
<th:block th:replace="~{fragments/footer :: common-scripts}"></th:block>

</body>
</html>
