<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: common-head(pageTitle='Đăng ký')}"></head>

<style>
    .register-card {
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        overflow: hidden;
        max-width: 1100px;
        width: 100%;
        display: flex;
        flex-direction: row;
    }

    .register-left {
        flex: 1;
        background-color: #e0f2f1;
        padding: 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    .register-left img { max-width: 100%; height: auto; margin-bottom: 20px; }
    .register-left h2 { color: #00796b; font-weight: 700; font-size: 2rem; margin-bottom: 15px; }
    .register-left p { color: #555; font-size: 1.1rem; }

    .register-right { flex: 1.2; padding: 50px; background: #fff; }
    .register-title { font-size: 1.5rem; font-weight: 700; color: #333; text-align: center; margin-bottom: 30px; }

    .form-label { font-weight: 600; font-size: 0.9rem; color: #555; margin-bottom: 5px; }
    .form-control, .form-select { border-radius: 8px; padding: 10px 15px; border: 1px solid #ddd; font-size: 0.95rem; }
    .form-control:focus, .form-select:focus { border-color: #26a69a; box-shadow: 0 0 0 0.2rem rgba(38, 166, 154, 0.25); }
    .input-group-text { background: #f9f9f9; border: 1px solid #ddd; border-radius: 8px 0 0 8px; color: #777; }
    .form-control-icon { border-left: none; border-radius: 0 8px 8px 0; }

    .btn-register {
        background: #26a69a;
        color: #fff;
        font-weight: 700;
        padding: 12px;
        border-radius: 8px;
        width: 100%;
        border: none;
        transition: 0.3s;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 20px;
    }
    .btn-register:hover { background: #00897b; }

    .social-login { display: flex; gap: 15px; margin-top: 20px; }
    .btn-social {
        flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px;
        background: #fff; color: #555; font-weight: 600; display: flex;
        align-items: center; justify-content: center; gap: 10px; transition: 0.3s; text-decoration: none;
    }
    .btn-social:hover { background: #f5f5f5; }
    .login-link { text-align: center; margin-top: 20px; font-size: 0.9rem; }
    .login-link a { color: #26a69a; font-weight: 700; text-decoration: none; }

    @media (max-width: 992px) {
        .register-card { flex-direction: column; max-width: 600px; }
        .register-left { display: none; }
        .register-right { padding: 30px; }
    }
</style>

<body class="index-page">

<header th:replace="~{fragments/header :: header-fragment(currentPage='register')}"></header>

<main class="main">
    <section class="register-container mt-5 pt-5 mb-5">
        <div class="container">
            <div class="row justify-content-center">

                <div class="register-card">
                    <div class="register-left">
                        <img th:src="@{/assets/img/hero-img.png}" alt="Nova LMS Mascot">
                        <h2>Nova LMS</h2>
                        <p>Hãy đăng ký tài khoản để trải nghiệm<br>cùng Nova ngay nhé!</p>
                    </div>

                    <div class="register-right">
                        <h3 class="register-title">Đăng ký tài khoản</h3>

                        <div id="mainAlert" class="alert d-none" role="alert"></div>

                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label">Tên <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control form-control-icon" id="fullName" name="fullName" placeholder="Nhập tên tại đây" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control form-control-icon" id="registerEmail" name="email" placeholder="Nhập email tại đây" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                    <input type="tel" class="form-control form-control-icon" id="phone" name="phone" placeholder="Nhập số điện thoại" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control form-control-icon" id="password" name="password" placeholder="Nhập mật khẩu tại đây" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Nhập lại mật khẩu <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                    <input type="password" class="form-control form-control-icon" id="confirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu tại đây" required>
                                </div>
                            </div>

                            <button type="button" id="btnOpenModal" class="btn-register">Tiếp tục</button>

                            <div class="text-center mt-3 text-muted" style="font-size: 0.85rem;">Hoặc đăng nhập nhanh</div>

                            <div class="social-login">
                                <a href="/oauth2/authorization/google" class="btn-social">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20" alt="Google"> Google
                                </a>
                            </div>

                            <div class="login-link">
                                Bạn đã có tài khoản? <a th:href="@{/login.html}">Đăng nhập</a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </section>
</main>

<div class="modal fade" id="verifyCodeModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 15px;">
            <div class="modal-header border-0 pb-0">
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center pt-0 px-5 pb-5">
                <div style="font-size: 4rem; color: #26a69a;"><i class="bi bi-envelope-check-fill"></i></div>
                <h4 class="fw-bold mt-2">Xác thực Email</h4>
                <p class="text-muted mb-4">Chúng tôi đã gửi một mã xác minh gồm 6 số tới email: <br> <strong id="displayEmail" class="text-dark"></strong></p>

                <div id="modalAlert" class="alert d-none small"></div>

                <div class="mb-3 text-start">
                    <label class="form-label fw-bold">Nhập mã xác minh</label>
                    <input type="text" class="form-control form-control-lg text-center" id="verificationCode" placeholder="Ví dụ: 123456" maxlength="6" style="letter-spacing: 5px; font-weight: bold; font-size: 1.2rem;">
                </div>

                <button type="button" id="btnFinalRegister" class="btn btn-register mt-2" style="border-radius: 50px;">Xác nhận & Đăng ký</button>

                <div class="mt-3">
                    <button type="button" id="btnResendCode" class="btn btn-link text-decoration-none" style="color: #26a69a; font-weight: 600;">Chưa nhận được mã? Gửi lại</button>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: common-footer}"></footer>
<th:block th:replace="~{fragments/footer :: common-scripts}"></th:block>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const btnOpenModal = document.getElementById("btnOpenModal");
        const btnFinalRegister = document.getElementById("btnFinalRegister");
        const btnResendCode = document.getElementById("btnResendCode");

        const mainAlert = document.getElementById("mainAlert");
        const modalAlert = document.getElementById("modalAlert");

        // Khởi tạo Bootstrap Modal
        const verifyModal = new bootstrap.Modal(document.getElementById('verifyCodeModal'));

        function showMainAlert(message, type) {
            mainAlert.className = `alert alert-${type}`;
            mainAlert.textContent = message;
            mainAlert.classList.remove('d-none');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showModalAlert(message, type) {
            modalAlert.className = `alert alert-${type} small`;
            modalAlert.textContent = message;
            modalAlert.classList.remove('d-none');
        }

        // 1. Validation & Bật Modal
        btnOpenModal.addEventListener("click", async function () {
            mainAlert.classList.add('d-none');

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validate dữ liệu rỗng
            if (!fullName || !email || !phone || !password || !confirmPassword) {
                showMainAlert("Vui lòng điền đầy đủ tất cả thông tin!", "danger");
                return;
            }

            // Validate format email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMainAlert("Định dạng email không hợp lệ!", "danger");
                return;
            }

            // Validate mật khẩu
            if (password.length < 6) {
                showMainAlert("Mật khẩu phải có ít nhất 6 ký tự!", "danger");
                return;
            }

            if (password !== confirmPassword) {
                showMainAlert("Mật khẩu xác nhận không khớp!", "danger");
                return;
            }

            // Mọi thứ OK -> Bật Modal lên & Gửi API lấy mã
            document.getElementById('displayEmail').textContent = email;
            verifyModal.show();
            await sendVerificationCode(email, false);
        });

        // 2. Hàm gọi API gửi mã
        async function sendVerificationCode(email, isResend) {
            if(isResend) {
                btnResendCode.disabled = true;
                btnResendCode.textContent = "Đang gửi...";
            }
            modalAlert.classList.add('d-none');

            try {
                const response = await fetch(`/api/v1/auth/send-code?email=${encodeURIComponent(email)}`, { method: "POST" });
                const result = await response.json();

                if (result.status === 200) {
                    showModalAlert("Mã xác minh đã được gửi đến email của bạn!", "success");
                    startCountdown(60);
                } else {
                    showModalAlert(result.message, "danger");
                    if(isResend) {
                        btnResendCode.disabled = false;
                        btnResendCode.textContent = "Gửi lại mã";
                    }
                }
            } catch (error) {
                showModalAlert("Lỗi kết nối máy chủ khi gửi mã", "danger");
                if(isResend) {
                    btnResendCode.disabled = false;
                    btnResendCode.textContent = "Gửi lại mã";
                }
            }
        }

        // 3. Xử lý Countdown nút gửi lại
        function startCountdown(seconds) {
            let counter = seconds;
            btnResendCode.disabled = true;

            const interval = setInterval(() => {
                counter--;
                btnResendCode.textContent = `Gửi lại (${counter}s)`;

                if (counter <= 0) {
                    clearInterval(interval);
                    btnResendCode.disabled = false;
                    btnResendCode.textContent = "Chưa nhận được mã? Gửi lại";
                }
            }, 1000);
        }

        // Sự kiện bấm nút Gửi lại mã
        btnResendCode.addEventListener("click", () => {
            const email = document.getElementById('registerEmail').value.trim();
            sendVerificationCode(email, true);
        });

        // 4. Xử lý nút Đăng Ký Cuối Cùng
        btnFinalRegister.addEventListener("click", async function () {
            const code = document.getElementById('verificationCode').value.trim();

            if (!code || code.length !== 6) {
                showModalAlert("Vui lòng nhập đủ 6 số mã xác minh!", "danger");
                return;
            }

            btnFinalRegister.disabled = true;
            btnFinalRegister.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Đang xử lý...';

            const payload = {
                fullName: document.getElementById('fullName').value.trim(),
                email: document.getElementById('registerEmail').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                password: document.getElementById('password').value,
                confirmPassword: document.getElementById('confirmPassword').value,
                verificationCode: code,
                // Mặc định cho luồng mới
                gender: "Other",
                city: "Other"
            };

            try {
                const response = await fetch('/api/v1/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.status === 200) {
                    showModalAlert("Đăng ký thành công! Đang chuyển hướng...", "success");
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 1500);
                } else {
                    showModalAlert(result.message, "danger");
                    btnFinalRegister.disabled = false;
                    btnFinalRegister.textContent = "Xác nhận & Đăng ký";
                }
            } catch (error) {
                showModalAlert("Lỗi hệ thống khi đăng ký!", "danger");
                btnFinalRegister.disabled = false;
                btnFinalRegister.textContent = "Xác nhận & Đăng ký";
            }
        });
    });
</script>

</body>
</html>
