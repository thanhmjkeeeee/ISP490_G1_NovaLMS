<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:with="isDashboard=true">
<head th:replace="~{fragments/head :: common-head(pageTitle='Quản lý nội dung')}"></head>
<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Quản lý nội dung', breadcrumb='Expert / Nội dung')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='content')}"></aside>
<aside th:replace="~{fragments/sidebar :: dash-overlay}"></aside>

<main class="dash-main d-flex flex-column" id="dashMain">

    <!-- Page header -->
    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h3 class="fw-bold m-0" style="color: #223a58;">Quản lý nội dung khóa học</h3>
            <p class="text-muted small m-0">Chọn khóa học để quản lý chương, bài học và câu hỏi.</p>
        </div>
    </div>

    <!-- Filters -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body p-3">
            <div class="row g-3 align-items-center">
                <div class="col-md-5">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" id="searchInput" class="form-control border-start-0 ps-0" placeholder="Tìm kiếm theo tên khóa học..." onkeyup="if(event.key==='Enter') applyFilters()">
                    </div>
                </div>
                <div class="col-md-3">
                    <select id="statusFilter" class="form-select">
                        <option value="all">Tất cả trạng thái</option>
                        <option value="Published">Published</option>
                        <option value="Active">Active</option>
                        <option value="Draft">Draft</option>
                        <option value="Closed">Closed</option>
                    </select>
                </div>
                <div class="col-md-4 text-md-end">
                    <button class="btn btn-primary px-4 rounded-pill shadow-sm" style="background: #136ad5; border:none;" onclick="applyFilters()">
                        <i class="bi bi-funnel me-2"></i>Lọc dữ liệu
                    </button>
                    <button class="btn btn-light px-3 rounded-pill border ms-2" onclick="resetFilters()">
                        <i class="bi bi-arrow-counterclockwise"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Course cards -->
    <div class="row g-4" id="courseList">
        <div class="col-12">
            <div class="text-center text-muted py-5">
                <div class="spinner-border text-primary mb-3" role="status"></div>
                <div class="small">Đang tải danh sách khóa học...</div>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <nav class="mt-5 mb-4" id="paginationNav" style="display:none;">
        <ul class="pagination justify-content-center mb-0" id="paginationList">
            <!-- Dynamic pages -->
        </ul>
    </nav>

</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<script>
let currentPage = 0;
const pageSize = 9;

async function loadCourses(page = 0) {
    const search = document.getElementById('searchInput').value;
    const status = document.getElementById('statusFilter').value;
    const container = document.getElementById('courseList');
    
    // Show loading
    container.innerHTML = `
        <div class="col-12">
            <div class="text-center text-muted py-5">
                <div class="spinner-border text-primary mb-3" role="status"></div>
                <div class="small">Đang tìm kiếm khóa học...</div>
            </div>
        </div>`;

    try {
        let url = `/api/v1/expert/modules/courses?page=${page}&limit=${pageSize}`;
        if (search) url += `&search=${encodeURIComponent(search)}`;
        if (status && status !== 'all') url += `&status=${status}`;

        const res = await fetch(url);
        const result = await res.json();

        if (result.status !== 200 || !result.data || !result.data.items || result.data.items.length === 0) {
            container.innerHTML = '<div class="col-12 text-center py-5"><div class="alert alert-info d-inline-block px-5">Không tìm thấy khóa học nào phù hợp.</div></div>';
            document.getElementById('paginationNav').style.display = 'none';
            return;
        }

        currentPage = page;
        container.innerHTML = '';
        
        result.data.items.forEach(course => {
            const statusStr = course.status || 'Tạm dừng';
            const statusUpper = statusStr.toUpperCase();
            let badgeClass = 'bg-secondary-subtle text-secondary';
            
            if (statusUpper === 'PUBLISHED' || statusUpper === 'ACTIVE') badgeClass = 'bg-success-subtle text-success';
            else if (statusUpper === 'DRAFT') badgeClass = 'bg-warning-subtle text-warning-emphasis';
            else if (statusUpper === 'CLOSED') badgeClass = 'bg-danger-subtle text-danger';
            
            const statusBadge = `<span class="badge rounded-pill ${badgeClass} px-3 text-uppercase" style="font-size: 0.65rem; letter-spacing: 0.5px;">${statusStr}</span>`;

            container.innerHTML += `
                <div class="col-md-6 col-xl-4">
                    <div class="card border-0 shadow-sm h-100 course-card-hover">
                        <div class="card-body d-flex flex-column">
                            <div class="d-flex align-items-start justify-content-between mb-3">
                                <div class="pe-2">
                                    <h5 class="fw-bold mb-1 line-clamp-2" style="color:#223a58;">${course.courseName || '—'}</h5>
                                    <div class="small text-muted mb-1">${course.categoryName || 'Chưa phân loại'}</div>
                                    <div class="small text-secondary"><i class="bi bi-people me-1"></i>${course.registrationCount || 0} học viên</div>
                                </div>
                                ${statusBadge}
                            </div>
                            
                            <div class="mt-auto pt-3 border-top">
                                <a href="/expert/content/course/${course.courseId}"
                                   class="btn btn-sm w-100 rounded-pill py-2 shadow-sm btn-manage-content">
                                    <i class="bi bi-stack me-2"></i>Quản lý chương & bài học
                                </a>
                            </div>
                        </div>
                    </div>
                </div>`;
        });

        renderPagination(result.data.totalPages, result.data.pageNo);

    } catch(e) {
        console.error(e);
        container.innerHTML = '<div class="col-12"><div class="alert alert-danger">Lỗi tải dữ liệu: ' + e.message + '</div></div>';
        document.getElementById('paginationNav').style.display = 'none';
    }
}

function renderPagination(totalPages, pageNo) {
    const nav = document.getElementById('paginationNav');
    const list = document.getElementById('paginationList');
    
    if (totalPages <= 1) {
        nav.style.display = 'none';
        return;
    }
    
    nav.style.display = 'block';
    list.innerHTML = '';

    // Previous button
    list.innerHTML += `
        <li class="page-item ${pageNo === 0 ? 'disabled' : ''}">
            <a class="page-link border-0 shadow-sm rounded-circle mx-1" href="javascript:void(0)" onclick="loadCourses(${pageNo - 1})" aria-label="Previous">
                <i class="bi bi-chevron-left"></i>
            </a>
        </li>`;

    // Page numbers
    for (let i = 0; i < totalPages; i++) {
        if (i === 0 || i === totalPages - 1 || (i >= pageNo - 2 && i <= pageNo + 2)) {
            list.innerHTML += `
                <li class="page-item ${i === pageNo ? 'active' : ''}">
                    <a class="page-link border-0 shadow-sm rounded-circle mx-1" href="javascript:void(0)" onclick="loadCourses(${i})">${i + 1}</a>
                </li>`;
        } else if (i === 1 || i === totalPages - 2) {
            list.innerHTML += '<li class="page-item disabled"><span class="page-link border-0 bg-transparent">...</span></li>';
        }
    }

    // Next button
    list.innerHTML += `
        <li class="page-item ${pageNo === totalPages - 1 ? 'disabled' : ''}">
            <a class="page-link border-0 shadow-sm rounded-circle mx-1" href="javascript:void(0)" onclick="loadCourses(${pageNo + 1})" aria-label="Next">
                <i class="bi bi-chevron-right"></i>
            </a>
        </li>`;
}

function applyFilters() {
    loadCourses(0);
}

function resetFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('statusFilter').value = 'all';
    loadCourses(0);
}

// Initial load
document.addEventListener('DOMContentLoaded', () => loadCourses(0));
</script>

<style>
.course-card-hover {
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.course-card-hover:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
}
.btn-manage-content {
    background: linear-gradient(45deg, #136ad5, #223a58);
    color: #fff;
    border: none;
    transition: all 0.3s ease;
    font-weight: 500;
}
.btn-manage-content:hover {
    background: linear-gradient(45deg, #223a58, #136ad5);
    color: #fff;
    box-shadow: 0 4px 12px rgba(19, 106, 213, 0.3);
    transform: scale(1.02);
}
.line-clamp-2 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
</style>
</body>
</html>
