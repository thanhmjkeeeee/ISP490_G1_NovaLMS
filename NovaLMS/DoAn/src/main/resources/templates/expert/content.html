<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:with="isDashboard=true">
<head th:replace="~{fragments/head :: common-head(pageTitle='Quản lý nội dung')}"></head>
<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Quản lý nội dung', breadcrumb='Expert / Nội dung')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='content')}"></aside>
<aside th:replace="~{fragments/sidebar :: dash-overlay}"></aside>

<main class="dash-main d-flex flex-column" id="dashMain">

    <!-- Page header -->
    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h3 class="fw-bold m-0" style="color: #223a58;">Quản lý nội dung khóa học</h3>
            <p class="text-muted small m-0">Chọn khóa học để quản lý chương, bài học và câu hỏi.</p>
        </div>
    </div>

    <!-- Course cards -->
    <div class="row g-4" id="courseList">
        <div class="col-12">
            <div class="text-center text-muted py-5">Đang tải danh sách khóa học...</div>
        </div>
    </div>

</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<script>
(async function() {
    try {
        const res = await fetch('/api/v1/expert/modules/courses');
        const result = await res.json();
        const container = document.getElementById('courseList');

        if (result.status !== 200 || !result.data || result.data.length === 0) {
            container.innerHTML = '<div class="col-12"><div class="alert alert-info">Bạn chưa sở hữu khóa học nào.</div></div>';
            return;
        }

        container.innerHTML = '';
        result.data.forEach(course => {
            const status = course.status || 'Tạm dừng';
            const isActive = status.toLowerCase() === 'active';
            const badgeClass = isActive ? 'bg-success-subtle text-success' : 'bg-warning-subtle text-warning-emphasis';
            
            const statusBadge = `<span class="badge rounded-pill ${badgeClass} px-3 text-uppercase">${status}</span>`;

            container.innerHTML += `
                <div class="col-md-6 col-xl-4">
                    <div class="card border-0 shadow-sm h-100 course-card-hover">
                        <div class="card-body d-flex flex-column">
                            <div class="d-flex align-items-start justify-content-between mb-3">
                                <div class="pe-2">
                                    <h5 class="fw-bold mb-1 line-clamp-2" style="color:#223a58;">${course.courseName || '—'}</h5>
                                    <div class="small text-muted">${course.categoryName || 'Chưa phân loại'}</div>
                                </div>
                                ${statusBadge}
                            </div>
                            
                            <div class="mt-auto pt-3">
                                <a href="/expert/content/course/${course.courseId}"
                                   class="btn btn-sm w-100 rounded-pill py-2 shadow-sm btn-manage-content">
                                    <i class="bi bi-stack me-2"></i>Quản lý chương & bài học
                                </a>
                            </div>
                        </div>
                    </div>
                </div>`;
        });
    } catch(e) {
        document.getElementById('courseList').innerHTML =
            '<div class="col-12"><div class="alert alert-danger">Lỗi tải dữ liệu: ' + e.message + '</div></div>';
    }
})();
</script>

<style>
.course-card-hover {
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.course-card-hover:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
}
.btn-manage-content {
    background: linear-gradient(45deg, #136ad5, #223a58);
    color: #fff;
    border: none;
    transition: all 0.3s ease;
    font-weight: 500;
}
.btn-manage-content:hover {
    background: linear-gradient(45deg, #223a58, #136ad5);
    color: #fff;
    box-shadow: 0 4px 12px rgba(19, 106, 213, 0.3);
    transform: scale(1.02);
}
.line-clamp-2 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
</style>
</body>
</html>
