<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:with="isDashboard=true">
<head th:replace="~{fragments/head :: common-head(pageTitle='Ngân hàng Quiz - Khóa học')}"></head>
<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Ngân hàng Quiz', breadcrumb='Expert / Quiz Bank')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='quiz-bank')}"></aside>
<aside th:replace="~{fragments/sidebar :: dash-overlay}"></aside>

<main class="dash-main" id="dashMain">

    <!-- Back + Page header -->
    <div class="d-flex justify-content-between align-items-end mb-4 flex-wrap gap-2">
        <div>
            <a href="/expert/quiz-bank" class="text-decoration-none text-muted small mb-1 d-inline-flex align-items-center">
                <i class="bi bi-arrow-left me-1"></i> Quay lại danh sách khóa học
            </a>
            <h3 class="fw-bold m-0" style="color: #223a58;">Ngân hàng Quiz</h3>
            <p class="text-muted small m-0">Quản lý Quiz cho từng chương trong khóa học.</p>
        </div>
        <a th:href="@{/expert/quiz-management/create}"
           href="/expert/quiz-management/create"
           class="btn btn-sm fw-bold shadow-sm rounded-pill px-3 text-white"
           style="background-color: #136ad5; border: none;">
            <i class="bi bi-plus-lg me-1"></i> Tạo Quiz mới
        </a>
    </div>

    <!-- Filters -->
    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body py-3">
            <div class="row g-2">
                <div class="col-6 col-md-3 d-flex flex-column justify-content-end">
                    <label class="form-label small fw-bold">Loại Quiz</label>
                    <select id="filterCategory" class="form-select form-select-sm">
                        <option value="">Tất cả</option>
                        <option value="ENTRY_TEST">Entry Test</option>
                        <option value="COURSE_QUIZ">Course Quiz</option>
                    </select>
                </div>
                <div class="col-6 col-md-3 d-flex flex-column justify-content-end">
                    <label class="form-label small fw-bold">Trạng thái</label>
                    <select id="filterStatus" class="form-select form-select-sm">
                        <option value="">Tất cả</option>
                        <option value="DRAFT">Draft</option>
                        <option value="PUBLISHED">Published</option>
                        <option value="ARCHIVED">Archived</option>
                    </select>
                </div>
                <div class="col-8 col-md-5 d-flex flex-column justify-content-end">
                    <label class="form-label small fw-bold">Tìm kiếm</label>
                    <div class="d-flex gap-2">
                        <input type="text" id="filterKeyword" class="form-control form-control-sm" placeholder="Tên quiz..." style="height:32px;">
                        <button class="btn btn-primary" onclick="loadQuizzes()" style="height:32px;padding:0 12px;display:flex;align-items:center;">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Quiz Table -->
    <div class="card border-0 shadow-sm mb-auto">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="px-4 py-3">#</th>
                        <th>Tên Quiz</th>
                        <th>Loại</th>
                        <th>Câu hỏi</th>
                        <th>Thời gian</th>
                        <th>Trạng thái</th>
                        <th class="text-end px-4">Hành động</th>
                    </tr>
                    </thead>
                    <tbody id="quizTableBody">
                    <tr><td colspan="7" class="text-center text-muted py-4">Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <nav class="mt-3"><ul class="pagination pagination-sm justify-content-center" id="pagination"></ul></nav>

</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<script>
const COURSE_ID = [[${courseId}]];
let currentPage = 0;
const pageSize = 10;

const statusBadge = (s) => {
    const map = { DRAFT: 'bg-warning text-dark', PUBLISHED: 'bg-success', ARCHIVED: 'bg-secondary' };
    return `<span class="badge ${map[s] || 'bg-light'}">${s}</span>`;
};

const categoryBadge = (c) => {
    const map = { ENTRY_TEST: 'bg-info text-dark', COURSE_QUIZ: 'bg-primary' };
    return `<span class="badge ${map[c] || 'bg-light'}">${c === 'ENTRY_TEST' ? 'Entry Test' : 'Course Quiz'}</span>`;
};

async function loadQuizzes(page = 0) {
    currentPage = page;
    const params = new URLSearchParams();
    params.append('courseId', COURSE_ID);
    const cat = document.getElementById('filterCategory').value;
    const status = document.getElementById('filterStatus').value;
    const keyword = document.getElementById('filterKeyword').value;
    if (cat) params.append('category', cat);
    if (status) params.append('status', status);
    if (keyword) params.append('keyword', keyword);
    params.append('page', page);
    params.append('size', pageSize);

    try {
        const res = await fetch(`/api/v1/expert/quizzes?${params}`);
        const result = await res.json();
        const tbody = document.getElementById('quizTableBody');

        if (result.status === 200 && result.data && result.data.items && result.data.items.length > 0) {
            tbody.innerHTML = result.data.items.map((q, i) => `
                <tr>
                    <td class="px-4 py-3">${page * pageSize + i + 1}</td>
                    <td class="fw-medium">${escape(q.title || '—')}</td>
                    <td>${categoryBadge(q.quizCategory)}</td>
                    <td><span class="badge bg-light text-dark">${q.totalQuestions || 0} câu</span></td>
                    <td>${q.timeLimitMinutes ? q.timeLimitMinutes + ' phút' : 'Không giới hạn'}</td>
                    <td>${statusBadge(q.status)}</td>
                    <td class="text-end px-4">
                        <a href="/expert/quiz-management/${q.quizId}/questions" class="btn btn-sm btn-outline-info me-1" title="Quản lý câu hỏi">
                            <i class="bi bi-list-check"></i>
                        </a>
                        <a href="/expert/quiz-management/${q.quizId}/edit" class="btn btn-sm btn-outline-primary me-1">
                            <i class="bi bi-pencil"></i>
                        </a>
                        ${!q.hasAttempts ? `<button class="btn btn-sm btn-outline-danger" onclick="deleteQuiz(${q.quizId})"><i class="bi bi-trash"></i></button>` : ''}
                    </td>
                </tr>
            `).join('');
            renderPagination(result.data);
        } else {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">Không tìm thấy quiz nào.</td></tr>';
            document.getElementById('pagination').innerHTML = '';
        }
    } catch (e) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center text-danger py-4">Lỗi: ' + e.message + '</td></tr>';
    }
}

function renderPagination(data) {
    const ul = document.getElementById('pagination');
    let html = '';
    for (let i = 0; i < data.totalPages; i++) {
        html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                    <a class="page-link" href="javascript:void(0)" onclick="loadQuizzes(${i})">${i + 1}</a></li>`;
    }
    ul.innerHTML = html;
}

async function deleteQuiz(id) {
    if (!confirm('Bạn có chắc muốn xóa quiz này?')) return;
    try {
        const res = await fetch(`/api/v1/expert/quizzes/${id}`, { method: 'DELETE' });
        const result = await res.json();
        if (res.ok) loadQuizzes(currentPage);
        else alert(result.message || 'Không thể xóa.');
    } catch (e) { alert('Lỗi: ' + e.message); }
}

function escape(str) {
    if (str == null) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

loadQuizzes();
</script>
</body>
</html>
