<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:with="isDashboard=true">
<head th:replace="~{fragments/head :: common-head(pageTitle='Câu hỏi trong Quiz - Expert')}"></head>
<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Quản lý câu hỏi Quiz', breadcrumb='Expert / Quiz Management')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='quiz-management')}"></aside>
<aside th:replace="~{fragments/sidebar :: dash-overlay}"></aside>

<main class="dash-main d-flex flex-column" id="dashMain">

    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h3 class="fw-bold m-0" style="color: #223a58;">Câu hỏi trong Quiz</h3>
            <p class="text-muted small m-0" id="quizTitle">Đang tải...</p>
        </div>
        <div class="d-flex gap-2">
            <!-- Nút Publish — hiện khi quiz đang là DRAFT -->
            <button type="button" class="btn btn-sm btn-success rounded-pill px-3 d-none" id="btnPublish"
                    onclick="publishQuiz()">
                <i class="bi bi-rocket me-1"></i> Xuất bản Quiz
            </button>
            <button type="button" class="btn btn-sm btn-outline-success rounded-pill px-3" onclick="openAddModal()">
                <i class="bi bi-plus-lg me-1"></i> Thêm câu hỏi
            </button>
            <a th:href="@{/expert/quiz-management}" class="btn btn-sm btn-outline-secondary rounded-pill px-3">
                <i class="bi bi-arrow-left me-1"></i> Quay lại
            </a>
        </div>
    </div>

    <!-- Current Questions in Quiz -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white py-3 border-bottom d-flex justify-content-between align-items-center">
            <h6 class="m-0 fw-bold" style="color: #223a58;">Danh sách câu hỏi trong Quiz (<span id="questionCount">0</span> câu)</h6>
            <button class="btn btn-sm btn-primary" onclick="saveChanges()">
                <i class="bi bi-floppy me-1"></i> Lưu thay đổi
            </button>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="px-4 py-3" style="width:60px">STT</th>
                        <th>Nội dung</th>
                        <th>Loại</th>
                        <th>Kỹ năng</th>
                        <th>CEFR</th>
                        <th>Điểm</th>
                        <th class="text-end px-4">Hành động</th>
                    </tr>
                    </thead>
                    <tbody id="quizQuestionsBody">
                    <tr><td colspan="7" class="text-center text-muted py-4">Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</main>

<!-- Add Question Modal -->
<div class="modal fade" id="addQuestionModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">Chọn câu hỏi từ Question Bank</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <!-- Filters in Modal -->
                <div class="row g-2 mb-3">
                    <div class="col-md-2">
                        <select id="modalSkill" class="form-select form-select-sm">
                            <option value="">Kỹ năng</option>
                            <option value="LISTENING">Listening</option>
                            <option value="READING">Reading</option>
                            <option value="WRITING">Writing</option>
                            <option value="SPEAKING">Speaking</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <select id="modalCefr" class="form-select form-select-sm">
                            <option value="">CEFR</option>
                            <option value="A1">A1</option><option value="A2">A2</option>
                            <option value="B1">B1</option><option value="B2">B2</option>
                            <option value="C1">C1</option><option value="C2">C2</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <input type="text" id="modalKeyword" class="form-control form-control-sm" placeholder="Tìm kiếm...">
                    </div>
                    <div class="col-md-1">
                        <button class="btn btn-sm btn-primary w-100" onclick="loadBankQuestions()"><i class="bi bi-search"></i></button>
                    </div>
                </div>

                <table class="table table-hover table-sm">
                    <thead class="table-light">
                    <tr>
                        <th>Nội dung</th>
                        <th>Loại</th>
                        <th>Kỹ năng</th>
                        <th>CEFR</th>
                        <th>Chủ đề</th>
                        <th class="text-end">Thêm</th>
                    </tr>
                    </thead>
                    <tbody id="bankQuestionsBody">
                    <tr><td colspan="6" class="text-center text-muted py-3">Nhấn tìm kiếm...</td></tr>
                    </tbody>
                </table>
                <nav><ul class="pagination pagination-sm justify-content-center" id="modalPagination"></ul></nav>

                <!-- Preview section -->
                <div id="previewSection" class="mt-3 p-3 bg-light rounded d-none">
                    <h6 class="fw-bold">Preview câu hỏi</h6>
                    <div id="previewContent"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<script th:inline="javascript">
const quizId = /*[[${quizId}]]*/ 0;
let quizQuestions = [];
let currentBankPage = 0;

const typeName = (t) => ({
    MULTIPLE_CHOICE_SINGLE: 'MC (Single)', MULTIPLE_CHOICE_MULTI: 'MC (Multi)',
    FILL_IN_BLANK: 'Fill Blank', MATCHING: 'Matching', WRITING: 'Writing', SPEAKING: 'Speaking'
}[t] || t);

// ── Load quiz details and its questions ──
async function loadQuizQuestions() {
    try {
        const res = await fetch(`/api/v1/expert/quizzes/${quizId}`);
        const result = await res.json();
        if (result.status === 200 && result.data) {
            const quiz = result.data;
            window.currentQuiz = quiz;
            document.getElementById('quizTitle').textContent = `Quiz: ${quiz.title || '—'} (${quiz.quizCategory === 'ENTRY_TEST' ? 'Entry Test' : 'Course Quiz'})`;
            document.getElementById('questionCount').textContent = quiz.totalQuestions;
            quizQuestions = quiz.questions || [];

            // Hiện nút Publish nếu quiz đang là DRAFT và có ≥1 câu hỏi
            const publishBtn = document.getElementById('btnPublish');
            if (quiz.status === 'DRAFT' && quiz.totalQuestions > 0) {
                publishBtn.classList.remove('d-none');
                publishBtn.disabled = false;
            } else {
                publishBtn.classList.add('d-none');
            }
            if (quiz.status === 'PUBLISHED') {
                publishBtn.classList.add('d-none');
            }

            renderQuizQuestions();
        }
    } catch (e) { console.error(e); }
}

let _expandedGroups = new Set();

function toggleGroup(groupId) {
    if (_expandedGroups.has(groupId)) _expandedGroups.delete(groupId);
    else _expandedGroups.add(groupId);
    renderQuizQuestions();
}

function renderQuizQuestions() {
    const tbody = document.getElementById('quizQuestionsBody');
    if (quizQuestions.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">Chưa có câu hỏi nào. Nhấn "Thêm câu hỏi" để bắt đầu.</td></tr>';
        document.getElementById('questionCount').textContent = '0';
        return;
    }

    // Nhóm câu hỏi
    const groups = new Map();
    const lones = [];
    quizQuestions.forEach(q => {
        if (q.groupId) {
            if (!groups.has(q.groupId)) groups.set(q.groupId, { id: q.groupId, content: q.groupContent, items: [] });
            groups.get(q.groupId).items.push(q);
        } else {
            lones.push(q);
        }
    });

    document.getElementById('questionCount').textContent = groups.size + lones.length;

    let html = '';
    let stt = 0;

    // Render Groups
    groups.forEach(g => {
        stt++;
        const isExpanded = _expandedGroups.has(g.id);
        const first = g.items[0];
        html += `
        <tr class="table-primary border-top" style="background-color: #f8f9ff !important;" data-group-id="${g.id}">
            <td class="px-4 py-2 fw-bold text-dark">
                ${stt}
            </td>
            <td colspan="4" class="py-2">
                <div class="d-flex align-items-center">
                    <button class="btn btn-sm btn-light me-2 rounded-circle p-0" style="width:24px; height:24px;" onclick="toggleGroup(${g.id})">
                        <i class="bi ${isExpanded ? 'bi-dash' : 'bi-plus'}"></i>
                    </button>
                    <div class="fw-bold text-primary"><i class="bi bi-journal-text me-1"></i> BỘ CÂU HỎI (PASSAGE) - ${g.items.length} câu con</div>
                </div>
                <div class="px-5 small text-muted text-truncate-2" style="font-style: italic;">${g.content || '—'}</div>
                <div class="px-5 mt-1">
                    <span class="small text-muted me-2">Thứ tự trong đề:</span>
                    <input type="number" class="form-control d-inline-block form-control-sm" style="width:60px" value="${first.orderIndex ?? ''}" data-group-order="${g.id}" min="1">
                </div>
            </td>
            <td class="py-2">
                <input type="number" class="form-control form-control-sm" style="width:70px" value="${first.points ?? 1}" data-group-points="${g.id}" step="0.1">
            </td>
            <td class="text-end px-4">
                <button class="btn btn-sm btn-link text-danger" onclick="removeGroup(${g.id})" title="Gỡ bộ"><i class="bi bi-trash"></i> Gỡ bộ</button>
            </td>
        </tr>
        `;
        
        if (isExpanded) {
            g.items.forEach((sq, idx) => {
                html += `
                <tr data-qid="${sq.questionId}" class="bg-light bg-opacity-10">
                    <td class="ps-5 py-2">
                        <!-- Trống STT cho câu con -->
                    </td>
                    <td style="max-width:300px" class="text-truncate small text-muted">${sq.questionContent || '—'}</td>
                    <td><span class="badge bg-light text-dark extra-small">${typeName(sq.questionType)}</span></td>
                    <td class="extra-small">${sq.skill}</td>
                    <td><span class="badge bg-light text-primary extra-small">${sq.cefrLevel}</span></td>
                    <td class="extra-small text-muted">${sq.points ?? 1}</td>
                    <td class="text-end px-4">
                         <!-- Không cho xóa lẻ -->
                    </td>
                </tr>
                `;
            });
        }
    });

    // Render Lones
    lones.forEach((q, i) => {
        stt++;
        html += `
        <tr data-qid="${q.questionId}">
            <td class="px-4 py-3 fw-bold text-dark">
                ${stt}
            </td>
            <td style="max-width:300px" class="text-truncate fw-medium">
                <div class="text-dark small text-truncate-2">${q.questionContent || '—'}</div>
                <div class="mt-1">
                    <span class="extra-small text-muted">Thứ tự:</span>
                    <input type="number" class="form-control d-inline-block form-control-sm" style="width:55px;height:24px;padding:0 5px;" value="${q.orderIndex ?? ''}" data-order="${q.questionId}" min="1">
                </div>
            </td>
            <td><span class="badge bg-info text-dark">${typeName(q.questionType)}</span></td>
            <td>${q.skill}</td>
            <td><span class="badge bg-primary">${q.cefrLevel}</span></td>
            <td>
                <input type="number" class="form-control form-control-sm" style="width:70px" value="${q.points ?? 1}" data-points="${q.questionId}" step="0.1">
            </td>
            <td class="text-end px-4">
                <button class="btn btn-sm btn-outline-danger" onclick="removeQuestion(${q.questionId})"><i class="bi bi-x-lg"></i></button>
            </td>
        </tr>
        `;
    });

    tbody.innerHTML = html;
}

async function removeGroup(groupId) {
    if (!confirm('Gỡ toàn bộ Passage này cùng các câu hỏi con?')) return;
    try {
        const res = await fetch(`/api/v1/expert/quizzes/${quizId}/groups/${groupId}`, { method: 'DELETE' });
        if (res.ok) loadQuizQuestions();
        else { const r = await res.json(); alert(r.message || 'Lỗi'); }
    } catch (e) { alert('Lỗi: ' + e.message); }
}

// ── Remove question from quiz ──
async function removeQuestion(questionId) {
    if (!confirm('Gỡ câu hỏi này khỏi quiz?')) return;
    try {
        const res = await fetch(`/api/v1/expert/quizzes/${quizId}/questions/${questionId}`, { method: 'DELETE' });
        if (res.ok) loadQuizQuestions();
        else { const r = await res.json(); alert(r.message || 'Lỗi'); }
    } catch (e) { alert('Lỗi: ' + e.message); }
}

// ── Save reordered questions ──
async function saveChanges() {
    const orderedList = [];

    // Lấy câu lẻ
    document.querySelectorAll('[data-order]').forEach(input => {
        const qid = parseInt(input.getAttribute('data-order'));
        const pointsInput = document.querySelector(`[data-points="${qid}"]`);
        orderedList.push({
            questionId: qid,
            orderIndex: parseInt(input.value) || 1,
            points: pointsInput ? parseFloat(pointsInput.value) : 1.0
        });
    });

    // Lấy bộ Passage — dùng orderIndex riêng biệt để không ghi đè lên câu lẻ
    document.querySelectorAll('[data-group-order]').forEach(input => {
        const gid = parseInt(input.getAttribute('data-group-order'));
        const gOrder = parseInt(input.value) || 1;
        const gPointsInput = document.querySelector(`[data-group-points="${gid}"]`);
        const gPoints = gPointsInput ? parseFloat(gPointsInput.value) : 1.0;

        // Áp dụng orderIndex và points cho tất cả câu hỏi con trong group
        quizQuestions.filter(q => q.groupId === gid).forEach(sq => {
            orderedList.push({
                questionId: sq.questionId,
                orderIndex: gOrder,
                points: gPoints
            });
        });
    });

    if (orderedList.length === 0) {
        window.location.href = '/expert/quiz-management';
        return;
    }

    try {
        const res = await fetch(`/api/v1/expert/quizzes/${quizId}/questions/reorder`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(orderedList)
        });
        if (res.ok) {
            window.location.href = '/expert/quiz-management';
        } else {
            const r = await res.json();
            alert(r.message || 'Lỗi khi lưu!');
        }
    } catch (e) { alert('Lỗi: ' + e.message); }
}

// ── Modal: Add questions ──
function openAddModal() {
    currentBankPage = 0;
    new bootstrap.Modal(document.getElementById('addQuestionModal')).show();

    const quiz = window.currentQuiz;
    const skillSelect = document.getElementById('modalSkill');
    skillSelect.disabled = false;
    const note = document.getElementById('modalSkillLockedNote');
    if (note) note.remove();

    loadBankQuestions(0);
}

async function loadBankQuestions(page) {
    if (page === undefined || page === null) {
        page = currentBankPage;
    } else {
        currentBankPage = page;
    }
    const params = new URLSearchParams();
    const skill = document.getElementById('modalSkill').value;
    const cefr = document.getElementById('modalCefr').value;
    const keyword = document.getElementById('modalKeyword').value;
    if (skill) params.append('skill', skill);
    if (cefr) params.append('cefrLevel', cefr);
    if (keyword) params.append('keyword', keyword);
    params.append('status', 'PUBLISHED');
    params.append('page', page);
    params.append('size', 10);

    try {
        const res = await fetch(`/api/v1/expert/question-bank?${params}`);
        const result = await res.json();
        const tbody = document.getElementById('bankQuestionsBody');

        if (result.status === 200 && result.data && result.data.items.length > 0) {
            const existingIds = new Set(quizQuestions.map(q => q.questionId));
            let html = '';
            result.data.items.forEach(q => {
                let canAdd = true;
                if (window.currentQuiz && window.currentQuiz.quizCategory === 'ENTRY_TEST') {
                    if (q.questionType !== 'MULTIPLE_CHOICE_SINGLE' &&
                        q.questionType !== 'MULTIPLE_CHOICE_MULTI' &&
                        q.questionType !== 'MATCHING' &&
                        q.questionType !== 'WRITING' &&
                        q.questionType !== 'SPEAKING') {
                        canAdd = false;
                    }
                }
                
                let isAdded = false;
                if (q.type === 'SINGLE') {
                    isAdded = existingIds.has(q.id);
                } else if (q.type === 'GROUP' && q.questions) {
                    isAdded = q.questions.some(subQ => existingIds.has(subQ.questionId));
                }

                let actionBtn = '';
                if (isAdded) {
                    actionBtn = '<span class="badge bg-success text-white px-2 py-1"><i class="bi bi-check-lg me-1"></i>Đã thêm</span>';
                } else if (!canAdd) {
                    actionBtn = '<span class="badge bg-warning text-dark" title="Không hỗ trợ cho Entry Test">Không hợp lệ</span>';
                } else {
                    actionBtn = `<button class="btn btn-sm btn-success rounded-pill px-3" onclick="addToQuiz(${q.id}, '${q.type}')"><i class="bi bi-plus"></i> Thêm</button>`;
                }

                html += `
                <tr>
                    <td style="max-width:250px" class="text-truncate" title="${q.content}">${q.content || '—'}</td>
                    <td><span class="badge bg-light text-dark border-0">${typeName(q.questionType)}</span></td>
                    <td>${q.skill}</td>
                    <td><span class="badge bg-info text-dark">${q.cefrLevel}</span></td>
                    <td>${q.topic || '—'}</td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-outline-info border-0 me-1" onclick="previewQuestion(${q.id})"><i class="bi bi-eye"></i></button>
                        ${actionBtn}
                    </td>
                </tr>
                `;
            });
            tbody.innerHTML = html;

            // Pagination
            const pg = document.getElementById('modalPagination');
            let paginationHtml = '';
            for (let i = 0; i < result.data.totalPages; i++) {
                paginationHtml += `<li class="page-item ${i === page ? 'active' : ''}">
                            <a class="page-link" href="javascript:void(0)" onclick="loadBankQuestions(${i})">${i + 1}</a></li>`;
            }
            pg.innerHTML = paginationHtml;
        } else {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3">Không tìm thấy câu hỏi Published nào.</td></tr>';
        }
    } catch (e) { console.error(e); }
}

async function previewQuestion(questionId) {
    try {
        const res = await fetch(`/api/v1/expert/question-bank/${questionId}`);
        const result = await res.json();
        if (result.status === 200 && result.data) {
            const q = result.data;
            const section = document.getElementById('previewSection');
            section.classList.remove('d-none');
            let optionsHtml = '';
            if (q.options && q.options.length > 0) {
                if (q.questionType === 'MATCHING') {
                    const rightItems = (q.matchRightOptions || []).map(o => o.title);
                    optionsHtml = `<div class="row mt-2">
                        <div class="col-6">
                            <ul class="list-group list-group-flush">` +
                            q.options.map(o => `<li class="list-group-item">${o.title} <span class="text-muted">→</span> <strong>${o.matchTarget || ''}</strong></li>`).join('') +
                        `</ul>
                        </div>
                        <div class="col-6">
                            <ul class="list-group list-group-flush">` +
                            rightItems.map(title => `<li class="list-group-item">${title}</li>`).join('') +
                        `</ul>
                        </div>
                    </div>`;
                } else {
                    optionsHtml = '<ul class="list-group list-group-flush mt-2">' +
                        q.options.map(o => `<li class="list-group-item ${o.correctAnswer ? 'list-group-item-success' : ''}">
                            ${o.title} ${o.correctAnswer ? '✓' : ''}
                        </li>`).join('') + '</ul>';
                }
            }
            document.getElementById('previewContent').innerHTML = `
                <p><strong>Loại:</strong> ${typeName(q.questionType)} | <strong>Skill:</strong> ${q.skill} | <strong>CEFR:</strong> ${q.cefrLevel}</p>
                <p>${q.content || '—'}</p>
                ${q.explanation ? `<p class="text-muted small"><i>Giải thích:</i> ${q.explanation}</p>` : ''}
                ${optionsHtml}
            `;
        }
    } catch (e) { console.error(e); }
}

async function addToQuiz(id, type) {
    try {
        const res = await fetch(`/api/v1/expert/quizzes/${quizId}/questions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                questionId: id, 
                itemType: type,
                points: 1.0 
            })
        });
        const result = await res.json();
        if (res.ok) {
            loadQuizQuestions();
            loadBankQuestions(currentBankPage);
        } else {
            alert(result.message || 'Không thể thêm.');
        }
    } catch (e) { alert('Lỗi: ' + e.message); }
}

async function publishQuiz() {
    if (!confirm('Xuất bản quiz? Sau khi xuất bản, quiz sẽ xuất hiện trên trang /placement-test (nếu là Entry Test).')) return;

    const btn = document.getElementById('btnPublish');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Đang xuất bản...';

    try {
        const res = await fetch(`/api/v1/expert/quizzes/${quizId}/status`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: 'PUBLISHED' })
        });
        const result = await res.json();
        if (res.ok) {
            alert('Xuất bản thành công!');
            loadQuizQuestions();
        } else {
            alert(result.message || 'Lỗi khi xuất bản.');
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-rocket me-1"></i> Xuất bản Quiz';
        }
    } catch (e) {
        alert('Lỗi: ' + e.message);
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-rocket me-1"></i> Xuất bản Quiz';
    }
}

loadQuizQuestions();
</script>
</body>
</html>
