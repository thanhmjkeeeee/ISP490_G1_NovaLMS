<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:with="isDashboard=true">
<head th:replace="~{fragments/head :: common-head(pageTitle='Quiz Management - Expert')}"></head>
<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Quiz Management', breadcrumb='Expert')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='quiz-management')}"></aside>
<aside th:replace="~{fragments/sidebar :: dash-overlay}"></aside>

<main class="dash-main d-flex flex-column" id="dashMain">

    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h3 class="fw-bold m-0" style="color: #223a58;" th:text="${mode == 'ASSIGNMENT' ? 'Quản lý Bài tập lớn' : 'Quản lý Bộ đề (Quiz)'}">Quản lý Quiz & Bài tập lớn</h3>
            <p class="text-muted small m-0" th:text="${mode == 'ASSIGNMENT' ? 'Tạo và quản lý bài tập về nhà (Assignment).' : 'Tạo và quản lý các bộ đề kiểm tra (Quiz).'}">Tạo và quản lý tất cả loại đề kiểm tra.</p>
        </div>
        <a th:href="@{/expert/quiz-management/create}" class="btn btn-sm fw-bold shadow-sm d-flex align-items-center rounded-pill px-3 text-white" style="background-color: #136ad5;">
            <i class="bi bi-plus-lg me-1"></i> Tạo Quiz / Bài tập lớn
        </a>
    </div>

    <!-- Filters -->
    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body py-3">
            <div class="row g-2 align-items-end">
                <div class="col-6 col-md-3">
                    <label class="form-label small fw-bold">Khóa học</label>
                    <select id="filterCourse" class="form-select form-select-sm" onchange="loadQuizzes()">
                        <option value="">Tất cả khóa học</option>
                        <option th:each="c : ${courses}" th:value="${c.courseId}" th:text="${c.courseName}"></option>
                    </select>
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label small fw-bold">Loại Quiz</label>
                    <select id="filterCategory" class="form-select form-select-sm" onchange="loadQuizzes()">
                        <option value="">Tất cả loại</option>
                        <option value="COURSE_QUIZ">Bài KT Khóa học</option>
                        <option value="MODULE_QUIZ">Bài KT Module</option>
                        <option value="LESSON_QUIZ">Bài KT Bài học</option>
                        <option value="COURSE_ASSIGNMENT">BTL Khóa học</option>
                        <option value="MODULE_ASSIGNMENT">BTL Module</option>
                    </select>
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label small fw-bold">Trạng thái</label>
                    <select id="filterStatus" class="form-select form-select-sm" onchange="loadQuizzes()">
                        <option value="">Tất cả</option>
                        <option value="DRAFT">Draft</option>
                        <option value="PUBLISHED">Published</option>
                        <option value="ARCHIVED">Archived</option>
                    </select>
                </div>
                <div class="col-md-5">
                    <label class="form-label small fw-bold">Tìm kiếm nhanh</label>
                    <input type="text" id="filterKeyword" class="form-control form-control-sm" placeholder="Tên quiz...">
                </div>
            </div>
        </div>
    </div>

    <!-- Quiz Table -->
    <div class="card border-0 shadow-sm mb-auto">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="px-4 py-3">#</th>
                        <th>Tên Quiz</th>
                        <th>Loại</th>
                        <th>Khóa học</th>
                        <th>Phạm vi</th>
                        <th>Câu hỏi</th>
                        <th>Trạng thái</th>
                        <th class="text-end px-4">Hành động</th>
                    </tr>
                    </thead>
                    <tbody id="quizTableBody">
                    <tr><td colspan="8" class="text-center text-muted py-4">Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <nav class="mt-3"><ul class="pagination pagination-sm justify-content-center" id="pagination"></ul></nav>

</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<script>
let currentPage = 0;
const pageSize = 10;

const statusBadge = (s) => {
    const map = { DRAFT: 'bg-warning text-dark', PUBLISHED: 'bg-success', ARCHIVED: 'bg-secondary' };
    return `<span class="badge ${map[s] || 'bg-light'}">${s}</span>`;
};

const categoryBadge = (c) => {
    const map = {
        ENTRY_TEST:'bg-info text-dark',
        COURSE_QUIZ:'bg-primary',
        MODULE_QUIZ:'bg-secondary',
        LESSON_QUIZ:'bg-dark',
        COURSE_ASSIGNMENT:'bg-warning text-dark',
        MODULE_ASSIGNMENT:'bg-success'
    };
    const labels = {
        ENTRY_TEST:'Entry Test',
        COURSE_QUIZ:'Bài KT Khóa học',
        MODULE_QUIZ:'Bài KT Module',
        LESSON_QUIZ:'Bài KT Bài học',
        COURSE_ASSIGNMENT:'BTL Khóa học',
        MODULE_ASSIGNMENT:'BTL Module'
    };
    return `<span class="badge ${map[c] || 'bg-light'}">${labels[c] || c}</span>`;
};

window.onload = () => {
    // Nếu ở chế độ Assignment, tự động chọn filter BTL
    const mode = '[[${mode}]]'; 
    if (mode === 'ASSIGNMENT') {
        const catFilter = document.getElementById('filterCategory');
        if (catFilter) catFilter.value = 'COURSE_ASSIGNMENT';
    }
    let quizListKeywordDebounce;
    document.getElementById('filterKeyword').addEventListener('input', function () {
        clearTimeout(quizListKeywordDebounce);
        quizListKeywordDebounce = setTimeout(function () { loadQuizzes(0); }, 400);
    });
    loadQuizzes();
};

async function loadQuizzes(page = 0) {
    currentPage = page;
    const courseId = document.getElementById('filterCourse').value;
    const cat = document.getElementById('filterCategory').value;
    const status = document.getElementById('filterStatus').value;
    const keyword = document.getElementById('filterKeyword').value;
    
    const params = new URLSearchParams();
    if (courseId) params.append('courseId', courseId);
    if (cat) params.append('category', cat);
    if (status) params.append('status', status);
    if (keyword) params.append('keyword', keyword);
    params.append('page', page);
    params.append('size', pageSize);

    try {
        const res = await fetch(`/api/v1/expert/quizzes?${params}`);
        const result = await res.json();
        const tbody = document.getElementById('quizTableBody');

        if (result.status === 200 && result.data && result.data.items.length > 0) {
            tbody.innerHTML = result.data.items.map((q, i) => `
                <tr>
                    <td class="px-4 py-3">${page * pageSize + i + 1}</td>
                    <td class="fw-medium">${q.title || '—'}</td>
                    <td>${categoryBadge(q.quizCategory)}</td>
                    <td>${q.courseName || '—'}</td>
                    <td><span class="small text-muted">${q.moduleName || q.lessonName || '—'}</span></td>
                    <td><span class="badge bg-light text-dark">${q.totalQuestions} câu</span></td>
                    <td>${statusBadge(q.status)}</td>
                    <td class="text-end px-4">
                        <a href="/expert/quiz-management/${q.quizId}/questions" class="btn btn-sm btn-outline-info me-1" title="Quản lý câu hỏi"><i class="bi bi-list-check"></i></a>
                        <a href="/expert/quiz-management/${q.quizId}/edit" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a>
                        ${!q.hasAttempts ? `<button class="btn btn-sm btn-outline-danger" onclick="deleteQuiz(${q.quizId})"><i class="bi bi-trash"></i></button>` : ''}
                    </td>
                </tr>
            `).join('');
            renderPagination(result.data);
        } else {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">Không tìm thấy quiz nào.</td></tr>';
            document.getElementById('pagination').innerHTML = '';
        }
    } catch (e) { console.error(e); }
}

function renderPagination(data) {
    NovaPagination.render('pagination', data.totalPages, currentPage, 'loadQuizzes');
}

async function deleteQuiz(id) {
    if (!confirm('Bạn có chắc muốn xóa quiz này?')) return;
    try {
        const res = await fetch(`/api/v1/expert/quizzes/${id}`, { method: 'DELETE' });
        const result = await res.json();
        if (res.ok) loadQuizzes(currentPage);
        else alert(result.message || 'Không thể xóa.');
    } catch (e) { alert('Lỗi: ' + e.message); }
}

</script>
</body>
</html>
