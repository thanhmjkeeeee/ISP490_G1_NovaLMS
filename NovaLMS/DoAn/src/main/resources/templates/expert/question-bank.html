<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:with="isDashboard=true">
<head th:replace="~{fragments/head :: common-head(pageTitle='Question Bank - Expert')}"></head>
<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Question Bank', breadcrumb='Expert')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='question-bank')}"></aside>
<aside th:replace="~{fragments/sidebar :: dash-overlay}"></aside>

<main class="dash-main d-flex flex-column" id="dashMain">

    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h3 class="fw-bold m-0" style="color: #223a58;">Quản lý ngân hàng đề</h3>
            <p class="text-muted small m-0">Quản lý toàn bộ câu hỏi trong hệ thống.</p>
        </div>
        <a th:href="@{/expert/question-bank/create}" class="btn btn-sm fw-bold shadow-sm d-flex align-items-center rounded-pill px-3 text-white" style="background-color: #136ad5;">
            <i class="bi bi-plus-lg me-1"></i> Tạo câu hỏi
        </a>
    </div>

    <!-- Filters -->
    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body py-3">
            <div class="row g-2">
                <div class="col-6 col-md-2 d-flex flex-column justify-content-end">
                    <label class="form-label small fw-bold">Kỹ năng</label>
                    <select id="filterSkill" class="form-select form-select-sm">
                        <option value="">Tất cả</option>
                        <option value="LISTENING">Listening</option>
                        <option value="READING">Reading</option>
                        <option value="WRITING">Writing</option>
                        <option value="SPEAKING">Speaking</option>
                    </select>
                </div>
                <div class="col-6 col-md-2 d-flex flex-column justify-content-end">
                    <label class="form-label small fw-bold">CEFR</label>
                    <select id="filterCefr" class="form-select form-select-sm">
                        <option value="">Tất cả</option>
                        <option value="A1">A1</option>
                        <option value="A2">A2</option>
                        <option value="B1">B1</option>
                        <option value="B2">B2</option>
                        <option value="C1">C1</option>
                        <option value="C2">C2</option>
                    </select>
                </div>
                <div class="col-6 col-md-2 d-flex flex-column justify-content-end">
                    <label class="form-label small fw-bold">Loại</label>
                    <select id="filterType" class="form-select form-select-sm">
                        <option value="">Tất cả</option>
                        <option value="MULTIPLE_CHOICE_SINGLE">MC (Single)</option>
                        <option value="MULTIPLE_CHOICE_MULTI">MC (Multi)</option>
                        <option value="FILL_IN_BLANK">Fill in Blank</option>
                        <option value="MATCHING">Matching</option>
                        <option value="WRITING">Writing</option>
                        <option value="SPEAKING">Speaking</option>
                    </select>
                </div>
                <div class="col-6 col-md-2 d-flex flex-column justify-content-end">
                    <label class="form-label small fw-bold">Trạng thái</label>
                    <select id="filterStatus" class="form-select form-select-sm">
                        <option value="">Tất cả</option>
                        <option value="DRAFT">Draft</option>
                        <option value="PUBLISHED">Published</option>
                        <option value="ARCHIVED">Archived</option>
                    </select>
                </div>
                <div class="col-8 col-md-3 d-flex flex-column justify-content-end">
                    <label class="form-label small fw-bold">Tìm kiếm</label>
                    <div class="d-flex gap-2">
                        <input type="text" id="filterKeyword" class="form-control form-control-sm" placeholder="Nội dung câu hỏi...">
                        <button class="btn btn-sm btn-primary" onclick="loadQuestions()" style="padding:0 12px;display:flex;align-items:center;">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Questions Table -->
    <div class="card border-0 shadow-sm mb-auto">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="px-4 py-3">#</th>
                        <th>Nội dung</th>
                        <th>Loại</th>
                        <th>Kỹ năng</th>
                        <th>CEFR</th>
                        <th>Chủ đề</th>
                        <th>Trạng thái</th>
                        <th>Quiz sử dụng</th>
                        <th class="text-end px-4">Hành động</th>
                    </tr>
                    </thead>
                    <tbody id="questionsTableBody">
                    <tr>
                        <td colspan="9" class="text-center text-muted py-4">Đang tải...</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <nav class="mt-3">
        <ul class="pagination pagination-sm justify-content-center" id="pagination"></ul>
    </nav>

</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<script>
let currentPage = 0;
const pageSize = 10;

const statusBadge = (s) => {
    const map = { DRAFT: 'bg-warning text-dark', PUBLISHED: 'bg-success', ARCHIVED: 'bg-secondary' };
    return `<span class="badge ${map[s] || 'bg-light text-dark'}">${s}</span>`;
};

const typeName = (t) => {
    const map = {
        MULTIPLE_CHOICE_SINGLE: 'MC (Single)', MULTIPLE_CHOICE_MULTI: 'MC (Multi)',
        FILL_IN_BLANK: 'Fill Blank', MATCHING: 'Matching', WRITING: 'Writing', SPEAKING: 'Speaking'
    };
    return map[t] || t;
};

async function loadQuestions(page = 0) {
    currentPage = page;
    const params = new URLSearchParams();
    const skill = document.getElementById('filterSkill').value;
    const cefr = document.getElementById('filterCefr').value;
    const type = document.getElementById('filterType').value;
    const status = document.getElementById('filterStatus').value;
    const keyword = document.getElementById('filterKeyword').value;

    if (skill) params.append('skill', skill);
    if (cefr) params.append('cefrLevel', cefr);
    if (type) params.append('questionType', type);
    if (status) params.append('status', status);
    if (keyword) params.append('keyword', keyword);
    params.append('page', page);
    params.append('size', pageSize);

    try {
        const res = await fetch(`/api/v1/expert/question-bank?${params}`);
        const result = await res.json();
        const tbody = document.getElementById('questionsTableBody');

        if (result.status === 200 && result.data && result.data.items.length > 0) {
            tbody.innerHTML = result.data.items.map((q, i) => `
                <tr>
                    <td class="px-4 py-3">${page * pageSize + i + 1}</td>
                    <td style="max-width:250px" class="text-truncate">${q.content || '—'}</td>
                    <td><span class="badge bg-info text-dark">${typeName(q.questionType)}</span></td>
                    <td>${q.skill}</td>
                    <td><span class="badge bg-primary">${q.cefrLevel}</span></td>
                    <td>${q.topic || '—'}</td>
                    <td>${statusBadge(q.status)}</td>
                    <td><span class="badge bg-light text-dark">${q.usedInQuizCount}</span></td>
                    <td class="text-end px-4">
                        <a href="/expert/question-bank/${q.questionId}/edit" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a>
                        ${q.status !== 'PUBLISHED' ? `<button class="btn btn-sm btn-outline-success me-1" onclick="changeStatus(${q.questionId},'PUBLISHED')"><i class="bi bi-check-lg"></i></button>` : ''}
                        ${q.usedInQuizCount === 0 ? `<button class="btn btn-sm btn-outline-danger" onclick="deleteQuestion(${q.questionId})"><i class="bi bi-trash"></i></button>` : ''}
                    </td>
                </tr>
            `).join('');
            renderPagination(result.data);
        } else {
            tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted py-4">Không tìm thấy câu hỏi nào.</td></tr>';
            document.getElementById('pagination').innerHTML = '';
        }
    } catch (e) {
        console.error(e);
    }
}

function renderPagination(data) {
    const ul = document.getElementById('pagination');
    let html = '';
    for (let i = 0; i < data.totalPages; i++) {
        html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                    <a class="page-link" href="javascript:void(0)" onclick="loadQuestions(${i})">${i + 1}</a>
                 </li>`;
    }
    ul.innerHTML = html;
}

async function changeStatus(id, newStatus) {
    if (!confirm(`Chuyển trạng thái sang ${newStatus}?`)) return;
    try {
        await fetch(`/api/v1/expert/question-bank/${id}/status`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: newStatus })
        });
        loadQuestions(currentPage);
    } catch (e) { alert('Lỗi: ' + e.message); }
}

async function deleteQuestion(id) {
    if (!confirm('Bạn có chắc muốn xóa câu hỏi này?')) return;
    try {
        const res = await fetch(`/api/v1/expert/question-bank/${id}`, { method: 'DELETE' });
        const result = await res.json();
        if (res.ok) { loadQuestions(currentPage); }
        else { alert(result.message || 'Không thể xóa.'); }
    } catch (e) { alert('Lỗi: ' + e.message); }
}

loadQuestions();
</script>
</body>
</html>
