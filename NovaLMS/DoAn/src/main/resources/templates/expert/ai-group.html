<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:with="isDashboard=true">
<head th:replace="~{fragments/head :: common-head(pageTitle='Sinh bộ câu hỏi AI - Expert')}"></head>
<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='AI Question Group Generator', breadcrumb='Expert')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='question-bank')}"></aside>
<aside th:replace="~{fragments/sidebar :: dash-overlay}"></aside>

<main class="dash-main d-flex flex-column" id="dashMain">

    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h3 class="fw-bold m-0" style="color: #223a58;">Sinh bộ câu hỏi bằng AI</h3>
            <p class="text-muted small m-0">Sinh bài đọc hoặc bài nghe kèm theo các câu hỏi trắc nghiệm liên quan.</p>
        </div>
        <a th:href="@{/expert/question-bank}" class="btn btn-sm btn-outline-secondary rounded-pill px-3">
            <i class="bi bi-arrow-left me-1"></i> Quay lại Ngân hàng đề
        </a>
    </div>

    <!-- Generator Form -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label fw-bold">Chủ đề <span class="text-danger">*</span></label>
                    <input type="text" id="groupTopic" class="form-control" placeholder="VD: Climate Change, Job Interview...">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Kỹ năng</label>
                    <select id="groupSkill" class="form-select"></select>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold">Trình độ (IELTS Band)</label>
                    <select id="groupCefr" class="form-select"></select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Số câu hỏi con (2–7)</label>
                    <input type="number" id="groupQty" class="form-control" min="2" max="7" value="5">
                </div>
            </div>
            <div class="mt-3 text-end">
                <button class="btn text-white px-4" style="background-color: #136ad5;" onclick="generateAIGroup()">
                    <i class="bi bi-lightning-charge me-1"></i> Sinh bộ câu hỏi
                </button>
            </div>
        </div>
    </div>

    <!-- Loading spinner -->
    <div id="aiLoading" class="text-center py-5" style="display:none;">
        <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;"></div>
        <p class="text-muted fw-bold">AI đang biên soạn nội dung Passage và các câu hỏi, vui lòng chờ...</p>
    </div>

    <!-- Warning -->
    <div id="aiWarning" class="alert alert-warning mb-4" style="display:none;"></div>

    <!-- Preview Results -->
    <div id="groupPreview" style="display:none;">
        <div class="row g-4">
            <!-- Passage column -->
            <div class="col-lg-7">
                <div class="card border-0 shadow-sm h-100">
                    <div id="passageHeader" class="card-header bg-white py-3 d-flex justify-content-between align-items-center fw-bold text-primary">
                        <span>Đoạn văn / Nội dung (Passage)</span>
                    </div>
                    <div class="card-body">
                        <div id="passageContent" class="p-3 bg-light rounded" style="min-height: 200px; white-space: pre-wrap; font-size: 0.95rem; line-height: 1.6;"></div>
                        <div class="mt-3" id="explanationContent"></div>
                    </div>
                </div>
            </div>
            <!-- Sub-questions column -->
            <div class="col-lg-5">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                        <h6 class="fw-bold text-primary m-0">Danh sách câu hỏi con</h6>
                        <button class="btn btn-sm btn-outline-secondary" onclick="toggleAllGroupQ()">Chọn/Bỏ tất cả</button>
                    </div>
                    <div class="card-body p-0">
                        <div id="groupQuestionList" class="list-group list-group-flush"></div>
                    </div>
                    <div class="card-footer bg-white py-3 text-end">
                        <button class="btn btn-success w-100" onclick="importAIGroup()">
                            <i class="bi bi-check-lg me-1"></i> Lưu bộ câu hỏi này
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>
<script th:src="@{/assets/expert/js/question-form-settings.js}"></script>

<script th:inline="javascript">
    let groupPreviewData = null;
    let groupSelectedSet = new Set();

    async function generateAIGroup() {
        const topic = document.getElementById('groupTopic').value.trim();
        const skill = document.getElementById('groupSkill').value;
        const cefr = document.getElementById('groupCefr').value;
        const qty = parseInt(document.getElementById('groupQty').value);

        if (!topic) { alert('Vui lòng nhập chủ đề.'); return; }
        if (!qty || qty < 2 || qty > 7) { alert('Số câu hỏi con phải từ 2-7.'); return; }

        const body = { topic, quantity: qty, skill, cefrLevel: cefr };

        document.getElementById('aiLoading').style.display = 'block';
        document.getElementById('groupPreview').style.display = 'none';
        document.getElementById('aiWarning').style.display = 'none';

        try {
            const res = await fetch('/api/v1/expert/questions/ai/generate/group', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const result = await res.json();
            if (!res.ok) { alert(result.message || 'Lỗi khi sinh bộ câu hỏi.'); return; }

            groupPreviewData = result.data;
            if (groupPreviewData.warning) {
                const w = document.getElementById('aiWarning');
                w.textContent = groupPreviewData.warning;
                w.style.display = 'block';
            }
            // Mặc định chọn tất cả
            groupSelectedSet = new Set((groupPreviewData.questions || []).map((_, i) => i));
            renderGroupPreview();
        } catch (e) { 
            alert('Lỗi: ' + e.message); 
        } finally { 
            document.getElementById('aiLoading').style.display = 'none'; 
        }
    }


    // ===== EDIT AI GEN =====
function renderGroupPreview() {
    const g = groupPreviewData;
    if (!g) return;

    // [CẬP NHẬT LOGIC MỚI]: Ẩn nút "Sửa Nội dung" nếu bài này có file Audio
    const isListening = g.audioUrl ? true : false;
    let editPassageBtn = '';

    if (!isListening) {
        editPassageBtn = `<button class="btn btn-sm btn-outline-secondary rounded-pill px-3 me-2" onclick="groupPreviewData._isEditingPassage=true; renderGroupPreview()"><i class="bi bi-pencil me-1"></i>Sửa Nội dung</button>`;
    }

    const header = document.getElementById('passageHeader');
    header.innerHTML = `<span>Đoạn văn / Nội dung (Passage)</span>
        <div>
            ${editPassageBtn}
            ${g.audioUrl ? `
                <button class="btn btn-sm btn-outline-primary rounded-pill px-3 fw-bold" onclick="playAudio('${g.audioUrl}', this)">
                    <i class="bi bi-play-fill me-1"></i> Nghe Audio
                </button>
            ` : ''}
        </div>`;

    // 1. NẾU ĐANG SỬA PASSAGE (CHỈ DÀNH CHO READING)
    if (g._isEditingPassage && !isListening) {
        document.getElementById('passageContent').innerHTML = `<textarea class="form-control" id="edit-passage-content" rows="10">${escapeHtml(g.passage || '')}</textarea>`;
        document.getElementById('explanationContent').innerHTML = `
            <div class="mt-3"><label class="small fw-bold">Giải thích chung:</label><textarea class="form-control form-control-sm" id="edit-passage-exp" rows="2">${escapeHtml(g.explanation || '')}</textarea></div>
            <div class="mt-2 text-end"><button class="btn btn-sm btn-primary rounded-pill px-4" onclick="saveEditPassage()">Lưu Nội dung</button></div>`;
    } else {
        document.getElementById('passageContent').textContent = g.passage || '';
        document.getElementById('explanationContent').innerHTML = g.explanation ? `<div class="small text-muted fst-italic mt-3"><i class="bi bi-info-circle me-1"></i>${escapeHtml(g.explanation)}</div>` : '';
    }

    const container = document.getElementById('groupQuestionList');
    const questions = g.questions || [];

    container.innerHTML = questions.map((q, i) => {
        // 2. NẾU ĐANG SỬA CÂU HỎI CON (SUB-QUESTION)
        if (q._isEditing) {
            let editFieldsHtml = '';

            // Form sửa cho MATCHING
            if (q.questionType === 'MATCHING' && q.matchLeft && q.matchRight) {
                editFieldsHtml += '<div class="row g-2 mt-2">';
                editFieldsHtml += '<div class="col-md-6"><label class="small fw-bold">Cột A</label>';
                q.matchLeft.forEach((l, idx) => {
                    editFieldsHtml += `<input type="text" class="form-control form-control-sm mb-1 edit-gmatch-left-${i}" value="${escapeHtml(String(l))}">`;
                });
                editFieldsHtml += '</div><div class="col-md-6"><label class="small fw-bold">Cột B</label>';
                q.matchRight.forEach((r, idx) => {
                    editFieldsHtml += `<input type="text" class="form-control form-control-sm mb-1 edit-gmatch-right-${i}" value="${escapeHtml(String(r))}">`;
                });
                editFieldsHtml += '</div></div>';
            }
            // Form sửa cho TRẮC NGHIỆM
            else if (q.options && q.options.length > 0) {
                editFieldsHtml += '<div class="mt-2"><label class="small fw-bold">Các đáp án:</label>' + q.options.map((o, optIdx) => `
                    <div class="input-group input-group-sm mb-1">
                        <div class="input-group-text bg-white">
                            <input class="form-check-input mt-0" type="${q.questionType === 'MULTIPLE_CHOICE_SINGLE' ? 'radio' : 'checkbox'}" name="edit-gopt-corr-${i}" value="${optIdx}" ${o.correct ? 'checked' : ''} id="edit-gopt-corr-${i}-${optIdx}">
                        </div>
                        <input type="text" class="form-control form-control-sm" id="edit-gopt-txt-${i}-${optIdx}" value="${escapeHtml(o.title)}">
                    </div>
                `).join('') + '</div>';
            }

            // Form sửa cho ĐIỀN TỪ
            if (q.questionType === 'FILL_IN_BLANK') {
                editFieldsHtml += `<div class="mt-2"><label class="small fw-bold">Đáp án đúng (Điền từ):</label><input type="text" class="form-control form-control-sm" id="edit-gq-correct-${i}" value="${escapeHtml(q.correctAnswer || '')}"></div>`;
            }

            return `
            <div class="list-group-item py-3 bg-light border-primary border-start border-4">
                <div class="mb-2 fw-bold text-primary small">Sửa câu ${i + 1}</div>
                <textarea class="form-control form-control-sm mb-2" id="edit-gq-content-${i}" rows="2">${escapeHtml(q.content || '')}</textarea>
                ${editFieldsHtml}
                <div class="mt-3 text-end">
                    <button class="btn btn-sm btn-secondary rounded-pill px-3" onclick="groupPreviewData.questions[${i}]._isEditing=false; renderGroupPreview()">Hủy</button>
                    <button class="btn btn-sm btn-primary rounded-pill px-3 ms-2" onclick="saveEditGroupQ(${i})"><i class="bi bi-save me-1"></i> Lưu</button>
                </div>
            </div>`;
        }

        // 3. XEM CÂU HỎI CON BÌNH THƯỜNG
        return `
        <div class="list-group-item py-3 ${groupSelectedSet.has(i) ? 'bg-light-subtle' : ''}">
            <div class="d-flex align-items-start gap-2">
                <input type="checkbox" class="form-check-input mt-1" id="gqChk${i}" ${groupSelectedSet.has(i) ? 'checked' : ''} onchange="toggleGroupQ(${i})">
                <div class="flex-grow-1 ms-2">
                    <div class="d-flex gap-2 mb-1 align-items-center">
                        <span class="badge bg-primary-subtle text-primary border border-primary-subtle rounded-pill small">${q.questionType || 'MC'}</span>
                        <span class="badge bg-secondary-subtle text-secondary border border-secondary-subtle rounded-pill small">${q.cefrLevel || g.cefrLevel || 'B1'}</span>

                        <button class="btn btn-sm btn-link text-secondary p-0 ms-auto" onclick="groupPreviewData.questions[${i}]._isEditing=true; renderGroupPreview()">
                            <i class="bi bi-pencil-square"></i> Sửa
                        </button>
                    </div>

                    <p class="mb-2 small fw-bold text-dark">${escapeHtml(q.content || '')}</p>

                    ${q.options && q.options.length > 0 ? `
                        <div class="small">
                            ${q.options.map(o => `
                                <div class="mb-1 ${o.correct ? 'text-success fw-bold' : 'text-muted'}">
                                    <i class="bi ${o.correct ? 'bi-check-circle-fill' : 'bi-circle'} me-1"></i>${escapeHtml(o.title)}
                                </div>
                            `).join('')}
                        </div>` : ''}
                    ${q.correctAnswer ? `<div class="small text-success fw-bold mt-1">Đáp án: ${escapeHtml(q.correctAnswer)}</div>` : ''}
                </div>
            </div>
        </div>`;
    }).join('');

    document.getElementById('groupPreview').style.display = 'block';
}

window.saveEditPassage = function() {
    if (!groupPreviewData) return;

    const passageEl = document.getElementById('edit-passage-content');
    if (passageEl) groupPreviewData.passage = passageEl.value;

    const expEl = document.getElementById('edit-passage-exp');
    if (expEl) groupPreviewData.explanation = expEl.value;

    groupPreviewData._isEditingPassage = false; // Đóng trạng thái edit
    renderGroupPreview(); // Load lại giao diện
};

window.saveEditGroupQ = function(idx) {
    const q = groupPreviewData.questions[idx];
    q.content = document.getElementById(`edit-gq-content-${idx}`).value;

    if (q.questionType === 'MATCHING') {
        const leftInputs = document.querySelectorAll(`.edit-gmatch-left-${idx}`);
        q.matchLeft = Array.from(leftInputs).map(inp => inp.value);

        const rightInputs = document.querySelectorAll(`.edit-gmatch-right-${idx}`);
        q.matchRight = Array.from(rightInputs).map(inp => inp.value);
    } else if (q.options && q.options.length > 0) {
        q.options.forEach((o, optIdx) => {
            o.title = document.getElementById(`edit-gopt-txt-${idx}-${optIdx}`).value;
            const checkEl = document.getElementById(`edit-gopt-corr-${idx}-${optIdx}`);
            if (checkEl) o.correct = checkEl.checked;
        });
    }

    if (q.questionType === 'FILL_IN_BLANK') {
        const corrEl = document.getElementById(`edit-gq-correct-${idx}`);
        if (corrEl) q.correctAnswer = corrEl.value;
    }

    q._isEditing = false;
    renderGroupPreview();
};
// ===== EDIT AI GEN =====

    function toggleGroupQ(idx) {
        if (groupSelectedSet.has(idx)) groupSelectedSet.delete(idx);
        else groupSelectedSet.add(idx);
        renderGroupPreview();
    }

    function toggleAllGroupQ() {
        if (!groupPreviewData || !groupPreviewData.questions) return;
        if (groupSelectedSet.size === groupPreviewData.questions.length) {
            groupSelectedSet = new Set();
        } else {
            groupSelectedSet = new Set(groupPreviewData.questions.map((_, i) => i));
        }
        renderGroupPreview();
    }

    async function importAIGroup() {
        if (!groupPreviewData) return;
        if (groupSelectedSet.size === 0) { alert('Vui lòng chọn ít nhất 1 câu hỏi con.'); return; }
        
        const filteredQuestions = groupPreviewData.questions.filter((_, i) => groupSelectedSet.has(i));
        const payload = {
            ...groupPreviewData,
            questions: filteredQuestions
        };

        if (!confirm(`Lưu bộ câu hỏi này với ${groupSelectedSet.size} câu con?`)) return;

        try {
            const res = await fetch('/api/v1/expert/questions/ai/import/group', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            if (!res.ok) { alert(result.message || 'Lỗi khi lưu.'); return; }
            alert('Đã lưu bộ câu hỏi thành công.');
            window.location.href = '/expert/question-bank';
        } catch (e) { alert('Lỗi: ' + e.message); }
    }

    let currentAudio = null;
    function playAudio(url, btn) {
        if (currentAudio) {
            currentAudio.pause();
            const prevBtn = document.querySelector('.btn-playing');
            if (prevBtn) {
                prevBtn.innerHTML = prevBtn.id === 'btn-passage-play' ? '<i class="bi bi-play-fill me-1"></i> Nghe bài nghe' : '<i class="bi bi-play-fill me-1"></i> Nghe câu hỏi';
                prevBtn.classList.remove('btn-playing', 'btn-danger');
                prevBtn.classList.add('btn-outline-primary');
            }
            if (currentAudio.src === url) {
                currentAudio = null;
                return;
            }
        }

        const audio = new Audio(url);
        currentAudio = audio;
        btn.classList.add('btn-playing', 'btn-danger');
        btn.classList.remove('btn-outline-primary');
        btn.innerHTML = '<i class="bi bi-stop-fill me-1"></i> Dừng';

        audio.play();
        audio.onended = () => {
            btn.innerHTML = btn.id === 'btn-passage-play' ? '<i class="bi bi-play-fill me-1"></i> Nghe bài nghe' : '<i class="bi bi-play-fill me-1"></i> Nghe câu hỏi';
            btn.classList.remove('btn-playing', 'btn-danger');
            btn.classList.add('btn-outline-primary');
            currentAudio = null;
        };
    }

    function escapeHtml(text) {
        if (!text) return '';
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return text.replace(/[&<>"']/g, m => map[m]);
    }

    document.addEventListener('DOMContentLoaded', async () => {
        try {
            if (window.NovaQuestionFormSettings) {
                await NovaQuestionFormSettings.load();
                const gs = document.getElementById('groupSkill');
                const gc = document.getElementById('groupCefr');
                if (gs) {
                    NovaQuestionFormSettings.fillSkillSelectByMode(gs, 'GROUP');
                    if (gs.querySelector('option[value="READING"]')) gs.value = 'READING';
                }
                if (gc) {
                    NovaQuestionFormSettings.fillCefrSelect(gc);
                    if (gc.querySelector('option[value="B1"]')) gc.value = 'B1';
                }
            }
        } catch (e) { console.error(e); }
    });
</script>

<style>
    .bg-light-subtle { background-color: #f0f7ff !important; }
</style>

</body>
</html>
