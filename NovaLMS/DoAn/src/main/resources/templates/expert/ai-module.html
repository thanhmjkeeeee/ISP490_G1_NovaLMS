<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:with="isDashboard=true">
<head th:replace="~{fragments/head :: common-head(pageTitle='Sinh câu hỏi theo Module - AI')}"></head>
<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='AI Generator by Module', breadcrumb='Expert')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='question-bank')}"></aside>
<aside th:replace="~{fragments/sidebar :: dash-overlay}"></aside>

<main class="dash-main d-flex flex-column" id="dashMain">

    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h3 class="fw-bold m-0" style="color: #223a58;">Sinh câu hỏi theo Module bằng AI</h3>
            <p class="text-muted small m-0">Chọn Module để AI dựa vào nội dung bài học sinh ra các câu hỏi tương ứng.</p>
        </div>
        <a th:href="@{/expert/question-bank}" class="btn btn-sm btn-outline-secondary rounded-pill px-3">
            <i class="bi bi-arrow-left me-1"></i> Quay lại Ngân hàng đề
        </a>
    </div>

    <!-- Generator Form -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label fw-bold">Chọn Khóa học</label>
                    <div class="searchable-select-container" id="courseSearchContainer">
                        <input type="text" id="courseDisplay" class="form-control searchable-select-input" 
                            placeholder="Chọn hoặc tìm khóa học..." readonly onclick="toggleSearchableSelect('courseSearchContainer')">
                        <div class="searchable-select-dropdown" id="courseDropdown">
                            <div class="p-2 border-bottom sticky-top bg-white">
                                <input type="text" class="form-control form-control-sm dropdown-search-input" 
                                    placeholder="Tìm kiếm..." onkeyup="filterSearchableItems('courseSearchContainer', this.value)">
                            </div>
                            <div class="searchable-items-list">
                                <div th:each="c : ${courses}" class="searchable-select-item" 
                                     th:data-value="${c.courseId}" th:text="${c.courseName}"
                                     th:onclick="|selectSearchableItem('courseSearchContainer', '${c.courseId}', '${c.courseName}')|"></div>
                                <div class="searchable-select-no-results" style="display:none;">Không tìm thấy kết quả</div>
                            </div>
                        </div>
                        <select id="courseId" class="d-none" onchange="loadModules()">
                            <option value="">-- Tất cả khóa học --</option>
                            <option th:each="c : ${courses}" th:value="${c.courseId}" th:text="${c.courseName}"></option>
                        </select>
                    </div>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Chọn Module <span class="text-danger">*</span></label>
                    <select id="aiModuleId" class="form-select">
                        <option value="">-- Chọn module --</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Trình độ (IELTS Band)</label>
                    <select id="aiCefr" class="form-select">
                        <option value="3.0">IELTS Band 3.0</option>
                        <option value="3.5">IELTS Band 3.5</option>
                        <option value="4.0">IELTS Band 4.0</option>
                        <option value="4.5">IELTS Band 4.5</option>
                        <option value="5.0" selected>IELTS Band 5.0</option>
                        <option value="5.5">IELTS Band 5.5</option>
                        <option value="6.0">IELTS Band 6.0</option>
                        <option value="6.5">IELTS Band 6.5</option>
                        <option value="7.0">IELTS Band 7.0</option>
                        <option value="7.5">IELTS Band 7.5</option>
                        <option value="8.0">IELTS Band 8.0</option>
                        <option value="8.5">IELTS Band 8.5</option>
                        <option value="9.0">IELTS Band 9.0</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold">Số lượng (1-7)</label>
                    <input type="number" id="aiQty" class="form-control" min="1" max="7" value="5">
                </div>
            </div>
            <div class="mt-3 text-end">
                <button class="btn text-white px-4" style="background-color: #136ad5;" onclick="generateAI()">
                    <i class="bi bi-lightning-charge me-1"></i> Sinh câu hỏi
                </button>
            </div>
        </div>
    </div>

    <!-- Loading spinner -->
    <div id="aiLoading" class="text-center py-5" style="display:none;">
        <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;"></div>
        <p class="text-muted fw-bold">AI đang phân tích nội dung Module và sinh câu hỏi, vui lòng chờ...</p>
    </div>

    <!-- Warning -->
    <div id="aiWarning" class="alert alert-warning mb-4" style="display:none;"></div>

    <!-- Preview Results -->
    <div id="aiPreview" style="display:none;">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <h6 class="fw-bold text-primary m-0">Kết quả xem trước (<span id="aiSelectedCount">0</span>/<span id="aiTotalCount">0</span> đã chọn)</h6>
                <button class="btn btn-sm btn-outline-secondary" onclick="toggleAllAI()">Chọn / Bỏ chọn tất cả</button>
            </div>
            <div class="card-body p-0">
                <div id="aiQuestionList" class="list-group list-group-flush"></div>
            </div>
            <div class="card-footer bg-white py-3 text-end">
                <button class="btn btn-success px-4" onclick="importSelectedAI()">
                    <i class="bi bi-check-circle me-1"></i> Lưu các câu đã chọn vào Ngân hàng đề
                </button>
            </div>
        </div>
    </div>

    <style>
        /* Searchable Select Premium Styles */
        .searchable-select-container {
            position: relative;
            text-align: left;
        }
        .searchable-select-input {
            cursor: pointer;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23343a40' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 16px 12px;
        }
        .searchable-select-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            z-index: 1000;
            display: none;
            max-height: 300px;
            overflow-y: auto;
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-top: 5px;
        }
        .searchable-select-dropdown.show {
            display: block;
        }
        .searchable-select-item {
            padding: 10px 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .searchable-select-item:hover {
            background: #f8faff;
            color: #136ad5;
        }
        .searchable-select-item.active {
            background: #eef4ff;
            color: #136ad5;
            font-weight: 600;
        }
        .searchable-select-no-results {
            padding: 15px;
            text-align: center;
            color: #6c757d;
            font-style: italic;
        }
    </style>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>
<script th:src="@{/assets/expert/js/question-form-settings.js}"></script>

<script th:inline="javascript">
    let aiQuestions = [];
    let aiSelectedSet = new Set();
    let allAiSelected = false;

    document.addEventListener('DOMContentLoaded', async () => {
        loadModules(); // Load ban đầu nếu có thể
        try {
            if (window.NovaQuestionFormSettings) {
                await NovaQuestionFormSettings.load();
                const cefrSel = document.getElementById('aiCefr');
                NovaQuestionFormSettings.fillCefrSelect(cefrSel);
                // Mặc định chọn một band IELTS phổ biến nếu có
                if (cefrSel.querySelector('option[value="5.0"]')) {
                    cefrSel.value = '5.0';
                } else if (cefrSel.querySelector('option[value="B1"]')) {
                    cefrSel.value = 'B1';
                }
            }
        } catch(e) { console.error(e); }
    function toggleSearchableSelect(containerId) {
        const dropdown = document.querySelector(`#${containerId} .searchable-select-dropdown`);
        const isShown = dropdown.classList.contains('show');
        document.querySelectorAll('.searchable-select-dropdown').forEach(d => d.classList.remove('show'));
        if (!isShown) {
            dropdown.classList.add('show');
            const searchInput = dropdown.querySelector('.dropdown-search-input');
            if (searchInput) {
                searchInput.value = '';
                searchInput.focus();
                filterSearchableItems(containerId, '');
            }
        }
    }

    function filterSearchableItems(containerId, keyword) {
        const items = document.querySelectorAll(`#${containerId} .searchable-select-item`);
        let hasResults = false;
        items.forEach(item => {
            const text = item.textContent.toLowerCase();
            const match = text.includes(keyword.toLowerCase());
            item.style.display = match ? 'block' : 'none';
            if (match) hasResults = true;
        });
        const noResults = document.querySelector(`#${containerId} .searchable-select-no-results`);
        if (noResults) noResults.style.display = hasResults ? 'none' : 'block';
    }

    function selectSearchableItem(containerId, value, text) {
        const container = document.getElementById(containerId);
        const display = container.querySelector('.searchable-select-input');
        const hiddenSelect = container.querySelector('select');
        const dropdown = container.querySelector('.searchable-select-dropdown');
        display.value = text;
        hiddenSelect.value = value;
        dropdown.classList.remove('show');
        const event = new Event('change');
        hiddenSelect.dispatchEvent(event);
        container.querySelectorAll('.searchable-select-item').forEach(item => {
            item.classList.toggle('active', item.dataset.value == value);
        });
    }

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.searchable-select-container')) {
            document.querySelectorAll('.searchable-select-dropdown').forEach(d => d.classList.remove('show'));
        }
    });

    async function loadModules() {
        const courseId = document.getElementById('courseId').value;
        const sel = document.getElementById('aiModuleId');
        sel.innerHTML = '<option value="">-- Đang tải module... --</option>';

        let url = '/api/v1/expert/modules';
        if (courseId) url += `?courseId=${courseId}`;

        try {
            const res = await fetch(url);
            const result = await res.json();
            sel.innerHTML = '<option value="">-- Chọn module --</option>';
            if (result.status === 200 && result.data) {
                result.data.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.moduleId;
                    opt.textContent = m.moduleName;
                    sel.appendChild(opt);
                });
            }
        } catch (e) {
            console.error(e);
            sel.innerHTML = '<option value="">-- Lỗi tải module --</option>';
        }
    }

    function escapeHtml(text) {
        if (text === null || text === undefined) return '';
        const s = String(text);
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return s.replace(/[&<>"']/g, m => map[m]);
    }

    /** Xem trước câu MATCHING: matchLeft / matchRight / correctPairs (1-based hoặc 0-based index cột phải). */
    function matchingPreviewHtml(q) {
        if (!q || q.questionType !== 'MATCHING') return '';
        const left = Array.isArray(q.matchLeft) ? q.matchLeft : [];
        const right = Array.isArray(q.matchRight) ? q.matchRight : [];
        if (left.length === 0 && right.length === 0) return '';

        function resolveRightIndex(p) {
            if (typeof p !== 'number' || isNaN(p) || !right.length) return -1;
            if (p >= 1 && p <= right.length) return p - 1;
            if (p >= 0 && p < right.length) return p;
            return -1;
        }

        let inner;
        const pairs = Array.isArray(q.correctPairs) ? q.correctPairs : null;
        if (pairs && pairs.length === left.length && left.length > 0) {
            inner = '<ul class="list-unstyled small mb-0 mt-1">';
            for (let idx = 0; idx < left.length; idx++) {
                const rj = resolveRightIndex(Number(pairs[idx]));
                const rtext = (rj >= 0 && right[rj] !== undefined) ? String(right[rj]) : '?';
                inner += '<li class="mb-1 d-flex align-items-start gap-2"><span class="badge bg-secondary flex-shrink-0">' + (idx + 1) + '</span>' +
                    '<span><span class="fw-medium text-dark">' + escapeHtml(String(left[idx])) + '</span>' +
                    ' <i class="bi bi-arrow-right text-muted mx-1"></i> ' +
                    '<span class="fw-medium text-dark">' + escapeHtml(rtext) + '</span></span></li>';
            }
            inner += '</ul>';
        } else {
            inner = '<div class="row g-2 mt-1"><div class="col-md-6"><div class="text-muted small mb-1">Cột A</div><ol class="small mb-0 ps-3">' +
                left.map(l => '<li>' + escapeHtml(String(l)) + '</li>').join('') + '</ol></div>' +
                '<div class="col-md-6"><div class="text-muted small mb-1">Cột B</div><ol class="small mb-0 ps-3">' +
                right.map(r => '<li>' + escapeHtml(String(r)) + '</li>').join('') + '</ol></div></div>';
            if (!pairs || pairs.length !== left.length) {
                inner += '<p class="small text-warning mb-0 mt-2"><i class="bi bi-exclamation-triangle me-1"></i>Không đủ dữ liệu ghép cặp (correctPairs).</p>';
            }
        }

        return '<div class="mt-3 border rounded-3 p-3 bg-body-secondary"><div class="small fw-bold text-secondary text-uppercase mb-1">Ghép đôi</div>' + inner + '</div>';
    }

    function writingPreviewHtml(q) {
        if (!q || (q.questionType !== 'WRITING' && q.questionType !== 'SPEAKING')) return '';
        if (!q.explanation || !String(q.explanation).trim()) return '';
        return '<p class="mt-2 mb-0 small text-muted"><i class="bi bi-journal-text me-1"></i><span class="fw-semibold text-secondary">Gợi ý / mô tả:</span> ' + escapeHtml(q.explanation) + '</p>';
    }

    async function generateAI() {
        const moduleId = document.getElementById('aiModuleId').value;
        const cefr = document.getElementById('aiCefr').value;
        const qty = parseInt(document.getElementById('aiQty').value);

        if (!moduleId) { alert('Vui lòng chọn module.'); return; }
        if (!qty || qty < 1 || qty > 7) { alert('Số lượng phải từ 1-7.'); return; }

        const body = { moduleId: parseInt(moduleId), cefrLevel: cefr, quantity: qty };
        
        document.getElementById('aiLoading').style.display = 'block';
        document.getElementById('aiPreview').style.display = 'none';
        document.getElementById('aiWarning').style.display = 'none';

        try {
            const res = await fetch('/api/v1/expert/questions/ai/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const result = await res.json();
            if (!res.ok) { alert(result.message || 'Lỗi khi sinh câu hỏi.'); return; }

            aiQuestions = result.data.questions || [];
            aiSelectedSet = new Set(aiQuestions.map((_, i) => i));
            renderAIQuestions();

            if (result.data.warning) {
                const w = document.getElementById('aiWarning');
                w.textContent = result.data.warning;
                w.style.display = 'block';
            }
        } catch (e) { 
            alert('Lỗi: ' + e.message); 
        } finally { 
            document.getElementById('aiLoading').style.display = 'none'; 
        }
    }


function renderAIQuestions() {
    const container = document.getElementById('aiQuestionList');
    document.getElementById('aiTotalCount').textContent = aiQuestions.length;
    document.getElementById('aiSelectedCount').textContent = aiSelectedSet.size;
    document.getElementById('aiPreview').style.display = 'block';

    if (aiQuestions.length === 0) {
        container.innerHTML = '<div class="p-4 text-center text-muted">AI không thể trả về câu hỏi nào. Hãy thử chủ đề/module khác.</div>';
        return;
    }

    container.innerHTML = aiQuestions.map((q, i) => {
        // Kiểm tra xem có phải câu hỏi Nghe hay không
        const isListening = q.audioUrl ? true : (q.skill && q.skill.toUpperCase() === 'LISTENING');

        // 1. NẾU ĐANG Ở CHẾ ĐỘ CHỈNH SỬA (EDIT MODE)
        if (q._isEditing) {
            let editFieldsHtml = '';

            // Form sửa cho MATCHING
            if (q.questionType === 'MATCHING' && q.matchLeft && q.matchRight) {
                editFieldsHtml += '<div class="row g-2 mt-2">';
                editFieldsHtml += '<div class="col-md-6"><label class="small fw-bold">Cột A (Vế trái)</label>';
                q.matchLeft.forEach((l, idx) => {
                    editFieldsHtml += `<input type="text" class="form-control form-control-sm mb-1 edit-match-left-${i}" value="${escapeHtml(String(l))}">`;
                });
                editFieldsHtml += '</div><div class="col-md-6"><label class="small fw-bold">Cột B (Vế phải)</label>';
                q.matchRight.forEach((r, idx) => {
                    editFieldsHtml += `<input type="text" class="form-control form-control-sm mb-1 edit-match-right-${i}" value="${escapeHtml(String(r))}">`;
                });
                editFieldsHtml += '</div></div><div class="small text-muted mt-1 fst-italic">* Mapping ghép cặp giữ nguyên theo AI gen.</div>';
            }
            // Form sửa cho TRẮC NGHIỆM
            else if (q.options && q.options.length > 0) {
                editFieldsHtml += '<div class="mt-2"><label class="small fw-bold">Các đáp án:</label>' + q.options.map((o, optIdx) => `
                    <div class="input-group input-group-sm mb-1">
                        <div class="input-group-text bg-white">
                            <input class="form-check-input mt-0" type="${q.questionType === 'MULTIPLE_CHOICE_SINGLE' ? 'radio' : 'checkbox'}" name="edit-opt-corr-${i}" value="${optIdx}" ${o.correct ? 'checked' : ''} id="edit-opt-corr-${i}-${optIdx}">
                        </div>
                        <input type="text" class="form-control" id="edit-opt-txt-${i}-${optIdx}" value="${escapeHtml(o.title)}">
                    </div>
                `).join('') + '</div>';
            }

            // Form sửa cho ĐIỀN TỪ
            if (q.questionType === 'FILL_IN_BLANK') {
                editFieldsHtml += `<div class="mt-2"><label class="small fw-bold">Đáp án đúng (Điền từ):</label><input type="text" class="form-control form-control-sm" id="edit-correct-${i}" value="${escapeHtml(q.correctAnswer || '')}"></div>`;
            }
            // Form sửa cho VIẾT/NÓI
            if (q.questionType === 'WRITING' || q.questionType === 'SPEAKING') {
                editFieldsHtml += `<div class="mt-2"><label class="small fw-bold">Gợi ý / Giải thích (Viết/Nói):</label><textarea class="form-control form-control-sm" id="edit-exp-${i}" rows="2">${escapeHtml(q.explanation || '')}</textarea></div>`;
            }

            // XỬ LÝ KHÓA NỘI DUNG CÂU HỎI NGHE
            let contentEditHtml = '';
            if (isListening) {
                contentEditHtml = `
                <div class="alert alert-warning py-2 px-3 small mb-2 border-0">
                    <i class="bi bi-exclamation-triangle-fill me-1"></i> <strong>Lưu ý:</strong> Nội dung câu hỏi được gắn chặt với Audio nên không thể sửa chữ. Bạn chỉ có thể chỉnh sửa đáp án bên dưới.
                </div>
                <textarea class="form-control form-control-sm mb-2 bg-light text-muted" id="edit-content-${i}" rows="3" readonly>${escapeHtml(q.content || '')}</textarea>
                `;
            } else {
                contentEditHtml = `<textarea class="form-control form-control-sm mb-2" id="edit-content-${i}" rows="3">${escapeHtml(q.content || '')}</textarea>`;
            }

            return `
            <div class="list-group-item p-4 border border-primary shadow-sm rounded mb-2 bg-white">
                <div class="mb-2 fw-bold text-primary"><i class="bi bi-pencil-square me-1"></i>Chỉnh sửa câu ${i + 1}</div>
                <label class="small fw-bold">Nội dung câu hỏi:</label>
                ${contentEditHtml}
                ${editFieldsHtml}
                <div class="mt-3 text-end">
                    <button class="btn btn-sm btn-light rounded-pill px-3" onclick="aiQuestions[${i}]._isEditing=false; renderAIQuestions()">Hủy</button>
                    <button class="btn btn-sm btn-primary rounded-pill px-3 ms-2" onclick="saveEditAI(${i})"><i class="bi bi-save me-1"></i>Lưu lại</button>
                </div>
            </div>`;
        }

        // 2. CHẾ ĐỘ XEM BÌNH THƯỜNG (VIEW MODE)
        return `
        <div class="list-group-item p-4 ${aiSelectedSet.has(i) ? 'bg-light-subtle' : ''}">
            <div class="d-flex align-items-start gap-3">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="aiChk${i}" ${aiSelectedSet.has(i) ? 'checked' : ''} onchange="toggleAI(${i})">
                </div>
                <div class="flex-grow-1">
                    <div class="d-flex gap-2 flex-wrap mb-2 align-items-center">
                        <span class="badge bg-primary-subtle text-primary border border-primary-subtle rounded-pill">${q.questionType}</span>
                        <span class="badge bg-info-subtle text-info border border-info-subtle rounded-pill">${q.skill}</span>
                        <span class="badge bg-warning-subtle text-warning border border-warning-subtle rounded-pill">${q.cefrLevel}</span>
                        ${q.topic ? `<span class="badge bg-light text-dark border rounded-pill">${q.topic}</span>` : ''}

                        <button class="btn btn-sm btn-outline-secondary rounded-pill px-3 py-1 ms-auto" onclick="aiQuestions[${i}]._isEditing=true; renderAIQuestions()">
                            <i class="bi bi-pencil me-1"></i> Sửa
                        </button>

                        ${q.audioUrl ? `
                            <button class="btn btn-sm btn-outline-primary rounded-pill px-3 py-1 fw-bold" onclick="playAudio('${q.audioUrl}', this)">
                                <i class="bi bi-play-fill me-1"></i> Nghe
                            </button>
                        ` : ''}
                    </div>
                    <h6 class="mb-2 fw-bold text-dark">Câu ${i + 1}: ${escapeHtml(q.content || '')}</h6>
                    ${q.options && q.options.length > 0 ? `
                        <div class="row g-2 mt-2">
                            ${q.options.map(o => `
                                <div class="col-md-6">
                                    <div class="p-2 border rounded ${o.correct ? 'bg-success-subtle border-success' : 'bg-white'}">
                                        <span class="small ${o.correct ? 'fw-bold text-success' : 'text-muted'}">${escapeHtml(o.title)}</span>
                                        ${o.correct ? '<i class="bi bi-check-circle-fill text-success ms-1"></i>' : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>` : ''}
                    ${matchingPreviewHtml(q)}
                    ${writingPreviewHtml(q)}
                    ${q.correctAnswer ? `<p class="mt-2 mb-0 small text-success fw-bold"><i class="bi bi-info-circle me-1"></i>Đáp án: ${escapeHtml(q.correctAnswer)}</p>` : ''}
                </div>
            </div>
        </div>`;
    }).join('');
}

window.saveEditAI = function(idx) {
    try {
        const q = aiQuestions[idx];
        if (!q) return;

        // 1. Lấy nội dung câu hỏi
        const contentEl = document.getElementById(`edit-content-${idx}`);
        if (contentEl) q.content = contentEl.value;

        // 2. Lấy dữ liệu MATCHING
        if (q.questionType === 'MATCHING') {
            const leftInputs = document.querySelectorAll(`.edit-match-left-${idx}`);
            if (leftInputs.length > 0) q.matchLeft = Array.from(leftInputs).map(inp => inp.value);

            const rightInputs = document.querySelectorAll(`.edit-match-right-${idx}`);
            if (rightInputs.length > 0) q.matchRight = Array.from(rightInputs).map(inp => inp.value);

        }
        // 3. Lấy dữ liệu TRẮC NGHIỆM
        else if (q.options && q.options.length > 0) {
            q.options.forEach((o, optIdx) => {
                const txtEl = document.getElementById(`edit-opt-txt-${idx}-${optIdx}`);
                if (txtEl) o.title = txtEl.value;

                const checkEl = document.getElementById(`edit-opt-corr-${idx}-${optIdx}`);
                if (checkEl) o.correct = checkEl.checked;
            });
        }

        // 4. Lấy dữ liệu ĐIỀN TỪ
        if (q.questionType === 'FILL_IN_BLANK') {
            const corrEl = document.getElementById(`edit-correct-${idx}`);
            if (corrEl) q.correctAnswer = corrEl.value;
        }

        // 5. Lấy dữ liệu NÓI/VIẾT
        if (q.questionType === 'WRITING' || q.questionType === 'SPEAKING') {
            const expEl = document.getElementById(`edit-exp-${idx}`);
            if (expEl) q.explanation = expEl.value;
        }

        // Đóng form sửa và load lại UI
        q._isEditing = false;
        renderAIQuestions();

    } catch (error) {
        console.error("Lỗi khi lưu câu hỏi:", error);
        alert("Đã có lỗi xảy ra khi lưu: " + error.message);
    }
};


    function toggleAI(idx) {
        if (aiSelectedSet.has(idx)) aiSelectedSet.delete(idx);
        else aiSelectedSet.add(idx);
        document.getElementById('aiSelectedCount').textContent = aiSelectedSet.size;
        renderAIQuestions();
    }

    function toggleAllAI() {
        allAiSelected = !allAiSelected;
        if (allAiSelected) {
            aiSelectedSet = new Set(aiQuestions.map((_, i) => i));
        } else {
            aiSelectedSet = new Set();
        }
        renderAIQuestions();
    }

    async function importSelectedAI() {
        if (aiSelectedSet.size === 0) { alert('Vui lòng chọn ít nhất 1 câu hỏi.'); return; }
        const selected = aiQuestions.filter((_, i) => aiSelectedSet.has(i));
        
        if (!confirm(`Xác nhận lưu ${aiSelectedSet.size} câu hỏi?`)) return;

        try {
            const res = await fetch('/api/v1/expert/questions/ai/import', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ questions: selected })
            });
            const result = await res.json();
            if (!res.ok) { alert(result.message || 'Lỗi khi lưu.'); return; }
            alert('Đã lưu thành công.');
            window.location.href = '/expert/question-bank';
        } catch (e) { alert('Lỗi: ' + e.message); }
    }

    let currentAudio = null;
    function playAudio(url, btn) {
        if (currentAudio) {
            currentAudio.pause();
            const prevBtn = document.querySelector('.btn-playing');
            if (prevBtn) {
                prevBtn.innerHTML = '<i class="bi bi-play-fill me-1"></i> Nghe câu hỏi';
                prevBtn.classList.remove('btn-playing', 'btn-danger');
                prevBtn.classList.add('btn-outline-primary');
            }
            if (currentAudio.src === url) {
                currentAudio = null;
                return;
            }
        }

        const audio = new Audio(url);
        currentAudio = audio;
        btn.classList.add('btn-playing', 'btn-danger');
        btn.classList.remove('btn-outline-primary');
        btn.innerHTML = '<i class="bi bi-stop-fill me-1"></i> Dừng';

        audio.play();
        audio.onended = () => {
            btn.innerHTML = '<i class="bi bi-play-fill me-1"></i> Nghe câu hỏi';
            btn.classList.remove('btn-playing', 'btn-danger');
            btn.classList.add('btn-outline-primary');
            currentAudio = null;
        };
    }

</script>
