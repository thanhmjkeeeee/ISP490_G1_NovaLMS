<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:with="isDashboard=true">
<head th:replace="~{fragments/head :: common-head(pageTitle='Tạo câu hỏi - Expert')}"></head>
<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Tạo câu hỏi', breadcrumb='Expert / Question Bank')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='question-bank')}"></aside>
<aside th:replace="~{fragments/sidebar :: dash-overlay}"></aside>

<main class="dash-main d-flex flex-column" id="dashMain">

    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h3 class="fw-bold m-0" style="color: #223a58;">Tạo câu hỏi mới</h3>
            <p class="text-muted small m-0">Thêm câu hỏi vào Master Question Bank.</p>
        </div>
        <a th:href="@{/expert/question-bank}" class="btn btn-sm btn-outline-secondary rounded-pill px-3">
            <i class="bi bi-arrow-left me-1"></i> Quay lại
        </a>
    </div>

    <div class="card border-0 shadow-sm mb-auto">
        <div class="card-body">
            <form id="questionForm">
                <!-- Row 1: Metadata -->
                <div class="row g-3 mb-3">
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Loại câu hỏi <span class="text-danger">*</span></label>
                        <select id="questionType" class="form-select" required onchange="onTypeChange()">
                            <option value="">-- Chọn loại --</option>
                            <option value="MULTIPLE_CHOICE_SINGLE">Multiple Choice (Single)</option>
                            <option value="MULTIPLE_CHOICE_MULTI">Multiple Choice (Multi)</option>
                            <option value="FILL_IN_BLANK">Fill in the Blank</option>
                            <option value="MATCHING">Matching</option>
                            <option value="WRITING">Writing (Tự luận)</option>
                            <option value="SPEAKING">Speaking (Ghi âm)</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Kỹ năng <span class="text-danger">*</span></label>
                        <select id="skill" class="form-select" required>
                            <option value="">-- Chọn kỹ năng --</option>
                            <option value="LISTENING">Listening</option>
                            <option value="READING">Reading</option>
                            <option value="WRITING">Writing</option>
                            <option value="SPEAKING">Speaking</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Cấp độ CEFR <span class="text-danger">*</span></label>
                        <select id="cefrLevel" class="form-select" required>
                            <option value="">-- Chọn cấp độ --</option>
                            <option value="A1">A1</option>
                            <option value="A2">A2</option>
                            <option value="B1">B1</option>
                            <option value="B2">B2</option>
                            <option value="C1">C1</option>
                            <option value="C2">C2</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Chủ đề</label>
                        <input type="text" id="topic" class="form-control" placeholder="VD: Travel, Technology...">
                    </div>
                </div>

                <!-- Row 2: Tags, Audio, Image -->
                <div class="row g-3 mb-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Tags</label>
                        <input type="text" id="tags" class="form-control" placeholder="tag1, tag2, tag3">
                    </div>

                    <!-- Audio Upload -->
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Audio <span class="text-muted small fw-normal">(mp3, wav, ogg – tối đa 20MB)</span></label>
                        <div class="input-group mb-1">
                            <input type="text" id="audioUrl" class="form-control form-control-sm"
                                   placeholder="Dán link hoặc chọn file..." 
                                   oninput="updatePreview('audio', this.value, 'audioPreviewWrap', 'audioPreview')">
                            <label class="btn btn-outline-secondary btn-sm mb-0" for="audioFileInput"
                                   title="Chọn file audio từ máy">
                                <i class="bi bi-upload"></i>
                            </label>
                        </div>
                        <input type="file" id="audioFileInput" accept="audio/*" class="d-none"
                               onchange="handleFileUpload(this,'audio','audioUrl','audioPreviewWrap')">
                        <div id="audioPreviewWrap" class="mt-1 d-none">
                            <audio id="audioPreview" controls class="w-100" style="height:36px;"></audio>
                        </div>
                        <small id="audioUploadStatus" class="text-muted"></small>
                    </div>

                    <!-- Image Upload -->
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Hình ảnh <span class="text-muted small fw-normal">(jpg, png, webp – tối đa 5MB)</span></label>
                        <div class="input-group mb-1">
                            <input type="text" id="imageUrl" class="form-control form-control-sm"
                                   placeholder="Dán link hoặc chọn file..."
                                   oninput="updatePreview('image', this.value, 'imagePreviewWrap', 'imagePreview')">
                            <label class="btn btn-outline-secondary btn-sm mb-0" for="imageFileInput"
                                   title="Chọn file ảnh từ máy">
                                <i class="bi bi-image"></i>
                            </label>
                        </div>
                        <input type="file" id="imageFileInput" accept="image/*" class="d-none"
                               onchange="handleFileUpload(this,'image','imageUrl','imagePreviewWrap')">
                        <div id="imagePreviewWrap" class="mt-1 d-none">
                            <img id="imagePreview" src="" alt="preview"
                                 class="img-fluid rounded border" style="max-height:120px;object-fit:cover;">
                        </div>
                        <small id="imageUploadStatus" class="text-muted"></small>
                    </div>
                </div>

                <!-- Content -->
                <div class="mb-3">
                    <label class="form-label fw-bold">Nội dung câu hỏi <span class="text-danger">*</span></label>
                    <textarea id="content" class="form-control" rows="4" required placeholder="Nhập nội dung câu hỏi..."></textarea>
                </div>

                <!-- Explanation -->
                <div class="mb-3">
                    <label class="form-label fw-bold">Giải thích đáp án</label>
                    <textarea id="explanation" class="form-control" rows="2" placeholder="Giải thích chi tiết (hiển thị khi review)"></textarea>
                </div>

                <!-- Answer Options Section -->
                <div id="optionsSection">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <label class="form-label fw-bold mb-0">Đáp án</label>
                        <button type="button" class="btn btn-sm btn-outline-primary" onclick="addOption()">
                            <i class="bi bi-plus-lg me-1"></i> Thêm đáp án
                        </button>
                    </div>
                    <div id="optionsContainer"></div>
                </div>

                <!-- Submit -->
                <div class="d-flex justify-content-end gap-2 mt-4">
                    <button type="button" class="btn btn-outline-secondary" onclick="submitQuestion('DRAFT')">Lưu bản nháp</button>
                    <button type="button" class="btn text-white" style="background-color: #136ad5;" onclick="submitQuestion('PUBLISHED')">Lưu & Xuất bản</button>
                </div>
            </form>
        </div>
    </div>

</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<script>
let optionIndex = 0;
const noOptionsTypes = ['WRITING', 'SPEAKING'];

// ─── FILE UPLOAD ────────────────────────────────────────────────────────────
function updatePreview(type, url, wrapId, previewId) {
    const wrap = document.getElementById(wrapId);
    const preview = document.getElementById(previewId);
    if (url && url.trim().length > 0) {
        wrap.classList.remove('d-none');
        preview.src = url;
    } else {
        wrap.classList.add('d-none');
        preview.src = "";
    }
}

async function handleFileUpload(input, type, urlFieldId, previewWrapperId) {
    const file = input.files[0];
    if (!file) return;

    const statusEl = document.getElementById(type === 'audio' ? 'audioUploadStatus' : 'imageUploadStatus');
    statusEl.textContent = 'Đang tải lên...';
    statusEl.className = 'text-warning small';

    const formData = new FormData();
    formData.append('file', file);

    try {
        const res = await fetch(`/api/v1/upload/${type}`, { method: 'POST', body: formData });
        const result = await res.json();

        if (res.ok && result.data) {
            document.getElementById(urlFieldId).value = result.data;
            statusEl.textContent = '✓ Upload thành công';
            statusEl.className = 'text-success small';

            updatePreview(type, result.data, previewWrapperId, type === 'image' ? 'imagePreview' : 'audioPreview');
        } else {
            statusEl.textContent = '✗ ' + (result.message || 'Upload thất bại');
            statusEl.className = 'text-danger small';
        }
    } catch (e) {
        statusEl.textContent = '✗ Lỗi kết nối: ' + e.message;
        statusEl.className = 'text-danger small';
    }

    // Reset input để cho phép chọn lại cùng file
    input.value = '';
}

function onTypeChange() {
    const type = document.getElementById('questionType').value;
    const section = document.getElementById('optionsSection');
    if (noOptionsTypes.includes(type)) {
        section.style.display = 'none';
    } else {
        section.style.display = 'block';
        if (document.getElementById('optionsContainer').children.length === 0) {
            addOption(); addOption();
        }
    }
}

function addOption() {
    const type = document.getElementById('questionType').value;
    const isMatching = type === 'MATCHING';
    const container = document.getElementById('optionsContainer');
    const idx = optionIndex++;
    const div = document.createElement('div');
    div.className = 'row g-2 mb-2 align-items-center option-row';
    div.id = `option-${idx}`;
    div.innerHTML = `
        <div class="${isMatching ? 'col-md-4' : 'col-md-6'}">
            <input type="text" class="form-control form-control-sm" placeholder="Nội dung đáp án" data-field="title" required>
        </div>
        ${isMatching ? `<div class="col-md-4">
            <input type="text" class="form-control form-control-sm" placeholder="Ghép nối với..." data-field="matchTarget">
        </div>` : ''}
        <div class="col-md-2">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" data-field="correct" id="correct-${idx}">
                <label class="form-check-label small" for="correct-${idx}">Đáp án đúng</label>
            </div>
        </div>
        <div class="col-md-1">
            <button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('.option-row').remove()">
                <i class="bi bi-trash"></i>
            </button>
        </div>
    `;
    container.appendChild(div);
}

function collectOptions() {
    const rows = document.querySelectorAll('.option-row');
    return Array.from(rows).map((row, i) => ({
        title: row.querySelector('[data-field="title"]').value,
        correct: row.querySelector('[data-field="correct"]').checked,
        orderIndex: i,
        matchTarget: row.querySelector('[data-field="matchTarget"]')?.value || null
    }));
}

async function submitQuestion(status) {
    const type = document.getElementById('questionType').value;
    if (!type) { alert('Vui lòng chọn loại câu hỏi.'); return; }

    const body = {
        content: document.getElementById('content').value,
        questionType: type,
        skill: document.getElementById('skill').value,
        cefrLevel: document.getElementById('cefrLevel').value,
        topic: document.getElementById('topic').value || null,
        tags: document.getElementById('tags').value || null,
        explanation: document.getElementById('explanation').value || null,
        audioUrl: document.getElementById('audioUrl').value || null,
        imageUrl: document.getElementById('imageUrl').value || null,
        status: status,
        options: noOptionsTypes.includes(type) ? [] : collectOptions()
    };

    try {
        const res = await fetch('/api/v1/expert/question-bank', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const result = await res.json();
        if (res.ok) {
            alert('Tạo câu hỏi thành công!');
            window.location.href = '/expert/question-bank';
        } else {
            alert(result.message || 'Có lỗi xảy ra.');
        }
    } catch (e) { alert('Lỗi: ' + e.message); }
}
</script>
</body>
</html>
