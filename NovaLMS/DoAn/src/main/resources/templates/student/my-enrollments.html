<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:with="isDashboard=true">

<head th:replace="~{fragments/head :: common-head(pageTitle='Lịch sử đăng ký')}"></head>

<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Lịch sử đăng ký', breadcrumb='Học tập')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='my-enrollments')}"></aside>
<div th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<main class="dash-main d-flex flex-column" id="dashMain">
    <div class="dash-page-header">
        <h2 class="dash-page-title">Lịch Sử Đăng Ký</h2>
        <p class="dash-page-subtitle">Theo dõi trạng thái các lớp học bạn đã đăng ký</p>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th class="border-top-0 py-3">Khóa Học</th>
                    <th class="border-top-0 py-3">Lớp</th>
                    <th class="border-top-0 py-3">Giá trị</th>
                    <th class="border-top-0 py-3">Trạng Thái</th>
                    <th class="border-top-0 py-3">Hành Động</th>
                </tr>
                </thead>
                <tbody id="enrollmentTableBody" style="border-top: none;">
                <tr><td colspan="5" class="text-center py-4">Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<script>
    document.addEventListener("DOMContentLoaded", async function() {
        const tbody = document.getElementById('enrollmentTableBody');

        const getStatusBadge = (status) => {
            if (status === 'Submitted') return '<span class="badge bg-warning text-dark px-3 py-2 rounded-pill shadow-sm">Chờ duyệt</span>';
            if (status === 'Approved') return '<span class="badge bg-success px-3 py-2 rounded-pill shadow-sm">Đã duyệt</span>';
            if (status === 'Cancelled') return '<span class="badge bg-secondary px-3 py-2 rounded-pill shadow-sm">Đã hủy</span>';
            return '<span class="badge bg-danger px-3 py-2 rounded-pill shadow-sm">Từ chối</span>';
        };

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
        };

        try {
            const response = await fetch('/api/v1/student/my-enrollments/data');
            const result = await response.json();

            if (result.status === 200 && result.data.length > 0) {
                tbody.innerHTML = result.data.map(reg => `
                    <tr>
                        <td class="py-3 fw-bold text-dark">${reg.courseName}</td>
                        <td class="text-muted">${reg.className}</td>
                        <td class="text-muted fw-medium">${formatCurrency(reg.registrationPrice)}</td>
                        <td>${getStatusBadge(reg.status)}</td>
                        <td>
                            ${reg.status === 'Approved'
                                ? `<a href="/student/my-courses" class="btn btn-sm btn-outline-primary rounded-pill px-3 shadow-sm"><i class="bi bi-play-circle-fill me-1"></i> Vào học</a>`
                                : `<button class="btn btn-sm btn-light rounded-pill px-3 text-muted" disabled>Chờ xử lý</button>`}
                        </td>
                    </tr>
                `).join('');
            } else {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-muted"><i class="bi bi-journal-x fs-1"></i><p>Bạn chưa đăng ký khóa học nào.</p></td></tr>`;
            }
        } catch (error) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger py-4">Lỗi kết nối dữ liệu!</td></tr>`;
        }
    });
</script>

</body>
</html>
