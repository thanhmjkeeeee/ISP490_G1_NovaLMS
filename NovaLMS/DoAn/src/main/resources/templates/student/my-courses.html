<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:with="isDashboard=true">

<head th:replace="~{fragments/head :: common-head(pageTitle='Khóa học của tôi')}"></head>

<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Khóa học của tôi', breadcrumb='Học tập')}"></header>

<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='my-courses')}"></aside>
<div th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<main class="dash-main d-flex flex-column" id="dashMain">

  <form id="filterForm" method="GET" th:action="@{/student/my-courses}">
    <div class="row g-4">

      <div class="col-lg-3">
        <div class="course-filters">
          <h4 class="filter-title">Lọc Khóa Học</h4>

          <div class="filter-group">
            <h5>Danh mục</h5>
            <label class="filter-radio">
              <input type="radio" name="categoryId" value=""
                     th:checked="${categoryId == null}"
                     onchange="this.form.submit()">
              Tất cả danh mục
            </label>
            <label class="filter-radio">
              <input type="radio" name="categoryId" value="101"
                     th:checked="${categoryId == 101}"
                     onchange="this.form.submit()">
              IELTS
            </label>
            <label class="filter-radio">
              <input type="radio" name="categoryId" value="102"
                     th:checked="${categoryId == 102}"
                     onchange="this.form.submit()">
              TOEIC
            </label>
          </div>
        </div>
      </div>

      <div class="col-lg-9">

        <div class="courses-header">
          <div class="search-box">
            <span class="search-icon"><i class="bi bi-search"></i></span>
            <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm tên khóa học...">
          </div>

          <div class="sort-dropdown">
            <select name="sort" onchange="this.form.submit()">
              <option value="registrationTime_desc" th:selected="${currentSort == 'registrationTime_desc'}">Mới đăng ký</option>
              <option value="registrationTime_asc" th:selected="${currentSort == 'registrationTime_asc'}">Cũ nhất</option>
            </select>
          </div>

          <span class="result-count" th:if="${coursePage != null}">
              <strong th:text="${coursePage.totalElements}">0</strong> khóa học
            </span>
        </div>

        <div th:if="${error != null}" class="alert-error" role="alert">
          <i class="bi bi-exclamation-triangle-fill"></i>
          <span th:text="${error}">Lỗi tải dữ liệu</span>
        </div>

        <div class="row g-4" th:if="${coursePage != null and coursePage.totalElements > 0}">

          <div class="col-lg-6 col-md-6" th:each="dto : ${coursePage.content}">
            <div class="course-card">

              <div class="course-image">
                <img th:src="@{${dto.imageUrl != null ? dto.imageUrl : '/assets/img/course-1.jpg'}}" th:alt="${dto.title}" loading="lazy">
                <span class="badge-class" th:text="${dto.className ?: 'Lớp học'}">Lớp</span>
                <span class="badge-status">Đang học</span>
              </div>

              <div class="course-content">
                <h4 th:text="${dto.title ?: 'Khóa học không khả dụng'}">Tên Khóa Học</h4>
                <p th:text="${#strings.abbreviate(dto.description ?: 'Khóa học chưa có mô tả chi tiết.', 110)}">Mô tả...</p>

                <div class="progress-wrap">
                  <div class="progress-labels">
                    <span>Tiến độ học tập</span>
                    <span class="pct">0%</span>
                  </div>
                  <div class="progress-track">
                    <div class="progress-fill" style="width: 0%"></div>
                  </div>
                </div>

                <div class="card-footer-row">
                  <a th:href="@{'/student/learn/' + ${dto.courseId}}" class="btn-learn">
                    <i class="bi bi-play-circle-fill"></i> Vào học
                  </a>
                </div>
              </div>

            </div>
          </div>

        </div>

        <div th:if="${coursePage != null and coursePage.totalElements == 0}" class="empty-state mt-3">
          <i class="bi bi-journal-x"></i>
          <h4>Không tìm thấy khóa học nào</h4>
          <p>Hãy thử thay đổi từ khóa tìm kiếm hoặc xóa bộ lọc danh mục.</p>
          <a th:href="@{/student/my-courses}" class="btn-clear">
            <i class="bi bi-x-circle me-1"></i> Xóa bộ lọc
          </a>
        </div>

        <div class="mt-4" th:if="${coursePage != null and coursePage.totalPages > 1}">
          <nav aria-label="Courses pagination">
            <ul class="pagination justify-content-center">
              <li class="page-item" th:classappend="${coursePage.first} ? 'disabled'">
                <button type="submit" name="page" th:value="${coursePage.number - 1}" class="page-link shadow-sm border-0"><i class="bi bi-chevron-left"></i></button>
              </li>
              <li class="page-item" th:each="i : ${#numbers.sequence(0, coursePage.totalPages - 1)}" th:classappend="${coursePage.number == i} ? 'active'">
                <button type="submit" name="page" th:value="${i}" class="page-link shadow-sm border-0 mx-1" th:text="${i + 1}">1</button>
              </li>
              <li class="page-item" th:classappend="${coursePage.last} ? 'disabled'">
                <button type="submit" name="page" th:value="${coursePage.number + 1}" class="page-link shadow-sm border-0"><i class="bi bi-chevron-right"></i></button>
              </li>
            </ul>
          </nav>
        </div>

      </div>
    </div>
  </form>

  <footer class="mt-auto pt-4 pb-2 text-center text-muted" style="font-size: 0.85rem;">
    &copy; 2026 Nova LMS - Khóa học của tôi
  </footer>

</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

</body>
</html>
