<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:with="isDashboard=true">

<head th:replace="~{fragments/head :: common-head(pageTitle='Khóa học của tôi')}"></head>

<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Khóa học của tôi', breadcrumb='Học tập')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='my-courses')}"></aside>
<div th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<main class="dash-main d-flex flex-column" id="dashMain">
  <div class="row g-4">
    <div class="col-lg-3">
      <div class="card border-0 shadow-sm rounded-4 p-4">
        <h5 class="fw-bold mb-3">Danh mục</h5>
        <div class="form-check mb-2">
          <input class="form-check-input filter-input" type="radio" name="categoryId" value="" id="catAll" checked>
          <label class="form-check-label" for="catAll">Tất cả danh mục</label>
        </div>
        <div class="form-check mb-2">
          <input class="form-check-input filter-input" type="radio" name="categoryId" value="101" id="catIelts">
          <label class="form-check-label" for="catIelts">IELTS</label>
        </div>
        <div class="form-check mb-2">
          <input class="form-check-input filter-input" type="radio" name="categoryId" value="102" id="catToeic">
          <label class="form-check-label" for="catToeic">TOEIC</label>
        </div>
      </div>
    </div>

    <div class="col-lg-9">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="input-group w-50 shadow-sm rounded-pill overflow-hidden">
          <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-search"></i></span>
          <input type="text" id="keywordInput" class="form-control border-start-0 ps-0 filter-input" placeholder="Tìm tên khóa học...">
        </div>
        <select id="sortInput" class="form-select w-25 shadow-sm rounded-pill filter-input">
          <option value="registrationTime_desc">Mới đăng ký</option>
          <option value="registrationTime_asc">Cũ nhất</option>
        </select>
      </div>

      <div id="courseContainer" class="row g-4"></div>

      <nav class="mt-4" aria-label="Pagination">
        <ul id="paginationContainer" class="pagination justify-content-center"></ul>
      </nav>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<script>
  let currentPage = 0;

  const fetchCourses = async () => {
      const keyword = document.getElementById('keywordInput') ? document.getElementById('keywordInput').value : '';
      const categoryRadio = document.querySelector('input[name="categoryId"]:checked');
      const categoryId = categoryRadio ? categoryRadio.value : '';
      const sortInput = document.getElementById('sortInput');
      const sort = sortInput ? sortInput.value : 'registrationTime_desc';

      try {
          const url = `/api/v1/student/my-courses/data?keyword=${encodeURIComponent(keyword)}&categoryId=${categoryId}&page=${currentPage}&size=6&sort=${sort}`;
          const response = await fetch(url);
          const result = await response.json();

          if (result.status === 200) {
              // ĐÃ SỬA: result.data.content -> result.data.items
              renderCourses(result.data.items);
              renderPagination(result.data);
          }
      } catch (error) {
          document.getElementById('courseContainer').innerHTML = `<div class="col-12 text-center text-danger">Lỗi tải dữ liệu</div>`;
      }
  };

  const renderCourses = (courses) => {
      const container = document.getElementById('courseContainer');
      if (!courses || courses.length === 0) {
          container.innerHTML = `<div class="col-12 text-center text-muted py-5"><i class="bi bi-journal-x fs-1"></i><p>Không tìm thấy khóa học nào.</p></div>`;
          return;
      }

      container.innerHTML = courses.map(c => `
          <div class="col-lg-6 col-md-6">
              <div class="card border-0 shadow-sm rounded-4 h-100 overflow-hidden">
                  <div class="position-relative">
                      <img src="${c.imageUrl || '/assets/img/course-1.jpg'}" class="w-100" style="height: 180px; object-fit: cover;" alt="">
                      <span class="position-absolute top-0 start-0 bg-primary text-white px-3 py-1 m-2 rounded-pill small">${c.className}</span>
                  </div>
                  <div class="card-body d-flex flex-column">
                      <h5 class="fw-bold text-dark text-truncate">${c.title}</h5>
                      <p class="text-muted small flex-grow-1">${c.description ? c.description.substring(0, 100) + '...' : 'Không có mô tả'}</p>
                      <a href="/student/learn/${c.courseId}" class="btn btn-light rounded-pill w-100 text-primary fw-bold mt-2 shadow-sm border">
                          <i class="bi bi-play-circle-fill me-1"></i> Vào học
                      </a>
                  </div>
              </div>
          </div>
      `).join('');
  };

  const renderPagination = (pageData) => {
      const pagination = document.getElementById('paginationContainer');
      if (!pageData || pageData.totalPages <= 1) {
          pagination.innerHTML = '';
          return;
      }

      // ĐÃ SỬA: Dùng pageData.pageNo thay cho first/pageNumber
      let html = `<li class="page-item ${pageData.pageNo === 0 ? 'disabled' : ''}">
          <button class="page-link shadow-sm border-0 rounded-circle me-1" onclick="changePage(${currentPage - 1})"><i class="bi bi-chevron-left"></i></button>
      </li>`;

      for (let i = 0; i < pageData.totalPages; i++) {
          // ĐÃ SỬA: pageData.pageNumber -> pageData.pageNo
          html += `<li class="page-item ${pageData.pageNo === i ? 'active' : ''}">
              <button class="page-link shadow-sm border-0 rounded-circle mx-1" onclick="changePage(${i})">${i + 1}</button>
          </li>`;
      }

      html += `<li class="page-item ${pageData.last ? 'disabled' : ''}">
          <button class="page-link shadow-sm border-0 rounded-circle ms-1" onclick="changePage(${currentPage + 1})"><i class="bi bi-chevron-right"></i></button>
      </li>`;

      pagination.innerHTML = html;
  };

  window.changePage = (page) => {
      currentPage = page;
      fetchCourses();
  };

  document.querySelectorAll('.filter-input').forEach(el => {
      el.addEventListener('change', () => {
          currentPage = 0;
          fetchCourses();
      });
      if(el.id === 'keywordInput') {
          el.addEventListener('keyup', () => {
              currentPage = 0;
              fetchCourses();
          });
      }
  });

  document.addEventListener("DOMContentLoaded", fetchCourses);
</script>

</body>
</html>
