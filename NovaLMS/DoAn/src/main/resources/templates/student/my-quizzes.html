<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:with="isDashboard=true">

<head th:replace="~{fragments/head :: common-head(pageTitle='Lịch sử kiểm tra')}"></head>

<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Lịch sử làm bài', breadcrumb='Lịch sử làm bài')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='quiz')}"></aside>
<div th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<main class="dash-main" id="dashMain">
    <div class="container-fluid px-4">

        <!-- Page Title -->
        <div class="mb-4">
            <h4 class="fw-bold mb-1"><i class="bi bi-bar-chart-line me-2"></i>Thống kê lịch sử làm bài</h4>
        </div>

        <!-- Stats Cards -->
        <div class="row g-3 mb-4" id="statsRow">
            <div class="col-md-3 col-6">
                <div class="card border-0 shadow-sm rounded-4 h-100" style="background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);">
                    <div class="card-body d-flex align-items-center gap-3 py-3">
                        <div class="rounded-circle bg-white bg-opacity-50 d-flex align-items-center justify-content-center" style="width:48px;height:48px">
                            <i class="bi bi-journal-check text-success fs-5"></i>
                        </div>
                        <div>
                            <div class="small text-muted fw-medium">Kiểm tra năng lực</div>
                            <div class="fw-bold fs-4" id="statEntry">—</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="card border-0 shadow-sm rounded-4 h-100" style="background: linear-gradient(135deg, #fff3cd 0%, #ffeeba 100%);">
                    <div class="card-body d-flex align-items-center gap-3 py-3">
                        <div class="rounded-circle bg-white bg-opacity-50 d-flex align-items-center justify-content-center" style="width:48px;height:48px">
                            <i class="bi bi-book text-warning fs-5"></i>
                        </div>
                        <div>
                            <div class="small text-muted fw-medium">Bài tập lớp học</div>
                            <div class="fw-bold fs-4" id="statCourse">—</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="card border-0 shadow-sm rounded-4 h-100" style="background: linear-gradient(135deg, #cce5ff 0%, #b8daff 100%);">
                    <div class="card-body d-flex align-items-center gap-3 py-3">
                        <div class="rounded-circle bg-white bg-opacity-50 d-flex align-items-center justify-content-center" style="width:48px;height:48px">
                            <i class="bi bi-collection text-primary fs-5"></i>
                        </div>
                        <div>
                            <div class="small text-muted fw-medium">Luyện đề</div>
                            <div class="fw-bold fs-4" id="statPractice">—</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="card border-0 shadow-sm rounded-4 h-100" style="background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);">
                    <div class="card-body d-flex align-items-center gap-3 py-3">
                        <div class="rounded-circle bg-white bg-opacity-50 d-flex align-items-center justify-content-center" style="width:48px;height:48px">
                            <i class="bi bi-list-check text-danger fs-5"></i>
                        </div>
                        <div>
                            <div class="small text-muted fw-medium">Tất cả</div>
                            <div class="fw-bold fs-4" id="statAll">—</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="d-flex gap-2 mb-3 flex-wrap">
            <button class="btn btn-primary rounded-pill px-4 fw-bold active" data-tab="ENTRY_TEST" onclick="switchTab('ENTRY_TEST')">Kiểm tra năng lực</button>
            <button class="btn btn-outline-primary rounded-pill px-4 fw-bold" data-tab="COURSE_QUIZ" onclick="switchTab('COURSE_QUIZ')">Bài tập lớp học</button>
            <button class="btn btn-outline-primary rounded-pill px-4 fw-bold" data-tab="PRACTICE" onclick="switchTab('PRACTICE')">Luyện đề</button>
            <button class="btn btn-outline-primary rounded-pill px-4 fw-bold" data-tab="ALL" onclick="switchTab('ALL')">Tất cả</button>
        </div>

        <!-- Search & Filter -->
        <div class="card border-0 shadow-sm rounded-4 mb-3">
            <div class="card-body py-3">
                <div class="row g-3 align-items-center">
                    <div class="col-md-4">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                            <input type="text" class="form-control border-start-0" id="searchInput" placeholder="Tìm kiếm..." oninput="debouncedSearch()">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="card border-0 shadow-sm rounded-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-primary">
                        <tr>
                            <th class="border-0 py-3 ps-4">#</th>
                            <th class="border-0 py-3">Tên bài kiểm tra</th>
                            <th class="border-0 py-3">Khóa học</th>
                            <th class="border-0 py-3">Nộp lúc</th>
                            <th class="border-0 py-3">Điểm</th>
                            <th class="border-0 py-3">Trạng thái</th>
                            <th class="border-0 py-3 text-end pe-4">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        <tr><td colspan="7" class="text-center py-5"><div class="spinner-border text-primary" role="status"></div></td></tr>
                    </tbody>
                </table>
            </div>
            <!-- Empty State -->
            <div id="emptyState" class="text-center py-5 d-none">
                <i class="bi bi-journal-x fs-1 text-muted"></i>
                <h6 class="mt-3 text-muted">Chưa có bài kiểm tra nào.</h6>
            </div>
        </div>

        <!-- Pagination -->
        <nav id="historyPagination" class="mt-4" style="display: none;">
            <ul id="historyPaginationButtons" class="pagination justify-content-center"></ul>
        </nav>

    </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<script>
let currentPage = 0;
let currentCategory = 'ALL';
let searchKeyword = '';
let searchTimer = null;

document.addEventListener('DOMContentLoaded', () => {
    loadStats();
    loadHistory(currentPage);
});

async function loadStats() {
    try {
        const [entry, course, all] = await Promise.all([
            fetch('/api/v1/student/quiz/history?size=1&category=ENTRY_TEST').then(r => r.json()),
            fetch('/api/v1/student/quiz/history?size=1&category=COURSE_QUIZ').then(r => r.json()),
            fetch('/api/v1/student/quiz/history?size=1&category=ALL').then(r => r.json())
        ]);
        document.getElementById('statEntry').textContent = (entry.data?.totalElements || 0) + ' bài';
        document.getElementById('statCourse').textContent = (course.data?.totalElements || 0) + ' bài';
        document.getElementById('statAll').textContent = (all.data?.totalElements || 0) + ' bài';
        document.getElementById('statPractice').textContent = '0 bài';
    } catch(e) {
        document.getElementById('statEntry').textContent = '0 bài';
        document.getElementById('statCourse').textContent = '0 bài';
        document.getElementById('statAll').textContent = '0 bài';
        document.getElementById('statPractice').textContent = '0 bài';
    }
}

function switchTab(category) {
    currentCategory = category;
    currentPage = 0;
    document.querySelectorAll('[data-tab]').forEach(btn => {
        if (btn.dataset.tab === category) {
            btn.classList.add('btn-primary');
            btn.classList.remove('btn-outline-primary');
        } else {
            btn.classList.remove('btn-primary');
            btn.classList.add('btn-outline-primary');
        }
    });
    loadHistory(0);
}

function debouncedSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
        searchKeyword = document.getElementById('searchInput').value.trim();
        currentPage = 0;
        loadHistory(0);
    }, 300);
}

async function loadHistory(page) {
    currentPage = page;
    const tbody = document.getElementById('historyTableBody');
    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-5"><div class="spinner-border text-primary" role="status"></div></td></tr>';
    document.getElementById('emptyState').classList.add('d-none');

    try {
        let url = '/api/v1/student/quiz/history?page=' + page + '&size=15';
        if (currentCategory !== 'ALL') url += '&category=' + currentCategory;
        if (searchKeyword) url += '&keyword=' + encodeURIComponent(searchKeyword);

        const res = await fetch(url);
        const result = await res.json();

        if (result.status !== 200 || !result.data || result.data.items.length === 0) {
            tbody.innerHTML = '';
            document.getElementById('emptyState').classList.remove('d-none');
            document.getElementById('historyPagination').style.display = 'none';
            return;
        }

        let html = '';
        result.data.items.forEach((item, index) => {
            const date = new Date(item.submittedAt).toLocaleString('vi-VN');
            const isPending = item.passed === null;
            let statusBadge = '';
            if (isPending) {
                statusBadge = '<span class="badge bg-warning text-dark">Chờ chấm điểm</span>';
            } else {
                statusBadge = item.passed
                    ? '<span class="badge bg-success">Đạt</span>'
                    : '<span class="badge bg-danger">Không Đạt</span>';
            }

            const categoryLabel = item.quizCategory === 'ENTRY_TEST'
                ? '<span class="badge bg-info bg-opacity-25 text-info">Kiểm tra năng lực</span>'
                : '<span class="badge bg-secondary">Bài tập</span>';

            html += `
                <tr>
                    <td class="ps-4 text-muted small">${page * 15 + index + 1}</td>
                    <td>
                        <div class="fw-bold text-dark">${item.quizTitle}</div>
                    </td>
                    <td><span class="badge bg-secondary">${item.courseName || 'N/A'}</span></td>
                    <td><span class="small text-muted"><i class="bi bi-clock me-1"></i>${date}</span></td>
                    <td><span class="fw-bold">${item.score}</span> <span class="text-muted">/ ${item.maxScore}</span></td>
                    <td>${statusBadge}</td>
                    <td class="text-end pe-4">
                        <a href="/student/quiz/result/${item.resultId}" class="btn btn-sm btn-outline-primary rounded-pill px-3">
                            Chi tiết <i class="bi bi-arrow-right"></i>
                        </a>
                    </td>
                </tr>
            `;
        });
        tbody.innerHTML = html;
        renderPagination(result.data.totalPages, page);

    } catch(e) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger py-4">Lỗi kết nối khi tải dữ liệu.</td></tr>';
    }
}

function renderPagination(totalPages, currentPageIdx) {
    const nav = document.getElementById('historyPagination');
    if (totalPages <= 1) {
        nav.style.display = 'none';
        return;
    }
    nav.style.display = 'block';
    NovaPagination.render('historyPaginationButtons', totalPages, currentPageIdx, 'loadHistory');
}
</script>

</body>
</html>
