<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:with="isDashboard=true">

<head th:replace="~{fragments/head :: common-head(pageTitle='Chi tiết khóa học')}"></head>

<body class="dashboard-body bg-light"> <header th:replace="~{fragments/header :: dash-header(pageTitle='Chi tiết khóa học', breadcrumb='Khóa học')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='my-courses')}"></aside>
<div th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<main class="dash-main d-flex flex-column py-4" id="dashMain">
  <div class="container-fluid">

    <div id="loadingIndicator" class="row g-4">
      <div class="col-12">
        <div class="skeleton" style="height: 250px; border-radius: 20px;"></div>
      </div>
      <div class="col-lg-8">
        <div class="skeleton mb-3" style="height: 50px; border-radius: 12px;"></div>
        <div class="skeleton mb-2" style="height: 80px; border-radius: 12px;"></div>
        <div class="skeleton mb-2" style="height: 80px; border-radius: 12px;"></div>
      </div>
      <div class="col-lg-4">
        <div class="skeleton" style="height: 300px; border-radius: 20px;"></div>
      </div>
    </div>

    <div id="courseContent" class="d-none fade-in-ready">

      <div class="course-banner bg-primary bg-gradient rounded-4 p-4 p-md-5 mb-4 shadow-sm text-white position-relative overflow-hidden">
        <div class="position-absolute top-0 end-0 opacity-25" style="transform: translate(20%, -30%);">
          <i class="bi bi-mortarboard-fill" style="font-size: 15rem;"></i>
        </div>

        <div class="row align-items-center position-relative z-1">
          <div class="col-lg-8 mb-4 mb-lg-0">
            <span id="bannerClassName" class="badge bg-white text-primary mb-3 px-3 py-2 rounded-pill fw-bold shadow-sm d-none"></span>
            <h1 id="bannerTitle" class="fw-bolder mb-3" style="font-size: 2.2rem;">Đang tải...</h1>
            <p id="bannerDesc" class="mb-0 text-white-50 lead fs-6" style="max-width: 90%;"></p>
          </div>

          <div class="col-lg-4 text-lg-end">
            <div class="bg-white bg-opacity-10 p-4 rounded-4 backdrop-blur">
              <div class="d-flex justify-content-between align-items-end mb-2">
                <span class="fw-bold small text-uppercase tracking-wider">Tiến độ học tập</span>
                <span id="bannerProgressText" class="fw-bolder fs-5">0%</span>
              </div>
              <div class="progress mb-4" style="height: 8px; background-color: rgba(255,255,255,0.2);">
                <div id="bannerProgressBar" class="progress-bar bg-warning progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
              </div>
              <a id="btnContinue" href="#" class="btn btn-warning text-dark rounded-pill px-4 fw-bold shadow w-100 d-none transition-all">
                Tiếp tục học <i class="bi bi-play-circle-fill ms-1"></i>
              </a>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-lg-8">
          <div class="bg-white rounded-4 shadow-sm p-2 mb-4">
            <ul class="nav nav-pills nav-fill gap-2" id="learningTabs" role="tablist">
              <li class="nav-item" role="presentation">
                <button class="nav-link active rounded-pill fw-bold" data-bs-toggle="tab" data-bs-target="#modules" type="button" role="tab">
                  <i class="bi bi-journal-text me-2"></i>Nội dung
                </button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link rounded-pill fw-bold" data-bs-toggle="tab" data-bs-target="#quiz-section" type="button" role="tab">
                  <i class="bi bi-patch-question me-2"></i>Bài kiểm tra
                </button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link rounded-pill fw-bold" data-bs-toggle="tab" data-bs-target="#assignment-section" type="button" role="tab">
                  <i class="bi bi-list-task me-2"></i>Bài tập lớn
                </button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link rounded-pill fw-bold" data-bs-toggle="tab" data-bs-target="#liveclass" type="button" role="tab">
                  <i class="bi bi-camera-video me-2"></i>Lớp Live
                </button>
              </li>
            </ul>
          </div>

          <div class="tab-content">
            <div class="tab-pane fade show active" id="modules" role="tabpanel">
              <div id="accordionModules" class="accordion custom-accordion"></div>
            </div>

            <div class="tab-pane fade" id="quiz-section" role="tabpanel">
              <div id="courseQuizContent"></div>
            </div>

            <div class="tab-pane fade" id="assignment-section" role="tabpanel">
              <div id="courseAssignmentContent"></div>
            </div>

            <div class="tab-pane fade" id="liveclass" role="tabpanel">
              <div class="card p-4 border-0 shadow-sm rounded-4 h-100">
                <h5 class="fw-bold mb-4 text-primary"><i class="bi bi-info-circle-fill me-2"></i>Thông tin tổ chức lớp</h5>
                <div id="liveClassInfo" class="d-flex flex-column gap-3"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="sticky-top" style="top: 100px;">
            <div class="card text-center p-4 border-0 shadow-sm rounded-4">
              <h6 class="fw-bold border-bottom pb-3 mb-4 text-start text-uppercase small tracking-wider text-muted">Giảng viên phụ trách</h6>
              <div class="position-relative d-inline-block mx-auto mb-3">
                <img id="teacherAvatar" src="/assets/img/default-avatar.png" onerror="this.onerror=null;this.src='/assets/img/default-avatar.png'" class="rounded-circle border border-4 border-white shadow-sm" width="120" height="120" style="object-fit: cover;">
                <span class="position-absolute bottom-0 end-0 bg-success border border-2 border-white rounded-circle p-2" title="Đang trực tuyến"></span>
              </div>
              <h5 id="teacherName" class="fw-bold mb-1 text-dark">Đang cập nhật</h5>
              <p class="text-primary small fw-bold mb-0">Chuyên gia đào tạo</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<script>
  document.addEventListener("DOMContentLoaded", async () => {
      const pathParts = window.location.pathname.replace(/\/$/, "").split('/');
      const courseId = pathParts[pathParts.length - 1];

      if (!courseId || isNaN(courseId)) {
          showErrorState('ID khóa học không hợp lệ!');
          return;
      }

      try {
          const response = await fetch(`/api/v1/learning/course/${courseId}`);
          if (!response.ok) throw new Error('Phản hồi từ máy chủ không hợp lệ');

          const result = await response.json();

          if(result.status === 200) {
              renderCourseData(result.data);
              document.getElementById('loadingIndicator').classList.add('d-none');
              document.getElementById('courseContent').classList.remove('d-none');
          } else {
              showErrorState(result.message || 'Lỗi lấy dữ liệu từ máy chủ.');
          }
      } catch (error) {
          showErrorState('Mất kết nối. Vui lòng kiểm tra lại mạng.');
      }
  });

  const showErrorState = (msg) => {
      document.getElementById('loadingIndicator').innerHTML = `
          <div class="col-12 text-center py-5">
              <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 4rem;"></i>
              <h4 class="fw-bold mt-3">Đã xảy ra lỗi</h4>
              <p class="text-muted">${msg}</p>
              <a href="/student/my-courses" class="btn btn-outline-primary rounded-pill px-4 mt-2">Quay lại danh sách</a>
          </div>`;
  };

  const renderCourseData = (course) => {
      // 1. Render Banner Info
      const classBadge = document.getElementById('bannerClassName');
      if(course.className) {
          classBadge.textContent = course.className;
          classBadge.classList.remove('d-none');
      }

      document.getElementById('bannerTitle').textContent = course.courseName || course.title || 'Khóa học không tên';
      document.getElementById('bannerDesc').textContent = course.description || 'Chưa có mô tả chi tiết.';

      const progress = course.progressPercent || 0;
      document.getElementById('bannerProgressText').textContent = `${progress}%`;
      document.getElementById('bannerProgressBar').style.width = `${progress}%`;

      const btnContinue = document.getElementById('btnContinue');
      if (course.modules && course.modules.length > 0) {
          btnContinue.classList.remove('d-none');
          btnContinue.href = `/student/lesson/${course.courseId}/continue`;
          if (progress === 100) {
              btnContinue.innerHTML = 'Ôn tập lại <i class="bi bi-arrow-repeat ms-1"></i>';
              btnContinue.classList.replace('btn-warning', 'btn-light');
          }
      }

      // 2. Render Teacher
      document.getElementById('teacherName').textContent = course.teacherName || 'Hệ thống LMS';
      if(course.teacherAvatar) document.getElementById('teacherAvatar').src = course.teacherAvatar;

      // 3. Render Live Class (Đã fix lỗi logic lồng ghép)
      const liveDiv = document.getElementById('liveClassInfo');
      if (!course.className) {
          liveDiv.innerHTML = `
            <div class="text-center py-5">
              <div class="bg-light rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                <i class="bi bi-camera-video-off fs-1 text-muted"></i>
              </div>
              <h6 class="fw-bold text-dark">Không phải lớp trực tuyến</h6>
              <p class="text-muted small">Khóa học này là khóa học Video quay sẵn (Self-paced learning).</p>
            </div>`;
      } else {
          const btnLive = course.liveMeetingLink
            ? `<div class="mb-2"><span class="badge bg-primary bg-opacity-10 text-primary px-3 py-2 rounded-pill small fw-bold"><i class="bi bi-info-circle me-1"></i> ${course.liveMeetingLabel || 'Link lớp học'}</span></div>
               <a href="${course.liveMeetingLink}" target="_blank" class="btn btn-primary rounded-pill px-4 shadow-sm fw-bold"><i class="bi bi-camera-video me-2"></i> Tham gia lớp học</a>`
            : `<div class="alert alert-warning d-inline-block rounded-pill px-4 py-2 small mb-0"><i class="bi bi-exclamation-circle me-2"></i> ${course.liveMeetingLabel || 'Link học hiện chưa được cập nhật.'}</div>`;

          liveDiv.innerHTML = `
              <div class="d-flex align-items-center p-3 bg-light rounded-3">
                  <div class="bg-white p-2 rounded shadow-sm me-3"><i class="bi bi-tags-fill text-primary fs-4"></i></div>
                  <div><p class="small text-muted mb-0">Mã lớp / Tên lớp</p><h6 class="fw-bold mb-0">${course.className}</h6></div>
              </div>
              <div class="d-flex align-items-center p-3 bg-light rounded-3">
                  <div class="bg-white p-2 rounded shadow-sm me-3"><i class="bi bi-calendar-check-fill text-success fs-4"></i></div>
                  <div><p class="small text-muted mb-0">Lịch học dự kiến</p><h6 class="fw-bold mb-0">${course.schedule || 'Chưa cập nhật'}</h6></div>
              </div>
              <div class="mt-4 text-center border-top pt-4">
                  <p class="text-muted small mb-3">Hệ thống sẽ tự động cập nhật link Meet theo ngày học.</p>
                  ${btnLive}
              </div>`;
      }

      // 4. Render Modules & Lessons
      const modulesDiv = document.getElementById('accordionModules');
      if (!course.modules || course.modules.length === 0) {
          modulesDiv.innerHTML = '<div class="text-center py-5 text-muted"><i class="bi bi-folder2-open fs-1 mb-3"></i><p>Nội dung đang được cập nhật. Vui lòng quay lại sau.</p></div>';
      } else {
          modulesDiv.innerHTML = course.modules.map((m, index) => {
              const lessons = m.lessons || [];
              const lessonsHtml = lessons.map(l => {
                  const isLocked = l.locked;
                  const isCompleted = l.completed;

                  let iconClass = 'bi-file-earmark-text';
                  let iconColor = 'text-primary';
                  if (l.type === 'VIDEO') { iconClass = 'bi-play-circle-fill'; iconColor = 'text-danger'; }
                  if (l.type === 'QUIZ')  { iconClass = 'bi-patch-question-fill'; iconColor = 'text-warning'; }

                  const statusIcon = isCompleted
                      ? '<i class="bi bi-check-circle-fill text-success fs-5"></i>'
                      : (isLocked ? '<i class="bi bi-lock-fill text-muted fs-5"></i>' : '');

                  return `
                  <a href="${isLocked ? 'javascript:void(0)' : '/student/lesson/view/' + l.lessonId}"
                     class="d-flex align-items-center text-decoration-none border-bottom py-3 px-4 transition-all ${isLocked ? 'opacity-50 cursor-not-allowed bg-light' : 'text-dark hover-bg-light'}">
                      <div class="${iconColor} me-3"><i class="bi ${iconClass} fs-4"></i></div>
                      <div class="flex-grow-1">
                          <h6 class="fw-bold mb-1" style="font-size: 0.95rem;">${l.lessonName || 'Bài học'}</h6>
                          <div class="d-flex align-items-center small text-muted">
                              <i class="bi bi-clock me-1"></i> <span>${l.duration || '--:--'}</span>
                          </div>
                      </div>
                      <div class="ms-3">${statusIcon}</div>
                  </a>`;
              }).join('');

              const totalLessons = m.totalLessons || lessons.length;
              const moduleName = m.moduleName || m.moduleTitle || 'Chương học';

              return `
              <div class="accordion-item mb-3 border-0 shadow-sm rounded-4 overflow-hidden custom-accordion-item">
                  <h2 class="accordion-header">
                      <button class="accordion-button ${index !== 0 ? 'collapsed' : ''} bg-white fw-bold py-3" type="button" data-bs-toggle="collapse" data-bs-target="#mod${m.moduleId}">
                          <div class="d-flex flex-column w-100 pe-3">
                              <span class="small text-muted fw-normal mb-1">Chương ${index + 1}</span>
                              <div class="d-flex justify-content-between align-items-center">
                                  <span class="fs-6 text-dark">${moduleName}</span>
                                  <span class="badge bg-light text-primary border rounded-pill px-3 py-2">${totalLessons} Bài</span>
                              </div>
                          </div>
                      </button>
                  </h2>
                  <div id="mod${m.moduleId}" class="accordion-collapse collapse ${index === 0 ? 'show' : ''}" data-bs-parent="#accordionModules">
                      <div class="accordion-body p-0 bg-white">
                          ${lessonsHtml || '<div class="p-4 text-center text-muted fst-italic">Chưa có bài học</div>'}
                      </div>
                  </div>
              </div>`;
          }).join('');
      }

      // 5. Render Quizzes (COURSE_QUIZ only)
      const quizContent = document.getElementById('courseQuizContent');
      const allQuizzes = course.quizzes || [];
      const regularQuizzes = allQuizzes.filter(q => q.isAssignment !== true);
      const assignments = allQuizzes.filter(q => q.isAssignment === true);

      if (regularQuizzes.length === 0) {
          quizContent.innerHTML = '<div class="text-center py-5 bg-white rounded-4 shadow-sm text-muted"><i class="bi bi-clipboard-x" style="font-size: 4rem;"></i><h5 class="fw-bold mt-3">Chưa có bài kiểm tra</h5><p>Khóa học này không yêu cầu làm bài kiểm tra cuối khóa.</p></div>';
      } else {
          quizContent.innerHTML = regularQuizzes.map(q => {
              const isOpen = q.isOpen === true;
              const attemptCount = q.attemptCount || 0;
              const maxAttempts = q.maxAttempts;
              const outOfAttempts = maxAttempts != null && attemptCount >= maxAttempts;

              let statusBadge = isOpen
                  ? `<span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 px-2 py-1"><i class="bi bi-unlock-fill me-1"></i>Đang mở</span>`
                  : `<span class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-25 px-2 py-1"><i class="bi bi-lock-fill me-1"></i>Đã khóa</span>`;

              let attemptsText = maxAttempts != null ? `${attemptCount}/${maxAttempts}` : attemptCount;

              let btnHtml = '';
              if (outOfAttempts) {
                  btnHtml = `<button class="btn btn-light text-muted rounded-pill fw-bold px-4 border" onclick="Swal.fire('Thông báo', 'Bạn đã hết lượt làm bài tập này!', 'info')"><i class="bi bi-x-circle me-2"></i>Hết lượt</button>`;
              } else if (!isOpen) {
                  btnHtml = `<button class="btn btn-light text-muted rounded-pill fw-bold px-4 border" disabled><i class="bi bi-lock-fill me-2"></i>Chưa mở</button>`;
              } else {
                  const btnLabel = attemptCount > 0 ? 'Làm lại bài' : 'Bắt đầu làm bài';
                  btnHtml = `<a href="/student/quiz/take/${q.quizId}" class="btn btn-primary rounded-pill fw-bold px-4 shadow-sm"><i class="bi bi-play-circle-fill me-2"></i>${btnLabel}</a>`;
              }

              return `
              <div class="card border-0 shadow-sm rounded-4 p-4 mb-3 transition-all hover-card">
                  <div class="d-flex align-items-center justify-content-between flex-wrap gap-4">
                      <div class="d-flex align-items-center gap-3">
                          <div class="bg-primary bg-opacity-10 p-3 rounded-circle text-primary">
                              <i class="bi bi-card-checklist fs-3"></i>
                          </div>
                          <div>
                              <h5 class="fw-bold text-dark mb-2">${q.title || 'Bài kiểm tra'}</h5>
                              <div class="d-flex flex-wrap gap-2 small">
                                  ${statusBadge}
                                  <span class="text-muted"><i class="bi bi-question-circle me-1"></i>${q.totalQuestions || 0} câu</span>
                                  <span class="text-muted"><i class="bi bi-stopwatch me-1"></i>${q.timeLimitMinutes ? q.timeLimitMinutes + ' phút' : 'Không giới hạn'}</span>
                                  <span class="text-muted"><i class="bi bi-arrow-repeat me-1"></i>Đã làm: ${attemptsText}</span>
                              </div>
                          </div>
                      </div>
                      <div class="text-end">
                          ${btnHtml}
                      </div>
                  </div>
              </div>`;
          }).join('');
      }

      // 6. Render Assignments (COURSE_ASSIGNMENT)
      const assignContent = document.getElementById('courseAssignmentContent');
      if (assignments.length === 0) {
          assignContent.innerHTML = '<div class="text-center py-5 bg-white rounded-4 shadow-sm text-muted"><i class="bi bi-list-task" style="font-size: 4rem;"></i><h5 class="fw-bold mt-3">Chưa có bài tập lớn</h5><p>Khóa học này chưa có assignment nào.</p></div>';
      } else {
          assignContent.innerHTML = assignments.map(q => {
              const isOpen = q.isOpen === true;
              const attemptCount = q.attemptCount || 0;
              const maxAttempts = q.maxAttempts;
              const outOfAttempts = maxAttempts != null && attemptCount >= maxAttempts;

              const now = new Date();
              const deadline = q.deadline ? new Date(q.deadline) : null;
              const isExpired = deadline ? now > deadline : false;

              // Parse closeAt
              let closeAt = null;
              if (q.closeAt) {
                  closeAt = new Date(q.closeAt);
              }

              // Determine effective open state
              let effectiveOpen = isOpen;
              if (effectiveOpen && q.openAt) {
                  const openTime = new Date(q.openAt);
                  effectiveOpen = now >= openTime;
              }
              if (effectiveOpen && closeAt && now > closeAt) {
                  effectiveOpen = false;
              }

              let statusHtml = '';
              if (isExpired) {
                  statusHtml = `<span class="badge bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25 px-2 py-1"><i class="bi bi-clock me-1"></i>Hết hạn nộp</span>`;
              } else if (effectiveOpen) {
                  statusHtml = `<span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 px-2 py-1"><i class="bi bi-unlock-fill me-1"></i>Đang mở</span>`;
              } else {
                  statusHtml = `<span class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-25 px-2 py-1"><i class="bi bi-lock-fill me-1"></i>Chưa mở</span>`;
              }

              // Deadline display
              let deadlineHtml = '';
              if (deadline) {
                  const dlStr = deadline.toLocaleString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                  const dlColor = isExpired ? 'text-danger' : 'text-warning';
                  deadlineHtml = `<span class="${dlColor}"><i class="bi bi-calendar-event me-1"></i>Hạn nộp: <strong>${dlStr}</strong></span>`;
              }

              let btnHtml = '';
              if (isExpired) {
                  btnHtml = `<button class="btn btn-light text-muted rounded-pill fw-bold px-4 border" disabled><i class="bi bi-x-circle me-2"></i>Đã hết hạn</button>`;
              } else if (outOfAttempts) {
                  btnHtml = `<button class="btn btn-light text-muted rounded-pill fw-bold px-4 border" onclick="Swal.fire('Thông báo', 'Bạn đã hết lượt làm bài tập này!', 'info')"><i class="bi bi-x-circle me-2"></i>Hết lượt làm</button>`;
              } else if (!effectiveOpen) {
                  btnHtml = `<button class="btn btn-light text-muted rounded-pill fw-bold px-4 border" disabled><i class="bi bi-lock-fill me-2"></i>Chưa mở</button>`;
              } else {
                  const btnLabel = attemptCount > 0 ? 'Làm lại bài' : 'Bắt đầu làm bài';
                  const url = q.isAssignment ? `/student/assignment/${q.quizId}` : `/student/quiz/take/${q.quizId}`;
                  btnHtml = `<a href="${url}" class="btn btn-warning rounded-pill fw-bold px-4 shadow-sm text-dark"><i class="bi bi-play-circle-fill me-2"></i>${btnLabel}</a>`;
              }

              return `
              <div class="card border-0 shadow-sm rounded-4 p-4 mb-3 transition-all hover-card" style="border-left: 4px solid #f59e0b !important;">
                  <div class="d-flex align-items-center justify-content-between flex-wrap gap-4">
                      <div class="d-flex align-items-center gap-3">
                          <div class="bg-warning bg-opacity-10 p-3 rounded-circle text-warning">
                              <i class="bi bi-list-task fs-3"></i>
                          </div>
                          <div>
                              <h5 class="fw-bold text-dark mb-2">${q.title || 'Bài tập lớn'}</h5>
                              <div class="d-flex flex-wrap gap-2 small">
                                  ${statusHtml}
                                  ${deadlineHtml}
                                  <span class="text-muted"><i class="bi bi-arrow-repeat me-1"></i>Đã làm: ${maxAttempts != null ? attemptCount + '/' + maxAttempts : attemptCount + ' lần'}</span>
                              </div>
                          </div>
                      </div>
                      <div class="text-end">
                          ${btnHtml}
                      </div>
                  </div>
              </div>`;
          }).join('');
      }
  };
</script>

</body>
</html>
