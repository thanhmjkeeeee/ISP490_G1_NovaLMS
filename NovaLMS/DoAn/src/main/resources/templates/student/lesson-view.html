<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:with="isDashboard=true">

<head th:replace="~{fragments/head :: common-head(pageTitle='Đang học')}"></head>


<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Đang học', breadcrumb='Bài giảng')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='my-courses')}"></aside>
<div th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<main class="dash-main" id="dashMain">
  <div class="learning-container">
    <div class="content-area" id="lessonContentArea">
      <div class="text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>
    </div>

    <div class="playlist-area shadow-sm">
      <div class="playlist-header">
        <h6 id="playlistCourseTitle" class="fw-bold mb-1 text-dark text-truncate">Đang tải...</h6>
        <div class="d-flex justify-content-between align-items-center mt-2">
          <span id="playlistProgressText" class="small text-muted">0%</span>
          <div class="progress flex-grow-1 ms-2" style="height: 6px;">
            <div id="playlistProgressBar" class="progress-bar bg-success" style="width: 0%"></div>
          </div>
        </div>
      </div>
      <div class="playlist-content">
        <div class="accordion playlist-accordion" id="playlistAccordion"></div>
      </div>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<script>
  let currentLessonIdStr;

  document.addEventListener("DOMContentLoaded", async () => {
      const pathParts = window.location.pathname.split('/');
      currentLessonIdStr = pathParts[pathParts.length - 1];

      try {
          // Gọi API gộp chung lấy cả Data Lesson và Data Course (cần viết backend hỗ trợ)
          const response = await fetch(`/api/v1/learning/lesson/view-data/${currentLessonIdStr}`);
          const result = await response.json();

          if(result.status === 200) {
              renderLessonContent(result.data.currentLesson);
              renderPlaylist(result.data.courseInfo, parseInt(currentLessonIdStr));
          }
      } catch (error) {
          document.getElementById('lessonContentArea').innerHTML = '<span class="text-danger">Lỗi tải bài học</span>';
      }
  });

  const renderLessonContent = (lesson) => {
      const area = document.getElementById('lessonContentArea');
      let html = '';

      if(lesson.type === 'VIDEO' && lesson.videoUrl) {
          var embedSrc = lesson.videoEmbedUrl || lesson.videoUrl;
          html += `<div class="video-wrapper ratio ratio-16x9"><iframe src="${embedSrc}" allowfullscreen loading="lazy"></iframe></div>`;
      } else if (lesson.type === 'DOC') {
          const docUrl = lesson.videoUrl || '';
          // Robust regex to detect .pdf or .docx even with query parameters
          const isPdf = /\.pdf($|\?)/i.test(docUrl);
          const isDocx = /\.(docx|doc)($|\?)/i.test(docUrl);
          
          let previewHtml = '';
          if (isPdf) {
              previewHtml = `<div class="preview-iframe-wrapper ratio ratio-4x3 shadow-sm rounded-3 overflow-hidden mb-4 border bg-light">
                                <object data="${docUrl}" type="application/pdf" style="width:100%; height:75vh;">
                                    <iframe src="${docUrl}" style="width:100%; height:75vh; border:none;" allow="autoplay">
                                        <p>Trình duyệt của bạn không hỗ trợ xem PDF trực tiếp. <a href="${docUrl}">Tải về để xem</a>.</p>
                                    </iframe>
                                </object>
                             </div>`;
          } else if (isDocx && docUrl) {
              // Google Docs Viewer for online preview of DOCX
              const gViewUrl = `https://docs.google.com/gview?url=${encodeURIComponent(docUrl)}&embedded=true`;
              previewHtml = `<div class="preview-iframe-wrapper ratio ratio-4x3 shadow-sm rounded-3 overflow-hidden mb-4 border bg-light">
                                <iframe src="${gViewUrl}" style="width:100%; height:75vh; border:none;">
                                    <p>Không thể xem trước tài liệu. <a href="${docUrl}">Tải về để xem</a>.</p>
                                </iframe>
                             </div>`;
          } else {
              previewHtml = `<div class="text-center py-5 opacity-50 bg-light rounded-3 mb-4"><i class="bi bi-file-earmark-richtext fs-1 text-primary"></i><p class="mt-2">Không có bản xem trước cho định dạng này</p></div>`;
          }

          let downloadBtn = '';
          if (lesson.allowDownload !== false && docUrl) {
              const fileName = (lesson.lessonTitle || 'tai_lieu').replace(/[^a-zA-Z0-9]/g, '_') + (isPdf ? '.pdf' : '.docx');
              downloadBtn = `
                <div class="text-center mt-3">
                    <button onclick="downloadDocument('${docUrl}', '${fileName}')" class="btn btn-primary rounded-pill px-4 shadow-sm fw-bold">
                        <i class="bi bi-cloud-download me-2"></i> Tải tài liệu bài học
                    </button>
                    <p class="text-muted small mt-2 mb-0"><i class="bi bi-info-circle me-1"></i> Bạn có quyền tải xuống tài liệu này.</p>
                </div>`;
          } else if (docUrl) {
              downloadBtn = `
                <div class="alert alert-secondary border-0 rounded-4 py-3 mt-3 text-center">
                    <i class="bi bi-shield-lock me-2"></i> Expert không cho phép tải xuống tài liệu này. Bạn chỉ có thể xem trực tiếp.
                </div>`;
          }

          html += `
            <div class="lesson-doc-container">
                ${previewHtml}
                <div class="p-4 bg-white rounded-4 shadow-sm border mb-4">
                    <div class="d-flex justify-content-between align-items-start mb-3 flex-wrap gap-2">
                        <h5 class="fw-bold text-primary mb-0"><i class="bi bi-info-circle me-2"></i>Mô tả tài liệu</h5>
                        <a href="${docUrl}" target="_blank" class="btn btn-sm btn-outline-secondary rounded-pill">
                            <i class="bi bi-box-arrow-up-right me-1"></i> Mở trong cửa sổ mới
                        </a>
                    </div>
                    <p class="text-secondary" style="line-height: 1.6;">${lesson.contentText || 'Không có mô tả chi tiết cho tài liệu này.'}</p>
                    ${downloadBtn}
                </div>
            </div>`;
      } else if (lesson.type === 'QUIZ') {
          html += `<div class="lesson-header mb-4 text-center py-5"><div style="font-size: 4rem; color: #10b981;"><i class="bi bi-patch-question-fill"></i></div>
                   <h4 class="mt-3">Bài kiểm tra cuối khóa</h4><a href="/student/quiz/take/${lesson.quiz_id || lesson.quizId}" class="btn btn-success rounded-pill px-5 shadow-sm fw-bold">Bắt đầu Quiz <i class="bi bi-arrow-right"></i></a></div>`;
      }

      if(lesson.type !== 'QUIZ') {
          const durationText = lesson.duration ? `<i class="bi bi-clock me-1"></i> ${lesson.duration}` : '';
          const markBtn = lesson.isCompleted
              ? `<span class="btn btn-success rounded-pill fw-bold px-4"><i class="bi bi-check-circle me-1"></i> Đã hoàn thành</span>`
              : `<button class="btn btn-outline-success rounded-pill fw-bold px-4" onclick="markCompleted(${lesson.lessonId})"><i class="bi bi-check-circle me-1"></i> Đánh dấu hoàn thành</button>`;
          html += `
            <div class="lesson-header d-flex justify-content-between align-items-center flex-wrap gap-3">
              <div><span class="badge bg-primary mb-2">${lesson.type}</span><h3 class="fw-bold mb-1">${lesson.lessonTitle}</h3>
              <p class="text-muted mb-0 small">${durationText}</p></div>
              ${markBtn}
            </div>`;
      }

      area.innerHTML = html;
      // Load lesson quizzes after lesson content renders
      loadLessonQuizzes(parseInt(currentLessonIdStr));
  };

  const renderPlaylist = (course, activeLessonId) => {
      document.getElementById('playlistCourseTitle').textContent = course.title;
      document.getElementById('playlistProgressText').textContent = `Tiến độ: ${course.progressPercent}%`;
      document.getElementById('playlistProgressBar').style.width = `${course.progressPercent}%`;

      const accordion = document.getElementById('playlistAccordion');
      accordion.innerHTML = course.modules.map(m => {
          const hasActiveLesson = m.lessons.some(l => l.lessonId === activeLessonId);
          return `
          <div class="accordion-item">
              <h2 class="accordion-header">
                  <button class="accordion-button ${hasActiveLesson ? '' : 'collapsed'}" type="button" data-bs-toggle="collapse" data-bs-target="#plMod${m.moduleId}">
                      ${m.moduleTitle}
                  </button>
              </h2>
              <div id="plMod${m.moduleId}" class="accordion-collapse collapse ${hasActiveLesson ? 'show' : ''}" data-bs-parent="#playlistAccordion">
                  <div class="accordion-body p-0 py-2">
                      ${m.lessons.map(l => {
                          const icon = l.isCompleted
                              ? '<i class="bi bi-check-circle-fill text-success"></i>'
                              : (l.type === 'VIDEO' ? '<i class="bi bi-play-circle"></i>' : '<i class="bi bi-file-earmark-text"></i>');
                          const duration = l.duration ? `<i class="bi bi-clock"></i> ${l.duration}` : '';
                          return `<a href="/student/lesson/view/${l.lessonId}" class="playlist-lesson ${l.lessonId === activeLessonId ? 'active' : ''}">
                              <div class="play-icon fs-5 me-2 mt-1">${icon}</div>
                              <div>
                                  <div class="fw-medium text-truncate" style="max-width: 250px;">${l.lessonTitle}</div>
                                  <div class="small mt-1" style="${l.lessonId === activeLessonId ? 'color:var(--dash-accent)' : ''}">${duration}</div>
                              </div>
                          </a>`;
                      }).join('')}
                  </div>
              </div>
          </div>`;
      }).join('');
  };

  window.markCompleted = async (id) => {
      try {
          const res = await fetch('/api/v1/learning/lesson/complete', {
              method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ lessonId: id })
          });
          const result = await res.json();
          if (result.status === 200) {
              // Reload view data để cập nhật progress bar + playlist + button
              const refreshResp = await fetch(`/api/v1/learning/lesson/view-data/${currentLessonIdStr}`);
              const refreshResult = await refreshResp.json();
              if (refreshResult.status === 200) {
                  renderLessonContent(refreshResult.data.currentLesson);
                  renderPlaylist(refreshResult.data.courseInfo, parseInt(currentLessonIdStr));
              }
          }
      } catch (e) { alert("Lỗi kết nối"); }
  };

  // ── LESSON QUIZZES ────────────────────────────────────────────────────────
  async function loadLessonQuizzes(lessonId) {
      try {
          const res = await fetch(`/api/v1/learning/lessons/${lessonId}/quizzes`);
          const result = await res.json();
          if (result.status === 200 && result.data && result.data.length > 0) {
              renderLessonQuizzes(result.data, lessonId);
          } else {
              // No quizzes — hide section
              var qSection = document.getElementById('lesson-quizzes-section');
              if (qSection) qSection.style.display = 'none';
          }
      } catch (e) { console.error('loadLessonQuizzes error:', e); }
  }

  function renderLessonQuizzes(quizzes, lessonId) {
      var area = document.getElementById('lessonContentArea');
      var sectionHtml = `
      <div class="card mt-4" id="lesson-quizzes-section">
          <div class="card-header d-flex justify-content-between align-items-center" style="background:#136ad5; color:#fff;">
              <h5 class="mb-0"><i class="bi bi-list-check me-2"></i>Quizzes</h5>
              <span class="badge bg-light text-dark">${quizzes.length} quiz</span>
          </div>
          <div class="card-body p-0" id="lesson-quizzes-list"></div>
      </div>`;
      area.insertAdjacentHTML('beforeend', sectionHtml);

      var list = document.getElementById('lesson-quizzes-list');
      quizzes.forEach(function(q) {
          var badge = '';
          var action = '';
          var statusClass = '';

          if (q.status === 'COMPLETED') {
              statusClass = 'border-success';
              badge = `<span class="badge bg-success"><i class="bi bi-check-circle me-1"></i>Hoàn thành</span>`;
              action = `<a href="/student/quiz/result/${q.quizId}" class="btn btn-sm btn-outline-success">Xem kết quả</a>`;
          } else if (q.status === 'AVAILABLE') {
              statusClass = 'border-primary';
              badge = `<span class="badge bg-primary"><i class="bi bi-play-circle me-1"></i>Sẵn sàng</span>`;
              action = `<a href="/student/quiz/take/${q.quizId}" class="btn btn-sm btn-primary">Làm Quiz</a>`;
          } else {
              statusClass = 'border-secondary';
              badge = `<span class="badge bg-secondary"><i class="bi bi-lock me-1"></i>Bị khóa</span>`;
              action = `<button class="btn btn-sm btn-secondary" disabled>🔒</button>`;
          }

          var scoreInfo = '';
          if (q.bestScore != null) {
              scoreInfo = `<span class="text-muted small ms-2">Điểm cao nhất: <strong>${q.bestScore}%</strong></span>`;
          }

          list.innerHTML += `
          <div class="d-flex justify-content-between align-items-center px-3 py-3 border-bottom ${statusClass}" style="background:#fafafa;">
              <div>
                  <div class="fw-bold text-dark">${q.orderIndex}. ${escape(q.title || '—')}</div>
                  <div class="mt-1">${badge}${scoreInfo}</div>
              </div>
              <div class="ms-3">${action}</div>
          </div>`;
      });
  }

  // ── BLOB DOWNLOAD HELPER ──────────────────────────────────────────────────
  async function downloadDocument(url, fileName) {
      // Hiển thị trạng thái đang tải (tùy chọn)
      const originalBtn = event.currentTarget;
      const originalHtml = originalBtn.innerHTML;
      originalBtn.disabled = true;
      originalBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Đang chuẩn bị...';

      try {
          const response = await fetch(url);
          if (!response.ok) throw new Error('Không thể tải file');
          
          const blob = await response.blob();
          const blobUrl = window.URL.createObjectURL(blob);
          
          const link = document.createElement('a');
          link.href = blobUrl;
          link.download = fileName;
          
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          
          window.URL.revokeObjectURL(blobUrl);
      } catch (e) {
          console.error('Download error:', e);
          alert('Có lỗi xảy ra khi tải tài liệu. Vui lòng thử lại hoặc mở link trực tiếp: ' + url);
      } finally {
          originalBtn.disabled = false;
          originalBtn.innerHTML = originalHtml;
      }
  }
</script>

</body>
</html>
