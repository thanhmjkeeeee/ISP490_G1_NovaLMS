<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:with="isDashboard=true">

<head th:replace="~{fragments/head :: common-head(pageTitle='Đang học')}"></head>


<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Đang học', breadcrumb='Bài giảng')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='my-courses')}"></aside>
<div th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<main class="dash-main" id="dashMain">
  <div class="learning-container">
    <div class="content-area" id="lessonContentArea">
      <div class="text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>
    </div>

    <div class="playlist-area shadow-sm">
      <div class="playlist-header">
        <a id="backToCourseLink" href="#" class="d-inline-flex align-items-center text-decoration-none mb-2" style="font-size:0.8rem; color:#64748b; gap:4px;">
          <i class="bi bi-arrow-left"></i> Quay lại tổng quan
        </a>
        <h6 id="playlistCourseTitle" class="fw-bold mb-1 text-dark text-truncate">Đang tải...</h6>
        <div class="d-flex justify-content-between align-items-center mt-2">
          <span id="playlistProgressText" class="small text-muted">0%</span>
          <div class="progress flex-grow-1 ms-2" style="height: 6px;">
            <div id="playlistProgressBar" class="progress-bar bg-success" style="width: 0%"></div>
          </div>
        </div>
      </div>
      <div class="playlist-content">
        <div class="accordion playlist-accordion" id="playlistAccordion"></div>
      </div>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<script>
  let currentLessonIdStr;

  document.addEventListener("DOMContentLoaded", async () => {
      const pathParts = window.location.pathname.split('/');
      currentLessonIdStr = pathParts[pathParts.length - 1];

      try {
          // Gọi API gộp chung lấy cả Data Lesson và Data Course (cần viết backend hỗ trợ)
          const response = await fetch(`/api/v1/learning/lesson/view-data/${currentLessonIdStr}`);
          const result = await response.json();

          if(result.status === 200) {

              renderLessonContent(result.data.currentLesson);
              renderPlaylist(result.data.courseInfo, parseInt(currentLessonIdStr));
          }
      } catch (error) {
          document.getElementById('lessonContentArea').innerHTML = '<span class="text-danger">Lỗi tải bài học</span>';
      }
  });
  const renderLessonContent = (lesson) => {
      const area = document.getElementById('lessonContentArea');
      let html = '';

      if(lesson.type === 'VIDEO' && lesson.videoUrl) {
          var embedSrc = lesson.videoEmbedUrl || lesson.videoUrl;
          html += `<div class="video-wrapper ratio ratio-16x9"><iframe src="${embedSrc}" allowfullscreen loading="lazy"></iframe></div>`;
      } else if (lesson.type === 'DOC') {
          const docUrl = lesson.videoUrl || '';
          const isPdf = /\.pdf($|\?)/i.test(docUrl);
          const isDocx = /\.(docx|doc)($|\?)/i.test(docUrl);

          let previewHtml = '';
          if (isPdf) {
              const previewUrl = `/api/v1/files/preview?url=${encodeURIComponent(docUrl)}`;
              const gViewUrl = `https://docs.google.com/gview?url=${encodeURIComponent(docUrl)}&embedded=true`;

              previewHtml = `
              <ul class="nav nav-tabs mb-2" id="pdfTabs" role="tablist">
                  <li class="nav-item" role="presentation">
                      <button class="nav-link active small py-1" data-bs-toggle="tab" data-bs-target="#native-pdf" type="button">Trình đọc Mặc định</button>
                  </li>
              </ul>
              <div class="tab-content preview-iframe-wrapper shadow-sm rounded-3 overflow-hidden mb-4 border bg-light" style="height: 75vh;">
                  <div class="tab-pane fade show active h-100" id="native-pdf">
                      <iframe src="${previewUrl}#toolbar=0" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
                  </div>
                  <div class="tab-pane fade h-100" id="google-pdf">
                      <iframe src="${gViewUrl}" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
                  </div>
              </div>`;
          } else if (isDocx && docUrl) {
              // Google Docs Viewer cho file word
              const gViewUrl = `https://docs.google.com/gview?url=${encodeURIComponent(docUrl)}&embedded=true`;
              previewHtml = `<div class="preview-iframe-wrapper ratio ratio-4x3 shadow-sm rounded-3 overflow-hidden mb-4 border bg-light">
                                <iframe src="${gViewUrl}" style="width:100%; height:75vh; border:none;">
                                    <p>Không thể xem trước tài liệu. <a href="${docUrl}">Tải về để xem</a>.</p>
                                </iframe>
                             </div>`;
          } else {
              previewHtml = `<div class="text-center py-5 opacity-50 bg-light rounded-3 mb-4"><i class="bi bi-file-earmark-richtext fs-1 text-primary"></i><p class="mt-2">Không có bản xem trước cho định dạng này</p></div>`;
          }

          let downloadBtn = '';
          const canDownload = lesson.allowDownload !== false;

          if (canDownload && docUrl) {
              const fileName = (lesson.lessonTitle || 'tai_lieu').replace(/[^a-zA-Z0-9]/g, '_') + (isPdf ? '.pdf' : '.docx');
              downloadBtn = `
                <div class="text-center mt-3">
                    <button onclick="downloadDocument('${docUrl}', '${fileName}')" class="btn btn-primary rounded-pill px-4 shadow-sm fw-bold">
                        <i class="bi bi-cloud-download me-2"></i> Tải tài liệu bài học
                    </button>
                    <p class="text-muted small mt-2 mb-0"><i class="bi bi-info-circle me-1"></i> Bạn có quyền tải xuống tài liệu này.</p>
                </div>`;
          } else if (docUrl) {
              downloadBtn = `
                <div class="alert alert-secondary border-0 rounded-4 py-3 mt-3 text-center">
                    <i class="bi bi-shield-lock me-2"></i> Expert không cho phép tải xuống tài liệu này. Bạn chỉ có thể xem trực tiếp.
                </div>`;
          }

          html += `
            <div class="lesson-doc-container">
                ${previewHtml}
                <div class="p-4 bg-white rounded-4 shadow-sm border mb-4">
                    <div class="d-flex justify-content-between align-items-start mb-3 flex-wrap gap-2">
                        <div class="d-flex align-items-center">
                           <h5 class="fw-bold text-primary mb-0 me-3"><i class="bi bi-info-circle me-2"></i>Mô tả tài liệu</h5>
                        </div>
                    </div>
                    <p class="text-secondary" style="line-height: 1.6;">${lesson.contentText || 'Không có mô tả chi tiết cho tài liệu này.'}</p>
                    ${downloadBtn}
                </div>
            </div>`;
      } else if (lesson.type === 'QUIZ') {
          html += `<div class="lesson-header mb-4 text-center py-5"><div style="font-size: 4rem; color: #10b981;"><i class="bi bi-patch-question-fill"></i></div>
                   <h4 class="mt-3">Bài kiểm tra cuối khóa</h4><a href="/student/quiz/take/${lesson.quiz_id || lesson.quizId}" class="btn btn-success rounded-pill px-5 shadow-sm fw-bold">Bắt đầu Quiz <i class="bi bi-arrow-right"></i></a></div>`;
      }

      if(lesson.type !== 'QUIZ') {
          const durationText = lesson.duration ? `<i class="bi bi-clock me-1"></i> ${lesson.duration}` : '';
          const isLessonDone = lesson.isCompleted || lesson.completed;
          const markBtn = isLessonDone
              ? `<span id="markCompleteBtn" class="btn btn-success rounded-pill fw-bold px-4" data-completed="true"><i class="bi bi-check-circle me-1"></i> Đã hoàn thành</span>`
              : `<button id="markCompleteBtn" class="btn btn-outline-success rounded-pill fw-bold px-4" data-lesson-id="${lesson.lessonId}" data-lesson-type="${lesson.type}" data-completed="false" onclick="markCompleted(${lesson.lessonId})"><i class="bi bi-check-circle me-1"></i> Đánh dấu hoàn thành</button>`;
          html += `
            <div class="lesson-header d-flex justify-content-between align-items-center flex-wrap gap-3">
              <div><span class="badge bg-primary mb-2">${lesson.type}</span><h3 class="fw-bold mb-1">${lesson.lessonTitle}</h3>
              <p class="text-muted mb-0 small">${durationText}</p></div>
              ${markBtn}
            </div>`;
      }

      area.innerHTML = html;

      // ── TASK 2: Anti-cheat Countdown Timer (60s) ──
      initCountdownTimer(lesson);
  };

  const renderPlaylist = (course, activeLessonId) => {
      document.getElementById('playlistCourseTitle').textContent = course.title;
      document.getElementById('playlistProgressText').textContent = `Tiến độ: ${course.progressPercent}%`;
      document.getElementById('playlistProgressBar').style.width = `${course.progressPercent}%`;

      // Set back link
      const backLink = document.getElementById('backToCourseLink');
      if (backLink && course.courseId) {
          backLink.href = `/student/learn/${course.courseId}`;
      }

      const accordion = document.getElementById('playlistAccordion');
      accordion.innerHTML = course.modules.map(m => {
          const hasActiveLesson = m.lessons.some(l => l.lessonId === activeLessonId);
          return `
          <div class="accordion-item">
              <h2 class="accordion-header">
                  <button class="accordion-button ${hasActiveLesson ? '' : 'collapsed'}" type="button" data-bs-toggle="collapse" data-bs-target="#plMod${m.moduleId}">
                      ${m.moduleTitle}
                  </button>
              </h2>
              <div id="plMod${m.moduleId}" class="accordion-collapse collapse ${hasActiveLesson ? 'show' : ''}" data-bs-parent="#playlistAccordion">
                  <div class="accordion-body p-0 py-2">
                      ${m.lessons.map(l => {
                          const isLessonDone = l.completed || l.isCompleted || l.status === 'Completed' || l.status === 'COMPLETED';

                          const typeIcon = l.type === 'VIDEO' ? '<i class="bi bi-play-circle"></i>' : '<i class="bi bi-file-earmark-text"></i>';

                          const checkIconRight = isLessonDone
                                ? `<div class="ms-auto flex-shrink-0 status-wrapper"><i class="bi bi-check-circle-fill text-success fs-5"></i></div>`
                                : `<div class="ms-auto flex-shrink-0 status-wrapper"></div>`;

                          const duration = l.duration ? `<i class="bi bi-clock"></i> ${l.duration}` : '';

                          return `<a href="/student/lesson/view/${l.lessonId}" class="playlist-lesson d-flex align-items-center ${l.lessonId === activeLessonId ? 'active' : ''}" data-lesson-id="${l.lessonId}">
                              <div class="play-icon fs-5 me-2 mt-1 flex-shrink-0" style="width: 24px; text-align: center;">${typeIcon}</div>
                              <div class="flex-grow-1 min-width-0">
                                  <div class="fw-medium text-truncate" style="max-width: 220px;">${l.lessonTitle}</div>
                                  <div class="small mt-1" style="${l.lessonId === activeLessonId ? 'color:var(--dash-accent)' : ''}">${duration}</div>
                              </div>
                              ${checkIconRight}
                          </a>`;
                      }).join('')}
                  </div>
              </div>
          </div>`;
      }).join('');
  };

  window.markCompleted = async (id) => {
      const btn = document.getElementById('markCompleteBtn');
      if (!btn) return;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Đang lưu...';

      try {
          const res = await fetch('/api/v1/learning/lesson/complete', {
              method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ lessonId: id })
          });
          const result = await res.json();
          if (result.status === 200) {

              // 1. Biến nút dưới cùng thành Đã hoàn thành
              btn.outerHTML = `<span id="markCompleteBtn" class="btn btn-success rounded-pill fw-bold px-4" data-completed="true"><i class="bi bi-check-circle me-1"></i> Đã hoàn thành</span>`;

              // 2. KHÔNG chạm vào icon bên trái nữa. Bắn icon tích xanh vào div trống bên PHẢI
              const sidebarLinks = document.querySelectorAll('.playlist-lesson');
              sidebarLinks.forEach(link => {
                  if (link.getAttribute('data-lesson-id') == id) {
                      const statusWrapper = link.querySelector('.status-wrapper');
                      if (statusWrapper) {
                          statusWrapper.innerHTML = '<i class="bi bi-check-circle-fill text-success fs-5"></i>';
                      }
                  }
              });

              // 3. Cập nhật lại thanh Progress
              try {
                  const refreshResp = await fetch(`/api/v1/learning/lesson/view-data/${currentLessonIdStr}`);
                  const refreshResult = await refreshResp.json();
                  if (refreshResult.status === 200) {
                      const course = refreshResult.data.courseInfo;
                      document.getElementById('playlistProgressText').textContent = `Tiến độ: ${course.progressPercent}%`;
                      document.getElementById('playlistProgressBar').style.width = `${course.progressPercent}%`;
                  }
              } catch (e) { }

          } else {
              alert(result.message || 'Lỗi đánh dấu hoàn thành');
              btn.disabled = false;
              btn.innerHTML = '<i class="bi bi-check-circle me-1"></i> Đánh dấu hoàn thành';
          }
      } catch (e) {
          alert("Lỗi kết nối");
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-check-circle me-1"></i> Đánh dấu hoàn thành';
      }
  };

  // ── Anti-cheat Countdown Timer with Page Visibility API ──
  let countdownInterval = null;
  let countdownRemaining = 0;
  let countdownBtn = null;

  function initCountdownTimer(lesson) {
      countdownBtn = document.getElementById('markCompleteBtn');
      if (!countdownBtn) return;

      // Only apply to VIDEO or DOC that are NOT yet completed
      const isCompleted = countdownBtn.getAttribute('data-completed') === 'true';
      const lessonType = (lesson.type || '').toUpperCase();

      if (isCompleted || (lessonType !== 'VIDEO' && lessonType !== 'DOC')) return;

      const REQUIRED_SECONDS = 60;
      countdownRemaining = REQUIRED_SECONDS;

      countdownBtn.disabled = true;
      countdownBtn.classList.remove('btn-outline-success');
      countdownBtn.classList.add('btn-outline-secondary');
      updateCountdownUI();

      // Start ticking only when tab is visible
      startCountdownTick();

      // Listen for tab visibility changes
      document.addEventListener('visibilitychange', handleCountdownVisibility);
  }

  function startCountdownTick() {
      if (countdownInterval) return; // Already running
      countdownInterval = setInterval(() => {
          // Only tick if tab is visible
          if (document.hidden) return;

          countdownRemaining--;
          if (countdownRemaining <= 0) {
              clearInterval(countdownInterval);
              countdownInterval = null;
              document.removeEventListener('visibilitychange', handleCountdownVisibility);
              if (countdownBtn) {
                  countdownBtn.disabled = false;
                  countdownBtn.classList.remove('btn-outline-secondary');
                  countdownBtn.classList.add('btn-outline-success');
                  countdownBtn.innerHTML = '<i class="bi bi-check-circle me-1"></i> Đánh dấu hoàn thành';
              }
          } else {
              updateCountdownUI();
          }
      }, 1000);
  }

  function pauseCountdownTick() {
      if (countdownInterval) {
          clearInterval(countdownInterval);
          countdownInterval = null;
      }
      // Update UI to show paused state
      if (countdownBtn && countdownRemaining > 0) {
          countdownBtn.innerHTML = `<i class="bi bi-pause-circle me-1"></i> Tạm dừng (Còn ${countdownRemaining}s...)`;
      }
  }

  function updateCountdownUI() {
      if (countdownBtn && countdownRemaining > 0) {
          countdownBtn.innerHTML = `<i class="bi bi-hourglass-split me-1"></i> Đánh dấu hoàn thành (Còn ${countdownRemaining}s...)`;
      }
  }

  function handleCountdownVisibility() {
      if (countdownRemaining <= 0) return;
      if (document.hidden) {
          pauseCountdownTick();
      } else {
          updateCountdownUI();
          startCountdownTick();
      }
  }



  // ── BLOB DOWNLOAD HELPER ──────────────────────────────────────────────────
  async function downloadDocument(url, fileName) {
      // Hiển thị trạng thái đang tải (tùy chọn)
      const originalBtn = event.currentTarget;
      const originalHtml = originalBtn.innerHTML;
      originalBtn.disabled = true;
      originalBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Đang chuẩn bị...';

      try {
          const response = await fetch(url);
          if (!response.ok) throw new Error('Không thể tải file');
          
          const blob = await response.blob();
          const blobUrl = window.URL.createObjectURL(blob);
          
          const link = document.createElement('a');
          link.href = blobUrl;
          link.download = fileName;
          
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          
          window.URL.revokeObjectURL(blobUrl);
      } catch (e) {
          console.error('Download error:', e);
          alert('Có lỗi xảy ra khi tải tài liệu. Vui lòng thử lại hoặc mở link trực tiếp: ' + url);
      } finally {
          originalBtn.disabled = false;
          originalBtn.innerHTML = originalHtml;
      }
  }

    // ── 📊 STUDY TIME TRACKING (PAGE VISIBILITY API) ─────────────────────────
    let studySeconds = 0;
    let isActive = true;
    let trackInterval;

    const startTracking = () => {
        trackInterval = setInterval(() => {
            if (isActive) {
                studySeconds++;
                // Ping every 30 seconds
                if (studySeconds % 30 === 0) {
                    syncStudyTime(30);
                }
            }
        }, 1000);
    };

    const stopTracking = () => {
        clearInterval(trackInterval);
    };

    const syncStudyTime = (seconds) => {
        if (seconds <= 0) return;
        fetch('/api/v1/learning/track-time', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ seconds: seconds })
        }).catch(err => console.error('Tracking sync error:', err));
    };

    // Use sendBeacon for the last sync before leaving
    window.addEventListener('beforeunload', () => {
        const remaining = studySeconds % 30;
        if (remaining > 0) {
            const data = JSON.stringify({ seconds: remaining });
            navigator.sendBeacon('/api/v1/learning/track-time', data);
        }
    });

    // Handle Tab visibility & Focus
    document.addEventListener('visibilitychange', () => {
        isActive = (document.visibilityState === 'visible');
    });

    window.addEventListener('focus', () => isActive = true);
    window.addEventListener('blur', () => isActive = false);

    startTracking();
</script>

</body>
</html>
