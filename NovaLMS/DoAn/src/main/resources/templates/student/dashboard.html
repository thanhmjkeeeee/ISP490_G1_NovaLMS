<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:with="isDashboard=true">

<head th:replace="~{fragments/head :: common-head(pageTitle='Dashboard Học Viên')}"></head>

<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Tổng quan', breadcrumb='Dashboard')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='dashboard')}"></aside>
<div th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<main class="dash-main d-flex flex-column" id="dashMain">
    <div class="dash-page-header">
        <h2 class="dash-page-title">Xin chào, <span id="userNamePlaceholder">...</span>! 👋</h2>
        <p class="dash-page-subtitle">Không gian học tập của bạn đã sẵn sàng.</p>
    </div>

    <div class="card border-0 shadow-sm rounded-4 d-flex flex-column align-items-center justify-content-center text-center mt-3" style="min-height: 50vh;">
        <div style="font-size: 4rem; color: #cbd5e1; margin-bottom: 1rem;">
            <i class="bi bi-grid-1x2"></i>
        </div>
        <h4 style="color: #475569; font-weight: 700;">Blank Dashboard</h4>
        <p style="color: #64748b; max-width: 500px;">
            Cấu trúc Layout đã được nâng cấp lên chuẩn API-First.
        </p>
        <a th:href="@{/student/my-courses}" class="btn btn-primary mt-3 px-4 rounded-pill shadow-sm">
            <i class="bi bi-play-btn me-2"></i>Vào khóa học của tôi
        </a>
    </div>

    <footer class="mt-auto pt-4 pb-2 text-center" style="font-size: 0.85rem; color: #9ca3af;">
        &copy; 2026 Nova LMS - Nền tảng học trực tuyến thông minh.
    </footer>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<script>
    document.addEventListener("DOMContentLoaded", async function() {
        try {
            const response = await fetch('/api/v1/student/dashboard/data');
            const result = await response.json();

            if (result.status === 200) {
                document.getElementById('userNamePlaceholder').textContent = result.data.fullName;
            }
        } catch (error) {
            document.getElementById('userNamePlaceholder').textContent = "Học viên";
        }
    });
</script>

</body>
</html>
