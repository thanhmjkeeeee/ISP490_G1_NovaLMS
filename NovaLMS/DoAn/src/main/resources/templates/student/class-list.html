<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:with="isDashboard=true">

<head th:replace="~{fragments/head :: common-head(pageTitle='Lớp học của tôi')}"></head>

<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Lớp học của tôi', breadcrumb='Học tập')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='my-classes')}"></aside>
<div th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<main class="dash-main d-flex flex-column" id="dashMain">

    <!-- ======== CLASS LIST VIEW ======== -->
    <div id="classListView">
        <div class="dash-page-header">
            <h2 class="dash-page-title">Lớp Học Của Tôi</h2>
            <p class="dash-page-subtitle">Danh sách các lớp bạn đã đăng ký</p>
        </div>

        <div id="classesContainer" class="row g-4">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
            </div>
        </div>
    </div>

    <!-- ======== CLASS DETAIL VIEW ======== -->
    <div id="classDetailView" class="d-none">
        <!-- Breadcrumb + Back -->
        <div class="dash-page-header mb-3">
            <button class="btn btn-link text-decoration-none p-0 me-3" onclick="showListView()">
                <i class="bi bi-arrow-left fs-4"></i>
            </button>
            <div>
                <h2 class="dash-page-title mb-1" id="detailClassName"></h2>
                <p class="dash-page-subtitle mb-0" id="detailCourseName"></p>
            </div>
        </div>

        <!-- Class Info Card -->
        <div class="card border-0 shadow-sm rounded-4 mb-4 overflow-hidden">
            <div class="card-body p-4">
                <div class="row g-3" id="detailInfoContent"></div>
            </div>
        </div>

        <!-- Tabs -->
        <ul class="nav nav-pills mb-4" id="detailTabs">
            <li class="nav-item">
                <button class="nav-link active" id="tabLichHoc" onclick="switchTab('lichhoc')">
                    <i class="bi bi-calendar-event me-1"></i>Lịch học
                </button>
            </li>
            <li class="nav-item ms-2">
                <button class="nav-link" id="tabKetQua" onclick="switchTab('ketqua')">
                    <i class="bi bi-graph-up me-1"></i>Kết quả học tập
                </button>
            </li>
            <li class="nav-item ms-2">
                <button class="nav-link" id="tabBangXepHang" onclick="switchTab('bangxephang')">
                    <i class="bi bi-trophy me-1"></i>Bảng xếp hạng coin
                </button>
            </li>
        </ul>

        <!-- LICH HOC PANEL -->
        <div id="lichHocPanel">
            <div id="sessionsContainer" class="row g-3">
                <div class="col-12 text-center py-4">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>
        </div>

        <!-- KET QUA HOC TAP PANEL -->
        <div id="ketQuaPanel" class="d-none">
            <div class="card border-0 shadow-sm rounded-4 text-center py-5">
                <i class="bi bi-bar-chart fs-1 text-muted"></i>
                <h5 class="mt-3 text-muted">Kết quả học tập</h5>
                <p class="text-muted small">Tính năng đang được phát triển</p>
            </div>
        </div>

        <!-- BANG XEP HANG PANEL -->
        <div id="bangXepHangPanel" class="d-none">
            <div class="card border-0 shadow-sm rounded-4 text-center py-5">
                <i class="bi bi-trophy fs-1 text-muted"></i>
                <h5 class="mt-3 text-muted">Bảng xếp hạng coin</h5>
                <p class="text-muted small">Tính năng đang được phát triển</p>
            </div>
        </div>
    </div>

</main>

<!-- ======== SESSION QUIZ MODAL ======== -->
<div class="modal fade" id="sessionQuizModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold" id="modalSessionTitle"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="modalSessionBody"></div>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<script>
    let currentClassId = null;
    let sessionModal = null;

    document.addEventListener('DOMContentLoaded', () => {
        sessionModal = new bootstrap.Modal(document.getElementById('sessionQuizModal'));
    });

    // ======== CLASS LIST ========
    const fetchClasses = async () => {
        try {
            const res = await fetch('/api/v1/student/classes');
            const json = await res.json();
            const container = document.getElementById('classesContainer');

            if (json.status !== 200 || !json.data || json.data.length === 0) {
                container.innerHTML = `
                    <div class="col-12">
                        <div class="card border-0 shadow-sm rounded-4 text-center py-5">
                            <i class="bi bi-people fs-1 text-muted"></i>
                            <h5 class="mt-3 text-muted">Bạn chưa đăng ký lớp học nào</h5>
                            <p class="text-muted small">Hãy đăng ký lớp học để bắt đầu học tập</p>
                            <a href="/courses.html" class="btn btn-primary rounded-pill px-4 mt-2">
                                <i class="bi bi-search me-1"></i>Khám phá khóa học
                            </a>
                        </div>
                    </div>`;
                return;
            }

            container.innerHTML = json.data.map(c => `
                <div class="col-lg-6 col-xl-4">
                    <div class="card border-0 shadow-sm rounded-4 h-100 overflow-hidden class-card" style="cursor:pointer" onclick="openClass(${c.classId})">
                        <div class="position-relative">
                            <img src="${c.courseImage || '/assets/img/course-1.jpg'}" class="w-100" style="height: 160px; object-fit:cover;" alt="">
                            <span class="position-absolute top-0 start-0 bg-primary text-white px-3 py-1 m-2 rounded-pill small fw-bold">
                                ${c.status || 'Open'}
                            </span>
                        </div>
                        <div class="card-body">
                            <h5 class="fw-bold text-dark mb-1">${c.className || ''}</h5>
                            <p class="text-muted small mb-2">${c.courseName || ''}</p>
                            <div class="small text-muted">
                                <div class="mb-1"><i class="bi bi-person me-1"></i>${c.teacherName || 'Chưa phân công'}</div>
                                <div class="mb-1"><i class="bi bi-calendar-week me-1"></i>${c.schedule || 'Chưa có lịch'} ${c.slotTime ? '- ' + c.slotTime : ''}</div>
                                <div><i class="bi bi-collection me-1"></i>${c.sessionCount} buổi học</div>
                            </div>
                        </div>
                        <div class="card-footer bg-white border-0 pt-0">
                            <button class="btn btn-primary rounded-pill w-100 shadow-sm">
                                <i class="bi bi-box-arrow-in-right me-1"></i>Xem chi tiết
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            document.getElementById('classesContainer').innerHTML = `
                <div class="col-12 text-center text-danger py-4">Lỗi tải dữ liệu lớp học!</div>`;
        }
    };

    // ======== CLASS DETAIL ========
    const openClass = async (classId) => {
        currentClassId = classId;
        try {
            const res = await fetch(`/api/v1/student/classes/${classId}`);
            const json = await res.json();

            if (json.status !== 200) {
                alert(json.message || 'Không thể tải chi tiết lớp học');
                return;
            }

            const d = json.data;
            document.getElementById('detailClassName').textContent = d.className || '';
            document.getElementById('detailCourseName').textContent = d.courseName || '';

            // Class info
            document.getElementById('detailInfoContent').innerHTML = `
                <div class="col-md-4">
                    <div class="d-flex align-items-center">
                        <div class="me-3"><i class="bi bi-calendar-check fs-4 text-primary"></i></div>
                        <div>
                            <div class="small text-muted">Khai giảng</div>
                            <div class="fw-semibold">${formatTime(d.startDate)} - ${formatDate(d.startDate)}</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="d-flex align-items-center">
                        <div class="me-3"><i class="bi bi-calendar-x fs-4 text-danger"></i></div>
                        <div>
                            <div class="small text-muted">Kết thúc</div>
                            <div class="fw-semibold">${formatTime(d.endDate)} - ${formatDate(d.endDate)}</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="d-flex align-items-center">
                        <div class="me-3"><i class="bi bi-person-circle fs-4 text-success"></i></div>
                        <div>
                            <div class="small text-muted">Giáo viên</div>
                            <div class="fw-semibold">${d.teacherName || 'Chưa phân công'}</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="d-flex align-items-center">
                        <div class="me-3"><i class="bi bi-collection fs-4 text-warning"></i></div>
                        <div>
                            <div class="small text-muted">Số buổi học</div>
                            <div class="fw-semibold">${d.numberOfSessions || 0} buổi</div>
                        </div>
                    </div>
                </div>`;

            // Sessions grid
            window._currentSessions = d.sessions || [];
            renderSessions(window._currentSessions);

            // Show detail view
            document.getElementById('classListView').classList.add('d-none');
            document.getElementById('classDetailView').classList.remove('d-none');
            switchTab('lichhoc');
        } catch (error) {
            alert('Lỗi tải chi tiết lớp học!');
        }
    };

    // ======== SESSIONS GRID (3 columns) ========
    const renderSessions = (sessions) => {
        const container = document.getElementById('sessionsContainer');
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        if (sessions.length === 0) {
            container.innerHTML = `
                <div class="col-12">
                    <div class="card border-0 shadow-sm rounded-4 text-center py-5">
                        <i class="bi bi-calendar-x fs-1 text-muted"></i>
                        <h5 class="mt-3 text-muted">Chưa có buổi học nào</h5>
                        <p class="text-muted small">Giảng viên sẽ cập nhật lịch học sớm</p>
                    </div>
                </div>`;
            return;
        }

        let html = '';
        sessions.forEach(s => {
            const sessionDate = s.sessionDate ? new Date(s.sessionDate) : null;
            const isPast = sessionDate && sessionDate < today;
            const bgColor = isPast ? '#3B82F6' : '#EC4899'; // blue = past, pink = upcoming
            const textColor = '#fff';
            const borderColor = isPast ? '#2563EB' : '#DB2777';

            const dateStr = s.sessionDate ? formatDate(s.sessionDate) : '—';
            const timeStr = s.startTime ? `${s.startTime}${s.endTime ? ' - ' + s.endTime : ''}` : '—';

            html += `
                <div class="col-md-6 col-lg-4">
                    <div class="session-card rounded-4 p-3 text-white fw-bold text-center shadow-sm"
                         style="background:${bgColor}; border: 2px solid ${borderColor}; cursor:pointer;"
                         onclick="openSessionModal(${s.sessionId}, '${escapeHtml(s.topic || 'Buổi ' + s.sessionNumber)}')"
                         title="Click để xem bài tập">
                        <div class="fs-5 mb-1">Buổi ${s.sessionNumber}</div>
                        <div class="small opacity-75">${dateStr}</div>
                        <div class="small opacity-75">${timeStr}</div>
                        ${s.topic ? `<div class="small mt-1 opacity-90">${s.topic}</div>` : ''}
                    </div>
                </div>`;
        });
        container.innerHTML = html;
    };

    // ======== SESSION QUIZ MODAL ========
    const openSessionModal = (sessionId, sessionTopic) => {
        // Find session data from current class detail
        const allSessions = window._currentSessions || [];
        const session = allSessions.find(s => s.sessionId === sessionId);
        if (!session) return;

        document.getElementById('modalSessionTitle').textContent = sessionTopic;

        const body = document.getElementById('modalSessionBody');

        if (!session.quizId) {
            body.innerHTML = `
                <div class="text-center py-4">
                    <i class="bi bi-inbox fs-1 text-muted"></i>
                    <h6 class="mt-3 text-muted">Buổi học này chưa có bài tập</h6>
                    <p class="text-muted small">Giảng viên sẽ cập nhật bài tập sau</p>
                </div>`;
        } else {
            const canTake = session.quizStatus === 'PUBLISHED';
            const scoreStr = session.bestScore !== null ? `<span class="text-success fw-bold">Điểm cao nhất: ${session.bestScore}%</span>` : '';

            body.innerHTML = `
                <div class="mb-3">
                    <h6 class="fw-bold mb-2"><i class="bi bi-patch-question me-1 text-primary"></i>${session.quizTitle || 'Bài kiểm tra'}</h6>
                    ${session.quizDescription ? `<p class="text-muted small mb-2">${session.quizDescription}</p>` : ''}
                    <div class="d-flex flex-wrap gap-2 mb-3">
                        ${session.timeLimitMinutes ? `<span class="badge bg-light text-dark border"><i class="bi bi-hourglass-split me-1"></i>${session.timeLimitMinutes} phút</span>` : ''}
                        ${session.passScore ? `<span class="badge bg-light text-dark border"><i class="bi bi-trophy me-1"></i>Điểm đạt: ${session.passScore}%</span>` : ''}
                        ${session.maxAttempts ? `<span class="badge bg-light text-dark border"><i class="bi bi-repeat me-1"></i>Tối đa ${session.maxAttempts} lần</span>` : ''}
                    </div>
                    ${session.hasAttempted ? `<div class="mb-3"><span class="badge bg-success bg-opacity-10 text-success border border-success">Đã làm ${session.attemptCount} lần</span> ${scoreStr}</div>` : ''}
                </div>
                ${canTake ? `
                    <a href="/student/quiz/take/${session.quizId}" class="btn btn-primary rounded-pill w-100 shadow-sm">
                        <i class="bi bi-play-fill me-1"></i>${session.hasAttempted ? 'Làm lại bài' : 'Làm bài kiểm tra'}
                    </a>
                ` : `
                    <button class="btn btn-light rounded-pill w-100 text-muted" disabled>
                        <i class="bi bi-lock me-1"></i>Bài kiểm tra chưa mở
                    </button>
                `}
                <div class="text-center mt-3">
                    <a href="/student/quiz" class="text-decoration-none small text-muted">Xem lịch sử bài kiểm tra</a>
                </div>`;
        }

        sessionModal.show();
    };

    // ======== TAB SWITCHING ========
    const switchTab = (tab) => {
        document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
        ['lichHocPanel', 'ketQuaPanel', 'bangXepHangPanel'].forEach(id => {
            document.getElementById(id).classList.add('d-none');
        });

        if (tab === 'lichhoc') {
            document.getElementById('tabLichHoc').classList.add('active');
            document.getElementById('lichHocPanel').classList.remove('d-none');
        } else if (tab === 'ketqua') {
            document.getElementById('tabKetQua').classList.add('active');
            document.getElementById('ketQuaPanel').classList.remove('d-none');
        } else {
            document.getElementById('tabBangXepHang').classList.add('active');
            document.getElementById('bangXepHangPanel').classList.remove('d-none');
        }
    };

    // ======== NAVIGATION ========
    const showListView = () => {
        document.getElementById('classDetailView').classList.add('d-none');
        document.getElementById('classListView').classList.remove('d-none');
        currentClassId = null;
        window._currentSessions = [];
    };

    // ======== UTILITIES ========
    const formatDate = (dateStr) => {
        if (!dateStr) return '—';
        try {
            const d = new Date(dateStr);
            return d.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
        } catch (e) {
            return dateStr;
        }
    };

    const formatTime = (dateStr) => {
        if (!dateStr) return '—';
        try {
            const d = new Date(dateStr);
            return d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
        } catch (e) {
            return '—';
        }
    };

    const escapeHtml = (str) => {
        if (!str) return '';
        return str.replace(/'/g, "\\'").replace(/"/g, '\\"');
    };

    // Override openClass to store sessions globally
    const _originalOpenClass = openClass;
    // Re-assign so we can capture sessions
    const openClassWithCapture = async (classId) => {
        await _originalOpenClass(classId);
    };

    document.addEventListener('DOMContentLoaded', fetchClasses);
</script>

</body>
</html>
