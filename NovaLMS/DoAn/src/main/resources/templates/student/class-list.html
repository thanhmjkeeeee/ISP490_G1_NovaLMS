<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:with="isDashboard=true">

<head th:replace="~{fragments/head :: common-head(pageTitle='Lớp học của tôi')}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lớp học của tôi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="dashboard-body bg-light">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Lớp học của tôi', breadcrumb='Học tập')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='my-classes')}"></aside>
<div th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<main class="dash-main d-flex flex-column py-4" id="dashMain">
    <div class="container-fluid">
        <div class="row g-4 align-items-start">

            <div class="col-lg-3 align-self-start">
                <div class="filter-card">
                    <div id="filterSection">
                        <div class="filter-card__header">
                            <i class="bi bi-funnel-fill"></i>
                            Trạng thái lớp
                        </div>
                        <div class="filter-group">
                            <div class="filter-option">
                                <input class="filter-radio" type="radio" name="classStatus" value="" id="stAll" checked style="display: none !important;">
                                <label class="filter-label" for="stAll">
                                    <span class="filter-label__icon all"><i class="bi bi-grid-fill"></i></span>
                                    <span>Tất cả</span>
                                </label>
                            </div>
                            <div class="filter-option">
                                <input class="filter-radio" type="radio" name="classStatus" value="Open" id="stActive" style="display: none !important;">
                                <label class="filter-label" for="stActive">
                                    <span class="filter-label__icon active-dot"><i class="bi bi-play-circle-fill"></i></span>
                                    <span>Đang học</span>
                                </label>
                            </div>
                            <div class="filter-option">
                                <input class="filter-radio" type="radio" name="classStatus" value="Closed" id="stDone" style="display: none !important;">
                                <label class="filter-label" for="stDone">
                                    <span class="filter-label__icon done"><i class="bi bi-check-circle-fill"></i></span>
                                    <span>Đã hoàn thành</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-9">
                <div id="classListView">

                    <div class="search-bar-wrapper mb-4">
                        <div class="search-input-group">
                            <span class="search-icon"><i class="bi bi-search"></i></span>
                            <input type="text" id="keywordInput" class="search-input" placeholder="Tìm tên lớp học (VD: IELTS K01)...">
                            <button class="search-clear d-none" id="searchClearBtn">
                                <i class="bi bi-x-circle-fill"></i>
                            </button>
                        </div>
                    </div>

                    <div id="classesContainer" class="courses-grid"></div>

                    <nav class="mt-5" aria-label="Phân trang">
                        <ul id="paginationContainer" class="pagination justify-content-center mb-0"></ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<script>
    /* ── State ────────────────────────────── */
    let currentPage      = 0;
    let debounceTimer    = null;
    let abortController  = null;

    /* ── Skeletons ──────────────────────────── */
    const skeletonCourseCard = () => `
      <div class="course-col card-visible" style="opacity:1">
        <div class="course-card" style="pointer-events:none">
          <div class="skeleton" style="height:200px;border-radius:16px 16px 0 0;margin:0"></div>
          <div class="course-card__body">
            <div class="skeleton mb-2" style="height:18px;width:70%"></div>
            <div class="skeleton mb-1" style="height:13px;width:100%"></div>
            <div class="skeleton mb-3" style="height:13px;width:80%"></div>
          </div>
          <div class="course-card__footer"><div class="skeleton" style="height:42px;border-radius:12px"></div></div>
        </div>
      </div>`;

    /* ════════════════════════════════════════
       CLASS LIST LOGIC
    ════════════════════════════════════════ */
    const fetchClasses = async () => {
      const keyword  = (document.getElementById('keywordInput')?.value || '').trim();
      const status   = document.querySelector('input[name="classStatus"]:checked')?.value ?? '';

      if (abortController) abortController.abort();
      abortController = new AbortController();

      const container = document.getElementById('classesContainer');
      container.innerHTML = [1,2,3,4].map(skeletonCourseCard).join('');

      try {
        const url = `/api/v1/student/classes?keyword=${encodeURIComponent(keyword)}&status=${status}&page=${currentPage}&size=6`;
        const res  = await fetch(url, { signal: abortController.signal });
        const json = await res.json();

        if (json.status === 200) {
          renderClasses(json.data?.items ?? json.data ?? []);
          if (json.data?.totalPages !== undefined) renderPagination(json.data);
        } else {
          showError();
        }
      } catch (err) {
        if (err.name !== 'AbortError') showError();
      }
    };

    const renderClasses = (list) => {
      const container = document.getElementById('classesContainer');

      if (!list || list.length === 0) {
        container.innerHTML = `
          <div class="state-box" style="grid-column:1/-1">
            <i class="bi bi-inbox state-box__icon blue"></i>
            <h5>Không tìm thấy lớp học</h5>
            <p>Thử thay đổi từ khóa hoặc bộ lọc trạng thái.</p>
          </div>`;
        return;
      }

      container.innerHTML = list.map((c, i) => `
        <div class="course-col" style="animation-delay:${i*70}ms">
          <div class="course-card" onclick="location.href='/student/my-classes/detail/${c.classId}'" style="cursor: pointer;">
            <div class="course-img-wrapper">
              <img src="${c.courseImage || '/assets/img/default-course.png'}"
                   class="card-img-top course-image" alt="${esc(c.className)}"
                   onerror="this.onerror=null;this.src='/assets/img/default-course.png'" loading="lazy">
              <span class="course-badge">
                <i class="bi bi-tag-fill"></i>${c.status === 'Closed' ? 'Đã hoàn thành' : 'Đang học'}
              </span>
            </div>
            <div class="course-card__body">
              <div class="course-title" title="${esc(c.className)}">${esc(c.className || 'Chưa xếp lớp')}</div>
              <div class="course-desc">${esc(c.courseName || 'Chưa có mô tả chi tiết.')}</div>
              <div class="course-meta">
                <span class="meta-pill"><i class="bi bi-person-workspace"></i>${esc(c.teacherName || 'Chưa phân công')}</span>
                <span class="meta-pill"><i class="bi bi-calendar-week"></i>${esc(c.schedule || 'Chưa có lịch')}</span>
              </div>
            </div>
            <div class="course-card__footer">
              <span class="btn-enroll text-primary fw-bold">
                Vào Trung tâm Lớp học <i class="bi bi-arrow-right-circle-fill ms-1"></i>
              </span>
            </div>
          </div>
        </div>`).join('');

      requestAnimationFrame(() => requestAnimationFrame(() => {
        document.querySelectorAll('#classesContainer .course-col').forEach(el => el.classList.add('card-visible'));
      }));
    };

    const showError = () => {
      document.getElementById('classesContainer').innerHTML = `
        <div class="state-box" style="grid-column:1/-1">
          <i class="bi bi-cloud-slash-fill state-box__icon" style="color:#ef4444"></i>
          <h5>Mất kết nối dữ liệu</h5>
          <p>Hệ thống đang gặp gián đoạn. Vui lòng thử lại sau.</p>
          <button class="btn btn-outline-primary mt-2" onclick="fetchClasses()"><i class="bi bi-arrow-repeat"></i> Thử lại</button>
        </div>`;
    };

    /* ── Pagination ───────────────────────── */
    const renderPagination = (pageData) => {
      const ul = document.getElementById('paginationContainer');
      if (!pageData || pageData.totalPages <= 1) {
          ul.innerHTML = '';
          return;
      }

      let html = `<li class="page-item ${currentPage === 0 ? 'disabled' : ''}">
        <button class="page-link shadow-sm border-0 rounded-circle mx-1 text-dark" data-page="${currentPage - 1}">
          <i class="bi bi-chevron-left"></i>
        </button>
      </li>`;

      for (let i = 0; i < pageData.totalPages; i++) {
        let isActive = (pageData.pageNo === i);
        html += `<li class="page-item ${isActive ? 'active' : ''}">
          <button class="page-link shadow-sm border-0 rounded-circle mx-1 ${isActive ? 'bg-primary border-primary text-white fw-bold' : 'text-dark'}" data-page="${i}">
            ${i + 1}
          </button>
        </li>`;
      }

      html += `<li class="page-item ${pageData.last ? 'disabled' : ''}">
        <button class="page-link shadow-sm border-0 rounded-circle mx-1 text-dark" data-page="${currentPage + 1}">
          <i class="bi bi-chevron-right"></i>
        </button>
      </li>`;

      ul.innerHTML = html;
    };

    document.getElementById('paginationContainer').addEventListener('click', e => {
      const btn = e.target.closest('[data-page]');
      if (!btn || btn.disabled) return;
      currentPage = parseInt(btn.dataset.page, 10);
      window.scrollTo({ top: 0, behavior: 'smooth' });
      fetchClasses();
    });

    /* ── Utils ────────────────────────────── */
    const esc = (s='') => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    /* ── Search & filter events ───────────── */
    const keywordInput = document.getElementById('keywordInput');
    const clearBtn     = document.getElementById('searchClearBtn');

    keywordInput.addEventListener('input', () => {
      clearBtn.classList.toggle('d-none', !keywordInput.value);
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => { currentPage = 0; fetchClasses(); }, 400);
    });

    clearBtn.addEventListener('click', () => {
      keywordInput.value = ''; clearBtn.classList.add('d-none');
      clearTimeout(debounceTimer); currentPage = 0; fetchClasses(); keywordInput.focus();
    });

    document.querySelectorAll('.filter-radio').forEach(el => {
      el.addEventListener('change', () => { currentPage = 0; fetchClasses(); });
    });

    /* ── Init ─────────────────────────────── */
    document.addEventListener('DOMContentLoaded', fetchClasses);
</script>

</body>
</html>
