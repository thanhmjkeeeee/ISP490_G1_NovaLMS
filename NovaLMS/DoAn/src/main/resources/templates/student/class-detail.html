<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:with="isDashboard=true">

<head th:replace="~{fragments/head :: common-head(pageTitle='Chi tiết Lớp học')}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết Lớp học</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="dashboard-body bg-light">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Chi tiết Lớp học', breadcrumb='Học tập')}"></header>
<aside  th:replace="~{fragments/sidebar :: dash-sidebar(activePage='my-classes')}"></aside>
<div    th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<style>
    /* Base Utilities */
    .transition-all { transition: all 0.3s ease; }
    .tracking-wider { letter-spacing: 0.05em; }
    .backdrop-blur { backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }

    /* Custom Nav Tabs (Pills style đồng bộ với Course Detail) */
    .nav-pills .nav-link { color: #6c757d; border: 1px solid transparent; transition: all 0.2s; padding: 0.75rem 1.5rem; font-weight: 600;}
    .nav-pills .nav-link:hover { background-color: #f8f9fa; color: #0d6efd; }
    .nav-pills .nav-link.active { background-color: #0d6efd; color: white; box-shadow: 0 4px 10px rgba(13, 110, 253, 0.3); }

    /* ── Back button ─────────────────────────── */
    .btn-back {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 18px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #475569;
      text-decoration: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: all 0.2s;
      margin-bottom: 20px;
    }
    .btn-back:hover { background: #f8fafc; color: #0d6efd; border-color: #bfdbfe; }

    /* ── Info / Content Cards ────────────────── */
    .info-card {
      background: #fff;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
      height: 100%;
    }
    .info-card-title {
      font-size: 0.95rem; font-weight: 700; color: #1e293b;
      margin-bottom: 18px; padding-bottom: 14px;
      border-bottom: 1px solid #f1f5f9;
      display: flex; align-items: center; gap: 8px;
    }
    .info-card-title i { color: #0d6efd; }

    /* ── Teacher card ────────────────────────── */
    .teacher-avatar-wrap {
      display: inline-block;
      padding: 3px;
      border: 2px solid #bfdbfe;
      border-radius: 50%;
      margin-bottom: 12px;
    }
    .teacher-avatar-wrap img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; display: block; }
    .btn-message {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      width: 100%; padding: 9px 0;
      border: 1.5px solid #0d6efd; border-radius: 50px;
      background: transparent; color: #0d6efd;
      font-size: 0.85rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-message:hover { background: #0d6efd; color: #fff;}

    /* ── Session accordion ───────────────────── */
    .session-card {
      background: #fff; border-radius: 12px;
      border: 1px solid #e2e8f0; margin-bottom: 12px;
      overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.03);
    }
    .session-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; cursor: pointer;
      transition: background 0.15s;
    }
    .session-header:hover { background: #f8fafc; }
    .session-no-box {
      width: 58px; text-align: center;
      background: #f0f5ff; border-radius: 8px;
      border-left: 3px solid #0d6efd; padding: 6px 4px;
      margin-right: 16px; flex-shrink: 0;
    }
    .session-no-box .lbl { font-size: 0.62rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
    .session-no-box .num { font-size: 1.3rem; font-weight: 800; color: #0d6efd; line-height: 1; margin-top: 2px; }
    .session-topic { font-size: 0.95rem; font-weight: 700; color: #1e293b; margin-bottom: 3px; }
    .session-sub   { font-size: 0.78rem; color: #94a3b8; }
    .s-status {
      font-size: 0.72rem; font-weight: 700; padding: 4px 11px;
      border-radius: 50px; white-space: nowrap; flex-shrink: 0;
    }
    .s-completed { background: #dcfce7; color: #16a34a; }
    .s-learning  { background: #dbeafe; color: #0d6efd; }
    .s-upcoming  { background: #f1f5f9; color: #94a3b8; }
    .session-body { border-top: 1px solid #f1f5f9; }

    /* ── Lesson items ────────────────────────── */
    .lesson-item {
      display: flex; align-items: center;
      padding: 14px 20px; border-bottom: 1px solid #f8fafc;
      text-decoration: none; color: #334155;
      transition: all 0.18s;
    }
    .lesson-item:last-child { border-bottom: none; }
    .lesson-item:hover:not(.locked) { background: #f8fafc; transform: translateX(4px); color: #0d6efd; }
    .lesson-item.locked { opacity: 0.55; cursor: not-allowed; }
    .l-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; margin-right: 14px; flex-shrink: 0;
    }
    .i-video { background: #fee2e2; color: #ef4444; }
    .i-doc   { background: #e0e7ff; color: #0d6efd; }
    .i-quiz  { background: #fef3c7; color: #f59e0b; }

    /* ── Members ─────────────────────────────── */
    .member-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid #f1f5f9;
    }
    .member-row:last-child { border-bottom: none; }
    .member-av {
      width: 42px; height: 42px; border-radius: 50%;
      background: #eff6ff; border: 2px solid #bfdbfe;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #0d6efd; font-size: 0.95rem;
      overflow: hidden; flex-shrink: 0;
    }
    .member-av img { width: 100%; height: 100%; object-fit: cover; }

    /* ── Live section ────────────────────────── */
    .live-box {
      border-radius: 14px; padding: 24px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
    }
    .live-box.has-link  { background: #eff6ff; border: 1px solid #bfdbfe; }
    .live-box.no-link   { background: #f8fafc; border: 1px solid #e2e8f0; }
    .live-icon-wrap {
      width: 54px; height: 54px; border-radius: 50%;
      background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; flex-shrink: 0;
    }
    .btn-join {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 22px; border-radius: 50px;
      background: #0d6efd; color: #fff;
      font-size: 0.85rem; font-weight: 700;
      text-decoration: none; border: none;
      transition: background 0.2s;
    }
    .btn-join:hover { background: #0b5ed7; color: #fff; }
    .btn-join.disabled { background: #94a3b8; pointer-events: none; }

    /* ── Loading / error states ──────────────── */
    .loading-box { text-align: center; padding: 64px 24px; background: #fff; border-radius: 14px; border: 1px solid #e2e8f0; }
    .error-box { background: #fff5f5; border: 1px solid #fecaca; border-left: 4px solid #ef4444; border-radius: 12px; padding: 24px; text-align: center; }
    .empty-box { background: #f8fafc; border: 1.5px dashed #cbd5e1; border-radius: 14px; padding: 48px 24px; text-align: center; }
    .spinner-blue {
      width: 40px; height: 40px;
      border: 3px solid #dbeafe; border-top-color: #0d6efd;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>

<main class="dash-main" id="dashMain">
    <div class="container-fluid py-4">

        <a href="/student/my-classes" class="btn-back">
            <i class="bi bi-arrow-left"></i> Quay lại Danh sách
        </a>

        <div id="classBannerContainer">
            <div class="loading-box">
                <div class="spinner-blue"></div>
                <p class="text-muted mb-0" style="font-size:0.9rem;">Đang tải không gian học tập...</p>
            </div>
        </div>

        <div class="bg-white rounded-4 shadow-sm p-2 mb-4 d-none" id="classTabs">
            <ul class="nav nav-pills nav-fill gap-2" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link rounded-pill" data-bs-toggle="tab" data-bs-target="#tab-info" type="button" role="tab">
                        <i class="bi bi-info-circle me-2"></i>Thông tin
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link active rounded-pill" data-bs-toggle="tab" data-bs-target="#tab-learning" type="button" role="tab">
                        <i class="bi bi-journal-bookmark me-2"></i>Nội dung học
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link rounded-pill" data-bs-toggle="tab" data-bs-target="#tab-schedule" type="button" role="tab">
                        <i class="bi bi-camera-video me-2"></i>Phòng Live
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link rounded-pill" data-bs-toggle="tab" data-bs-target="#tab-members" type="button" role="tab">
                        <i class="bi bi-people me-2"></i>Thành viên
                    </button>
                </li>
            </ul>
        </div>

        <div id="classTabContent" class="tab-content d-none">
            <div class="tab-pane fade" id="tab-info" role="tabpanel"></div>
            <div class="tab-pane fade show active" id="tab-learning" role="tabpanel"></div>
            <div class="tab-pane fade" id="tab-schedule" role="tabpanel"></div>
            <div class="tab-pane fade" id="tab-members" role="tabpanel"></div>
        </div>

    </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<script>
    /* ── Get classId from URL ─────────────── */
    const pathParts      = window.location.pathname.split('/');
    const classIdFromUrl = pathParts[pathParts.length - 1];

    /* ── Main loader ─────────────────────── */
    document.addEventListener('DOMContentLoaded', async () => {
      if (!classIdFromUrl || isNaN(classIdFromUrl)) {
        showBannerError('Mã lớp học không hợp lệ!');
        return;
      }

      try {
        const res    = await fetch(`/api/v1/student/classes/${classIdFromUrl}`);
        const result = await res.json();

        if (result.status !== 200) throw new Error(result.message || 'Lỗi tải dữ liệu');

        const d = result.data;
        renderBanner(d);
        renderInfo(d);
        renderLearning(d);
        renderSchedule(d);
        renderMembers(d);

        document.getElementById('classTabs').classList.remove('d-none');
        document.getElementById('classTabContent').classList.remove('d-none');

      } catch (err) {
        showBannerError(err.message);
      }
    });

    /* ════════════════════════════════════════
       RENDER FUNCTIONS
    ════════════════════════════════════════ */

    /* 1. BANNER (Đồng bộ HTML/CSS y hệt my-course-detail) */
    function renderBanner(d) {
      const pct      = d.progressPercent || 0;
      const isClosed = d.status === 'Closed';

      document.getElementById('classBannerContainer').innerHTML = `
        <div class="course-banner bg-primary bg-gradient rounded-4 p-4 p-md-5 mb-4 shadow-sm text-white position-relative overflow-hidden">
          <div class="position-absolute top-0 end-0 opacity-25" style="transform: translate(20%, -30%);">
            <i class="bi bi-mortarboard-fill" style="font-size: 15rem;"></i>
          </div>

          <div class="row align-items-center position-relative z-1">
            <div class="col-lg-8 mb-4 mb-lg-0">
              <span class="badge bg-white text-primary mb-3 px-3 py-2 rounded-pill fw-bold shadow-sm">
                <i class="bi ${isClosed ? 'bi-slash-circle' : 'bi-play-circle-fill'} me-1"></i>
                ${isClosed ? 'Đã kết thúc' : 'Đang học'}
              </span>
              <h1 class="fw-bolder mb-3" style="font-size: 2.2rem;">${esc(d.className || 'Chưa xếp tên lớp')}</h1>
              <p class="mb-0 text-white-50 lead fs-6">
                <i class="bi bi-book me-1"></i> Khóa học: ${esc(d.courseName || '--')} <span class="mx-2">|</span>
                <i class="bi bi-calendar3 me-1"></i> Khai giảng: ${formatDate(d.startDate)}
              </p>
            </div>

            <div class="col-lg-4 text-lg-end">
              <div class="bg-white bg-opacity-10 p-4 rounded-4 backdrop-blur">
                <div class="d-flex justify-content-between align-items-end mb-2">
                  <span class="fw-bold small text-uppercase tracking-wider">Tiến độ học tập</span>
                  <span class="fw-bolder fs-5">${pct}%</span>
                </div>
                <div class="progress mb-2" style="height: 8px; background-color: rgba(255,255,255,0.2);">
                  <div class="progress-bar bg-warning progress-bar-striped progress-bar-animated" role="progressbar" style="width: ${pct}%"></div>
                </div>
                <div class="text-end small text-white-50">
                  <i class="bi bi-check2-circle me-1"></i>Hoàn thành ${d.completedSessions || 0}/${d.totalSessions || 0} buổi
                </div>
              </div>
            </div>
          </div>
        </div>`;
    }

    /* 2. THÔNG TIN CHUNG */
    function renderInfo(d) {
      const members = d.members || [];
      const teacher = members.find(m => m.role === 'TEACHER') || { name: 'Chưa phân công', avatar: null };
      const av = teacher.avatar
        || `https://ui-avatars.com/api/?name=${encodeURIComponent(teacher.name)}&background=eff6ff&color=0d6efd`;

      document.getElementById('tab-info').innerHTML = `
        <div class="row g-4">
          <div class="col-md-8">
            <div class="info-card">
              <div class="info-card-title"><i class="bi bi-card-text"></i>Giới thiệu Khóa/Lớp học</div>
              <div class="text-muted lh-lg" style="font-size:0.9rem;">
                Chào mừng bạn đến với lớp <strong>${esc(d.className)}</strong>.<br>
                Ngày dự kiến kết thúc: <strong>${formatDate(d.endDate) || 'Chưa cập nhật'}</strong>.<br>
                Hãy theo dõi Lộ trình học tập thường xuyên và tham gia đầy đủ các buổi học Live Class để đạt kết quả tốt nhất nhé!
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="info-card text-center">
              <div class="info-card-title justify-content-center"><i class="bi bi-person-badge"></i>Giảng viên</div>
              <div class="teacher-avatar-wrap">
                <img src="${av}" alt="${esc(teacher.name)}">
              </div>
              <h6 class="fw-bold mb-1">${esc(teacher.name)}</h6>
              <p class="mb-4" style="font-size:0.8rem;">
                <span class="badge" style="background:#eff6ff;color:#0d6efd;font-weight:600;">Giảng viên phụ trách</span>
              </p>
              <button class="btn-message"><i class="bi bi-chat-dots"></i> Nhắn tin trao đổi</button>
            </div>
          </div>
        </div>`;
    }

    /* 3. NỘI DUNG HỌC TẬP */
    function renderLearning(d) {
      const sessions = d.sessions || [];
      const tab = document.getElementById('tab-learning');

      if (!sessions.length) {
        tab.innerHTML = `
          <div class="empty-box">
            <i class="bi bi-inbox" style="font-size:2.8rem;color:#cbd5e1;"></i>
            <h5 class="fw-bold mt-3 text-dark">Chưa có nội dung học tập</h5>
            <p class="text-muted mb-0">Giảng viên đang cập nhật lộ trình cho lớp học này.</p>
          </div>`;
        return;
      }

      const rows = sessions.map((s, i) => {
        const n   = String(s.sessionNo).padStart(2, '0');
        const sc  = s.status === 'COMPLETED' ? 's-completed' : s.status === 'LEARNING' ? 's-learning' : 's-upcoming';
        const st  = s.status === 'COMPLETED' ? 'Đã qua' : s.status === 'LEARNING' ? 'Đang học' : 'Sắp tới';
        const si  = s.status === 'COMPLETED' ? 'bi-check-circle-fill' : s.status === 'LEARNING' ? 'bi-play-circle-fill' : 'bi-lock-fill';
        const open = (i === 0 || s.status === 'LEARNING') ? 'show' : '';
        const lessons = s.lessons || [];

        return `
          <div class="session-card">
            <div class="session-header" data-bs-toggle="collapse" data-bs-target="#sess${s.sessionId}">
              <div class="d-flex align-items-center flex-grow-1 me-3">
                <div class="session-no-box">
                  <div class="lbl">BUỔI</div>
                  <div class="num">${n}</div>
                </div>
                <div>
                  <div class="session-topic">${esc(s.topic || 'Nội dung đang cập nhật...')}</div>
                  <div class="session-sub">
                    <i class="bi bi-calendar3 me-1"></i>${formatDate(s.date)}
                    <span class="mx-1">•</span>
                    <i class="bi bi-journal-text me-1"></i>${lessons.length} nội dung
                  </div>
                </div>
              </div>
              <span class="s-status ${sc}"><i class="bi ${si} me-1"></i>${st}</span>
            </div>
            <div id="sess${s.sessionId}" class="collapse ${open} session-body" data-bs-parent="#accordionSessions">
              ${lessons.length
                ? lessons.map(renderLesson).join('')
                : '<div class="p-4 text-center text-muted small">Buổi học này chưa có nội dung.</div>'}
            </div>
          </div>`;
      }).join('');

      tab.innerHTML = `
        <div class="d-flex align-items-center mb-4">
          <h5 class="fw-bold mb-0"><i class="bi bi-map text-primary me-2"></i>Lộ trình học tập</h5>
        </div>
        <div class="accordion" id="accordionSessions">${rows}</div>`;
    }

    function renderLesson(l) {
      const typeMap = {
        VIDEO: { cls:'i-video', icon:'bi-play-fill',      label:'Video bài giảng' },
        QUIZ:  { cls:'i-quiz',  icon:'bi-patch-question', label:'Bài tập / Trắc nghiệm' },
        DOC:   { cls:'i-doc',   icon:'bi-file-earmark-text', label:'Tài liệu đọc' },
      };
      const t   = typeMap[l.type] || typeMap.DOC;
      const isDone   = l.completed;
      const isLocked = l.locked;
      const statusIcon = isLocked
        ? '<i class="bi bi-lock-fill text-secondary fs-5"></i>'
        : isDone
          ? '<i class="bi bi-check-circle-fill text-success fs-4"></i>'
          : '<i class="bi bi-circle text-muted fs-4"></i>';
      const href = isLocked ? 'javascript:void(0)'
        : l.type === 'QUIZ'
          ? `/student/quiz/take/${l.quizId}?classId=${classIdFromUrl}`
          : `/student/lesson/view/${l.lessonId}`;
      const locked = isLocked ? 'locked' : '';
      const onclick = isLocked ? `onclick="alert('Bài học chưa đến thời gian mở khoá!')"` : '';

      return `
        <a href="${href}" ${onclick} class="lesson-item ${locked}">
          <div class="l-icon ${t.cls}"><i class="bi ${t.icon}"></i></div>
          <div class="flex-grow-1">
            <div class="fw-bold" style="font-size:0.9rem;">${esc(l.lessonTitle || l.lessonName || 'Bài học')}</div>
            <div class="text-muted" style="font-size:0.77rem;">${t.label} <span class="mx-1">•</span> <i class="bi bi-clock me-1"></i>${l.duration || '--:--'}</div>
          </div>
          <div>${statusIcon}</div>
        </a>`;
    }

    /* 4. PHÒNG HỌC LIVE */
    function renderSchedule(d) {
      const has = d.meetLink && d.meetLink.trim();
      document.getElementById('tab-schedule').innerHTML = `
        <div class="info-card">
          <div class="info-card-title"><i class="bi bi-broadcast text-danger"></i>Trung tâm Live Class</div>
          <div class="live-box ${has ? 'has-link' : 'no-link'}">
            <div class="d-flex align-items-center gap-3 flex-grow-1">
              <div class="live-icon-wrap ${has ? 'text-primary' : 'text-secondary'}">
                <i class="bi ${has ? 'bi-camera-video-fill' : 'bi-camera-video-off-fill'}"></i>
              </div>
              <div>
                <div class="fw-bold mb-1 ${has ? 'text-primary' : 'text-secondary'}" style="font-size:0.95rem;">
                  Phòng học trực tuyến Google Meet
                </div>
                <div class="text-muted" style="font-size:0.82rem;">
                  ${has
                    ? 'Nhấn nút bên phải để tham gia buổi học tương tác với Giảng viên.'
                    : 'Giảng viên chưa cấu hình phòng học cho lớp này.'}
                </div>
              </div>
            </div>
            <a href="${has ? d.meetLink : '#'}" class="btn-join ${has ? '' : 'disabled'}" target="_blank">
              <i class="bi bi-box-arrow-up-right"></i>Vào lớp học ngay
            </a>
          </div>
        </div>`;
    }

    /* 5. THÀNH VIÊN */
    function renderMembers(d) {
      const tab = document.getElementById('tab-members');
      const students = (d.members || []).filter(m => m.role === 'STUDENT');

      if (!students.length) {
        tab.innerHTML = `
          <div class="empty-box">
            <i class="bi bi-people" style="font-size:2.5rem;color:#cbd5e1;"></i>
            <p class="text-muted mt-3 mb-0">Chưa có học viên nào trong lớp.</p>
          </div>`;
        return;
      }

      const items = students.map(m => {
        const init = (m.name || '?')[0].toUpperCase();
        const av   = m.avatar ? `<img src="${esc(m.avatar)}" alt="${esc(m.name)}">` : init;
        return `
          <div class="col-md-6 col-lg-4">
            <div class="member-row p-3 rounded-12 border bg-white" style="border-radius:12px;">
              <div class="member-av">${av}</div>
              <div class="overflow-hidden">
                <div class="fw-bold text-truncate" style="font-size:0.88rem;" title="${esc(m.name)}">${esc(m.name)}</div>
                <div class="text-muted text-truncate" style="font-size:0.78rem;" title="${esc(m.email)}">${esc(m.email)}</div>
              </div>
            </div>
          </div>`;
      }).join('');

      tab.innerHTML = `
        <div class="info-card">
          <div class="info-card-title"><i class="bi bi-people-fill"></i>Danh sách học viên (${students.length})</div>
          <div class="row g-3">${items}</div>
        </div>`;
    }

    /* ── Error banner ────────────────────────── */
    function showBannerError(msg) {
      document.getElementById('classBannerContainer').innerHTML = `
        <div class="error-box">
          <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:2rem;"></i>
          <h5 class="fw-bold mt-3 mb-1">Không thể tải dữ liệu</h5>
          <p class="text-muted mb-0">${esc(msg)}</p>
        </div>`;
    }

    /* ── Utils ───────────────────────────────── */
    function formatDate(s) {
      if (!s) return '--/--/----';
      try { const [y,m,d] = s.split('T')[0].split('-'); return `${d}/${m}/${y}`; }
      catch { return s; }
    }
    const esc = (s = '') => String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
</script>

</body>
</html>
