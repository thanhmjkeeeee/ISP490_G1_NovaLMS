<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:with="isDashboard=true">

<head th:replace="~{fragments/head :: common-head(pageTitle='Làm Bài Kiểm Tra')}"></head>

<body class="dashboard-body">
<style>
    /* White overlay when focus lost */
    #anti-cheat-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        z-index: 9999;
        justify-content: center;
        align-items: center;
        text-align: center;
        flex-direction: column;
        transition: opacity 0.3s ease;
    }
    .warning-pulse {
        animation: pulse-red 1.5s infinite;
    }
    @keyframes pulse-red {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
    }
    /* Chống sao chép */
    body {
        user-select: none;
        -webkit-user-select: none;
    }
</style>

<div id="anti-cheat-overlay">
    <div class="p-5 rounded-4 shadow-lg bg-white border border-danger border-3" style="max-width: 600px; backdrop-filter: none;">
        <div class="mb-4 warning-pulse">
            <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 5rem;"></i>
        </div>
        <h2 class="text-danger fw-bold mb-3">VUI LÒNG QUAY LẠI MÀN HÌNH!</h2>
        <p class="lead mb-4 fw-medium text-dark">Hành động rời khỏi trang thi đã được ghi nhận. <br>Vui lòng quay lại để tiếp tục bài thi ngay lập tức.</p>
        <div class="alert alert-danger border-danger">
            <i class="bi bi-info-circle-fill me-2"></i>
            Hệ thống sẽ tự động <strong>KHÓA</strong> bài thi nếu vi phạm quá 3 lần.
        </div>
        <div class="text-muted small mt-2">
            Nội dung bài thi đã được làm mờ để bảo mật.
        </div>
    </div>
</div>

<header th:replace="~{fragments/header :: dash-header(pageTitle='Bài Kiểm Tra', breadcrumb='Lớp học')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='my-classes')}"></aside>
<div th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<main class="dash-main" id="dashMain">
  <div class="container-fluid">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        
        <!-- Header Bài Quiz -->
        <div class="card shadow-sm border-0 mb-4 rounded-4">
          <div class="card-body p-4">
            <h3 class="fw-bold mb-2" th:text="${quiz.title}">Tên Quiz</h3>
            <p class="text-muted mb-3" th:text="${quiz.description}">Mô tả ngắn...</p>
            <div class="d-flex align-items-center gap-4">
              <div class="badge bg-primary bg-opacity-10 text-primary px-3 py-2 rounded-pill fs-6">
                <i class="bi bi-ui-checks-grid me-1"></i> <span th:text="${quiz.totalQuestions}"></span> Câu hỏi
              </div>
              <div class="badge bg-warning bg-opacity-10 text-warning px-3 py-2 rounded-pill fs-6" th:if="${quiz.timeLimitMinutes != null}">
                <i class="bi bi-clock-history me-1"></i> <span id="timerText" th:text="${quiz.timeLimitMinutes} + ' Phút'"></span>
              </div>
            </div>
          </div>
        </div>

        <form id="quizForm" class="mb-5">
          <input type="hidden" id="quizId" th:value="${quiz.quizId}">
          <input type="hidden" id="timeLimitMinutes" th:value="${quiz.timeLimitMinutes}">
          <input type="hidden" id="speakingTimeLimit" th:value="${quiz.speakingTimeLimitSeconds}">
          <input type="hidden" id="classId" th:value="${classId}">
          <input type="hidden" id="sessionId" th:value="${sessionId}">
          
          <div th:each="question, stat : ${quiz.questions}" class="card shadow-sm border-0 mb-4 rounded-4 question-card">
            
            <!-- Render Passage if it's the first question of the group -->
            <div th:if="${question.groupId != null and (stat.first or quiz.questions[stat.index - 1].groupId != question.groupId)}" class="card-header bg-light border-bottom p-4">
              <h5 class="fw-bold mb-3 text-primary"><i class="bi bi-journal-text me-2"></i>Đoạn văn / Ngữ cảnh</h5>
              <div th:if="${question.passage != null and !question.passage.isEmpty()}" class="mb-3 fs-5" th:utext="${question.passage}"></div>
              <div th:if="${question.groupImageUrl != null and !question.groupImageUrl.isEmpty()}" class="mb-3 text-center">
                <img th:src="${question.groupImageUrl}" class="img-fluid rounded border shadow-sm" style="max-height: 400px;">
              </div>
              <div th:if="${question.groupAudioUrl != null and !question.groupAudioUrl.isEmpty()}" class="mb-2">
                <audio controls class="w-100 shadow-sm rounded">
                  <source th:src="${question.groupAudioUrl}" type="audio/mpeg">
                </audio>
              </div>
            </div>

            <div class="card-body p-4">
              <div class="d-flex justify-content-between mb-3">
                <h5 class="fw-bold mb-0">Câu <span th:text="${stat.count}"></span> <span class="text-muted fw-normal">/ <span th:text="${quiz.totalQuestions}"></span></span></h5>
                <span class="badge bg-secondary" th:text="${question.points} + ' Điểm'"></span>
              </div>
              
              <div class="mb-4">
                <p class="fs-5 mb-3" th:utext="${question.content}"></p>
                
                <div th:if="${question.imageUrl != null and !question.imageUrl.isEmpty()}" class="mb-3">
                  <img th:src="${question.imageUrl}" class="img-fluid rounded border shadow-sm" style="max-height: 350px;">
                </div>
                
                <div th:if="${question.audioUrl != null and !question.audioUrl.isEmpty()}" class="mb-3">
                  <audio controls class="w-100 shadow-sm rounded" style="height: 40px;">
                    <source th:src="${question.audioUrl}" type="audio/mpeg">
                  </audio>
                </div>
              </div>

              <!-- Trắc nghiệm 1 đáp án -->
              <div th:if="${question.questionType == 'MULTIPLE_CHOICE_SINGLE'}">
                <div th:each="opt : ${question.options}" class="form-check custom-radio mb-3">
                  <input class="form-check-input" type="radio" th:name="'q_' + ${question.questionId}" th:id="'opt_' + ${opt.answerOptionId}" th:value="${opt.answerOptionId}">
                  <label class="form-check-label w-100 p-3 rounded-3 border" th:for="'opt_' + ${opt.answerOptionId}" th:text="${opt.title}"></label>
                </div>
              </div>

              <!-- Trắc nghiệm nhiều đáp án -->
              <div th:if="${question.questionType == 'MULTIPLE_CHOICE_MULTI'}">
                <div th:each="opt : ${question.options}" class="form-check custom-checkbox mb-3">
                  <input class="form-check-input" type="checkbox" th:name="'q_' + ${question.questionId}" th:id="'opt_' + ${opt.answerOptionId}" th:value="${opt.answerOptionId}">
                  <label class="form-check-label w-100 p-3 rounded-3 border" th:for="'opt_' + ${opt.answerOptionId}" th:text="${opt.title}"></label>
                </div>
              </div>

              <!-- Điền vào chỗ trống -->
              <div th:if="${question.questionType == 'FILL_IN_BLANK'}">
                <input type="text" class="form-control p-3 border-2" th:name="'q_' + ${question.questionId}" placeholder="Nhập câu trả lời...">
              </div>

              <!-- WRITING: plain textarea -->
              <div th:if="${question.questionType == 'WRITING'}">
                <textarea class="form-control p-3 border-2" th:name="'q_' + ${question.questionId}"
                          th:id="'answer_' + ${question.questionId}"
                          rows="6" placeholder="Viết câu trả lời của bạn ở đây..."></textarea>
              </div>

              <!-- SPEAKING: audio recording UI -->
              <div th:if="${question.questionType == 'SPEAKING'}" class="mb-3">
                <label class="form-label fw-bold">Ghi âm câu trả lời của bạn</label>
                <div class="d-flex gap-2 align-items-center mb-2">
                  <button type="button" class="btn btn-outline-danger btn-sm" id="recordBtn"
                          onclick="toggleRecording()">
                    <i class="bi bi-mic"></i> Ghi âm
                  </button>
                  <label class="btn btn-outline-secondary btn-sm mb-0">
                    <i class="bi bi-upload"></i> Tải lên file
                    <input type="file" accept="audio/*" class="d-none" id="audioUpload"
                           onchange="handleAudioUpload(this)">
                  </label>
                </div>
                <div id="audioStatus" class="small text-muted"></div>
                <div id="speaking-timer-badge" class="fw-bold text-danger small mb-2"></div>
                <audio id="audioPlayback" controls class="d-none w-100 mt-2"></audio>
                <input type="hidden"
                       th:id="'answer_' + ${question.questionId}"
                       th:attr="data-speaking-question=${question.questionId}"
                       th:name="'q_' + ${question.questionId}"
                       value="">
              </div>

              <!-- Nối từ (Matching) -->
              <div th:if="${question.questionType == 'MATCHING'}" class="matching-container">
                <div th:each="opt : ${question.options}" class="row mb-3 align-items-center">
                  <div class="col-md-5">
                    <div class="p-3 border rounded-3 bg-light" th:text="${opt.title}"></div>
                  </div>
                  <div class="col-md-2 text-center text-muted">
                    <i class="bi bi-arrow-right-short fs-3"></i>
                  </div>
                  <div class="col-md-5">
                    <select class="form-select p-3 border-2" th:name="'q_' + ${question.questionId} + '_' + ${opt.answerOptionId}">
                      <option value="">-- Chọn đáp án tương ứng --</option>
                      <option th:each="rightOpt : ${question.matchRightOptions}" th:value="${rightOpt.title}" th:text="${rightOpt.title}"></option>
                    </select>
                  </div>
                </div>
              </div>

            </div>
          </div>

          <div class="text-center mt-5 mb-5">
            <button type="button" class="btn btn-primary btn-lg rounded-pill px-5 fw-bold shadow" onclick="submitQuiz()">Nộp Bài</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<style>
  .custom-radio input[type="radio"]:checked + label {
    border-color: var(--dash-accent) !important;
    background-color: rgba(19, 106, 213, 0.05);
  }
  .custom-checkbox input[type="checkbox"]:checked + label {
    border-color: var(--dash-accent) !important;
    background-color: rgba(19, 106, 213, 0.05);
  }
</style>

<script>
  let timerInterval;
  let mediaRecorder;
  let audioChunks = [];
  let speakingTimerInterval;
  let isSubmitting = false;

  document.addEventListener("DOMContentLoaded", () => {
    const timeLimit = parseInt(document.getElementById('timeLimitMinutes').value);
    if (timeLimit && !isNaN(timeLimit)) {
      startTimer(timeLimit * 60);
    }
  });

  // ── Anti-Cheat Logic ───────────────────────────────────────────────────────
  let isLocked = false;
  const overlay = document.getElementById('anti-cheat-overlay');

  window.addEventListener('blur', () => {
      if (!isLocked && !isSubmitting) overlay.style.display = 'flex';
  });
  window.addEventListener('focus', () => {
      overlay.style.display = 'none';
  });

  const reportViolation = async (reason) => {
      if (isLocked || isSubmitting) return;
      const quizIdInput = document.getElementById('quizId');
      if (!quizIdInput) return;
      const qId = parseInt(quizIdInput.value);

      try {
          const res = await fetch('/api/v1/student/quiz/lock', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({
                  quizId: qId,
                  reason: reason || "Chuyển tab / Rời khỏi màn hình"
              })
          });
          const data = await res.json();
          
          if (data.status === 'LOCKED') {
              isLocked = true;
              Swal.fire({
                  title: 'BÀI THI ĐÃ BỊ KHÓA!',
                  html: `<div class="text-start text-danger fw-bold">Bạn đã vi phạm quy chế quá 3 lần (Chuyển tab/Rời màn hình).</div><hr><div class="text-muted small">Hệ thống đã tự động khóa bài làm của bạn. Vui lòng quay lại danh sách bài kiểm tra để gửi yêu cầu hỗ trợ nếu cần.</div>`,
                  icon: 'error',
                  confirmButtonText: 'Quay lại danh sách',
                  allowOutsideClick: false
              }).then(() => {
                  window.location.href = '/student/quiz';
              });
          } else if (data.status === 'WARNING') {
              Swal.fire({
                  title: 'CẢNH BÁO VI PHẠM!',
                  html: `<div class="mb-3">Bạn vừa rời khỏi màn hình bài thi!</div><h4 class="text-danger fw-bold">Số lần vi phạm: ${data.violationCount}/3</h4><p class="small text-muted">Lưu ý: Đến lần thứ 3 bài thi sẽ bị KHÓA tự động.</p>`,
                  icon: 'warning',
                  confirmButtonColor: '#ffc107',
                  confirmButtonText: 'Tôi đã hiểu và cam kết không tái phạm'
              });
          }
      } catch (e) {
          console.error("Lỗi báo cáo vi phạm", e);
      }
  };

  document.addEventListener("visibilitychange", () => {
      if (document.hidden && !isSubmitting && !isLocked) {
          reportViolation("Chuyển Tab hoặc rời trình duyệt");
      }
  });

  // Warn before closing tab/browser
  window.addEventListener("beforeunload", (e) => {
      if (!isLocked && !isSubmitting) {
          e.preventDefault();
          e.returnValue = 'Bạn đang làm bài kiểm tra. Thoát trang sẽ khiến bài thi bị khóa. Bạn có chắc chắn muốn thoát?'; 
      }
  });

  // Intercept normal links
  document.addEventListener('click', async (e) => {
      const link = e.target.closest('a');
      if (link && !isLocked && !isSubmitting) {
          const href = link.getAttribute('href');
          if (href && !href.startsWith('#') && !href.startsWith('javascript:')) {
              e.preventDefault();
              Swal.fire({
                  title: 'Bạn muốn rời khỏi trang?',
                  text: 'Hành động này sẽ được ghi nhận là một lần vi phạm quy chế thi!',
                  icon: 'warning',
                  showCancelButton: true,
                  confirmButtonText: 'Vẫn rời đi',
                  cancelButtonText: 'Ở lại làm bài'
              }).then((result) => {
                  if (result.isConfirmed) {
                      reportViolation("Tự ý nhấn vào liên kết rời khỏi trang");
                      window.location.href = href;
                  }
              });
          }
      }
  });

  function startTimer(durationSeconds) {
    let timer = durationSeconds;
    const timerDisplay = document.getElementById('timerText');

    timerInterval = setInterval(() => {
      let minutes = parseInt(timer / 60, 10);
      let seconds = parseInt(timer % 60, 10);

      minutes = minutes < 10 ? "0" + minutes : minutes;
      seconds = seconds < 10 ? "0" + seconds : seconds;

      if(timerDisplay) timerDisplay.textContent = minutes + ":" + seconds;

      if (--timer < 0) {
        clearInterval(timerInterval);
        alert("Hết giờ! Bài làm sẽ tự động được nộp.");
        submitQuiz(true);
      }
    }, 1000);
  }

  // ── Speaking Timer ─────────────────────────────────────────────────────────
  function startSpeakingTimer(seconds) {
    let remaining = seconds;
    const badge = document.getElementById('speaking-timer-badge');
    if (!badge) return;
    if (speakingTimerInterval) clearInterval(speakingTimerInterval);
    remaining = seconds;
    speakingTimerInterval = setInterval(() => {
      const mins = Math.floor(remaining / 60);
      const secs = remaining % 60;
      badge.textContent = '⏱ ' + String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
      if (remaining <= 0) {
        clearInterval(speakingTimerInterval);
        stopAndUploadRecording();
      }
      remaining--;
    }, 1000);
  }

  // ── MediaRecorder ───────────────────────────────────────────────────────────
  async function toggleRecording() {
    const btn = document.getElementById('recordBtn');
    if (!mediaRecorder || mediaRecorder.state === 'inactive') {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = () => {
        uploadRecordedAudio();
        stream.getTracks().forEach(t => t.stop());
      };
      mediaRecorder.start();
      btn.innerHTML = '<i class="bi bi-stop-fill"></i> Dừng';
      btn.classList.replace('btn-outline-danger', 'btn-danger');
      document.getElementById('audioStatus').textContent = 'Đang ghi âm...';
      const speakingLimit = parseInt(document.getElementById('speakingTimeLimit').value || '0');
      if (speakingLimit > 0) startSpeakingTimer(speakingLimit);
    } else {
      stopAndUploadRecording();
    }
  }

  function stopAndUploadRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      if (speakingTimerInterval) clearInterval(speakingTimerInterval);
      mediaRecorder.stop();
    }
  }

  function uploadRecordedAudio() {
    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    const file = new File([blob], 'recording.webm', { type: 'audio/webm' });
    uploadAudioFile(file);
    const btn = document.getElementById('recordBtn');
    if (btn) {
      btn.innerHTML = '<i class="bi bi-mic"></i> Ghi âm';
      btn.classList.replace('btn-danger', 'btn-outline-danger');
    }
  }

  async function handleAudioUpload(input) {
    const file = input.files[0];
    if (!file) return;
    await uploadAudioFile(file);
  }

  async function uploadAudioFile(file) {
    const formData = new FormData();
    formData.append('file', file);
    try {
      const res = await fetch('/api/v1/student/quiz/audio', { method: 'POST', body: formData });
      const result = await res.json();
      if (result.status === 200 && result.audioUrl) {
        document.getElementById('audioStatus').textContent = '✅ Đã tải lên thành công!';
        const playback = document.getElementById('audioPlayback');
        playback.src = result.audioUrl;
        playback.classList.remove('d-none');
        const speakingInput = document.querySelector('[data-speaking-question]');
        if (speakingInput) speakingInput.value = result.audioUrl;
      } else {
        alert('Upload thất bại: ' + (result.message || ''));
      }
    } catch (e) {
      alert('Upload thất bại!');
    }
  }

  async function submitQuiz(autoSubmit = false) {
    // Validate SPEAKING audio answers
    const emptyErrors = [];
    document.querySelectorAll('input[name^="q_"][data-speaking-question]').forEach(function(input) {
      if (!input.value || input.value.trim() === '') {
        const card = input.closest('.question-card');
        const qNum = card ? card.querySelector('.fs-5') : null;
        const label = qNum ? qNum.textContent.trim() : 'Câu hỏi Nói';
        emptyErrors.push(label + ': chưa có file ghi âm.');
      }
    });
    if (emptyErrors.length > 0) {
      alert('Vui lòng hoàn thành các câu sau trước khi nộp bài:\n\n' + emptyErrors.join('\n'));
      return;
    }

    if (!autoSubmit) {
      const swalResult = await Swal.fire({
        title: 'Xác nhận nộp bài',
        text: 'Bạn có chắc chắn muốn nộp bài làm của mình không?',
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#3085d6',
        cancelButtonColor: '#d33',
        confirmButtonText: 'Đồng ý nộp',
        cancelButtonText: 'Hủy'
      });
      if (!swalResult.isConfirmed) return;
    }
    
    isSubmitting = true;
    if (timerInterval) clearInterval(timerInterval);
    
    const quizId = document.getElementById('quizId').value;
    const form = document.getElementById('quizForm');
    const formData = new FormData(form);
    
    let answers = {};
    
    formData.forEach((value, key) => {
      if (key.startsWith('q_')) {
        const parts = key.split('_');
        const questionId = parts[1];
        
        // Handle MATCHING specially (q_{id}_{optId})
        if (parts.length === 3) {
           const optId = parts[2];
           if (!answers[questionId]) answers[questionId] = {};
           answers[questionId][optId] = value;
        } else {
           // MULTIPLE_CHOICE_MULTI could have multiple values for same key in FormData
           // Handle arrays for checkboxes
           const allVals = formData.getAll(key);
           if (allVals.length > 1) {
             answers[questionId] = allVals.map(v => parseInt(v));
           } else {
             // Try parse integer for single choice, else keep string for fill in blank
             const intVal = parseInt(value);
             answers[questionId] = isNaN(intVal) ? value : parseInt(value);
             // if it was a checkbox with 1 selected, we might still want array. 
             // for simplicity, backend handles single id vs list
           }
        }
      }
    });

    const payload = {
      quizId: parseInt(quizId),
      answers: answers
    };

    try {
      const response = await fetch('/api/v1/student/quiz/submit', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
      const result = await response.json();
      
      if (response.ok) {
        const classId = document.getElementById('classId') ? document.getElementById('classId').value : null;
        const sessionId = document.getElementById('sessionId') ? document.getElementById('sessionId').value : null;
        let resultUrl = `/student/quiz/result/${result.resultId}`;
        const params = [];
        if (classId) params.push('classId=' + classId);
        if (sessionId) params.push('sessionId=' + sessionId);
        if (params.length > 0) resultUrl += '?' + params.join('&');
        window.location.href = resultUrl;
      } else {
        alert("Lỗi nộp bài: " + (result.message || 'Unknown error'));
      }
    } catch (e) {
      alert("Lỗi kết nối khi nộp bài!");
    }
  }
</script>

</body>
</html>
