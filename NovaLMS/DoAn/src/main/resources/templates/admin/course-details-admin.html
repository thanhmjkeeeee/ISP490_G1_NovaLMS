<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:with="isDashboard=true">
    <th:block th:replace="~{fragments/head :: common-head(pageTitle='Chi tiết khóa học')}"></th:block>
</head>
<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Chi tiết khóa học', breadcrumb='Khóa học / Chi tiết')}"></header>

<aside id="dashSidebar" class="dash-sidebar">
    <div th:replace="~{fragments/sidebar :: dash-sidebar(activePage='courses')}"></div>
</aside>

<main class="dash-main" id="dashMain">
    <div class="container-fluid">
        <div class="mb-3">
            <a th:href="@{/admin/courses}" class="text-decoration-none text-muted small">
                <i class="bi bi-arrow-left me-1"></i> Quay lại danh sách
            </a>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center border-bottom">
                <h5 class="fw-bold m-0 text-primary">
                    <i class="bi bi-info-circle me-2"></i>Thông tin khóa học
                </h5>
                <a th:href="@{/admin/courses/edit/{id}(id=${course.courseId})}"
                   class="btn btn-primary rounded-pill px-4 shadow-sm">
                    <i class="bi bi-pencil-square me-2"></i>Chỉnh sửa khóa học
                </a>
            </div>

            <div class="card-body p-4">
                <div class="row g-4">
                    <div class="col-md-4 text-center border-end py-4">
                        <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 100px; height: 100px;">
                            <i class="bi bi-journal-bookmark text-primary fs-1"></i>
                        </div>
                        <h4 class="fw-bold text-dark mb-1" th:text="${course.courseName}">Tên khóa học</h4>
                        <p class="text-muted mb-3" th:text="${'Mã: ' + course.courseCode}">CODE-123</p>

                        <span th:if="${course.status == 'active'}" class="badge bg-success-soft text-success px-3 py-2 rounded-pill">
                            <i class="bi bi-check-circle me-1"></i> Đang hoạt động
                        </span>
                        <span th:unless="${course.status == 'active'}" class="badge bg-warning-soft text-warning px-3 py-2 rounded-pill">
                            <i class="bi bi-pause-circle me-1"></i> Bản nháp
                        </span>
                    </div>

                    <div class="col-md-8 ps-md-5">
                        <div class="row mb-4">
                            <div class="col-6">
                                <label class="small text-muted text-uppercase fw-bold d-block mb-1">Học phí</label>
                                <h5 class="text-danger fw-bold"
                                    th:text="${course.price != null ? #numbers.formatInteger(course.price, 0, 'POINT') + ' VND' : '0 VND'}">0 VND</h5>
                            </div>
                            <div class="col-6">
                                <label class="small text-muted text-uppercase fw-bold d-block mb-1">Ngày tạo</label>
                                <h5 class="text-dark small">01/03/2026</h5> </div>
                        </div>

                        <div class="mb-4">
                            <label class="small text-muted text-uppercase fw-bold d-block mb-1">Mô tả chi tiết</label>
                            <div class="bg-light p-3 rounded-3 text-secondary" style="line-height: 1.6;">
                                <p class="m-0" th:text="${course.description ?: 'Chưa có thông tin mô tả chi tiết cho khóa học này.'}">Mô tả...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card-footer bg-light py-3 text-end border-0">
                <button class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="return confirm('Bạn có chắc chắn muốn xóa?')">
                    <i class="bi bi-trash me-1"></i> Xóa khóa học
                </button>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>
</body>
</html>
