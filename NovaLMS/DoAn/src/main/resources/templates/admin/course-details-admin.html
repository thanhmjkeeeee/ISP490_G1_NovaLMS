<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:with="isDashboard=true">
    <th:block th:replace="~{fragments/head :: common-head(pageTitle='Chi tiết khóa học')}"></th:block>
</head>
<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Chi tiết khóa học', breadcrumb='Khóa học / Chi tiết')}"></header>

<aside id="dashSidebar" class="dash-sidebar">
    <div th:replace="~{fragments/sidebar :: dash-sidebar(activePage='courses')}"></div>
</aside>

<main class="dash-main" id="dashMain">
    <div class="container-fluid">
        <div class="mb-3">
            <a th:href="@{/admin/courses}" class="text-decoration-none text-muted small">
                <i class="bi bi-arrow-left me-1"></i> Quay lại danh sách
            </a>
        </div>

        <div id="loadingState" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="text-muted mt-2">Đang tải dữ liệu khóa học...</p>
        </div>

        <div id="detailContainer" class="card border-0 shadow-sm rounded-4 overflow-hidden" style="display: none;">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center border-bottom">
                <h5 class="fw-bold m-0 text-primary">
                    <i class="bi bi-info-circle me-2"></i>Thông tin khóa học
                </h5>
                <a id="editBtn" href="#" class="btn btn-primary rounded-pill px-4 shadow-sm">
                    <i class="bi bi-pencil-square me-2"></i>Chỉnh sửa khóa học
                </a>
            </div>

            <div class="card-body p-4">
                <div class="row g-4">
                    <div class="col-md-4 text-center border-end py-4">
                        <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 100px; height: 100px;">
                            <i class="bi bi-journal-bookmark text-primary fs-1"></i>
                        </div>
                        <h4 class="fw-bold text-dark mb-1" id="courseName">---</h4>
                        <p class="text-muted mb-3" id="courseCode">Mã: ---</p>
                        <div id="statusBadge"></div>
                    </div>

                    <div class="col-md-8 ps-md-5">
                        <div class="row mb-4">
                            <div class="col-6">
                                <label class="small text-muted text-uppercase fw-bold d-block mb-1">Học phí gốc</label>
                                <h5 class="text-muted text-decoration-line-through small" id="courseOriginalPrice">0 VND</h5>
                                <h5 class="text-danger fw-bold" id="coursePrice">0 VND</h5>
                                <span class="badge bg-danger" id="courseSaleBadge"></span>
                            </div>
                            <div class="col-6">
                                <label class="small text-muted text-uppercase fw-bold d-block mb-1">Cập nhật lúc</label>
                                <h5 class="text-dark small" id="updateDate">---</h5>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="small text-muted text-uppercase fw-bold d-block mb-1">Mô tả chi tiết</label>
                            <div class="bg-light p-3 rounded-3 text-secondary" style="min-height: 120px;">
                                <p class="m-0" id="courseDescription">---</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card-footer bg-light py-3 text-end border-0">
                <button class="btn btn-outline-danger btn-sm rounded-pill px-3" id="btnDelete">
                    <i class="bi bi-trash me-1"></i> Xóa khóa học
                </button>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Lấy ID từ URL (đoạn cuối của /admin/courses/detail/4)
        const pathSegments = window.location.pathname.split('/');
        const courseId = pathSegments[pathSegments.length - 1];

        if (courseId) {
            fetch(`/api/v1/courses/${courseId}`)
                .then(response => response.json())
                .then(res => {
                    if (res.status === 200) {
                        const course = res.data;

                        // Đổ dữ liệu vào giao diện
                        document.getElementById('courseName').innerText = course.courseName || 'N/A';
                        document.getElementById('courseCode').innerText = 'Mã: ' + (course.courseCode || 'N/A');

                        // Xử lý giá và sale
                        const originalPrice = course.price || 0;
                        const sale = course.sale || 0;
                        if (sale > 0) {
                            document.getElementById('courseOriginalPrice').innerText = originalPrice.toLocaleString('vi-VN') + ' VND';
                            document.getElementById('coursePrice').innerText = (originalPrice - sale).toLocaleString('vi-VN') + ' VND';
                            document.getElementById('courseSaleBadge').innerText = 'Giảm ' + sale.toLocaleString('vi-VN') + ' VND';
                        } else {
                            document.getElementById('courseOriginalPrice').style.display = 'none';
                            document.getElementById('coursePrice').innerText = originalPrice.toLocaleString('vi-VN') + ' VND';
                        }

                        document.getElementById('courseDescription').innerText = course.description || 'Chưa có thông tin mô tả.';
                        document.getElementById('editBtn').href = `/admin/courses/edit/${course.courseId}`;

                        // Badge trạng thái
                        const badge = document.getElementById('statusBadge');
                        const st = (course.status || '').toLowerCase();
                        if (st === 'active') {
                            badge.innerHTML = `<span class="badge bg-success bg-opacity-10 text-success px-3 py-2 rounded-pill">Đang hoạt động</span>`;
                        } else if (st === 'published') {
                            badge.innerHTML = `<span class="badge bg-primary bg-opacity-10 text-primary px-3 py-2 rounded-pill">Đã xuất bản</span>`;
                        } else if (st === 'inactive') {
                            badge.innerHTML = `<span class="badge bg-secondary bg-opacity-10 text-secondary px-3 py-2 rounded-pill">Tạm dừng</span>`;
                        } else {
                            badge.innerHTML = `<span class="badge bg-warning bg-opacity-10 text-warning px-3 py-2 rounded-pill">Bản nháp</span>`;
                        }

                        // Hiển thị nội dung, ẩn loading
                        document.getElementById('detailContainer').style.display = 'block';
                        document.getElementById('loadingState').style.display = 'none';

                        // Xử lý nút xóa - Chỉ hiện nếu chưa có học viên
                        const btnDelete = document.getElementById('btnDelete');
                        if (course.registrationCount > 0) {
                            btnDelete.style.display = 'none';
                        } else {
                            btnDelete.onclick = () => {
                                if(confirm("Bạn có chắc chắn muốn xóa?")) {
                                    fetch(`/api/v1/courses/${courseId}`, { method: 'DELETE' })
                                        .then(() => window.location.href = "/admin/courses");
                                }
                            };
                        }
                    }
                })
                .catch(err => {
                    console.error("Lỗi:", err);
                    document.getElementById('loadingState').innerHTML = '<p class="text-danger">Không thể tải dữ liệu!</p>';
                });
        }
    });
</script>
</body>
</html>
