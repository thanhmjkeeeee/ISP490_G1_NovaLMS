<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:with="isDashboard=true">
    <th:block th:replace="~{fragments/head :: common-head(pageTitle='Quản lý khóa học')}"></th:block>
</head>

<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Quản lý khóa học', breadcrumb='Khóa học')}"></header>

<aside id="dashSidebar" class="dash-sidebar">
    <div th:replace="~{fragments/sidebar :: dash-sidebar(activePage='courses')}"></div>
</aside>

<div id="dashOverlay" class="dash-overlay"></div>

<main class="dash-main" id="dashMain">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold text-dark m-0">Course Management</h3>
            <p class="text-muted small m-0">Manage courses, assign experts/managers & content.</p>
        </div>
        <a th:href="@{/admin/courses/new}" class="btn btn-primary shadow-sm fw-bold rounded-pill px-4" style="background-color: #3b82f6; border: none;">
            <i class="bi bi-plus-lg me-1"></i> Create New Course
        </a>
    </div>

    <div class="card mb-4 border-0 shadow-sm">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-secondary">Search</label>
                    <div class="input-group input-group-sm">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" id="searchInput" class="form-control border-start-0 bg-light" placeholder="Name, Code...">
                    </div>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold text-secondary">Status</label>
                    <select id="statusFilter" class="form-select form-select-sm bg-light">
                        <option value="">All Status</option>
                        <option value="active">Active</option>
                        <option value="draft">Draft</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="button" onclick="loadCourseData(0)" class="btn btn-sm btn-primary w-100">Filter</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4 py-3 text-uppercase small text-muted">ID</th>
                        <th class="py-3 text-uppercase small text-muted">Course Info</th>
                        <th class="py-3 text-uppercase small text-muted">Price</th>
                        <th class="py-3 text-uppercase small text-muted">Status</th>
                        <th class="text-end pe-4 py-3 text-uppercase small text-muted">Actions</th>
                    </tr>
                    </thead>
                    <tbody id="courseDataBody">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card-footer bg-white py-3 border-0">
            <div class="d-flex justify-content-between align-items-center small text-muted">
                <span id="paginationInfo">Showing page...</span>
                <nav>
                    <ul class="pagination pagination-sm mb-0" id="paginationButtons"></ul>
                </nav>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        loadCourseData(0);
    });

    // Hàm load dữ liệu chính
    function loadCourseData(pageNo) {
    const pageSize = 10;

    // 1. Lấy giá trị từ các ô nhập liệu
    const search = document.getElementById('searchInput').value;
    const status = document.getElementById('statusFilter').value;

    // 2. Xây dựng URL với Query Parameters (Khớp với Backend của bạn)
    // Giả sử Backend nhận tham số: search và status
    let url = `/api/v1/courses/list?pageNo=${pageNo}&pageSize=${pageSize}`;

    if (search) url += `&search=${encodeURIComponent(search)}`;
    if (status) url += `&status=${encodeURIComponent(status)}`;

    const tbody = document.getElementById('courseDataBody');
    tbody.innerHTML = `<tr><td colspan="5" class="text-center py-5"><div class="spinner-border text-primary spinner-border-sm"></div> Loading...</td></tr>`;

    fetch(url)
        .then(response => response.json())
        .then(res => {
            if (res.status === 200) {
                renderTable(res.data.items);
                renderPagination(res.data.pageNo, res.data.totalPage);
            } else {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">${res.message}</td></tr>`;
            }
        })
        .catch(err => {
            console.error("API Error:", err);
            tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">Cannot connect to server</td></tr>`;
        });
}

// Thêm sự kiện nhấn "Enter" ở ô search để kích hoạt tìm kiếm luôn
document.getElementById('searchInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        loadCourseData(0);
    }
});

    // Hàm vẽ bảng
    function renderTable(courses) {
        const tbody = document.getElementById('courseDataBody');
        if (!courses || courses.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-muted"><i class="bi bi-inbox fs-2 d-block"></i> No courses found.</td></tr>`;
            return;
        }

        tbody.innerHTML = courses.map(course => `
            <tr>
                <td class="ps-4 text-muted small">#${course.courseId}</td>
                <td>
                    <div class="d-flex align-items-center">
                        <div class="bg-primary bg-opacity-10 rounded d-flex align-items-center justify-content-center me-3" style="width: 40px; height: 40px;">
                            <i class="bi bi-journal-code text-primary fs-5"></i>
                        </div>
                        <div>
                            <div class="fw-bold text-dark">${course.courseName || 'No Name'}</div>
                            <div class="small text-muted">Code: ${course.courseCode || 'N/A'}</div>
                        </div>
                    </div>
                </td>
                <td><div class="fw-bold text-dark">${(course.price || 0).toLocaleString('vi-VN')} VND</div></td>
                <td>
                    <span class="badge px-2 py-1 fw-semibold ${course.status === 'active' ? 'bg-success bg-opacity-10 text-success' : 'bg-warning bg-opacity-10 text-warning'}">
                        ${course.status || 'draft'}
                    </span>
                </td>
                <td class="text-end pe-4">
                    <a href="/admin/courses/detail/${course.courseId}" class="btn btn-sm btn-light border shadow-sm" title="View">
                        <i class="bi bi-eye text-primary"></i>
                    </a>
                    <button class="btn btn-sm btn-light border shadow-sm ms-1" onclick="deleteCourse(${course.courseId})" title="Delete">
                        <i class="bi bi-trash text-danger"></i>
                    </button>
                </td>
            </tr>
        `).join('');
    }

    // Hàm vẽ phân trang
    function renderPagination(currentPage, totalPages) {
        document.getElementById('paginationInfo').innerText = `Page ${currentPage + 1} of ${totalPages || 1}`;
        const container = document.getElementById('paginationButtons');
        if (totalPages <= 1) { container.innerHTML = ''; return; }

        let html = '';
        html += `<li class="page-item ${currentPage === 0 ? 'disabled' : ''}">
                    <a class="page-link" href="javascript:void(0)" onclick="loadCourseData(${currentPage - 1})">Prev</a>
                 </li>`;

        for (let i = 0; i < totalPages; i++) {
            html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                        <a class="page-link" href="javascript:void(0)" onclick="loadCourseData(${i})">${i + 1}</a>
                     </li>`;
        }

        html += `<li class="page-item ${currentPage + 1 >= totalPages ? 'disabled' : ''}">
                    <a class="page-link" href="javascript:void(0)" onclick="loadCourseData(${currentPage + 1})">Next</a>
                 </li>`;

        container.innerHTML = html;
    }

    // Hàm xóa khóa học (Kết nối với @DeleteMapping của bạn)
    function deleteCourse(id) {
        if (confirm("Are you sure you want to delete this course?")) {
            fetch(`/api/v1/courses/${id}`, {
                method: 'DELETE'
            })
            .then(response => {
                if (response.ok || response.status === 204) {
                    alert("Deleted successfully!");
                    loadCourseData(0); // Load lại bảng
                } else {
                    alert("Delete failed!");
                }
            })
            .catch(err => console.error("Error:", err));
        }
    }
</script>
</body>
</html>
