<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:with="isDashboard=true">
    <th:block th:replace="~{fragments/head :: common-head(pageTitle='Quản lý khóa học')}"></th:block>
</head>

<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Quản lý khóa học', breadcrumb='Khóa học')}"></header>

<aside id="dashSidebar" class="dash-sidebar">
    <div th:replace="~{fragments/sidebar :: dash-sidebar(activePage='courses')}"></div>
</aside>

<div id="dashOverlay" class="dash-overlay"></div>

<main class="dash-main" id="dashMain">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold text-dark m-0">Course Management</h3>
            <p class="text-muted small m-0">Manage courses, assign experts/managers & content.</p>
        </div>
        <a th:href="@{/admin/courses/new}" class="btn btn-primary shadow-sm fw-bold rounded-pill px-4" style="background-color: #3b82f6; border: none;">
            <i class="bi bi-plus-lg me-1"></i> Create New Course
        </a>
    </div>

    <div class="card mb-4 border-0 shadow-sm">
        <div class="card-body">
            <form class="row g-3" th:action="@{/admin/courses}" method="get">
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-secondary">Search</label>
                    <div class="input-group input-group-sm">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" name="keyword" class="form-control border-start-0 bg-light" placeholder="ID, Name, Code...">
                    </div>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold text-secondary">Status</label>
                    <select name="status" class="form-select form-select-sm bg-light">
                        <option value="">All Status</option>
                        <option value="active">Active</option>
                        <option value="draft">Draft</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-sm btn-primary w-100">Filter</button>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <a th:href="@{/admin/courses}" class="btn btn-sm btn-secondary w-100">Reset</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4 py-3 text-uppercase small text-muted">ID</th>
                        <th class="py-3 text-uppercase small text-muted">Course Info</th>
                        <th class="py-3 text-uppercase small text-muted">Price</th>
                        <th class="py-3 text-uppercase small text-muted">Status</th>
                        <th class="text-end pe-4 py-3 text-uppercase small text-muted">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${courses == null or #lists.isEmpty(courses)}">
                        <td colspan="5" class="text-center py-5 text-muted">
                            <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                            No courses found.
                        </td>
                    </tr>

                    <tr th:each="course : ${courses}">
                        <td class="ps-4 text-muted small" th:text="${'#' + course.courseId}">#101</td>
                        <td>
                            <div class="d-flex align-items-center">
                                <div class="bg-primary bg-opacity-10 rounded d-flex align-items-center justify-content-center me-3" style="width: 40px; height: 40px;">
                                    <i class="bi bi-journal-code text-primary fs-5"></i>
                                </div>
                                <div>
                                    <div class="fw-bold text-dark" th:text="${course.courseName ?: 'No Name'}">Course Name</div>
                                    <div class="small text-muted" th:text="${'Code: ' + (course.courseCode ?: 'N/A')}">Code</div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <div class="fw-bold text-dark">
                                <span th:text="${course.price != null ? #numbers.formatInteger(course.price, 0, 'POINT') + ' VND' : '0 VND'}">Price</span>
                            </div>
                        </td>
                        <td>
                            <span class="badge px-2 py-1 fw-semibold"
                                  th:classappend="${course.status == 'active' ? 'bg-success bg-opacity-10 text-success' : 'bg-warning bg-opacity-10 text-warning'}"
                                  th:text="${course.status ?: 'unknown'}">Status</span>
                        </td>
                        <td class="text-end pe-4">
                            <a th:href="@{/admin/courses/detail/{id}(id=${course.courseId})}"
                               class="btn btn-sm btn-light border shadow-sm" title="Xem chi tiết">
                                <i class="bi bi-eye text-primary"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card-footer bg-white py-3 border-0" th:if="${totalPages > 1}">
            <div class="d-flex justify-content-between align-items-center small text-muted">
                <span th:text="${'Page ' + (currentPage + 1) + ' of ' + totalPages}">Showing 1 of 1</span>
                <nav>
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link shadow-none" th:href="@{/admin/courses(page=${currentPage - 1})}">Prev</a>
                        </li>
                        <li class="page-item mx-1" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                            th:classappend="${i == currentPage} ? 'active'">
                            <a class="page-link shadow-none rounded"
                               th:href="@{/admin/courses(page=${i})}"
                               th:text="${i + 1}"
                               th:style="${i == currentPage} ? 'background-color: #3b82f6; border-color: #3b82f6;' : ''">1</a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                            <a class="page-link shadow-none" th:href="@{/admin/courses(page=${currentPage + 1})}">Next</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

</body>
</html>
