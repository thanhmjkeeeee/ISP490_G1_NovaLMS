<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/admin/admin-head :: admin-head}"></head>

<body>

<div th:replace="~{fragments/admin/admin-sidebar :: admin-sidebar(activePage='accounts')}"></div>

<main class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold m-0" style="color: #223a58;">Account Management</h3>
            <p class="text-muted small m-0">Manage system users and their roles.</p>
        </div>
        <div>
            <button class="btn btn-sm fw-bold shadow-sm d-flex align-items-center rounded-pill px-3 text-white" style="background-color: #136ad5;">
                <i class="bi bi-person-plus-fill me-1"></i> Add Account
            </button>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">User</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Joined Date</th>
                        <th class="text-end pe-4">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td class="ps-4">
                            <div class="d-flex align-items-center">
                                <img th:src="@{/assets/img/testimonials/testimonials-1.jpg}" class="account-avatar me-3" alt="User">
                                <div>
                                    <div class="fw-bold">John Doe</div>
                                    <small class="text-muted">john@example.com</small>
                                </div>
                            </div>
                        </td>
                        <td><span class="badge bg-primary bg-opacity-10 text-primary px-3">Student</span></td>
                        <td><span class="status-badge bg-success bg-opacity-10 text-success">Active</span></td>
                        <td class="text-muted small">Oct 12, 2023</td>
                        <td class="text-end pe-4">
                            <i class="bi bi-pencil-square text-primary me-2 action-btn"></i>
                            <i class="bi bi-trash text-danger action-btn"></i>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/admin/admin-footer :: admin-footer}"></div>

</body>
</html>
