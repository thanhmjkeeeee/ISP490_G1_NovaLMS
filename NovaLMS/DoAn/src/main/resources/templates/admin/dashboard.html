<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:with="isDashboard=true">

<!-- 1. Gọi Head Fragment (Mới) -->
<head th:replace="~{fragments/head :: common-head(pageTitle='Admin Dashboard')}"></head>

<!-- Thêm class chuẩn cho thẻ body -->
<body class="dashboard-body">

<!-- 2. Gọi Header (Topbar) -->
<header th:replace="~{fragments/header :: dash-header(pageTitle='Dashboard Overview', breadcrumb='Admin')}"></header>

<!-- 3. Gọi Sidebar & Overlay (Mới) -->
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='dashboard')}"></aside>
<div th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<!-- 4. Thẻ main đổi thành class dash-main và thêm id -->
<main class="dash-main d-flex flex-column" id="dashMain">

    <!-- ========================================== -->
    <!-- GIỮ NGUYÊN 100% NỘI DUNG CODE GỐC CỦA BẠN  -->
    <!-- ========================================== -->
    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h3 class="fw-bold m-0" style="color: #223a58;">Dashboard Overview</h3>
            <p class="text-muted small m-0">Welcome back, Admin.</p>
        </div>
        <div>
            <a th:href="@{/admin/courses/new}" class="btn btn-sm fw-bold shadow-sm d-flex align-items-center rounded-pill px-3 text-white" style="background-color: #136ad5;">
                <i class="bi bi-plus-lg me-1"></i> New Course
            </a>
        </div>
    </div>

    <div class="row g-4 mb-4">
        <!-- Card 1: Học viên -->
        <div class="col-xl-3 col-md-6">
            <div class="card border-0 shadow-sm h-100 p-3 rounded-4" style="background: linear-gradient(135deg, rgba(19, 106, 213, 0.05) 0%, rgba(19, 106, 213, 0.02) 100%);">
                <div class="d-flex align-items-center">
                    <div class="rounded-circle d-flex align-items-center justify-content-center me-3 shadow-sm"
                         style="width:50px; height:50px; font-size:24px; background-color: #136ad5; color: #fff;">
                        <i class="bi bi-people-fill"></i>
                    </div>
                    <div>
                        <h6 class="text-muted small text-uppercase fw-bold mb-1">Học viên</h6>
                        <h4 class="fw-bold mb-0 text-dark" th:text="${studentCount != null ? studentCount : 0}">0</h4>
                    </div>
                </div>
            </div>
        </div>

        <!-- Card 2: Khóa học -->
        <div class="col-xl-3 col-md-6">
            <div class="card border-0 shadow-sm h-100 p-3 rounded-4" style="background: linear-gradient(135deg, rgba(25, 135, 84, 0.05) 0%, rgba(25, 135, 84, 0.02) 100%);">
                <div class="d-flex align-items-center">
                    <div class="rounded-circle d-flex align-items-center justify-content-center me-3 shadow-sm" 
                         style="width:50px; height:50px; font-size:24px; background-color: #198754; color: #fff;">
                        <i class="bi bi-journal-bookmark-fill"></i>
                    </div>
                    <div>
                        <h6 class="text-muted small text-uppercase fw-bold mb-1">Khóa học</h6>
                        <h4 class="fw-bold mb-0 text-dark" th:text="${courseCount != null ? courseCount : 0}">0</h4>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Card 3: Giảng viên -->
        <div class="col-xl-3 col-md-6">
            <div class="card border-0 shadow-sm h-100 p-3 rounded-4" style="background: linear-gradient(135deg, rgba(253, 126, 20, 0.05) 0%, rgba(253, 126, 20, 0.02) 100%);">
                <div class="d-flex align-items-center">
                    <div class="rounded-circle d-flex align-items-center justify-content-center me-3 shadow-sm" 
                         style="width:50px; height:50px; font-size:24px; background-color: #fd7e14; color: #fff;">
                        <i class="bi bi-person-video3"></i>
                    </div>
                    <div>
                        <h6 class="text-muted small text-uppercase fw-bold mb-1">Giảng viên</h6>
                        <h4 class="fw-bold mb-0 text-dark" th:text="${teacherCount != null ? teacherCount : 0}">0</h4>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Card 4: Lượt đăng ký -->
        <div class="col-xl-3 col-md-6">
            <div class="card border-0 shadow-sm h-100 p-3 rounded-4" style="background: linear-gradient(135deg, rgba(220, 53, 69, 0.05) 0%, rgba(220, 53, 69, 0.02) 100%);">
                <div class="d-flex align-items-center">
                    <div class="rounded-circle d-flex align-items-center justify-content-center me-3 shadow-sm" 
                         style="width:50px; height:50px; font-size:24px; background-color: #dc3545; color: #fff;">
                        <i class="bi bi-ui-checks"></i>
                    </div>
                    <div>
                        <h6 class="text-muted small text-uppercase fw-bold mb-1">Lượt đăng ký</h6>
                        <h4 class="fw-bold mb-0 text-dark" th:text="${registrationCount != null ? registrationCount : 0}">0</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Thêm mb-auto để đẩy các thành phần nếu có xuống đáy -->
    <div class="card border-0 shadow-sm mb-auto">
        <div class="card-header bg-white py-3 border-bottom">
            <h6 class="m-0 fw-bold" style="color: #223a58;">New Registrations</h6>
        </div>
        <div class="card-body">
            <p class="text-muted text-center py-4">Table content here...</p>
        </div>
    </div>

</main>

<!-- 5. Gọi Script Components thay cho admin-footer cũ -->
<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

</body>
</html>
