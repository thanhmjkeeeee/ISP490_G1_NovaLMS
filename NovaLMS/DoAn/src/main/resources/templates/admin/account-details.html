<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:with="isDashboard=true">
    <th:block th:replace="~{fragments/head :: common-head(pageTitle='Chi tiết tài khoản')}"></th:block>
</head>

<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Hồ sơ người dùng', breadcrumb='Tài khoản / Chi tiết')}"></header>

<aside id="dashSidebar" class="dash-sidebar">
    <div th:replace="~{fragments/sidebar :: dash-sidebar(activePage='users')}"></div>
</aside>

<div id="dashOverlay" class="dash-overlay"></div>

<main class="dash-main" id="dashMain">
    <div class="container-fluid pt-4">
        <div class="mb-4">
            <a th:href="@{/admin/list}" class="btn btn-sm btn-light border rounded-pill px-3 shadow-sm">
                <i class="bi bi-arrow-left me-1"></i> Quay lại danh sách
            </a>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm rounded-4 text-center py-5 px-4 h-100">
                    <div class="avatar-wrapper mb-3 mx-auto bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center"
                         style="width: 110px; height: 110px;">
                        <i class="bi bi-person-circle text-primary display-3"></i>
                    </div>
                    <h4 class="fw-bold text-dark mb-1" id="sideFullName">Loading...</h4>
                    <p class="text-muted small mb-4" id="sideRole">Vui lòng đợi...</p>

                    <div id="sideStatus">
                    </div>

                    <hr class="my-4 opacity-50">

                    <div class="text-start">
                        <div class="d-flex justify-content-between mb-2 small">
                            <span class="text-muted">ID người dùng:</span>
                            <span class="fw-bold" id="sideUserId">#0</span>
                        </div>
                        <div class="d-flex justify-content-between mb-2 small">
                            <span class="text-muted">Tham gia từ:</span>
                            <span class="fw-bold">2024</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card border-0 shadow-sm rounded-4 overflow-hidden h-100">
                    <div class="card-header bg-white border-bottom py-3 px-4">
                        <h5 class="fw-bold m-0 text-dark">Chỉnh sửa thông tin</h5>
                    </div>

                    <div class="card-body p-4 p-md-5">
                        <form id="accountForm">
                            <input type="hidden" id="userId">

                            <div class="row g-4">
                                <div class="col-md-12">
                                    <label class="form-label small fw-bold text-secondary">HỌ VÀ TÊN <span class="text-danger">*</span></label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                                        <input type="text" id="fullName" class="form-control border-start-0 bg-light shadow-none" required>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-secondary">EMAIL (CỐ ĐỊNH)</label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
                                        <input type="email" id="email" class="form-control border-start-0 bg-light shadow-none text-muted" readonly>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-secondary">SỐ ĐIỆN THOẠI</label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-telephone"></i></span>
                                        <input type="text" id="mobile" class="form-control border-start-0 bg-light shadow-none">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-secondary">VAI TRÒ HỆ THỐNG</label>
                                    <select id="roleId" class="form-select form-select-sm bg-light shadow-none" required>
                                        <option value="201">Admin</option>
                                        <option value="202">Manager</option>
                                        <option value="203">Expert</option>
                                        <option value="204">Teacher</option>
                                        <option value="205">Student</option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-secondary">TRẠNG THÁI TÀI KHOẢN</label>
                                    <select id="status" class="form-select form-select-sm bg-light shadow-none">
                                        <option value="Active">Đang hoạt động</option>
                                        <option value="Inactive">Tạm khóa</option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-secondary">MẬT KHẨU MỚI <span class="text-muted">(Để trống nếu không đổi)</span></label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                                        <input type="password" id="password" class="form-control border-start-0 bg-light shadow-none" placeholder="Nhập mật khẩu mới">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-secondary">XÁC NHẬN MẬT KHẨU</label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock-fill"></i></span>
                                        <input type="password" id="confirmPassword" class="form-control border-start-0 bg-light shadow-none" placeholder="Nhập lại mật khẩu">
                                    </div>
                                </div>
                            </div>

                            <div class="mt-5 pt-3 border-top d-flex justify-content-end gap-2">
                                <a th:href="@{/admin/list}" class="btn btn-sm btn-light rounded-pill px-4 border">Hủy bỏ</a>
                                <button type="submit" class="btn btn-sm btn-primary rounded-pill px-5 shadow-sm fw-bold">
                                    Lưu thay đổi
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // 1. Lấy ID từ URL
        const path = window.location.pathname;
        const userId = path.split('/').pop();

        if (userId && !isNaN(userId)) {
            // 2. Load dữ liệu bằng AJAX (Fetch) giống trang Course
            fetch(`/api/v1/accounts/${userId}`)
                .then(res => res.json())
                .then(res => {
                    if (res.status === 200) {
                        const u = res.data;
                        // Đổ vào form
                        document.getElementById('userId').value = u.userId;
                        document.getElementById('fullName').value = u.fullName;
                        document.getElementById('email').value = u.email;
                        document.getElementById('mobile').value = u.mobile;
                        document.getElementById('roleId').value = u.roleId;
                        document.getElementById('status').value = u.status;

                        // Đổ vào thẻ Profile bên trái
                        document.getElementById('sideFullName').innerText = u.fullName;
                        document.getElementById('sideRole').innerText = u.roleName || 'Người dùng';
                        document.getElementById('sideUserId').innerText = '#' + u.userId;

                        const statusHTML = u.status === 'Active'
                            ? `<span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-10 px-3 py-2 rounded-pill">Hoạt động</span>`
                            : `<span class="badge bg-danger bg-opacity-10 text-danger border border-danger border-opacity-10 px-3 py-2 rounded-pill">Bị khóa</span>`;
                        document.getElementById('sideStatus').innerHTML = statusHTML;
                    }
                })
                .catch(err => console.error("Error loading account:", err));
        }

        // 3. Xử lý Update bằng AJAX (PUT)
        document.getElementById('accountForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validate password if provided
            if (password || confirmPassword) {
                if (password.length < 6) {
                    alert("Mật khẩu phải có ít nhất 6 ký tự!");
                    return;
                }
                if (!/[A-Z]/.test(password)) {
                    alert("Mật khẩu phải có ít nhất 1 ký tự viết hoa!");
                    return;
                }
                if (!/[0-9]/.test(password)) {
                    alert("Mật khẩu phải có ít nhất 1 ký tự số!");
                    return;
                }
                if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)) {
                    alert("Mật khẩu phải có ít nhất 1 ký tự đặc biệt!");
                    return;
                }
                if (password !== confirmPassword) {
                    alert("Mật khẩu xác nhận không khớp!");
                    return;
                }
            }

            const id = document.getElementById('userId').value;
            const payload = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                mobile: document.getElementById('mobile').value,
                roleId: parseInt(document.getElementById('roleId').value),
                status: document.getElementById('status').value
            };

            // Only add password if user entered new password
            if (password) {
                payload.password = password;
            }

            fetch(`/api/v1/accounts/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(res => {
                if (res.status === 200 || res.status === 202) {
                    alert("Cập nhật thông tin thành công!");
                    location.reload(); // Reload để cập nhật Sidebar thông tin mới
                } else {
                    alert("Lỗi: " + res.message);
                }
            })
            .catch(err => alert("Không thể kết nối máy chủ!"));
        });
    });
</script>
</body>
</html>
