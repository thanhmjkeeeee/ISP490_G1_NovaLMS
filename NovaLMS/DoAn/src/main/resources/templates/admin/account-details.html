<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/admin/admin-head :: admin-head}"></head>

<body>

<div th:replace="~{fragments/admin/admin-sidebar :: admin-sidebar(activePage='accounts')}"></div>

<main class="main-content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <a th:href="@{/admin/accounts}" class="text-decoration-none text-muted small">
                <i class="bi bi-arrow-left"></i> Back to List
            </a>
            <h3 class="fw-bold text-dark m-0 mt-1">Account Details</h3>
        </div>
    </div>

    <section id="account-details" class="section">
        <div class="container-fluid p-0">
            <div class="row gx-4">

                <div class="col-lg-4 mb-4">
                    <div class="card shadow-sm border-0 text-center p-4 h-100">
                        <div class="card-body">
                            <div class="mb-3 position-relative d-inline-block">
                                <img th:src="@{/assets/img/testimonials/testimonials-1.jpg}" alt="Profile"
                                     class="rounded-circle img-fluid bg-secondary"
                                     style="width: 150px; height: 150px; object-fit: cover;">
                            </div>
                            <h4 class="mt-2 text-dark fw-bold">John Doe</h4>
                            <p class="text-muted">Student</p>
                            <div class="d-grid gap-2 mt-3">
                                <p class="small text-muted mb-0">User ID: 101</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="card shadow-sm border-0">
                        <div class="card-header bg-white border-0 py-3">
                            <h5 class="mb-0 text-primary fw-bold">User Information</h5>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/admin/accounts/save}" method="POST">

                                <div class="mb-3">
                                    <label class="form-label fw-bold small text-secondary">Full Name</label>
                                    <input type="text" class="form-control" name="full_name" value="John Doe">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold small text-secondary">Email Address</label>
                                    <input type="email" class="form-control" name="email" value="john@example.com">
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold small text-secondary">Mobile</label>
                                        <input type="tel" class="form-control" name="mobile" value="0901234567">
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label fw-bold small text-secondary">Role</label>
                                        <select class="form-select" name="role_id">
                                            <option value="5" selected>Student</option>
                                            <option value="6">Instructor</option>
                                            <option value="7">Admin</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold small text-secondary">Note</label>
                                    <textarea class="form-control" name="note" rows="3">Student requested course change.</textarea>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold small text-secondary">Status</label>
                                        <select class="form-select" name="status">
                                            <option value="Active" selected>Active</option>
                                            <option value="Blocked">Blocked</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold small text-secondary">Last Login</label>
                                        <input type="text" class="form-control bg-light" value="2023-10-25 14:30" readonly>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label fw-bold small text-secondary">Password</label>
                                    <input type="password" class="form-control" placeholder="New password...">
                                </div>

                                <div class="d-flex justify-content-end gap-2">
                                    <a th:href="@{/admin/accounts}" class="btn btn-secondary text-white">Cancel</a>
                                    <button type="submit" class="btn btn-primary" style="background-color: var(--sidebar-bg-color); border:none;">
                                        Save Changes
                                    </button>
                                </div>

                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

</main>

<div th:replace="~{fragments/admin/admin-footer :: admin-footer}"></div>

</body>
</html>
