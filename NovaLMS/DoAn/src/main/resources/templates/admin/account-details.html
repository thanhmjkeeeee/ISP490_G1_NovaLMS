<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: common-head(pageTitle='Chi tiết tài khoản')}"></head>

<body class="dashboard-body">
<header th:replace="~{fragments/header :: dash-header(pageTitle='Thông tin người dùng', breadcrumb='Tài khoản / Chi tiết')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='users')}"></aside>
<div th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<main class="dash-main" id="dashMain">
    <div class="container-fluid">
        <div class="mb-3">
            <a th:href="@{/admin/list}" class="text-decoration-none text-muted">
                <i class="bi bi-arrow-left"></i> Quay lại danh sách
            </a>
        </div>

        <div class="row">
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm rounded-4 mb-4">
                    <div class="card-body text-center py-5">
                        <div class="avatar-xl mb-3 mx-auto bg-light rounded-circle d-flex align-items-center justify-content-center" style="width: 100px; height: 100px;">
                            <i class="bi bi-person-fill text-secondary fs-1"></i>
                        </div>
                        <h5 class="fw-bold mb-1" th:text="${account.fullName}">Họ và Tên</h5>
                        <p class="text-muted small mb-3" th:text="${account.roleName}">Vai trò</p>

                        <span th:class="${account.status == 'Active' ? 'badge bg-success-soft text-success' : 'badge bg-danger-soft text-danger'}"
                              th:text="${account.status == 'Active' ? 'Hoạt động' : 'Đang khóa'}">
                            </span>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-header bg-white border-0 pt-4 ps-4">
                        <h5 class="fw-bold m-0">Hồ sơ người dùng</h5>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/admin/accounts/save}" th:object="${account}" method="POST">
                            <input type="hidden" th:field="*{userId}">

                            <div class="row g-3">
                                <div class="col-md-12">
                                    <label class="form-label fw-semibold">Họ và tên</label>
                                    <input type="text" th:field="*{fullName}" class="form-control rounded-3" required>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Email</label>
                                    <input type="email" th:field="*{email}" class="form-control rounded-3" readonly>
                                    <small class="text-muted italic">Email không thể thay đổi</small>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Số điện thoại</label>
                                    <input type="text" th:field="*{mobile}" class="form-control rounded-3">
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Vai trò hệ thống</label>
                                    <select th:field="*{roleId}" class="form-select rounded-3">
                                        <option th:value="1" th:text="Admin" th:selected="${account.roleId == 1}"></option>
                                        <option th:value="2" th:text="Manager" th:selected="${account.roleId == 2}"></option>
                                        <option th:value="3" th:text="Teacher" th:selected="${account.roleId == 3}"></option>
                                        <option th:value="4" th:text="Student" th:selected="${account.roleId == 4}"></option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Trạng thái hiện tại</label>
                                    <input type="text" th:field="*{status}" class="form-control bg-light" readonly>
                                </div>
                            </div>

                            <div class="mt-4 d-flex justify-content-end gap-2">
                                <button type="button" class="btn btn-outline-warning rounded-pill px-4"
                                        onclick="document.getElementById('toggleForm').submit();">
                                    <i class="bi bi-shield-lock me-1"></i> Đổi trạng thái
                                </button>
                                <button type="submit" class="btn btn-primary rounded-pill px-4">
                                    <i class="bi bi-check-lg me-1"></i> Cập nhật thông tin
                                </button>
                            </div>
                        </form>

                        <form id="toggleForm" th:action="@{/admin/toggle/{id}(id=${account.userId})}" method="POST" style="display: none;"></form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
</body>
</html>
