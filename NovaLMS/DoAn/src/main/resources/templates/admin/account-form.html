<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:with="isDashboard=true">
  <th:block th:replace="~{fragments/head :: common-head(pageTitle='Thêm tài khoản mới')}"></th:block>
</head>

<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Thêm tài khoản', breadcrumb='Tài khoản / Tạo mới')}"></header>

<aside id="dashSidebar" class="dash-sidebar">
  <div th:replace="~{fragments/sidebar :: dash-sidebar(activePage='users')}"></div>
</aside>

<div id="dashOverlay" class="dash-overlay"></div>

<main class="dash-main" id="dashMain">
  <div class="container-fluid pt-4">
    <div class="row justify-content-center">
      <div class="col-lg-10 col-xl-9">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">

          <div class="card-header bg-white border-bottom py-3 px-4 d-flex justify-content-between align-items-center">
            <div>
              <h5 class="fw-bold m-0 text-dark">Tạo tài khoản hệ thống</h5>
              <p class="text-muted small mb-0">Vui lòng nhập chính xác thông tin để cấp quyền truy cập.</p>
            </div>
            <a th:href="@{/admin/list}" class="btn btn-sm btn-light border rounded-pill px-3 shadow-sm">
              <i class="bi bi-arrow-left me-1"></i> Quay lại
            </a>
          </div>

          <div class="card-body p-4 p-md-5">
            <form id="addAccountForm">
              <div class="mb-5">
                <h6 class="fw-bold text-primary mb-3 d-flex align-items-center">
                  <i class="bi bi-person-badge-fill me-2"></i>Thông tin cá nhân
                </h6>
                <div class="row g-4">
                  <div class="col-md-12">
                    <label class="form-label small fw-bold text-secondary text-uppercase">Họ và tên <span class="text-danger">*</span></label>
                    <div class="input-group input-group-sm">
                      <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                      <input type="text" id="fullName" class="form-control bg-light border-start-0 shadow-none" placeholder="Ví dụ: Nguyễn Văn A" required>
                    </div>
                    <div id="fullNameError" class="text-danger small mt-1"></div>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small fw-bold text-secondary text-uppercase">Địa chỉ Email <span class="text-danger">*</span></label>
                    <div class="input-group input-group-sm">
                      <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
                      <input type="email" id="email" class="form-control bg-light border-start-0 shadow-none" placeholder="name@example.com" required>
                    </div>
                    <div id="emailError" class="text-danger small mt-1"></div>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small fw-bold text-secondary text-uppercase">Số điện thoại <span class="text-danger">*</span></label>
                    <div class="input-group input-group-sm">
                      <span class="input-group-text bg-light border-end-0"><i class="bi bi-telephone"></i></span>
                      <input type="text" id="mobile" class="form-control bg-light border-start-0 shadow-none" placeholder="09xxxxxxxx" required>
                    </div>
                    <div id="mobileError" class="text-danger small mt-1"></div>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small fw-bold text-secondary text-uppercase">Mật khẩu <span class="text-danger">*</span></label>
                    <div class="input-group input-group-sm">
                      <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                      <input type="password" id="password" class="form-control bg-light border-start-0 shadow-none" placeholder="Nhập mật khẩu" required>
                    </div>
                    <div id="passwordError" class="text-danger small mt-1"></div>
                    <small class="text-muted">Tối thiểu 6 ký tự, 1 chữ hoa, 1 số, 1 ký tự đặc biệt</small>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small fw-bold text-secondary text-uppercase">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                    <div class="input-group input-group-sm">
                      <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock-fill"></i></span>
                      <input type="password" id="confirmPassword" class="form-control bg-light border-start-0 shadow-none" placeholder="Nhập lại mật khẩu" required>
                    </div>
                    <div id="confirmPasswordError" class="text-danger small mt-1"></div>
                  </div>
                </div>
              </div>

              <div class="mb-4">
                <h6 class="fw-bold text-primary mb-3 d-flex align-items-center">
                  <i class="bi bi-shield-check me-2"></i>Phân quyền & Bảo mật
                </h6>
                <div class="row g-4">
                  <div class="col-md-6">
                    <label class="form-label small fw-bold text-secondary text-uppercase">Vai trò truy cập <span class="text-danger">*</span></label>
                    <select id="roleId" class="form-select form-select-sm bg-light shadow-none" required>
                      <option value="" selected disabled>-- Chọn vai trò --</option>
                      <option value="1">Quản trị viên (Admin)</option>
                      <option value="16">Quản lý (Manager)</option>
                      <option value="3">Chuyên gia (Expert)</option>
                      <option value="2">Giảng viên (Teacher)</option>
                      <option value="4">Học viên (Student)</option>
                    </select>
                    <div id="roleIdError" class="text-danger small mt-1"></div>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small fw-bold text-secondary text-uppercase">Trạng thái mặc định</label>
                    <div class="input-group input-group-sm">
                      <span class="input-group-text bg-light border-end-0"><i class="bi bi-toggle-on"></i></span>
                      <input type="text" class="form-control bg-light border-start-0 text-success fw-bold" value="Đang hoạt động" readonly>
                    </div>
                  </div>
                </div>
              </div>

              <div class="mt-5 pt-4 border-top d-flex justify-content-start gap-2">
                <button type="reset" class="btn btn-sm btn-light rounded-pill px-4 border shadow-sm">Xóa trắng</button>
                <button type="submit" class="btn btn-sm btn-primary rounded-pill px-5 shadow-sm fw-bold">
                  <i class="bi bi-plus-circle me-1"></i> Xác nhận tạo
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>

<script>
  document.getElementById('addAccountForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const setError = (fieldId, message) => {
          const errorEl = document.getElementById(fieldId + 'Error');
          if (errorEl) errorEl.textContent = message || '';
      };

      ['fullName', 'email', 'mobile', 'password', 'confirmPassword', 'roleId'].forEach(id => setError(id, ''));

      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const mobile = document.getElementById('mobile').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const roleIdValue = document.getElementById('roleId').value;

      let hasError = false;

      if (!fullName || fullName.length < 2) {
          setError('fullName', 'Tên phải có ít nhất 2 ký tự.');
          hasError = true;
      } else if (!/^[\p{L}\s'.-]+$/u.test(fullName)) {
          setError('fullName', 'Tên chỉ được chứa chữ cái và khoảng trắng.');
          hasError = true;
      }

      if (!email) {
          setError('email', 'Vui lòng nhập email.');
          hasError = true;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          setError('email', 'Email không đúng định dạng.');
          hasError = true;
      }

      if (!mobile) {
          setError('mobile', 'Vui lòng nhập số điện thoại.');
          hasError = true;
      } else if (!/^(0|\+84)\d{9,10}$/.test(mobile)) {
          setError('mobile', 'Số điện thoại không đúng định dạng Việt Nam.');
          hasError = true;
      }

      if (password.length < 6) {
          setError('password', 'Mật khẩu phải có ít nhất 6 ký tự.');
          hasError = true;
      }
      if (!/[A-Z]/.test(password)) {
          setError('password', 'Mật khẩu phải có ít nhất 1 ký tự viết hoa.');
          hasError = true;
      }
      if (!/[0-9]/.test(password)) {
          setError('password', 'Mật khẩu phải có ít nhất 1 ký tự số.');
          hasError = true;
      }
      if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)) {
          setError('password', 'Mật khẩu phải có ít nhất 1 ký tự đặc biệt.');
          hasError = true;
      }
      if (password !== confirmPassword) {
          setError('confirmPassword', 'Mật khẩu xác nhận không khớp.');
          hasError = true;
      }

      if (!roleIdValue) {
          setError('roleId', 'Vui lòng chọn vai trò.');
          hasError = true;
      }

      if (hasError) {
          return;
      }

      // Thu thập dữ liệu
      const payload = {
          fullName: fullName,
          email: email,
          mobile: mobile,
          password: password,
          roleId: parseInt(roleIdValue),
          status: "Active"
      };

      // Gửi AJAX tới API (Giống logic trang list của bạn)
      fetch('/api/v1/accounts/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(res => {
          if (res.status === 201 || res.status === 200) {
              alert("Tạo tài khoản thành công!");
              window.location.href = "/admin/list";
          } else {
              setError('fullName', res.message || 'Tạo tài khoản thất bại.');
          }
      })
      .catch(err => {
          console.error("Error:", err);
          setError('fullName', 'Không thể kết nối máy chủ!');
      });
  });
</script>
</body>
</html>
