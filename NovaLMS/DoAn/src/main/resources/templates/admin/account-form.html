<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:with="isDashboard=true">
  <th:block th:replace="~{fragments/head :: common-head(pageTitle='Thêm tài khoản mới')}"></th:block>
</head>

<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Thêm tài khoản', breadcrumb='Tài khoản / Tạo mới')}"></header>

<aside id="dashSidebar" class="dash-sidebar">
  <div th:replace="~{fragments/sidebar :: dash-sidebar(activePage='users')}"></div>
</aside>

<div id="dashOverlay" class="dash-overlay"></div>

<main class="dash-main" id="dashMain">
  <div class="container-fluid pt-4">
    <div class="row justify-content-center">
      <div class="col-lg-10 col-xl-9">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">

          <div class="card-header bg-white border-bottom py-3 px-4 d-flex justify-content-between align-items-center">
            <div>
              <h5 class="fw-bold m-0 text-dark">Tạo tài khoản hệ thống</h5>
              <p class="text-muted small mb-0">Vui lòng nhập chính xác thông tin để cấp quyền truy cập.</p>
            </div>
            <a th:href="@{/admin/list}" class="btn btn-sm btn-light border rounded-pill px-3 shadow-sm">
              <i class="bi bi-arrow-left me-1"></i> Quay lại
            </a>
          </div>

          <div class="card-body p-4 p-md-5">
            <form id="addAccountForm">
              <div class="mb-5">
                <h6 class="fw-bold text-primary mb-3 d-flex align-items-center">
                  <i class="bi bi-person-badge-fill me-2"></i>Thông tin cá nhân
                </h6>
                <div class="row g-4">
                  <div class="col-md-12">
                    <label class="form-label small fw-bold text-secondary text-uppercase">Họ và tên <span class="text-danger">*</span></label>
                    <div class="input-group input-group-sm">
                      <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                      <input type="text" id="fullName" class="form-control bg-light border-start-0 shadow-none" placeholder="Ví dụ: Nguyễn Văn A" required>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small fw-bold text-secondary text-uppercase">Địa chỉ Email <span class="text-danger">*</span></label>
                    <div class="input-group input-group-sm">
                      <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
                      <input type="email" id="email" class="form-control bg-light border-start-0 shadow-none" placeholder="name@example.com" required>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small fw-bold text-secondary text-uppercase">Số điện thoại</label>
                    <div class="input-group input-group-sm">
                      <span class="input-group-text bg-light border-end-0"><i class="bi bi-telephone"></i></span>
                      <input type="text" id="mobile" class="form-control bg-light border-start-0 shadow-none" placeholder="09xxxxxxxx">
                    </div>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small fw-bold text-secondary text-uppercase">Mật khẩu <span class="text-danger">*</span></label>
                    <div class="input-group input-group-sm">
                      <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                      <input type="password" id="password" class="form-control bg-light border-start-0 shadow-none" placeholder="Nhập mật khẩu" required>
                    </div>
                    <small class="text-muted">Tối thiểu 6 ký tự, 1 chữ hoa, 1 số, 1 ký tự đặc biệt</small>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small fw-bold text-secondary text-uppercase">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                    <div class="input-group input-group-sm">
                      <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock-fill"></i></span>
                      <input type="password" id="confirmPassword" class="form-control bg-light border-start-0 shadow-none" placeholder="Nhập lại mật khẩu" required>
                    </div>
                  </div>
                </div>
              </div>

              <div class="mb-4">
                <h6 class="fw-bold text-primary mb-3 d-flex align-items-center">
                  <i class="bi bi-shield-check me-2"></i>Phân quyền & Bảo mật
                </h6>
                <div class="row g-4">
                  <div class="col-md-6">
                    <label class="form-label small fw-bold text-secondary text-uppercase">Vai trò truy cập</label>
                    <select id="roleId" class="form-select form-select-sm bg-light shadow-none" required>
                      <option value="" selected disabled>-- Chọn vai trò --</option>
                      <option value="1">Quản trị viên (Admin)</option>
                      <option value="2">Quản lý (Manager)</option>
                      <option value="3">Giảng viên (Teacher)</option>
                      <option value="4">Học viên (Student)</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small fw-bold text-secondary text-uppercase">Trạng thái mặc định</label>
                    <div class="input-group input-group-sm">
                      <span class="input-group-text bg-light border-end-0"><i class="bi bi-toggle-on"></i></span>
                      <input type="text" class="form-control bg-light border-start-0 text-success fw-bold" value="Active" readonly>
                    </div>
                  </div>
                </div>
              </div>

              <div class="mt-5 pt-4 border-top d-flex justify-content-end gap-2">
                <button type="reset" class="btn btn-sm btn-light rounded-pill px-4 border shadow-sm">Xóa trắng</button>
                <button type="submit" class="btn btn-sm btn-primary rounded-pill px-5 shadow-sm fw-bold">
                  <i class="bi bi-plus-circle me-1"></i> Xác nhận tạo
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>

<script>
  document.getElementById('addAccountForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Validate password
      if (password.length < 6) {
          alert("Mật khẩu phải có ít nhất 6 ký tự!");
          return;
      }
      if (!/[A-Z]/.test(password)) {
          alert("Mật khẩu phải có ít nhất 1 ký tự viết hoa!");
          return;
      }
      if (!/[0-9]/.test(password)) {
          alert("Mật khẩu phải có ít nhất 1 ký tự số!");
          return;
      }
      if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)) {
          alert("Mật khẩu phải có ít nhất 1 ký tự đặc biệt!");
          return;
      }
      if (password !== confirmPassword) {
          alert("Mật khẩu xác nhận không khớp!");
          return;
      }

      // Thu thập dữ liệu
      const payload = {
          fullName: document.getElementById('fullName').value,
          email: document.getElementById('email').value,
          mobile: document.getElementById('mobile').value,
          password: password,
          roleId: parseInt(document.getElementById('roleId').value),
          status: "Active"
      };

      // Gửi AJAX tới API (Giống logic trang list của bạn)
      fetch('/api/v1/accounts/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(res => {
          if (res.status === 201 || res.status === 200) {
              alert("Tạo tài khoản thành công!");
              window.location.href = "/admin/list";
          } else {
              alert("Lỗi: " + res.message);
          }
      })
      .catch(err => {
          console.error("Error:", err);
          alert("Không thể kết nối máy chủ!");
      });
  });
</script>
</body>
</html>
