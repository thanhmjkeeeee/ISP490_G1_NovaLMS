<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:with="isDashboard=true">
  <th:block th:replace="~{fragments/head :: common-head(pageTitle='Thêm khóa học mới')}"></th:block>
  <style>
    .searchable-dropdown {
      position: relative;
    }
    .dropdown-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      z-index: 1050;
      background: #fff;
      max-height: 200px;
      overflow-y: auto;
      display: none;
      border-radius: 8px;
      margin-top: 4px;
    }
    .dropdown-results.show {
      display: block;
    }
    .dropdown-item {
      padding: 10px 15px;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 0.9rem;
    }
    .dropdown-item:hover {
      background-color: #f1f5f9;
    }
    .dropdown-item.active {
      background-color: #3b82f6;
      color: #fff;
    }
  </style>
</head>
<html class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Thêm khóa học', breadcrumb='Khóa học / Tạo mới')}"></header>

<aside id="dashSidebar" class="dash-sidebar">
  <div th:replace="~{fragments/sidebar :: dash-sidebar(activePage='courses')}"></div>
</aside>

<main class="dash-main" id="dashMain">
  <div class="container-fluid">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
            <h5 class="fw-bold m-0">Thông tin khóa học</h5>
            <a th:href="@{/admin/courses}" class="btn btn-sm btn-outline-secondary">Quay lại</a>
          </div>

          <div class="card-body p-4">
            <form id="courseForm" class="row g-3">
              <input type="hidden" id="courseId">

              <div class="col-md-8">
                <label class="form-label fw-bold small">Tên khóa học <span class="text-danger">*</span></label>
                <input type="text" id="courseName" class="form-control" placeholder="Nhập tên khóa học..." required>
                <div id="courseNameError" class="text-danger small mt-1"></div>
              </div>

              <div class="col-md-4">
                <label class="form-label fw-bold small">Trạng thái <span class="text-danger">*</span></label>
                <select id="status" class="form-select" required>
                  <option value="active">Hoạt động</option>
                  <option value="draft">Bản nháp</option>
                  <option value="inactive">Tạm dừng</option>
                </select>
                <div id="statusError" class="text-danger small mt-1"></div>
              </div>

              <div class="col-md-4">
                <label class="form-label fw-bold small">Chương trình (Category) <span class="text-danger">*</span></label>
                <div class="searchable-dropdown" id="categoryContainer">
                  <input type="text" id="categorySearch" class="form-control" placeholder="Tìm chương trình..." autocomplete="off">
                  <input type="hidden" id="categoryId">
                  <div class="dropdown-results shadow-sm border" id="categoryResults"></div>
                </div>
                <div id="categoryIdError" class="text-danger small mt-1"></div>
              </div>

              <div class="col-md-4">
                <label class="form-label fw-bold small">&nbsp;</label>
                <button type="button" class="btn btn-outline-primary w-100" onclick="showAddCategoryModal()">
                  <i class="bi bi-plus-lg me-1"></i> Thêm chương trình
                </button>
              </div>

              <div class="col-md-4">
                <label class="form-label fw-bold small">Chuyên gia (Expert) <span class="text-danger">*</span></label>
                <div class="searchable-dropdown" id="expertContainer">
                  <input type="text" id="expertSearch" class="form-control" placeholder="Tìm chuyên gia..." autocomplete="off">
                  <input type="hidden" id="expertId">
                  <div class="dropdown-results shadow-sm border" id="expertResults"></div>
                </div>
                <div id="expertIdError" class="text-danger small mt-1"></div>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-bold small">Học phí (VND) <span class="text-danger">*</span></label>
                <input type="number" id="price" class="form-control" placeholder="0" required>
                <div id="priceError" class="text-danger small mt-1"></div>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-bold small">Phần trăm giảm (%) <span class="text-danger">*</span></label>
                <input type="number" id="sale" class="form-control" placeholder="0" value="0" min="0" max="100" required>
                <div id="saleError" class="text-danger small mt-1"></div>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-bold small">Số buổi học</label>
                <input type="number" id="numberOfSessions" class="form-control" placeholder="Ví dụ: 30" min="1" max="200">
                <div class="form-text small">Số buổi học mặc định cho lớp thuộc khóa học này.</div>
              </div>

              <div class="col-12">
                <label class="form-label fw-bold small">Ảnh đại diện khóa học <span class="text-danger">*</span></label>
                <div class="d-flex align-items-start gap-3">
                  <div class="avatar-preview-box border rounded bg-light d-flex align-items-center justify-content-center"
                       style="width: 120px; height: 120px; overflow: hidden; position: relative;">
                    <img id="avatarPreview" src="" alt="Preview"
                         style="max-width: 100%; max-height: 100%; object-fit: cover; display: none;">
                    <div id="avatarPlaceholder" class="text-muted text-center small">
                      <i class="bi bi-image" style="font-size: 2rem;"></i><br>Chưa có ảnh
                    </div>
                  </div>
                  <div class="flex-grow-1">
                    <input type="file" id="avatarFile" class="form-control mb-1" accept="image/*" onchange="uploadCourseAvatar()">
                    <input type="hidden" id="avatar" required>
                    <div id="avatarStatus" class="small mt-1" style="display:none;"></div>
                    <div class="form-text small">Hỗ trợ JPG, PNG. Dung lượng tối đa 5MB.</div>
                    <div id="avatarError" class="text-danger small mt-1"></div>
                  </div>
                </div>
              </div>

              <div class="col-12">
                <label class="form-label fw-bold small">Mô tả khóa học <span class="text-danger">*</span></label>
                <textarea id="description" class="form-control" rows="4" placeholder="Nhập mô tả chi tiết..." required></textarea>
                <div id="descriptionError" class="text-danger small mt-1"></div>
              </div>

              <div class="col-12 mt-4 text-start">
                <button type="reset" class="btn btn-light border px-4 me-2">Nhập lại</button>
                <button type="submit" class="btn btn-primary px-5" style="background-color: #3b82f6; border: none;">Lưu khóa học</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<!-- Modal Thêm Category mới -->
<div class="modal fade" id="addCategoryModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold" style="color:#223a58;">Thêm Chương trình mới</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body pt-2">
        <div class="mb-3">
          <label class="form-label small fw-bold text-secondary">Tên chương trình <span class="text-danger">*</span></label>
          <input type="text" id="newCategoryName" class="form-control" placeholder="Ví dụ: IELTS Academic">
        </div>
        <div class="mb-3">
          <label class="form-label small fw-bold text-secondary">Giá trị (Value) <span class="text-danger">*</span></label>
          <input type="text" id="newCategoryValue" class="form-control" placeholder="Ví dụ: CAT_IELTS_ACADEMIC">
          <div class="form-text small">Dùng ký tự không dấu, gạch dưới. VD: CAT_IELTS_ACADEMIC</div>
        </div>
        <div id="categoryError" class="text-danger small" style="display:none;"></div>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-light border" data-bs-dismiss="modal">Hủy</button>
        <button type="button" class="btn text-white fw-bold" style="background-color:#136ad5; border:none;" onclick="saveCategory()">
          <i class="bi bi-check-lg me-1"></i> Lưu
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // ============================================================
  //  HELPERS (defined outside DOMContentLoaded so modal can call)
  // ============================================================

  function showAddCategoryModal() {
    document.getElementById('newCategoryName').value = '';
    document.getElementById('newCategoryValue').value = '';
    document.getElementById('categoryError').style.display = 'none';
    new bootstrap.Modal(document.getElementById('addCategoryModal')).show();
  }

  // Utility function for searchable dropdowns
  function initializeSearchableDropdown(idPrefix, data, labelField, valueField) {
    const searchInput = document.getElementById(idPrefix + 'Search');
    const hiddenInput = document.getElementById(idPrefix + 'Id');
    const resultsContainer = document.getElementById(idPrefix + 'Results');

    function renderResults(filteredData) {
      resultsContainer.innerHTML = '';
      if (filteredData.length === 0) {
        resultsContainer.innerHTML = '<div class="dropdown-item text-muted">Không tìm thấy kết quả</div>';
      } else {
        filteredData.forEach(item => {
          const div = document.createElement('div');
          div.className = 'dropdown-item';
          div.textContent = item[labelField];
          div.onclick = () => {
            searchInput.value = item[labelField];
            hiddenInput.value = item[valueField];
            resultsContainer.classList.remove('show');
          };
          resultsContainer.appendChild(div);
        });
      }
      resultsContainer.classList.add('show');
    }

    searchInput.addEventListener('focus', () => {
      if (data && data.length > 0) renderResults(data);
    });

    searchInput.addEventListener('input', (e) => {
      const val = e.target.value.toLowerCase();
      const filtered = data.filter(item => 
        item[labelField].toLowerCase().includes(val)
      );
      renderResults(filtered);
      // Clear ID if value doesn't match exactly? optional, but safer to let user select
      // hiddenInput.value = ''; 
    });

    document.addEventListener('click', (e) => {
      if (!searchInput.contains(e.target) && !resultsContainer.contains(e.target)) {
        resultsContainer.classList.remove('show');
      }
    });
  }

  async function loadCategories() {
    try {
      const res = await fetch('/api/settings?type=COURSE_CATEGORY');
      const result = await res.json();
      if (result.data) {
        window.allCategories = result.data;
        initializeSearchableDropdown('category', result.data, 'name', 'settingId');
      }
    } catch (err) {
      console.error('Error loading categories:', err);
    }
  }

  async function loadExperts() {
    try {
      const res = await fetch('/api/v1/accounts/experts');
      const result = await res.json();
      if (result.data) {
        // Prepare label for experts (Name + Email)
        const experts = result.data.map(exp => ({
          ...exp,
          displayName: exp.fullName + ' (' + (exp.email || '') + ')'
        }));
        window.allExperts = experts;
        initializeSearchableDropdown('expert', experts, 'displayName', 'userId');
      }
    } catch (err) {
      console.error('Error loading experts:', err);
    }
  }

  async function saveCategory() {
    const name = document.getElementById('newCategoryName').value.trim();
    const value = document.getElementById('newCategoryValue').value.trim().toUpperCase().replace(/\s+/g, '_');
    const errorEl = document.getElementById('categoryError');

    if (!name || !value) {
      errorEl.textContent = 'Vui lòng nhập đầy đủ thông tin.';
      errorEl.style.display = 'block';
      return;
    }

    try {
      const res = await fetch('/api/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, value: value })
      });
      const result = await res.json();

      if (result.status === 201 || result.status === 200) {
        bootstrap.Modal.getInstance(document.getElementById('addCategoryModal')).hide();
        await loadCategories();
        if (result.data && result.data.settingId) {
          // Update searchable input
          const cat = window.allCategories.find(c => c.settingId == result.data.settingId);
          if (cat) {
            document.getElementById('categorySearch').value = cat.name;
            document.getElementById('categoryId').value = cat.settingId;
          }
        }
      } else {
        errorEl.textContent = result.message || 'Lỗi khi lưu.';
        errorEl.style.display = 'block';
      }
    } catch (err) {
      errorEl.textContent = 'Lỗi kết nối.';
      errorEl.style.display = 'block';
    }
  }

  // Chờ data load xong (dùng cho edit mode)
  function waitForData(globalVar, callback) {
    const check = () => {
      if (window[globalVar] && window[globalVar].length > 0) {
        callback();
      } else {
        setTimeout(check, 100);
      }
    };
    check();
  }

  // ============================================================
  //  DOMContentLoaded — tất cả code chạy khi DOM sẵn sàng
  // ============================================================
  document.addEventListener("DOMContentLoaded", function() {

    // 1. Load dropdowns
    loadCategories();
    loadExperts();

    // 2. Load course data nếu đang ở trang edit
    const pathSegments = window.location.pathname.split('/');
    const courseIdFromUrl = pathSegments[pathSegments.length - 1];

    if (courseIdFromUrl && !isNaN(courseIdFromUrl)) {
      fetch(`/api/v1/courses/${courseIdFromUrl}`)
        .then(res => res.json())
        .then(res => {
          if (res.status === 200) {
            const course = res.data;
            document.getElementById('courseId').value = course.courseId;
            document.getElementById('courseName').value = course.courseName || '';
            document.getElementById('price').value = course.price || 0;
            const salePercent = (course.price && course.sale) ? ((course.sale / course.price) * 100) : 0;
            document.getElementById('sale').value = salePercent.toFixed(2);
            document.getElementById('avatar').value = course.avatar || '';
            if (course.avatar) {
              const preview = document.getElementById('avatarPreview');
              const placeholder = document.getElementById('avatarPlaceholder');
              preview.src = course.avatar;
              preview.style.display = 'block';
              placeholder.style.display = 'none';
            }
            document.getElementById('status').value = (course.status || 'active').toLowerCase();
            document.getElementById('description').value = course.description || '';
            if (course.numberOfSessions) {
              document.getElementById('numberOfSessions').value = course.numberOfSessions;
            }

            // Chờ data load xong rồi set giá trị hiển thị cho search input
            if (course.categoryId) {
              waitForData('allCategories', () => {
                const cat = window.allCategories.find(c => c.settingId == course.categoryId);
                if (cat) {
                  document.getElementById('categorySearch').value = cat.name;
                  document.getElementById('categoryId').value = cat.settingId;
                }
              });
            }
            if (course.expertId) {
              waitForData('allExperts', () => {
                const exp = window.allExperts.find(e => e.userId == course.expertId);
                if (exp) {
                  document.getElementById('expertSearch').value = exp.displayName;
                  document.getElementById('expertId').value = exp.userId;
                }
              });
            }

            document.querySelector('.fw-bold.m-0').innerText = "Chỉnh sửa khóa học";
          }
        })
        .catch(err => console.error("Lỗi khi nạp dữ liệu cũ:", err));
    }

    // 3. Form submit — POST tạo mới / PUT cập nhật
    document.getElementById('courseForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const setError = (fieldId, message) => {
        const errorEl = document.getElementById(fieldId + 'Error');
        if (errorEl) errorEl.textContent = message || '';
      };

      ['courseName', 'price', 'sale', 'categoryId', 'expertId', 'status', 'avatar', 'description'].forEach(id => setError(id, ''));

      const courseId = document.getElementById('courseId').value;
      const categoryId = document.getElementById('categoryId').value;
      const categorySearch = document.getElementById('categorySearch').value;
      const expertId = document.getElementById('expertId').value;
      const expertSearch = document.getElementById('expertSearch').value;
      const status = document.getElementById('status').value;
      const courseName = document.getElementById('courseName').value.trim();
      const price = parseFloat(document.getElementById('price').value);
      const salePercent = parseFloat(document.getElementById('sale').value);
      const numberOfSessions = parseInt(document.getElementById('numberOfSessions').value) || null;
      const avatar = document.getElementById('avatar').value.trim();
      const description = document.getElementById('description').value.trim();

      let hasError = false;

      if (!courseName) {
        setError('courseName', 'Vui lòng nhập tên khóa học.');
        hasError = true;
      }

      if (isNaN(price) || price < 0) {
        setError('price', 'Học phí phải là số lớn hơn hoặc bằng 0.');
        hasError = true;
      }

      if (isNaN(salePercent) || salePercent < 0 || salePercent > 100) {
        setError('sale', 'Phần trăm giảm phải nằm trong khoảng 0-100.');
        hasError = true;
      }

      if (!categoryId || !categorySearch) {
        setError('categoryId', 'Vui lòng chọn chương trình từ danh sách.');
        hasError = true;
      }

      if (!expertId || !expertSearch) {
        setError('expertId', 'Vui lòng chọn chuyên gia từ danh sách.');
        hasError = true;
      }

      if (!status) {
        setError('status', 'Vui lòng chọn trạng thái.');
        hasError = true;
      }

      if (!avatar) {
        setError('avatar', 'Vui lòng tải lên ảnh đại diện.');
        hasError = true;
      }

      if (!description) {
        setError('description', 'Vui lòng nhập mô tả khóa học.');
        hasError = true;
      }

      if (hasError) {
        return;
      }

      const saleAmount = ((price || 0) * salePercent) / 100;

      const formData = {
        courseName: courseName,
        price: price || 0,
        sale: saleAmount,
        numberOfSessions: numberOfSessions,
        avatar: avatar,
        status: status,
        description: description,
        categoryId: parseInt(categoryId),
        expertId: parseInt(expertId)
      };

      const url = courseId ? `/api/v1/courses/${courseId}` : '/api/v1/courses/';
      const method = courseId ? 'PUT' : 'POST';

      fetch(url, {
        method: method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
      })
      .then(res => res.json())
      .then(res => {
        if (res.status === 200 || res.status === 201 || res.status === 202) {
          alert(courseId ? "Cập nhật thành công!" : "Thêm mới thành công!");
          window.location.href = "/admin/courses";
        } else {
          setError('courseName', res.message || 'Thao tác thất bại.');
        }
      })
      .catch(err => {
        console.error("Lỗi kết nối API:", err);
        setError('courseName', 'Không thể kết nối tới máy chủ!');
      });
    });

  }); // end DOMContentLoaded

  // --- Upload Avatar Function ---
  async function uploadCourseAvatar() {
      const fileInput = document.getElementById('avatarFile');
      const hiddenInput = document.getElementById('avatar');
      const preview = document.getElementById('avatarPreview');
      const placeholder = document.getElementById('avatarPlaceholder');
      const status = document.getElementById('avatarStatus');
      const errorEl = document.getElementById('avatarError');

      if (!fileInput.files || fileInput.files.length === 0) return;

      const file = fileInput.files[0];
      
      // Reset status
      status.style.display = 'block';
      status.className = 'small mt-1 text-primary';
      status.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Đang tải ảnh lên...';
      errorEl.textContent = '';

      const formData = new FormData();
      formData.append('file', file);

      try {
          const res = await fetch('/api/v1/upload/image', {
              method: 'POST',
              body: formData
          });
          const result = await res.json();

          if (result.status === 200 || result.status === 201) {
              const url = result.data;
              hiddenInput.value = url;
              
              // Update Preview
              preview.src = url;
              preview.style.display = 'block';
              placeholder.style.display = 'none';

              status.className = 'small mt-1 text-success';
              status.innerHTML = '<i class="bi bi-check-circle me-1"></i> Tải lên thành công.';
          } else {
              status.style.display = 'none';
              errorEl.textContent = result.message || 'Lỗi tải ảnh.';
          }
      } catch (err) {
          status.style.display = 'none';
          errorEl.textContent = 'Lỗi kết nối upload.';
          console.error(err);
      }
  }
</script>
</html>
