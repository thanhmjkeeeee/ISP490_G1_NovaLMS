<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:with="isDashboard=true">
  <th:block th:replace="~{fragments/head :: common-head(pageTitle='Thêm khóa học mới')}"></th:block>
</head>
<html class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Thêm khóa học', breadcrumb='Khóa học / Tạo mới')}"></header>

<aside id="dashSidebar" class="dash-sidebar">
  <div th:replace="~{fragments/sidebar :: dash-sidebar(activePage='courses')}"></div>
</aside>

<main class="dash-main" id="dashMain">
  <div class="container-fluid">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
            <h5 class="fw-bold m-0">Thông tin khóa học</h5>
            <a th:href="@{/admin/courses}" class="btn btn-sm btn-outline-secondary">Quay lại</a>
          </div>

          <div class="card-body p-4">
            <form id="courseForm" class="row g-3">
              <input type="hidden" id="courseId">

              <div class="col-md-6">
                <label class="form-label fw-bold small">Chương trình (Category) <span class="text-danger">*</span></label>
                <div class="input-group">
                  <select id="categoryId" class="form-select" required>
                    <option value="">-- Chọn chương trình --</option>
                  </select>
                  <button type="button" class="btn btn-outline-primary" onclick="showAddCategoryModal()">
                    <i class="bi bi-plus-lg"></i> Thêm mới
                  </button>
                </div>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-bold small">Mã khóa học (Title)</label>
                <input type="text" id="courseCode" class="form-control" placeholder="C01, C02...">
              </div>

              <div class="col-md-12">
                <label class="form-label fw-bold small">Tên khóa học</label>
                <input type="text" id="courseName" class="form-control" placeholder="Nhập tên khóa học..." required>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-bold small">Học phí (VND)</label>
                <input type="number" id="price" class="form-control" placeholder="0">
              </div>

              <div class="col-md-6">
                <label class="form-label fw-bold small">Trạng thái</label>
                <select id="status" class="form-select">
                  <option value="active">Hoạt động</option>
                  <option value="draft">Bản nháp</option>
                  <option value="inactive">Tạm dừng</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-bold small">Giảm giá (VND)</label>
                <input type="number" id="sale" class="form-control" placeholder="0" value="0">
              </div>

              <div class="col-md-6">
                <label class="form-label fw-bold small">Avatar URL</label>
                <input type="text" id="avatar" class="form-control" placeholder="https://example.com/image.jpg">
              </div>

              <div class="col-12">
                <label class="form-label fw-bold small">Mô tả khóa học</label>
                <textarea id="description" class="form-control" rows="4" placeholder="Nhập mô tả chi tiết..."></textarea>
              </div>

              <div class="col-12 mt-4 text-end">
                <button type="reset" class="btn btn-light border px-4 me-2">Nhập lại</button>
                <button type="submit" class="btn btn-primary px-5" style="background-color: #3b82f6; border: none;">Lưu khóa học</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<!-- Modal Thêm Category mới -->
<div class="modal fade" id="addCategoryModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Thêm Chương trình mới</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Tên chương trình</label>
          <input type="text" id="newCategoryName" class="form-control" placeholder="Ví dụ: IELTS Academic">
        </div>
        <div class="mb-3">
          <label class="form-label">Giá trị (Value)</label>
          <input type="text" id="newCategoryValue" class="form-control" placeholder="Ví dụ: CAT_IELTS_ACADEMIC">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
        <button type="button" class="btn btn-primary" onclick="saveCategory()">Lưu</button>
      </div>
    </div>
  </div>
</div>

<script>
  // Load categories on page load
  document.addEventListener("DOMContentLoaded", function() {
    loadCategories();
  });

  async function loadCategories() {
    try {
      const res = await fetch('/admin/settings/categories');
      const result = await res.json();
      const select = document.getElementById('categoryId');

      // Keep first option
      select.innerHTML = '<option value="">-- Chọn chương trình --</option>';

      if (result.data) {
        result.data.forEach(cat => {
          const opt = document.createElement('option');
          opt.value = cat.settingId;
          opt.textContent = cat.name;
          select.appendChild(opt);
        });
      }
    } catch (err) {
      console.error('Error loading categories:', err);
    }
  }

  function showAddCategoryModal() {
    document.getElementById('newCategoryName').value = '';
    document.getElementById('newCategoryValue').value = '';
    new bootstrap.Modal(document.getElementById('addCategoryModal')).show();
  }

  async function saveCategory() {
    const name = document.getElementById('newCategoryName').value;
    const value = document.getElementById('newCategoryValue').value;

    if (!name || !value) {
      alert('Vui lòng nhập đầy đủ thông tin!');
      return;
    }

    try {
      const res = await fetch('/admin/settings/category', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, value: value })
      });
      const result = await res.json();

      if (result.status === 201 || result.status === 200) {
        alert('Thêm thành công!');
        bootstrap.Modal.getInstance(document.getElementById('addCategoryModal')).hide();
        loadCategories();

        // Auto select newly added category
        if (result.data && result.data.settingId) {
          document.getElementById('categoryId').value = result.data.settingId;
        }
      } else {
        alert('Lỗi: ' + result.message);
      }
    } catch (err) {
      console.error('Error saving category:', err);
      alert('Lỗi kết nối!');
    }
  }

  // --- PHẦN 1: XỬ LÝ ĐỔ DỮ LIỆU KHI EDIT ---

    // Lấy ID từ URL (Ví dụ: /admin/courses/edit/4)
    const pathSegments = window.location.pathname.split('/');
    const courseIdFromUrl = pathSegments[pathSegments.length - 1];

    // Nếu ID là số hợp lệ, tiến hành gọi API lấy dữ liệu cũ
    if (courseIdFromUrl && !isNaN(courseIdFromUrl)) {
        fetch(`/api/v1/courses/${courseIdFromUrl}`)
            .then(response => response.json())
            .then(res => {
                if (res.status === 200) {
                    const course = res.data;

                    // Điền dữ liệu vào các ô input (Mapping)
                    document.getElementById('courseId').value = course.courseId;
                    document.getElementById('courseCode').value = course.courseCode || '';
                    document.getElementById('courseName').value = course.courseName || '';
                    document.getElementById('price').value = course.price || 0;
                    document.getElementById('sale').value = course.sale || 0;
                    document.getElementById('avatar').value = course.avatar || '';
                    document.getElementById('status').value = (course.status || 'active').toLowerCase();
                    document.getElementById('description').value = course.description || '';

                    // Set category if exists
                    if (course.categoryId) {
                        // Wait for categories to load then set selected
                        setTimeout(() => {
                            document.getElementById('categoryId').value = course.categoryId;
                        }, 500);
                    }

                    // Cập nhật tiêu đề giao diện
                    document.querySelector('.fw-bold.m-0').innerText = "Chỉnh sửa khóa học";
                }
            })
            .catch(err => console.error("Lỗi khi nạp dữ liệu cũ:", err));
    }

    // --- PHẦN 2: XỬ LÝ SUBMIT FORM (POST/PUT) ---

    document.getElementById('courseForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const courseId = document.getElementById('courseId').value;

      // Thu thập dữ liệu (Khớp với CourseRequestDTO ở Backend)
      const categoryId = document.getElementById('categoryId').value;
      const formData = {
        courseCode: document.getElementById('courseCode').value, // Map vào field courseCode của DTO
        courseName: document.getElementById('courseName').value,
        price: parseFloat(document.getElementById('price').value) || 0,
        sale: parseFloat(document.getElementById('sale').value) || 0,
        avatar: document.getElementById('avatar').value,
        status: document.getElementById('status').value,
        description: document.getElementById('description').value,
        categoryId: categoryId ? parseInt(categoryId) : null
      };

      // Quyết định URL và Method: Nếu có courseId thì là cập nhật (PUT)
      const url = courseId ? `/api/v1/courses/${courseId}` : '/api/v1/courses/';
      const method = courseId ? 'PUT' : 'POST';

      fetch(url, {
        method: method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
      })
      .then(response => response.json())
      .then(res => {
          // Xử lý kết quả trả về từ ResponseData
          if (res.status === 200 || res.status === 201 || res.status === 202) {
              alert(courseId ? "Cập nhật thành công!" : "Thêm mới thành công!");
              window.location.href = "/admin/courses";
          } else {
              alert("Thao tác thất bại: " + (res.message || "Lỗi hệ thống"));
          }
      })
      .catch(err => {
          console.error("Lỗi kết nối API:", err);
          alert("Không thể kết nối tới máy chủ!");
      });
    });
  });
</script>
</html>
