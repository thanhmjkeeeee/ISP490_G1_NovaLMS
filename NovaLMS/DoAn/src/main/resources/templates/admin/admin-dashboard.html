<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/admin/admin-head :: admin-head}"></head>

<body>

<div th:replace="~{fragments/admin/admin-sidebar :: admin-sidebar(activePage='dashboard')}"></div>

<main class="main-content">

    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h3 class="fw-bold m-0" style="color: #223a58;">Dashboard Overview</h3>
            <p class="text-muted small m-0">Welcome back, Admin.</p>
        </div>
        <div>
            <a th:href="@{/admin/courses/new}" class="btn btn-sm fw-bold shadow-sm d-flex align-items-center rounded-pill px-3 text-white" style="background-color: #136ad5;">
                <i class="bi bi-plus-lg me-1"></i> New Course
            </a>
        </div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-xl-3 col-md-6">
            <div class="card h-100 p-3">
                <div class="d-flex align-items-center">
                    <div class="rounded-circle d-flex align-items-center justify-content-center me-3"
                         style="width:50px; height:50px; font-size:24px; background-color: rgba(19, 106, 213, 0.1); color: #136ad5;">
                        <i class="bi bi-people-fill"></i>
                    </div>
                    <div>
                        <h6 class="text-muted small text-uppercase fw-bold mb-1">Students</h6>
                        <h4 class="fw-bold mb-0 text-dark">1,245</h4>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-xl-3 col-md-6">
            <div class="card h-100 p-3">
                <div class="d-flex align-items-center">
                    <div class="rounded-circle bg-success bg-opacity-10 text-success d-flex align-items-center justify-content-center me-3" style="width:50px; height:50px; font-size:24px;">
                        <i class="bi bi-journal-bookmark-fill"></i>
                    </div>
                    <div>
                        <h6 class="text-muted small text-uppercase fw-bold mb-1">Courses</h6>
                        <h4 class="fw-bold mb-0 text-dark">32</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white py-3 border-bottom">
            <h6 class="m-0 fw-bold" style="color: #223a58;">New Registrations</h6>
        </div>
        <div class="card-body">
            <p class="text-muted text-center py-4">Table content here...</p>
        </div>
    </div>
</main>

<div th:replace="~{fragments/admin/admin-footer :: admin-footer}"></div>

</body>
</html>
