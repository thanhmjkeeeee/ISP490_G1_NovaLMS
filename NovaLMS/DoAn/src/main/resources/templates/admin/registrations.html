<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:with="isDashboard=true">
    <th:block th:replace="~{fragments/head :: common-head(pageTitle='Quản lý đăng ký')}"></th:block>
</head>

<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Quản lý đăng ký', breadcrumb='Đăng ký')}"></header>

<aside id="dashSidebar" class="dash-sidebar">
    <div th:replace="~{fragments/sidebar :: dash-sidebar(activePage='registrations')}"></div>
</aside>

<div id="dashOverlay" class="dash-overlay"></div>

<main class="dash-main" id="dashMain">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold text-dark m-0">Registration Management</h3>
            <p class="text-muted small m-0">Quản lý danh sách đăng ký khóa học của học viên.</p>
        </div>
    </div>

    <div class="card mb-4 border-0 shadow-sm">
        <div class="card-body">
            <div class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label class="form-label small fw-bold text-secondary mb-1">Tìm kiếm</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" id="searchInput" class="form-control border-start-0 bg-light" placeholder="Tên học viên, email, khóa học...">
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-secondary mb-1">Trạng thái</label>
                    <select id="statusFilter" class="form-select bg-light">
                        <option value="">Tất cả trạng thái</option>
                        <option value="Submitted">Đã gửi</option>
                        <option value="Approved">Chấp nhận</option>
                        <option value="Cancelled">Hủy</option>
                        <option value="Rejected">Từ chối</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button type="button" onclick="loadRegistrationData(0)" class="btn btn-primary w-100 fw-bold shadow-sm d-flex align-items-center justify-content-center" style="background-color: #3b82f6; border: none;">
                        <i class="bi bi-filter me-2"></i> Lọc
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" style="table-layout: fixed;">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4 py-3 text-uppercase small text-muted" style="width: 85px;">ID</th>
                        <th class="py-3 text-uppercase small text-muted" style="width: 180px;">Học viên</th>
                        <th class="py-3 text-uppercase small text-muted" style="width: 150px;">Chương trình</th>
                        <th class="py-3 text-uppercase small text-muted" style="width: 200px;">Khóa học</th>
                        <th class="py-3 text-uppercase small text-muted" style="width: 120px;">Lớp học</th>
                        <th class="py-3 text-uppercase small text-muted" style="width: 120px;">Giá</th>
                        <th class="py-3 text-uppercase small text-muted" style="width: 130px;">TT Đăng ký</th>
                        <th class="py-3 text-uppercase small text-muted" style="width: 130px;">TT Thanh toán</th>
                        <th class="text-end pe-4 py-3 text-uppercase small text-muted" style="width: 70px;">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody id="registrationDataBody">
                    </tbody>
                </table>
            </div>
            <div id="paginationContainer" class="d-flex justify-content-between align-items-center p-3 border-top">
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<div class="modal fade" id="statusModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">Cập nhật trạng thái</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="modalRegistrationId">
                <div class="mb-3">
                    <label class="form-label fw-medium">Trạng thái mới</label>
                    <select id="newStatus" class="form-select">
                        <option value="Approved">Chấp nhận</option>
                        <option value="Cancelled">Hủy</option>
                        <option value="Rejected">Từ chối</option>
                    </select>
                </div>
                <div id="paidCourseWarning" class="alert alert-warning py-2 d-none" role="alert">
                    <i class="bi bi-exclamation-triangle me-1"></i>
                    Khóa học có phí — chỉ duyệt được khi đã thanh toán qua PayOS.
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium">Ghi chú</label>
                    <textarea id="statusNote" class="form-control" rows="3" placeholder="Nhập ghi chú (nếu có)"></textarea>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn btn-primary px-4" id="saveStatusBtn" onclick="updateStatus()">Lưu thay đổi</button>
            </div>
        </div>
    </div>
</div>

<style>
    #registrationDataBody td {
        vertical-align: middle;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    /* ĐÃ FIX: Điều chỉnh lại CSS cho khớp với vị trí cột mới */
    #registrationDataBody td:nth-child(2),
    #registrationDataBody td:nth-child(3),
    #registrationDataBody td:nth-child(4),
    #registrationDataBody td:nth-child(5) {
        white-space: normal;
        min-width: 120px;
    }
</style>

<script th:inline="javascript">
    let currentPage = 0;
    const pageSize = 10;

    function showToast(message, type = 'info') {
        const existingToast = document.getElementById('toastContainer');
        if (existingToast) existingToast.remove();

        const toast = document.createElement('div');
        toast.id = 'toastContainer';
        toast.className = `toast-container position-fixed top-0 end-0 p-3`;
        toast.style.zIndex = '9999';

        const toastInner = document.createElement('div');
        toastInner.className = `toast show border-0 shadow`;
        toastInner.setAttribute('role', 'alert');

        const bgClass = type === 'success' ? 'bg-success' : type === 'error' ? 'bg-danger' : 'bg-info';
        const icon = type === 'success' ? 'bi-check-circle' : type === 'error' ? 'bi-x-circle' : 'bi-info-circle';

        toastInner.innerHTML = `
            <div class="toast-header ${bgClass} text-white border-0">
                <i class="bi ${icon} me-2"></i>
                <strong class="me-auto">${type === 'success' ? 'Thành công' : type === 'error' ? 'Lỗi' : 'Thông báo'}</strong>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body bg-white text-dark fw-medium">${message}</div>
        `;

        toast.appendChild(toastInner);
        document.body.appendChild(toast);

        setTimeout(() => toast.remove(), 3000);
    }

    function loadRegistrationData(page = 0) {
        currentPage = page;
        const keyword = document.getElementById('searchInput').value;
        const status = document.getElementById('statusFilter').value;

        let url = `/admin/registrations/data?page=${page}&size=${pageSize}&keyword=${encodeURIComponent(keyword)}&status=${encodeURIComponent(status)}`;

        fetch(url, { credentials: 'same-origin' })
        .then(response => response.json())
        .then(data => {
            if (data.status === 200 && data.data) {
                renderTable(data.data.items);
                renderPagination(data.data);
            } else {
                showToast(data.message || 'Lỗi tải dữ liệu', 'error');
            }
        })
        .catch(error => console.error('Error:', error));
    }

    function renderTable(registrations) {
        const tbody = document.getElementById('registrationDataBody');
        if (!registrations || registrations.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center py-5 text-muted"><i class="bi bi-inbox fs-2 d-block mb-2"></i>Không có dữ liệu đăng ký</td></tr>';
            return;
        }

        // ĐÃ FIX LỖI LỆCH CỘT: Thêm cột hiển thị Tên Học Viên (r.fullName hoặc r.studentName tùy Backend trả về)
        tbody.innerHTML = registrations.map(r => `
            <tr>
                <td class="ps-4 fw-medium text-secondary" style="white-space: nowrap; overflow: visible;">#${r.registrationId}</td>
                <td class="fw-bold text-primary" title="${r.userName || r.userEmail}">${r.userName || r.userEmail || 'N/A'}</td>
                <td class="fw-medium text-info">${r.categoryName || 'N/A'}</td>
                <td class="fw-medium text-dark" title="${r.courseName}">${r.courseName || 'N/A'}</td>
                <td><span class="badge bg-light text-dark border">${r.className || 'N/A'}</span></td>
                <td class="fw-bold ${r.registrationPrice && r.registrationPrice > 0 ? 'text-danger' : 'text-success'}">${r.registrationPrice && r.registrationPrice > 0 ? r.registrationPrice.toLocaleString('vi-VN') + ' đ' : 'Miễn phí'}</td>
                <td><span class="badge ${getRegStatusBadge(r.status, r.paymentStatus)} px-2 py-1">${getRegStatusLabel(r.status, r.paymentStatus)}</span></td>
                <td><span class="badge ${getPaymentBadgeClass(r.paymentStatus)} px-2 py-1">${getPaymentStatusLabel(r.paymentStatus)}</span></td>
                <td class="text-end pe-4">
                    <button class="btn btn-sm btn-light border text-primary shadow-sm" onclick="openStatusModal(${r.registrationId}, ${r.registrationPrice && r.registrationPrice > 0}, ${r.paymentStatus === 'PAID' ? 'true' : 'false'}, '${r.status}')" title="Cập nhật">
                        <i class="bi bi-pencil-square"></i>
                    </button>
                </td>
            </tr>
        `).join('');
    }

    function getStatusBadgeClass(status) {
        switch(status) {
            case 'Approved': return 'bg-success';
            case 'Rejected': return 'bg-danger';
            case 'Cancelled': return 'bg-warning text-dark';
            case 'Submitted': return 'bg-info text-dark';
            default: return 'bg-secondary';
        }
    }

    function getRegStatusBadge(status, paymentStatus) {
        if (status === 'Approved') return 'bg-success';
        if (status === 'Cancelled') return 'bg-warning text-dark';
        if (status === 'Rejected') return 'bg-danger';
        if (status === 'Submitted') return 'bg-info text-dark';
        return 'bg-secondary';
    }

    function getRegStatusLabel(status, paymentStatus) {
        const labels = {
            'Approved': 'Đã duyệt',
            'Cancelled': 'Đã hủy',
            'Rejected': 'Từ chối',
            'Submitted': 'Đã gửi'
        };
        return labels[status] || status || 'N/A';
    }

    function getPaymentBadgeClass(paymentStatus) {
        switch(paymentStatus) {
            case 'PAID': return 'bg-success';
            case 'PENDING': return 'bg-info text-dark';
            case 'CANCELLED': return 'bg-warning text-dark';
            case 'FAILED': return 'bg-danger';
            case 'EXPIRED': return 'bg-warning text-dark';
            case 'FREE': return 'bg-success';
            default: return 'bg-secondary';
        }
    }

    function getPaymentStatusLabel(paymentStatus) {
        const labels = {
            'PAID': 'Đã thanh toán',
            'PENDING': 'Chờ thanh toán',
            'CANCELLED': 'Đã hủy',
            'FAILED': 'Thất bại',
            'EXPIRED': 'Hết hạn',
            'FREE': 'Miễn phí'
        };
        return labels[paymentStatus] || paymentStatus || 'N/A';
    }

    function renderPagination(data) {
        const container = document.getElementById('paginationContainer');
        if (data.totalPages <= 1) {
            container.innerHTML = '';
            return;
        }

        let html = `<div class="small text-muted fw-medium">Hiển thị ${data.pageNo * pageSize + 1} - ${Math.min((data.pageNo + 1) * pageSize, data.totalElements)} / ${data.totalElements} bản ghi</div>`;
        html += '<nav><ul class="pagination pagination-sm mb-0 shadow-sm">';

        html += `<li class="page-item ${data.pageNo === 0 ? 'disabled' : ''}">
            <a class="page-link" href="javascript:void(0)" onclick="loadRegistrationData(${data.pageNo - 1})"><i class="bi bi-chevron-left"></i></a>
        </li>`;

        for (let i = 0; i < data.totalPages; i++) {
            if (i === 0 || i === data.totalPages - 1 || (i >= data.pageNo - 1 && i <= data.pageNo + 1)) {
                html += `<li class="page-item ${i === data.pageNo ? 'active' : ''}">
                    <a class="page-link" href="javascript:void(0)" onclick="loadRegistrationData(${i})">${i + 1}</a>
                </li>`;
            } else if (i === data.pageNo - 2 || i === data.pageNo + 2) {
                html += '<li class="page-item disabled"><span class="page-link border-0">...</span></li>';
            }
        }

        html += `<li class="page-item ${data.pageNo >= data.totalPages - 1 ? 'disabled' : ''}">
            <a class="page-link" href="javascript:void(0)" onclick="loadRegistrationData(${data.pageNo + 1})"><i class="bi bi-chevron-right"></i></a>
        </li>`;

        html += '</ul></nav>';
        container.innerHTML = html;
    }

    function openStatusModal(registrationId, isPaidCourse, isPaid, currentStatus) {
        document.getElementById('modalRegistrationId').value = registrationId;

        const statusSelect = document.getElementById('newStatus');
        const paidWarning = document.getElementById('paidCourseWarning');
        const saveBtn = document.getElementById('saveStatusBtn');

        // Nếu đã thanh toán và đã duyệt → không cho chỉnh sửa
        if (currentStatus === 'Approved' && isPaid) {
            paidWarning.classList.remove('d-none');
            paidWarning.className = 'alert alert-secondary py-2';
            paidWarning.innerHTML = '<i class="bi bi-info-circle me-1"></i> Đăng ký đã được thanh toán và duyệt. Không thể thay đổi trạng thái.';
            statusSelect.innerHTML = '<option value="">-- Không thể thay đổi --</option>';
            statusSelect.disabled = true;
            saveBtn.disabled = true;
            document.getElementById('statusNote').value = '';
            const modal = new bootstrap.Modal(document.getElementById('statusModal'));
            modal.show();
            return;
        }

        // Reset trạng thái bình thường
        statusSelect.disabled = false;
        saveBtn.disabled = false;
        paidWarning.className = 'alert alert-warning py-2 d-none';
        paidWarning.innerHTML = '<i class="bi bi-exclamation-triangle me-1"></i> Khóa học có phí — chỉ duyệt được khi đã thanh toán qua PayOS.';
        statusSelect.value = 'Approved';

        // Nếu khóa có phí mà chưa thanh toán → ẩn nút duyệt
        if (isPaidCourse && !isPaid) {
            paidWarning.classList.remove('d-none');
            statusSelect.innerHTML = `
                <option value="Cancelled">Hủy</option>
                <option value="Rejected">Từ chối</option>
            `;
        } else {
            paidWarning.classList.add('d-none');
            statusSelect.innerHTML = `
                <option value="Approved">Chấp nhận</option>
                <option value="Cancelled">Hủy</option>
                <option value="Rejected">Từ chối</option>
            `;
        }

        document.getElementById('statusNote').value = '';
        const modal = new bootstrap.Modal(document.getElementById('statusModal'));
        modal.show();
    }

    function updateStatus() {
        const registrationId = document.getElementById('modalRegistrationId').value;
        const status = document.getElementById('newStatus').value;
        const note = document.getElementById('statusNote').value;

        fetch(`/admin/registrations/${registrationId}/status?status=${status}&note=${encodeURIComponent(note)}`, {
            method: 'PUT',
            credentials: 'same-origin'
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 200) {
                showToast('Cập nhật trạng thái thành công!', 'success');
                bootstrap.Modal.getInstance(document.getElementById('statusModal')).hide();
                loadRegistrationData(currentPage);
            } else {
                showToast(data.message || 'Cập nhật thất bại', 'error');
            }
        })
        .catch(error => {
            showToast('Đã xảy ra lỗi kết nối', 'error');
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        loadRegistrationData(0);
    });
</script>

</body>
</html>
