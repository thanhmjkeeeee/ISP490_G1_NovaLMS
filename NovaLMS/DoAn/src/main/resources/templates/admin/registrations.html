<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:with="isDashboard=true">
    <th:block th:replace="~{fragments/head :: common-head(pageTitle='Quản lý đăng ký')}"></th:block>
</head>

<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Quản lý đăng ký', breadcrumb='Đăng ký')}"></header>

<aside id="dashSidebar" class="dash-sidebar">
    <div th:replace="~{fragments/sidebar :: dash-sidebar(activePage='registrations')}"></div>
</aside>

<div id="dashOverlay" class="dash-overlay"></div>

<main class="dash-main" id="dashMain">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold text-dark m-0">Registration Management</h3>
            <p class="text-muted small m-0">Quản lý danh sách đăng ký khóa học của học viên.</p>
        </div>
    </div>

    <div class="card mb-4 border-0 shadow-sm">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-5">
                    <label class="form-label small fw-bold text-secondary">Tìm kiếm</label>
                    <div class="input-group input-group-sm">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" id="searchInput" class="form-control border-start-0 bg-light" placeholder="Tên học viên, email, khóa học...">
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-secondary">Trạng thái</label>
                    <select id="statusFilter" class="form-select form-select-sm bg-light">
                        <option value="">Tất cả trạng thái</option>
                        <option value="Submitted">Submitted</option>
                        <option value="Approved">Approved</option>
                        <option value="Cancelled">Cancelled</option>
                        <option value="Rejected">Rejected</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button type="button" onclick="loadRegistrationData(0)" class="btn btn-sm btn-primary w-100 fw-bold shadow-sm">
                        <i class="bi bi-filter me-1"></i> Lọc
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" style="table-layout: fixed;">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4 py-3 text-uppercase small text-muted" style="width: 60px;">ID</th>
                        <th class="py-3 text-uppercase small text-muted">Học viên</th>
                        <th class="py-3 text-uppercase small text-muted">Khóa học</th>
                        <th class="py-3 text-uppercase small text-muted">Lớp học</th>
                        <th class="py-3 text-uppercase small text-muted" style="width: 120px;">Ngày đăng ký</th>
                        <th class="py-3 text-uppercase small text-muted" style="width: 100px;">Giá</th>
                        <th class="py-3 text-uppercase small text-muted" style="width: 100px;">Trạng thái</th>
                        <th class="text-end pe-4 py-3 text-uppercase small text-muted" style="width: 80px;">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody id="registrationDataBody">
                    </tbody>
                </table>
            </div>
            <div id="paginationContainer" class="d-flex justify-content-between align-items-center p-3 border-top">
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Status Update Modal -->
<div class="modal fade" id="statusModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Cập nhật trạng thái</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="modalRegistrationId">
                <div class="mb-3">
                    <label class="form-label">Trạng thái mới</label>
                    <select id="newStatus" class="form-select">
                        <option value="Approved">Approved - Chấp nhận</option>
                        <option value="Cancelled">Cancelled - Hủy</option>
                        <option value="Rejected">Rejected - Từ chối</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Ghi chú</label>
                    <textarea id="statusNote" class="form-control" rows="3" placeholder="Nhập ghi chú (nếu có)"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn btn-primary" onclick="updateStatus()">Cập nhật</button>
            </div>
        </div>
    </div>
</div>

<style>
#registrationDataBody td {
    vertical-align: middle;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
#registrationDataBody td:nth-child(2) {
    white-space: normal;
    min-width: 150px;
}
#registrationDataBody td:nth-child(3),
#registrationDataBody td:nth-child(4) {
    white-space: normal;
    min-width: 120px;
}
</style>

<script th:inline="javascript">
let currentPage = 0;
const pageSize = 10;

// Toast notification function
function showToast(message, type = 'info') {
    // Remove existing toast if any
    const existingToast = document.getElementById('toastContainer');
    if (existingToast) existingToast.remove();

    // Create toast element
    const toast = document.createElement('div');
    toast.id = 'toastContainer';
    toast.className = `toast-container position-fixed top-0 end-0 p-3`;
    toast.style.zIndex = '9999';

    const toastInner = document.createElement('div');
    toastInner.className = `toast show`;
    toastInner.setAttribute('role', 'alert');
    toastInner.setAttribute('aria-live', 'assertive');
    toastInner.setAttribute('aria-atomic', 'true');

    const bgClass = type === 'success' ? 'bg-success' : type === 'error' ? 'bg-danger' : 'bg-info';
    const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ';

    toastInner.innerHTML = `
        <div class="toast-header ${bgClass} text-white">
            <strong class="me-auto">${icon} ${type === 'success' ? 'Thành công' : type === 'error' ? 'Lỗi' : 'Thông báo'}</strong>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
        </div>
        <div class="toast-body">${message}</div>
    `;

    toast.appendChild(toastInner);
    document.body.appendChild(toast);

    // Auto hide after 3 seconds
    setTimeout(() => {
        toast.remove();
    }, 3000);
}

function loadRegistrationData(page = 0) {
    currentPage = page;
    const keyword = document.getElementById('searchInput').value;
    const status = document.getElementById('statusFilter').value;

    let url = `/admin/registrations/data?page=${page}&size=${pageSize}&keyword=${encodeURIComponent(keyword)}&status=${encodeURIComponent(status)}`;

    console.log('Loading from:', url);

    fetch(url, {
        credentials: 'same-origin'
    })
    .then(response => response.json())
    .then(data => {
        console.log('API Response:', data);
        if (data.status === 200 && data.data) {
            console.log('Items:', data.data.items);
            renderTable(data.data.items);
            renderPagination(data.data);
        } else {
            showToast(data.message || 'Lỗi tải dữ liệu', 'error');
        }
    })
    .catch(error => console.error('Error:', error));
}

function renderTable(registrations) {
    const tbody = document.getElementById('registrationDataBody');
    if (!registrations || registrations.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4 text-muted">Không có dữ liệu</td></tr>';
        return;
    }

    tbody.innerHTML = registrations.map(r => `
        <tr>
            <td class="ps-4">#${r.registrationId}</td>
            <td>
                <div class="d-flex align-items-center">
                    <div class="avatar-circle bg-primary text-white me-2">${r.userName ? r.userName.charAt(0).toUpperCase() : '?'}</div>
                    <div>
                        <div class="fw-bold">${r.userName || 'N/A'}</div>
                        <small class="text-muted">${r.userEmail || ''}</small>
                    </div>
                </div>
            </td>
            <td>${r.courseName || 'N/A'}</td>
            <td>${r.className || 'N/A'}</td>
            <td>${r.registrationTime ? new Date(r.registrationTime).toLocaleDateString('vi-VN') : 'N/A'}</td>
            <td>${r.registrationPrice ? r.registrationPrice.toLocaleString('vi-VN') + ' đ' : 'Miễn phí'}</td>
            <td>
                <span class="badge ${getStatusBadgeClass(r.status)}">${r.status || 'N/A'}</span>
            </td>
            <td class="text-end pe-4">
                <button class="btn btn-sm btn-outline-primary" onclick="openStatusModal(${r.registrationId})" title="Cập nhật trạng thái">
                    <i class="bi bi-pencil"></i>
                </button>
            </td>
        </tr>
    `).join('');
}

function getStatusBadgeClass(status) {
    switch(status) {
        case 'Approved': return 'bg-success';
        case 'Rejected': return 'bg-danger';
        case 'Cancelled': return 'bg-warning text-dark';
        case 'Submitted': return 'bg-info text-dark';
        default: return 'bg-secondary';
    }
}

function renderPagination(data) {
    const container = document.getElementById('paginationContainer');
    if (data.totalPages <= 1) {
        container.innerHTML = '';
        return;
    }

    let html = `<div>Hiển thị ${data.pageNo * pageSize + 1} - ${Math.min((data.pageNo + 1) * pageSize, data.totalElements)} của ${data.totalElements} bản ghi</div>`;
    html += '<nav><ul class="pagination mb-0">';

    html += `<li class="page-item ${data.pageNo === 0 ? 'disabled' : ''}">
        <a class="page-link" href="javascript:void(0)" onclick="loadRegistrationData(${data.pageNo - 1})">Trước</a>
    </li>`;

    for (let i = 0; i < data.totalPages; i++) {
        if (i === 0 || i === data.totalPages - 1 || (i >= data.pageNo - 1 && i <= data.pageNo + 1)) {
            html += `<li class="page-item ${i === data.pageNo ? 'active' : ''}">
                <a class="page-link" href="javascript:void(0)" onclick="loadRegistrationData(${i})">${i + 1}</a>
            </li>`;
        } else if (i === data.pageNo - 2 || i === data.pageNo + 2) {
            html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
        }
    }

    html += `<li class="page-item ${data.pageNo >= data.totalPages - 1 ? 'disabled' : ''}">
        <a class="page-link" href="javascript:void(0)" onclick="loadRegistrationData(${data.pageNo + 1})">Sau</a>
    </li>`;

    html += '</ul></nav>';
    container.innerHTML = html;
}

function openStatusModal(registrationId) {
    document.getElementById('modalRegistrationId').value = registrationId;
    document.getElementById('newStatus').value = 'Approved';
    document.getElementById('statusNote').value = '';
    const modal = new bootstrap.Modal(document.getElementById('statusModal'));
    modal.show();
}

function updateStatus() {
    const registrationId = document.getElementById('modalRegistrationId').value;
    const status = document.getElementById('newStatus').value;
    const note = document.getElementById('statusNote').value;

    fetch(`/admin/registrations/${registrationId}/status?status=${status}&note=${encodeURIComponent(note)}`, {
        method: 'PUT',
        credentials: 'same-origin'
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === 200) {
            showToast('Cập nhật trạng thái thành công!', 'success');
            bootstrap.Modal.getInstance(document.getElementById('statusModal')).hide();
            loadRegistrationData(currentPage);
        } else {
            showToast(data.message || 'Cập nhật thất bại', 'error');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        showToast('Đã xảy ra lỗi kết nối', 'error');
    });
}

// Initialize
document.addEventListener('DOMContentLoaded', function() {
    loadRegistrationData(0);
});
</script>

</body>
</html>
