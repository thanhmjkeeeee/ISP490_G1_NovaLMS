<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:with="isDashboard=true">
  <th:block th:replace="~{fragments/head :: common-head(pageTitle='Quản lý lớp học')}"></th:block>
  <style>
    html, body { height: auto !important; overflow-y: auto !important; }
    .dashboard-body { display: block !important; }
    .dash-main { min-height: 100vh !important; padding-bottom: 100px !important; overflow: visible !important; }
    .card-custom { border: none; box-shadow: 0 5px 20px rgba(0,0,0,0.05); border-radius: 12px; background: #fff; }
    .info-label { font-size: 0.75rem; text-transform: uppercase; color: #94a3b8; font-weight: 800; }
    .info-value { font-weight: 700; color: #1e293b; font-size: 1rem; }
    .st-badge { padding: 5px 15px; border-radius: 50px; font-weight: 800; font-size: 11px; text-transform: uppercase; }
    .st-Open { background: #d1e7dd; color: #0f5132; }
    .st-Draft { background: #fff3cd; color: #856404; }
    .st-Closed { background: #f8d7da; color: #842029; }
    .schedule-check .btn { border-radius: 20px !important; font-size: 0.82rem; }
  </style>
</head>

<body class="dashboard-body">
<header th:replace="~{fragments/header :: dash-header(pageTitle='Quản lý đào tạo', breadcrumb='Lớp học')}"></header>
<aside id="dashSidebar" class="dash-sidebar">
  <div th:replace="~{fragments/sidebar :: dash-sidebar(activePage='classes')}"></div>
</aside>

<main class="dash-main" id="dashMain">
  <div class="container-fluid px-4 py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <a th:href="@{/manager/class/list}" class="btn btn-sm btn-light text-muted fw-bold mb-2">
          <i class="bi bi-arrow-left"></i> QUAY LẠI
        </a>
        <h3 class="fw-bold text-dark m-0" id="pageTitle">Lớp: <span id="displayClassName">Đang tải...</span></h3>
      </div>
      <div id="actionButtons">
        <button onclick="goToEdit()" class="btn btn-warning shadow-sm fw-bold rounded-pill px-4">
          <i class="bi bi-pencil-square me-1"></i> Chỉnh sửa
        </button>
      </div>
    </div>

    <!-- CREATE/EDIT FORM -->
    <div id="classFormSection" class="card card-custom" style="display: none;">
      <div class="card-header bg-white border-0 p-4">
        <h5 class="fw-bold m-0" id="formTitle">Tạo lớp học mới</h5>
      </div>
      <div class="card-body p-4">
        <form id="classForm">
          <input type="hidden" id="classId">

          <div class="row g-4">

            <!-- Row 1: Tên lớp + Khóa học -->
            <div class="col-md-6">
              <label class="form-label small fw-bold text-secondary text-uppercase">Tên lớp học <span class="text-danger">*</span></label>
              <input type="text" id="className" class="form-control" placeholder="Ví dụ: Lớp Python cơ bản" required>
              <div id="classNameError" class="text-danger small mt-1"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label small fw-bold text-secondary text-uppercase">Khóa học <span class="text-danger">*</span></label>
              <select id="courseId" class="form-select" required>
                <option value="">-- Chọn khóa học --</option>
              </select>
              <div id="courseIdError" class="text-danger small mt-1"></div>
            </div>

            <!-- Row 2: Giảng viên + Trạng thái (radio) -->
            <div class="col-md-6">
              <label class="form-label small fw-bold text-secondary text-uppercase">Giảng viên <span class="text-danger">*</span></label>
              <select id="teacherId" class="form-select" required>
                <option value="">-- Chọn giảng viên --</option>
              </select>
              <div id="teacherIdError" class="text-danger small mt-1"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label small fw-bold text-secondary text-uppercase">Trạng thái <span class="text-danger">*</span></label>
              <div>
                <div class="btn-group" role="group">
                  <input type="radio" class="btn-check" name="classStatus" id="stDraft" value="Draft" checked>
                  <label class="btn btn-outline-warning btn-sm" for="stDraft">Nháp</label>
                  <input type="radio" class="btn-check" name="classStatus" id="stOpen" value="Open">
                  <label class="btn btn-outline-success btn-sm" for="stOpen">Mở</label>
                  <input type="radio" class="btn-check" name="classStatus" id="stClosed" value="Closed">
                  <label class="btn btn-outline-danger btn-sm" for="stClosed">Đóng</label>
                </div>
              </div>
              <div id="classStatusError" class="text-danger small mt-1"></div>
            </div>

            <!-- Row 3: Số buổi học + Ca học -->
            <div class="col-md-4">
              <label class="form-label small fw-bold text-secondary text-uppercase">Số buổi học <span class="text-danger">*</span></label>
              <input type="number" id="numberOfSessions" class="form-control" placeholder="Ví dụ: 30" min="1" max="100" required>
              <div id="numberOfSessionsError" class="text-danger small mt-1"></div>
            </div>

            <div class="col-md-4">
              <label class="form-label small fw-bold text-secondary text-uppercase">Ca học <span class="text-danger">*</span></label>
              <select id="slotTime" class="form-select" required>
                <option value="">-- Chọn ca học --</option>
                <option value="Sáng (7:00 - 9:00)">Sáng (7:00 - 9:00)</option>
                <option value="Sáng (9:00 - 11:00)">Sáng (9:00 - 11:00)</option>
                <option value="Chiều (13:00 - 15:00)">Chiều (13:00 - 15:00)</option>
                <option value="Chiều (15:00 - 17:00)">Chiều (15:00 - 17:00)</option>
                <option value="Tối (18:00 - 20:00)">Tối (18:00 - 20:00)</option>
              </select>
              <div id="slotTimeError" class="text-danger small mt-1"></div>
            </div>

            <div class="col-md-4">
              <label class="form-label small fw-bold text-secondary text-uppercase">Link Google Meet <span class="text-danger">*</span></label>
              <input type="url" id="meetLink" class="form-control" placeholder="https://meet.google.com/..." required>
              <div id="meetLinkError" class="text-danger small mt-1"></div>
            </div>

            <!-- Row 4: Ngày bắt đầu + Ngày kết thúc -->
            <div class="col-md-6">
              <label class="form-label small fw-bold text-secondary text-uppercase">Ngày khai giảng <span class="text-danger">*</span></label>
              <input type="date" id="startDate" class="form-control" required>
              <div id="startDateError" class="text-danger small mt-1"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label small fw-bold text-secondary text-uppercase">Ngày kết thúc <span class="text-success">(tự động tính / cho phép chỉnh sửa)</span></label>
              <input type="date" id="endDate" class="form-control">
              <small class="text-muted">* Thay đổi nếu cần.</small>
              <div id="endDateError" class="text-danger small mt-1"></div>
            </div>

            <!-- Row 5: Lịch học (7 checkboxes) -->
            <div class="col-12">
              <label class="form-label small fw-bold text-secondary text-uppercase">Lịch học <span class="text-danger">*</span></label>
              <div class="schedule-check btn-group" role="group">
                <input type="checkbox" class="btn-check" id="day2" value="2" onclick="onScheduleChange()">
                <label class="btn btn-outline-primary btn-sm" for="day2">Thứ 2</label>
                <input type="checkbox" class="btn-check" id="day3" value="3" onclick="onScheduleChange()">
                <label class="btn btn-outline-primary btn-sm" for="day3">Thứ 3</label>
                <input type="checkbox" class="btn-check" id="day4" value="4" onclick="onScheduleChange()">
                <label class="btn btn-outline-primary btn-sm" for="day4">Thứ 4</label>
                <input type="checkbox" class="btn-check" id="day5" value="5" onclick="onScheduleChange()">
                <label class="btn btn-outline-primary btn-sm" for="day5">Thứ 5</label>
                <input type="checkbox" class="btn-check" id="day6" value="6" onclick="onScheduleChange()">
                <label class="btn btn-outline-primary btn-sm" for="day6">Thứ 6</label>
                <input type="checkbox" class="btn-check" id="day7" value="7" onclick="onScheduleChange()">
                <label class="btn btn-outline-primary btn-sm" for="day7">Thứ 7</label>
                <input type="checkbox" class="btn-check" id="day8" value="8" onclick="onScheduleChange()">
                <label class="btn btn-outline-primary btn-sm" for="day8">Chủ nhật</label>
              </div>
              <div id="scheduleError" class="text-danger small mt-1"></div>
            </div>

            <!-- Row 6: Mô tả lớp học -->
            <div class="col-12">
              <label class="form-label small fw-bold text-secondary text-uppercase">Mô tả lớp học</label>
              <textarea id="description" class="form-control" rows="3" placeholder="Mô tả chi tiết về lớp học..."></textarea>
            </div>

          </div>

          <div class="mt-4 pt-4 border-top d-flex justify-content-start gap-2">
            <a th:href="@{/manager/class/list}" class="btn btn-light rounded-pill px-4">Hủy</a>
            <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold">
              <i class="bi bi-check-lg me-1"></i> Lưu
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- DETAIL VIEW -->
    <div id="detailSection">
      <div class="row g-4">
        <div class="col-lg-4">
          <div class="card card-custom p-4 text-center">
            <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3 mx-auto" style="width: 70px; height: 70px;">
              <i class="bi bi-door-open-fill fs-2"></i>
            </div>
            <h5 class="fw-bold mb-1" id="detailCourseName">---</h5>
            <div class="mb-4"><span id="detailStatusBadge" class="st-badge">---</span></div>

            <div class="text-start border-top pt-4">
              <div class="mb-3">
                <p class="info-label mb-1">Giảng viên</p>
                <p class="info-value" id="detailTeacherName">Chưa phân công</p>
              </div>
              <div class="mb-3">
                <p class="info-label mb-1">Lịch học & Ca</p>
                <p class="info-value"><span id="detailSchedule">---</span> | <span id="detailSlot">---</span></p>
              </div>
              <div class="row g-2">
                <div class="col-6">
                  <p class="info-label mb-1">Khai giảng</p>
                  <p class="info-value small text-success" id="detailStart">---</p>
                </div>
                <div class="col-6">
                  <p class="info-label mb-1">Kết thúc</p>
                  <p class="info-value small text-danger" id="detailEnd">---</p>
                </div>
              </div>
              <div class="mb-3">
                <p class="info-label mb-1">Số buổi</p>
                <p class="info-value" id="detailSessions">---</p>
              </div>
              <div class="mb-3" id="detailDescriptionSection" style="display:none;">
                <p class="info-label mb-1">Mô tả</p>
                <p class="info-value small text-secondary" id="detailDescription"></p>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="card card-custom h-100">
            <div class="card-header bg-white border-0 p-4 d-flex justify-content-between align-items-center">
              <h5 class="fw-bold m-0">Học viên (<span id="studentCount">0</span>)</h5>
              <a id="btnManageStudents" href="#" class="btn btn-info btn-sm rounded-pill">
                <i class="bi bi-people me-1"></i> Quản lý sinh viên
              </a>
            </div>
            <div class="card-body p-0">
              <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                  <thead class="table-light">
                  <tr>
                    <th class="ps-4">Học viên</th>
                    <th>Ngày đăng ký</th>
                    <th class="text-end pe-4">Trạng thái</th>
                  </tr>
                  </thead>
                  <tbody id="studentTableBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>

<script th:inline="javascript">
  function getCurrentId() {
      const url = window.location.pathname;
      if (url.includes('/edit/')) {
          const parts = url.split('/edit/');
          const id = parts[1];
          return id && !isNaN(id) ? id : null;
      }
      if (url.includes('/detail/')) {
          const parts = url.split('/detail/');
          const id = parts[1];
          return id && !isNaN(id) ? id : null;
      }
      const id = url.substring(url.lastIndexOf('/') + 1);
      if (id === 'create' || isNaN(id)) return null;
      return id;
  }

  const classId = getCurrentId();
  const path = window.location.pathname;
  const isEditMode = path.includes('/edit/');
  const isCreateMode = path === '/manager/class/create';
  const isDetailMode = path.includes('/detail/');
  const ALL_SLOT_TIMES = [
      'Sáng (7:00 - 9:00)', 'Sáng (9:00 - 11:00)',
      'Chiều (13:00 - 15:00)', 'Chiều (15:00 - 17:00)', 'Tối (18:00 - 20:00)'
  ];

  function renderSlotOptions(slots, selectedSlot = '') {
      const slotSelect = document.getElementById('slotTime');
      if (!slotSelect) return;
      const safeSlots = (slots && slots.length > 0) ? slots : ALL_SLOT_TIMES;
      slotSelect.innerHTML = '<option value="">-- Chọn ca học --</option>';
      safeSlots.forEach(slot => {
          const option = document.createElement('option');
          option.value = slot;
          option.textContent = slot;
          if (selectedSlot && slot.toLowerCase() === selectedSlot.toLowerCase()) option.selected = true;
          slotSelect.appendChild(option);
      });
  }

  async function fetchAvailableSlots(selectedSlot = '') {
      const teacherId = document.getElementById('teacherId').value;
      const scheduleStr = buildScheduleString();
      if (!teacherId || !scheduleStr) { renderSlotOptions(ALL_SLOT_TIMES, selectedSlot); return; }
      try {
          const excludeClassId = classId ? `&excludeClassId=${classId}` : '';
          const res = await fetch(`/api/v1/classes/available-slots?teacherId=${encodeURIComponent(teacherId)}&schedule=${encodeURIComponent(scheduleStr)}${excludeClassId}`);
          const result = await res.json();
          if (result.status === 200) renderSlotOptions(result.data || [], selectedSlot);
          else renderSlotOptions(ALL_SLOT_TIMES, selectedSlot);
      } catch (err) { renderSlotOptions(ALL_SLOT_TIMES, selectedSlot); }
  }

  function bindScheduleTeacherEvents() {
      document.getElementById('teacherId').addEventListener('change', () => fetchAvailableSlots());
      document.querySelectorAll('.schedule-check input[type="checkbox"]').forEach(cb => {
          cb.addEventListener('change', () => fetchAvailableSlots());
      });
  }

  // Schedule helpers
  function buildScheduleString() {
      const checked = [];
      document.querySelectorAll('.schedule-check input[type="checkbox"]:checked').forEach(cb => {
          checked.push(cb.value);
      });
      return checked.join(',');
  }

  function parseScheduleToCheckboxes(scheduleStr) {
      if (!scheduleStr) return;
      // Parse "2,4,6" or "Thứ 2, 4, 6" etc.
      const normalized = scheduleStr.toLowerCase()
          .replace(/thứ\s*/g, '').replace(/cn|chủ\s*nhật|sunday/g, '8');
      const nums = normalized.match(/\b([2-8])\b/g) || [];
      nums.forEach(n => {
          const val = n === '8' ? '8' : n;
          const cb = document.getElementById('day' + val);
          if (cb) cb.checked = true;
      });
  }

  function onScheduleChange() {
      calculateEndDate();
      fetchAvailableSlots();
  }

  // Auto-calculate endDate
  function parseScheduleDays(schedule) {
      if (!schedule) return [];
      const days = [];
      const normalized = schedule.toLowerCase()
          .replace(/thứ\s*/g, '').replace(/cn|chủ\s*nhật|sunday/g, '8')
          .replace(/t2/g, '2').replace(/t3/g, '3').replace(/t4/g, '4')
          .replace(/t5/g, '5').replace(/t6/g, '6').replace(/t7/g, '7');
      const nums = normalized.match(/\b([2-8])\b/g) || [];
      nums.forEach(n => { const v = n === '8' ? '7' : n; if (!days.includes(v)) days.push(v); });
      return days.sort();
  }

  function calculateEndDate() {
      const scheduleStr = buildScheduleString();
      const startDateEl = document.getElementById('startDate');
      const numSessionsEl = document.getElementById('numberOfSessions');
      const endDateEl = document.getElementById('endDate');
      if (!scheduleStr || !startDateEl.value || !numSessionsEl.value) return;
      const weekdays = parseScheduleDays(scheduleStr);
      if (weekdays.length === 0) return;
      const startDate = new Date(startDateEl.value + 'T00:00:00');
      if (isNaN(startDate.getTime())) return;
      let current = new Date(startDate);
      let sessionsLeft = parseInt(numSessionsEl.value);
      const maxDays = sessionsLeft * 14;
      for (let i = 0; i < maxDays && sessionsLeft > 0; i++) {
          const dow = current.getDay(); // 0=Sun
          const targetDow = dow === 0 ? '7' : String(dow);
          if (weekdays.includes(targetDow)) {
              sessionsLeft--;
              if (sessionsLeft === 0) {
                  const y = current.getFullYear();
                  const m = String(current.getMonth() + 1).padStart(2, '0');
                  const d = String(current.getDate()).padStart(2, '0');
                  endDateEl.value = `${y}-${m}-${d}`;
                  return;
              }
          }
          current.setDate(current.getDate() + 1);
      }
  }

  function bindAutoEndDate() {
      ['startDate', 'numberOfSessions'].forEach(id => {
          const el = document.getElementById(id);
          if (el) { el.addEventListener('input', calculateEndDate); el.addEventListener('change', calculateEndDate); }
      });
      setTimeout(calculateEndDate, 100);
  }

  function setupDateConstraints() {
      const startDateEl = document.getElementById('startDate');
      const endDateEl = document.getElementById('endDate');
      if (!startDateEl || !endDateEl) return;
      const today = new Date(); today.setHours(0,0,0,0);
      const minDate = today.toISOString().split('T')[0];
      startDateEl.setAttribute('min', minDate);
      endDateEl.setAttribute('min', minDate);
  }

  document.addEventListener("DOMContentLoaded", function() {
      if (isCreateMode) {
          showFormMode(false);
          renderSlotOptions(ALL_SLOT_TIMES);
          loadCourses(); loadTeachers();
          bindScheduleTeacherEvents(); bindAutoEndDate(); setupDateConstraints();
          // Auto-fill Số buổi học khi chọn khóa học
          document.getElementById('courseId').addEventListener('change', function() {
              const courseId = this.value;
              if (courseId && courseDataMap[courseId] && courseDataMap[courseId].numberOfSessions) {
                  document.getElementById('numberOfSessions').value = courseDataMap[courseId].numberOfSessions;
                  calculateEndDate();
              }
          });
      } else if (isEditMode && classId) {
          showFormMode(true);
          renderSlotOptions(ALL_SLOT_TIMES);
          loadCourses(); loadTeachers();
          bindScheduleTeacherEvents(); bindAutoEndDate(); setupDateConstraints();
          loadClassDetailForEdit();
      } else if (isDetailMode && classId) {
          showDetailMode(); loadClassDetailForView();
      } else if (classId) {
          showDetailMode(); loadClassDetailForView();
      }
  });

  function showFormMode(isEdit = false) {
      document.getElementById('detailSection').style.display = 'none';
      document.getElementById('classFormSection').style.display = 'block';
      document.getElementById('pageTitle').innerText = isEdit ? 'Chỉnh sửa lớp học' : 'Tạo lớp học mới';
      document.getElementById('actionButtons').style.display = 'none';
  }

  function showDetailMode() {
      document.getElementById('detailSection').style.display = 'block';
      document.getElementById('classFormSection').style.display = 'none';
  }

  // Store course data for auto-fill
  let courseDataMap = {};

  async function loadCourses() {
      try {
          const res = await fetch('/api/v1/courses/list?pageNo=0&pageSize=100');
          const result = await res.json();
          if (result.data && result.data.items) {
              const select = document.getElementById('courseId');
              result.data.items.forEach(c => {
                  courseDataMap[c.courseId] = c;
                  const opt = document.createElement('option');
                  opt.value = c.courseId; opt.textContent = c.courseName; select.appendChild(opt);
              });
          }
      } catch (err) { console.error('Error loading courses', err); }
  }

  async function loadTeachers() {
      try {
          const res = await fetch('/api/v1/accounts/list?pageNo=0&pageSize=100');
          const result = await res.json();
          if (result.data && result.data.items) {
              const teachers = result.data.items.filter(u => u.roleName && u.roleName.toLowerCase().includes('teacher'));
              const select = document.getElementById('teacherId');
              teachers.forEach(t => {
                  const opt = document.createElement('option');
                  opt.value = t.userId; opt.textContent = t.fullName; select.appendChild(opt);
              });
          }
      } catch (err) { console.error('Error loading teachers', err); }
  }

  async function loadClassDetail() {
      if (!classId) return null;
      try {
          const res = await fetch(`/api/v1/classes/detail/${classId}`);
          if (!res.ok) return null;
          const result = await res.json();
          if (result.status !== 200 || !result.data) return null;
          const d = result.data;
          window.classData = {
              classId: d.classId, className: d.className || '', courseId: d.courseId,
              teacherId: d.teacherId, status: d.status || 'Draft',
              schedule: d.schedule || '', slotTime: d.slotTime || d.slot_time || '',
              startDate: d.startDate || d.start_date,
              endDate: d.endDate || d.end_date,
              courseName: d.courseName || 'N/A',
              teacherName: d.teacherName || 'Chưa phân công',
              registrations: d.registrations || [],
              meetLink: d.meetLink || '',
              numberOfSessions: d.numberOfSessions || null,
              description: d.description || ''
          };
          return window.classData;
      } catch (err) { console.error(err); return null; }
  }

  async function loadClassDetailForEdit() {
      const data = await loadClassDetail();
      if (!data) return;
      document.getElementById('classId').value = data.classId;
      document.getElementById('className').value = data.className;
      document.getElementById('description').value = data.description || '';
      await fetchAvailableSlots(data.slotTime);
      if (data.numberOfSessions) document.getElementById('numberOfSessions').value = data.numberOfSessions;
      if (data.meetLink) document.getElementById('meetLink').value = data.meetLink;
      if (data.startDate) document.getElementById('startDate').value = data.startDate.split('T')[0];
      if (data.endDate) document.getElementById('endDate').value = data.endDate.split('T')[0];
      // Set radio for status
      document.querySelectorAll('input[name="classStatus"]').forEach(r => r.checked = false);
      const statusRadio = document.getElementById('st' + data.status);
      if (statusRadio) statusRadio.checked = true;
      // Parse schedule to checkboxes
      parseScheduleToCheckboxes(data.schedule);
      document.getElementById('pageTitle').innerText = 'Chỉnh sửa lớp học';
      setTimeout(async () => {
          if (data.courseId) { const s = document.getElementById('courseId'); if (s) s.value = data.courseId; }
          if (data.teacherId) {
              const s = document.getElementById('teacherId');
              if (s) { s.value = data.teacherId; await fetchAvailableSlots(data.slotTime); }
          }
      }, 500);
  }

  async function loadClassDetailForView() {
      const data = await loadClassDetail();
      if (!data) return;
      document.getElementById('displayClassName').innerText = data.className || 'N/A';
      document.getElementById('detailCourseName').innerText = data.courseName;
      document.getElementById('detailTeacherName').innerText = data.teacherName;
      document.getElementById('detailSchedule').innerText = formatScheduleDisplay(data.schedule);
      document.getElementById('detailSlot').innerText = data.slotTime || 'N/A';
      document.getElementById('detailStart').innerText = formatDate(data.startDate);
      document.getElementById('detailEnd').innerText = formatDate(data.endDate);
      document.getElementById('detailSessions').innerText = data.numberOfSessions || '---';
      const st = data.status;
      const badge = document.getElementById('detailStatusBadge');
      badge.innerText = st; badge.className = `st-badge st-${st}`;
      if (data.description) {
          document.getElementById('detailDescription').innerText = data.description;
          document.getElementById('detailDescriptionSection').style.display = 'block';
      }
      if (data.registrations && data.registrations.length > 0) renderStudents(data.registrations);
      // Set manage students button
      const btn = document.getElementById('btnManageStudents');
      if (btn && classId) btn.href = `/manager/class/students/${classId}`;
  }

  function formatScheduleDisplay(schedule) {
      if (!schedule) return '---';
      const map = { '2': 'Thứ 2', '3': 'Thứ 3', '4': 'Thứ 4', '5': 'Thứ 5', '6': 'Thứ 6', '7': 'Thứ 7', '8': 'CN' };
      const days = schedule.split(',').map(d => map[d.trim()] || d.trim());
      return days.join(', ');
  }

  function renderStudents(list) {
      const tbody = document.getElementById('studentTableBody');
      if (!tbody) return;
      document.getElementById('studentCount').innerText = list.length;
      if (!list || list.length === 0) {
          tbody.innerHTML = '<tr><td colspan="3" class="text-center py-4 text-muted">Chưa có học viên</td></tr>';
          return;
      }
      let html = '';
      list.forEach(s => {
          const sc = s.status === 'Approved' ? 'bg-success' : (s.status === 'Rejected' ? 'bg-danger' : 'bg-warning');
          html += `<tr><td class="ps-4"><div class="fw-bold">${s.userName || '---'}</div><div class="small text-muted">${s.userEmail || ''}</div></td><td>${formatDate(s.registrationTime)}</td><td class="text-end pe-4"><span class="badge ${sc}">${s.status || 'Pending'}</span></td></tr>`;
      });
      tbody.innerHTML = html;
  }

  function formatDate(str) {
      if (!str) return '---';
      const d = new Date(str); return isNaN(d.getTime()) ? str : d.toLocaleDateString('vi-VN');
  }

  function goToEdit() { if (classId) window.location.href = `/manager/class/edit/${classId}`; }

  // Form submit
  document.getElementById('classForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const setError = (id, msg) => { const el = document.getElementById(id + 'Error'); if (el) el.textContent = msg || ''; };
      const clearErrors = () => ['className','courseId','teacherId','schedule','numberOfSessions','meetLink','startDate'].forEach(id => setError(id,''));
      clearErrors();
      const className = document.getElementById('className').value.trim();
      const courseId = document.getElementById('courseId').value;
      const scheduleStr = buildScheduleString();
      const numberOfSessions = parseInt(document.getElementById('numberOfSessions').value);
      let hasError = false;
      if (!className) { setError('className','Vui lòng nhập tên lớp học.'); hasError = true; }
      if (!courseId) { setError('courseId','Vui lòng chọn khóa học.'); hasError = true; }
      if (!document.getElementById('teacherId').value) { setError('teacherId','Vui lòng chọn giảng viên.'); hasError = true; }
      if (!scheduleStr) { setError('schedule','Vui lòng chọn ít nhất một ngày học.'); hasError = true; }
      if (!numberOfSessions || numberOfSessions <= 0) { setError('numberOfSessions','Vui lòng nhập số buổi học.'); hasError = true; }
      const startDate = document.getElementById('startDate').value;
      if (!startDate) { setError('startDate','Vui lòng chọn ngày khai giảng.'); hasError = true; }
      const meetLink = document.getElementById('meetLink').value.trim();
      if (!meetLink) { setError('meetLink','Vui lòng nhập link meet.'); hasError = true; }
      if (hasError) return;

      const status = document.querySelector('input[name="classStatus"]:checked')?.value || 'Draft';
      const endDate = document.getElementById('endDate').value;
      const formatDt = (d) => d ? d + 'T00:00:00' : null;

      const payload = {
          className, courseId: parseInt(courseId),
          teacherId: document.getElementById('teacherId').value ? parseInt(document.getElementById('teacherId').value) : null,
          status, startDate: formatDt(startDate),
          endDate: endDate ? formatDt(endDate) : null,
          schedule: scheduleStr, slotTime: document.getElementById('slotTime').value,
          numberOfSessions, meetLink,
          description: document.getElementById('description').value.trim()
      };

      try {
          const url = classId ? `/api/v1/classes/${classId}` : '/api/v1/classes/';
          const method = classId ? 'PUT' : 'POST';
          const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
          const result = await res.json();
          if (result.status === 201 || result.status === 200 || result.status === 202) {
              alert('Lưu thành công!');
              window.location.href = '/manager/class/list';
          } else { setError('className', result.message || 'Lưu thất bại.'); }
      } catch (err) { setError('className','Không thể kết nối máy chủ.'); }
  });
</script>
</body>
</html>
