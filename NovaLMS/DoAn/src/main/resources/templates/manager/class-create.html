<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:with="isDashboard=true">
  <th:block th:replace="~{fragments/head :: common-head(pageTitle='Thiết lập lớp học')}"></th:block>
</head>

<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Quản lý đào tạo', breadcrumb='Thiết lập lớp học')}"></header>

<aside id="dashSidebar" class="dash-sidebar">
  <div th:replace="~{fragments/sidebar :: dash-sidebar(activePage='classes')}"></div>
</aside>

<div id="dashOverlay" class="dash-overlay"></div>

<main class="dash-main" id="dashMain">
  <div class="mb-4 d-flex justify-content-between align-items-end">
    <div>
      <a th:href="@{/manager/class/list}" class="btn btn-link text-decoration-none p-0 mb-2 text-muted small">
        <i class="bi bi-arrow-left"></i> Quay lại danh sách
      </a>
      <h3 class="fw-bold text-dark m-0" id="formTitle">Tạo lớp học mới</h3>
    </div>
    <div id="studentCountBadge" class="d-none">
      <div class="bg-white border rounded-pill px-3 py-2 shadow-sm d-flex align-items-center">
        <i class="bi bi-people-fill text-primary me-2"></i>
        <span class="small fw-bold text-secondary">Sĩ số: </span>
        <span id="currentStudents" class="ms-1 fw-bold text-primary">0</span>
        <span class="text-muted small mx-1">/</span>
        <span class="small text-muted">Không giới hạn</span>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-lg-8">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <form id="classForm">
            <div class="row g-3">
              <div class="col-md-12">
                <label class="form-label small fw-bold text-secondary">Tên lớp học</label>
                <input type="text" id="className" class="form-control bg-light border-0 shadow-none" placeholder="VD: IELTS-K15" required>
              </div>

              <div class="col-md-6">
                <label class="form-label small fw-bold text-secondary">Khóa học <span class="text-danger">*</span></label>
                <select id="courseId" class="form-select bg-light border-0 shadow-none" required>
                  <option value="">-- Chọn khóa học --</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label small fw-bold text-secondary">Giảng viên</label>
                <select id="teacherId" class="form-select bg-light border-0 shadow-none">
                  <option value="">-- Chưa phân công --</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label small fw-bold text-secondary">Lịch học</label>
                <select id="schedule" class="form-select bg-light border-0 shadow-none">
                  <option value="Thứ 2-4-6">Thứ 2 - 4 - 6</option>
                  <option value="Thứ 3-5-7">Thứ 3 - 5 - 7</option>
                  <option value="Cuối tuần">Thứ 7 & Chủ nhật</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label small fw-bold text-secondary">Ca học (Slot Time)</label>
                <select id="slotTime" class="form-select bg-light border-0 shadow-none">
                  <option value="08:00 - 10:00">08:00 - 10:00</option>
                  <option value="10:00 - 12:00">10:00 - 12:00</option>
                  <option value="13:30 - 15:30">13:30 - 15:30</option>
                  <option value="18:00 - 20:00">18:00 - 20:00</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label small fw-bold text-secondary">Ngày khai giảng</label>
                <input type="datetime-local" id="startDate" class="form-control bg-light border-0 shadow-none" required>
              </div>

              <div class="col-md-6">
                <label class="form-label small fw-bold text-secondary">Dự kiến kết thúc</label>
                <input type="datetime-local" id="endDate" class="form-control bg-light border-0 shadow-none">
              </div>

              <div class="col-md-6">
                <label class="form-label small fw-bold text-secondary">Trạng thái lớp</label>
                <div class="d-flex gap-2">
                  <input type="radio" class="btn-check" name="status" id="stPending" value="Pending" checked>
                  <label class="btn btn-outline-warning btn-sm border-0 shadow-none px-3" for="stPending">Pending</label>

                  <input type="radio" class="btn-check" name="status" id="stOpen" value="Open">
                  <label class="btn btn-outline-success btn-sm border-0 shadow-none px-3" for="stOpen">Open</label>

                  <input type="radio" class="btn-check" name="status" id="stClosed" value="Closed">
                  <label class="btn btn-outline-danger btn-sm border-0 shadow-none px-3" for="stClosed">Closed</label>
                </div>
              </div>
            </div>

            <div class="mt-4 pt-3 border-top d-flex justify-content-end gap-2">
              <a th:href="@{/manager/class/list" class="btn btn-light fw-bold px-4 rounded-pill">Hủy bỏ</a>
              <button type="button" onclick="handleSave()" class="btn btn-primary fw-bold px-4 rounded-pill shadow-sm">
                <i class="bi bi-save me-1"></i> Lưu lớp học
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="col-lg-4">
      <div class="card border-0 shadow-sm bg-primary text-white mb-3">
        <div class="card-body">
          <h6 class="fw-bold"><i class="bi bi-lightbulb me-2"></i>Mẹo nhỏ</h6>
          <p class="small mb-0 opacity-75">Hãy đảm bảo giảng viên đã có lịch trống trước khi phân công để tránh xung đột ca dạy.</p>
        </div>
      </div>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>

<script>
  const path = window.location.pathname;
  const isEdit = path.includes('/edit/');
  const classId = isEdit ? path.split('/').pop() : null;

  document.addEventListener("DOMContentLoaded", async function() {
      // Load các dropdown data trước
      await Promise.all([loadCourses(), loadTeachers()]);

      if (isEdit) {
          document.getElementById('formTitle').innerText = "Cập nhật lớp học";
          loadClassData();
      }
  });

  async function loadCourses() {
      const res = await fetch('/api/v1/courses/list?pageSize=100');
      const json = await res.json();
      const select = document.getElementById('courseId');
      json.data.items.forEach(c => {
          select.innerHTML += `<option value="${c.courseId}">${c.courseName}</option>`;
      });
  }

  async function loadTeachers() {
      const res = await fetch('/api/v1/accounts/list?roleId=3&pageSize=100');
      const json = await res.json();
      const select = document.getElementById('teacherId');
      json.data.items.forEach(t => {
          select.innerHTML += `<option value="${t.userId}">${t.fullName}</option>`;
      });
  }

  function loadClassData() {
      fetch(`/api/v1/classes/detail/${classId}`)
          .then(res => res.json())
          .then(res => {
              if(res.status === 200) {
                  const data = res.data;
                  document.getElementById('className').value = data.className;
                  document.getElementById('courseId').value = data.courseId;
                  document.getElementById('teacherId').value = data.teacherId || "";
                  document.getElementById('schedule').value = data.schedule;
                  document.getElementById('slotTime').value = data.slotTime;
                  document.getElementById('startDate').value = data.startDate;
                  document.getElementById('endDate').value = data.endDate;

                  // Set radio status
                  document.querySelector(`input[name="status"][value="${data.status}"]`).checked = true;

                  // Hiển thị sĩ số (Giả định Backend trả về số lượng trong ClassDetailResponse)
                  document.getElementById('studentCountBadge').classList.remove('d-none');
                  document.getElementById('currentStudents').innerText = data.studentCount || 0;
              }
          });
  }

  function handleSave() {
      const formData = {
          className: document.getElementById('className').value,
          courseId: document.getElementById('courseId').value,
          teacherId: document.getElementById('teacherId').value || null,
          schedule: document.getElementById('schedule').value,
          slotTime: document.getElementById('slotTime').value,
          startDate: document.getElementById('startDate').value,
          endDate: document.getElementById('endDate').value,
          status: document.querySelector('input[name="status"]:checked').value
      };

      const url = isEdit ? `/api/v1/classes/${classId}` : `/api/v1/classes/`;
      const method = isEdit ? 'PUT' : 'POST';

      fetch(url, {
          method: method,
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(formData)
      })
      .then(res => res.json())
      .then(res => {
          if(res.status === 200 || res.status === 201 || res.status === 202) {
              alert("Lưu thành công!");
              window.location.href = "/admin/classes";
          } else {
              alert("Lỗi: " + res.message);
          }
      });
  }
</script>
</body>
</html>
