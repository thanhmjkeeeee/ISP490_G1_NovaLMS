<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:with="isDashboard=true">
  <th:block th:replace="~{fragments/head :: common-head(pageTitle='Chi tiết lớp học')}"></th:block>
  <style>
    /* FIX LỖI CUỘN: Cho phép trang cuộn tự nhiên */
    html, body { height: auto !important; overflow-y: auto !important; }
    .dashboard-body { display: block !important; }
    .dash-main { min-height: 100vh !important; padding-bottom: 100px !important; overflow: visible !important; }

    .card-custom { border: none; box-shadow: 0 5px 20px rgba(0,0,0,0.05); border-radius: 12px; background: #fff; }
    .info-label { font-size: 0.75rem; text-transform: uppercase; color: #94a3b8; font-weight: 800; }
    .info-value { font-weight: 700; color: #1e293b; font-size: 1rem; }

    .st-badge { padding: 5px 15px; border-radius: 50px; font-weight: 800; font-size: 11px; text-transform: uppercase; }
    .st-Open { background: #d1e7dd; color: #0f5132; }
    .st-Pending { background: #fff3cd; color: #856404; }
    .st-Closed { background: #f8d7da; color: #842029; }
  </style>
</head>

<body class="dashboard-body">
<header th:replace="~{fragments/header :: dash-header(pageTitle='Quản lý đào tạo', breadcrumb='Chi tiết lớp')}"></header>
<aside id="dashSidebar" class="dash-sidebar">
  <div th:replace="~{fragments/sidebar :: dash-sidebar(activePage='classes')}"></div>
</aside>

<main class="dash-main" id="dashMain">
  <div class="container-fluid px-4 py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <a th:href="@{/manager/class/list}" class="btn btn-sm btn-light text-muted fw-bold mb-2">
          <i class="bi bi-arrow-left"></i> QUAY LẠI
        </a>
        <h3 class="fw-bold text-dark m-0">Lớp: <span id="displayClassName">Đang tải...</span></h3>
      </div>
      <button onclick="goToEdit()" class="btn btn-warning shadow-sm fw-bold rounded-pill px-4">
        <i class="bi bi-pencil-square me-1"></i> Chỉnh sửa
      </button>
    </div>

    <div class="row g-4">
      <div class="col-lg-4">
        <div class="card card-custom p-4 text-center">
          <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3 mx-auto" style="width: 70px; height: 70px;">
            <i class="bi bi-door-open-fill fs-2"></i>
          </div>
          <h5 class="fw-bold mb-1" id="detailCourseName">---</h5>
          <div class="mb-4"><span id="detailStatusBadge" class="st-badge">---</span></div>

          <div class="text-start border-top pt-4">
            <div class="mb-3">
              <p class="info-label mb-1">Giảng viên</p>
              <p class="info-value" id="detailTeacherName">Chưa phân công</p>
            </div>
            <div class="mb-3">
              <p class="info-label mb-1">Lịch học & Ca</p>
              <p class="info-value"><span id="detailSchedule">---</span> | <span id="detailSlot">---</span></p>
            </div>
            <div class="row g-2">
              <div class="col-6">
                <p class="info-label mb-1">Khai giảng</p>
                <p class="info-value small text-success" id="detailStart">---</p>
              </div>
              <div class="col-6">
                <p class="info-label mb-1">Kết thúc</p>
                <p class="info-value small text-danger" id="detailEnd">---</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card card-custom h-100">
          <div class="card-header bg-white border-0 p-4 d-flex justify-content-between align-items-center">
            <h5 class="fw-bold m-0">Học viên (<span id="studentCount">0</span>)</h5>
          </div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                  <th class="ps-4">Học viên</th>
                  <th>Ngày đăng ký</th>
                  <th class="text-end pe-4">Trạng thái</th>
                </tr>
                </thead>
                <tbody id="studentTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>

<script th:inline="javascript">
  // HÀM LẤY ID CHUẨN: Lấy số cuối cùng từ URL (Vd: .../detail/101 -> 101)
  function getCurrentId() {
      const url = window.location.pathname;
      const id = url.substring(url.lastIndexOf('/') + 1);
      return id;
  }

  const classId = getCurrentId();

  document.addEventListener("DOMContentLoaded", loadClassDetail);

  async function loadClassDetail() {
      try {
          const res = await fetch(`/api/v1/classes/detail/${classId}`);
          const result = await res.json();

          console.log("Dữ liệu gốc:", result);

          // Bóc tách dữ liệu lớp học (Hỗ trợ cả object đơn hoặc mảng items)
          let d = null;
          if (result.data) {
              if (result.data.items && result.data.items.length > 0) d = result.data.items[0];
              else if (Array.isArray(result.data)) d = result.data[0];
              else d = result.data;
          }

          if (d) {
              // Điền thông tin (Dùng cả snake_case và camelCase cho chắc chắn)
              document.getElementById('displayClassName').innerText = d.class_name || d.className || 'N/A';
              document.getElementById('detailCourseName').innerText = d.course_name || d.courseName || 'N/A';
              document.getElementById('detailTeacherName').innerText = d.teacher_name || d.teacherName || 'Chưa phân công';
              document.getElementById('detailSchedule').innerText = d.schedule || 'N/A';
              document.getElementById('detailSlot').innerText = d.slot_time || d.slotTime || 'N/A';

              document.getElementById('detailStart').innerText = formatDate(d.start_date || d.startDate);
              document.getElementById('detailEnd').innerText = formatDate(d.end_date || d.endDate);

              const st = d.status || 'Pending';
              const badge = document.getElementById('detailStatusBadge');
              badge.innerText = st;
              badge.className = `st-badge st-${st}`;

              renderStudents(d.students || []);
          }
      } catch (err) {
          console.error("Lỗi:", err);
      }
  }

  function renderStudents(list) {
      const tbody = document.getElementById('studentTableBody');
      document.getElementById('studentCount').innerText = list.length;
      if (!list || list.length === 0) {
          tbody.innerHTML = '<tr><td colspan="3" class="text-center py-4">Chưa có học viên</td></tr>';
          return;
      }
      tbody.innerHTML = list.map(s => `
          <tr>
              <td class="ps-4">
                  <div class="fw-bold">${s.full_name || s.fullName || '---'}</div>
                  <div class="small text-muted">${s.email || ''}</div>
              </td>
              <td>${formatDate(s.registration_date || s.registrationDate)}</td>
              <td class="text-end pe-4"><span class="badge bg-success bg-opacity-10 text-success">Active</span></td>
          </tr>
      `).join('');
  }

  function formatDate(str) {
      if (!str) return '---';
      const d = new Date(str);
      return isNaN(d.getTime()) ? str : d.toLocaleDateString('vi-VN');
  }

  // FIX CHÍNH: Chuyển hướng đúng ID
  function goToEdit() {
      const id = getCurrentId();
      if(id) {
          window.location.href = `/manager/class/edit/${id}`;
      }
  }
</script>
</body>
</html>
