<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:with="isDashboard=true">

<!-- 1. Gọi Head Fragment (Mới) -->
<head th:replace="~{fragments/head :: common-head(pageTitle='Manager Dashboard')}"></head>

<!-- Thêm class chuẩn cho thẻ body -->
<body class="dashboard-body">

<!-- 2. Gọi Header (Topbar) -->
<header th:replace="~{fragments/header :: dash-header(pageTitle='Dashboard Overview', breadcrumb='Admin')}"></header>

<!-- 3. Gọi Sidebar & Overlay (Mới) -->
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='dashboard')}"></aside>
<div th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<!-- 4. Thẻ main đổi thành class dash-main và thêm id -->
<main class="dash-main d-flex flex-column" id="dashMain">

    <!-- ========================================== -->
    <!-- GIỮ NGUYÊN 100% NỘI DUNG CODE GỐC CỦA BẠN  -->
    <!-- ========================================== -->
    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h3 class="fw-bold m-0" style="color: #223a58;">Dashboard Overview</h3>
            <p class="text-muted small m-0">Welcome back, Manager.</p>
        </div>
        <div>
            <a th:href="@{/admin/courses/new}" class="btn btn-sm fw-bold shadow-sm d-flex align-items-center rounded-pill px-3 text-white" style="background-color: #136ad5;">
                <i class="bi bi-plus-lg me-1"></i> New Course
            </a>
        </div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-xl-3 col-md-6">
            <div class="card h-100 p-3 shadow-sm border-0 rounded-4">
                <div class="d-flex align-items-center">
                    <div class="rounded-circle d-flex align-items-center justify-content-center me-3" style="width:50px; height:50px; font-size:24px; background-color: rgba(19, 106, 213, 0.1); color: #136ad5;">
                        <i class="bi bi-people-fill"></i>
                    </div>
                    <div>
                        <h6 class="text-muted small text-uppercase fw-bold mb-1">Students</h6>
                        <h4 class="fw-bold mb-0 text-dark" id="statStudents">-</h4>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-xl-3 col-md-6">
            <div class="card h-100 p-3 shadow-sm border-0 rounded-4">
                <div class="d-flex align-items-center">
                    <div class="rounded-circle bg-success bg-opacity-10 text-success d-flex align-items-center justify-content-center me-3" style="width:50px; height:50px; font-size:24px;">
                        <i class="bi bi-journal-bookmark-fill"></i>
                    </div>
                    <div>
                        <h6 class="text-muted small text-uppercase fw-bold mb-1">Courses</h6>
                        <h4 class="fw-bold mb-0 text-dark" id="statCourses">-</h4>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-xl-3 col-md-6">
            <div class="card h-100 p-3 shadow-sm border-0 rounded-4">
                <div class="d-flex align-items-center">
                    <div class="rounded-circle bg-warning bg-opacity-10 text-warning d-flex align-items-center justify-content-center me-3" style="width:50px; height:50px; font-size:24px;">
                        <i class="bi bi-easel-fill"></i>
                    </div>
                    <div>
                        <h6 class="text-muted small text-uppercase fw-bold mb-1">Classes</h6>
                        <h4 class="fw-bold mb-0 text-dark" id="statClasses">-</h4>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-xl-3 col-md-6">
            <div class="card h-100 p-3 shadow-sm border-0 rounded-4">
                <div class="d-flex align-items-center">
                    <div class="rounded-circle bg-danger bg-opacity-10 text-danger d-flex align-items-center justify-content-center me-3" style="width:50px; height:50px; font-size:24px;">
                        <i class="bi bi-person-plus-fill"></i>
                    </div>
                    <div>
                        <h6 class="text-muted small text-uppercase fw-bold mb-1">New Enrollments</h6>
                        <h4 class="fw-bold mb-0 text-dark" id="statNewRegs">-</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Thêm mb-auto để đẩy các thành phần nếu có xuống đáy -->
    <div class="card border-0 shadow-sm mb-auto rounded-4 mb-4">
        <div class="card-header bg-white py-3 border-bottom d-flex justify-content-between align-items-center">
            <h6 class="m-0 fw-bold" style="color: #223a58;">Recent Registrations</h6>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
               <table class="table table-hover align-middle mb-0">
                  <thead class="table-light text-muted small">
                     <tr>
                        <th class="ps-4">Student</th>
                        <th>Email</th>
                        <th>Course</th>
                        <th>Date Enrolled</th>
                        <th>Status</th>
                     </tr>
                  </thead>
                  <tbody id="recentRegistrationsTbody">
                     <tr><td colspan="5" class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm" role="status"></div> Loading...</td></tr>
                  </tbody>
               </table>
            </div>
        </div>
    </div>

</main>

<!-- 5. Gọi Script Components thay cho admin-footer cũ -->
<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<script>
    document.addEventListener("DOMContentLoaded", async function() {
        try {
            const response = await fetch('/manager/api/v1/dashboard/data');
            const data = await response.json();
            
            if (data) {
                document.getElementById('statStudents').textContent = data.totalStudents || 0;
                document.getElementById('statCourses').textContent = data.totalCourses || 0;
                document.getElementById('statClasses').textContent = data.totalClasses || 0;
                document.getElementById('statNewRegs').textContent = data.newRegistrationsThisWeek || 0;
                
                const tbody = document.getElementById('recentRegistrationsTbody');
                if (data.recentRegistrations && data.recentRegistrations.length > 0) {
                    tbody.innerHTML = data.recentRegistrations.map(r => `
                        <tr>
                            <td class="ps-4 fw-medium text-dark">${r.studentName}</td>
                            <td class="text-muted">${r.studentEmail}</td>
                            <td>${r.courseName}</td>
                            <td>${new Date(r.enrolledAt).toLocaleDateString('vi-VN')}</td>
                            <td>
                                <span class="badge ${r.status === 'Approved' ? 'bg-success bg-opacity-10 text-success' : 'bg-warning bg-opacity-10 text-warning'}">${r.status}</span>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">No recent registrations found.</td></tr>';
                }
            }
        } catch (error) {
            console.error("Dashboard error:", error);
            document.getElementById('recentRegistrationsTbody').innerHTML = '<tr><td colspan="5" class="text-center py-4 text-danger">Failed to load data.</td></tr>';
        }
    });
</script>

</body>
</html>
