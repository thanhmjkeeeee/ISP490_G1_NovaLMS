<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:with="isDashboard=true">
    <th:block th:replace="~{fragments/head :: common-head(pageTitle='Quản lý lớp học')}"></th:block>
    <style>
        html, body, .dashboard-body { height: auto !important; overflow: visible !important; }
        .dash-main { height: auto !important; min-height: 100vh !important; overflow-y: visible !important; padding-bottom: 5rem !important; display: block !important; }
        .status-badge { padding: 6px 12px; border-radius: 50px; font-size: 11px; font-weight: 700; text-transform: uppercase; display: inline-block; }
        .st-open { background-color: #d1e7dd !important; color: #0f5132 !important; }
        .st-pending, .st-draft { background-color: #fff3cd !important; color: #856404 !important; }
        .st-closed { background-color: #f8d7da !important; color: #842029 !important; }
        .card-custom { border: none; box-shadow: 0 5px 20px rgba(0,0,0,0.08); border-radius: 12px; background: #fff; }
        .input-custom { border-radius: 8px; background-color: #f8f9fa !important; border: 1px solid #dee2e6; height: 42px; }
        .pagination .page-link { border: none; margin: 0 3px; border-radius: 8px !important; background-color: #f8f9fa; }
        .pagination .page-item.active .page-link { background-color: #0d6efd; color: #fff; }
        select.input-custom { display: flex; align-items: center; }
    </style>
</head>

<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Quản lý đào tạo', breadcrumb='Quản lý lớp')}"></header>

<aside id="dashSidebar" class="dash-sidebar">
    <div th:replace="~{fragments/sidebar :: dash-sidebar(activePage='classes')}"></div>
</aside>

<main class="dash-main" id="dashMain">
    <div class="container-fluid px-4 py-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold text-dark m-0">Quản lý lớp học</h3>
                <p class="text-muted small m-0">Danh sách lớp học và phân công giảng viên.</p>
            </div>
            <a th:href="@{/manager/class/create}" class="btn btn-primary shadow-sm fw-bold rounded-pill px-4">
                <i class="bi bi-plus-lg me-1"></i> Tạo lớp mới
            </a>
        </div>

        <!-- Filter Row -->
        <div class="card card-custom mb-4">
            <div class="card-body p-4">
                <div class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label small fw-bold text-secondary">Tên lớp</label>
                        <select id="filterClassName" class="form-select input-custom">
                            <option value="">-- Tất cả lớp --</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold text-secondary">Tên khóa học</label>
                        <select id="filterCourseName" class="form-select input-custom">
                            <option value="">-- Tất cả khóa học --</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold text-secondary">Giảng viên</label>
                        <select id="filterTeacherName" class="form-select input-custom">
                            <option value="">-- Tất cả giảng viên --</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small fw-bold text-secondary">Trạng thái</label>
                        <select id="filterStatus" class="form-select input-custom">
                            <option value="">Tất cả</option>
                            <option value="Draft">Nháp</option>
                            <option value="Open">Mở</option>
                            <option value="Closed">Đóng</option>
                        </select>
                    </div>
                    <div class="col-md-1">
                        <button type="button" onclick="loadClassData(0)"
                                class="btn btn-primary w-100 fw-bold rounded-pill shadow-sm"
                                style="background-color: #3b82f6;">
                            <i class="bi bi-filter"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="card card-custom">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th class="ps-4 py-3 small text-muted">ID</th>
                            <th class="py-3 small text-muted">Tên lớp</th>
                            <th class="py-3 small text-muted">Tên khóa học</th>
                            <th class="py-3 small text-muted">Giảng viên</th>
                            <th class="py-3 small text-muted">Trạng thái</th>
                            <th class="text-end pe-4 py-3 small text-muted">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody id="classDataBody"></tbody>
                    </table>
                </div>
            </div>
            <div class="card-footer bg-white py-4 border-0">
                <div class="d-flex justify-content-between align-items-center">
                    <span id="paginationInfo" class="small text-muted"></span>
                    <nav>
                        <ul class="pagination pagination-sm mb-0" id="paginationButtons"></ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>

<script th:inline="javascript">
    async function initFilters() {
        // Load courses
        try {
            const res = await fetch('/api/v1/courses/list?pageNo=0&pageSize=100');
            const json = await res.json();
            if (json.status === 200 && json.data && json.data.items) {
                const select = document.getElementById('filterCourseName');
                json.data.items.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.courseName;
                    opt.textContent = c.courseName;
                    select.appendChild(opt);
                });
            }
        } catch (e) { console.error('Error loading courses', e); }

        // Load teachers
        try {
            const res = await fetch('/api/v1/accounts/list?pageNo=0&pageSize=100');
            const json = await res.json();
            if (json.status === 200 && json.data && json.data.items) {
                const teachers = json.data.items.filter(u => u.roleName && u.roleName.toLowerCase().includes('teacher'));
                const select = document.getElementById('filterTeacherName');
                teachers.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t.fullName;
                    opt.textContent = t.fullName;
                    select.appendChild(opt);
                });
            }
        } catch (e) { console.error('Error loading teachers', e); }

        // Load class names
        try {
            const res = await fetch('/api/v1/classes/list?pageNo=0&pageSize=500');
            const json = await res.json();
            if (json.status === 200 && json.data && json.data.items) {
                const select = document.getElementById('filterClassName');
                const seen = new Set();
                json.data.items.forEach(c => {
                    if (c.className && !seen.has(c.className)) {
                        seen.add(c.className);
                        const opt = document.createElement('option');
                        opt.value = c.className;
                        opt.textContent = c.className;
                        select.appendChild(opt);
                    }
                });
            }
        } catch (e) { console.error('Error loading class names', e); }
    }

    document.addEventListener("DOMContentLoaded", async () => {
        await initFilters();
        loadClassData(0);
    });

    async function loadClassData(pageNo) {
        const className = document.getElementById('filterClassName').value;
        const courseName = document.getElementById('filterCourseName').value;
        const teacherName = document.getElementById('filterTeacherName').value;
        const status = document.getElementById('filterStatus').value;

        let url = `/api/v1/classes/list?pageNo=${pageNo}&pageSize=10`;
        if (className) url += `&className=${encodeURIComponent(className)}`;
        if (courseName) url += `&courseName=${encodeURIComponent(courseName)}`;
        if (teacherName) url += `&teacherName=${encodeURIComponent(teacherName)}`;
        if (status) url += `&status=${encodeURIComponent(status)}`;

        const tbody = document.getElementById('classDataBody');
        tbody.innerHTML = `<tr><td colspan="6" class="text-center py-5">Đang tải...</td></tr>`;

        try {
            const res = await fetch(url);
            const json = await res.json();
            if (json.status === 200 || json.status === 202) {
                renderTable(json.data.items);
                renderPagination(json.data.pageNo, json.data.totalPages);
            }
        } catch (err) { console.error(err); }
    }

    function renderTable(classes) {
        const tbody = document.getElementById('classDataBody');
        if (!classes || classes.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-5">Không có dữ liệu.</td></tr>`;
            return;
        }

        tbody.innerHTML = classes.map(c => {
            const statusText = c.status || 'Pending';
            const statusKey = statusText.toLowerCase();
            return `
            <tr>
                <td class="ps-4 text-muted small">#${c.classId}</td>
                <td class="fw-semibold text-dark">${c.className || 'N/A'}</td>
                <td class="small text-secondary">${c.courseName || 'N/A'}</td>
                <td class="small fw-semibold">${c.teacherName || 'Chưa phân công'}</td>
                <td>
                    <span class="status-badge ${getStatusClass(statusKey)}">${statusText}</span>
                </td>
                <td class="text-end pe-4">
                    <a href="/manager/class/detail/${c.classId}" class="btn btn-sm btn-light text-info border shadow-sm me-1"><i class="bi bi-eye"></i></a>
                    <a href="/manager/class/edit/${c.classId}" class="btn btn-sm btn-light text-primary border shadow-sm"><i class="bi bi-pencil"></i></a>
                </td>
            </tr>`;
        }).join('');
    }

    function getStatusClass(statusKey) {
        if (statusKey === 'open') return 'st-open';
        if (statusKey === 'draft') return 'st-draft';
        return 'st-closed';
    }
    function renderPagination(currentPage, totalPages) {
        if (document.getElementById('paginationInfo')) {
            document.getElementById('paginationInfo').innerText = `Trang ${currentPage + 1} / ${totalPages || 1}`;
        }
        NovaPagination.render('paginationButtons', totalPages, currentPage, 'loadClassData');
    }
</script>
</body>
</html>
