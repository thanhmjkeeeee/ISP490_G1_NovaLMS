<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:with="isDashboard=true">
    <th:block th:replace="~{fragments/head :: common-head(pageTitle='Quản lý lớp học')}"></th:block>
</head>

<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Quản lý đào tạo', breadcrumb='Quản lý lớp')}"></header>

<aside id="dashSidebar" class="dash-sidebar">
    <div th:replace="~{fragments/sidebar :: dash-sidebar(activePage='classes')}"></div>
</aside>

<div id="dashOverlay" class="dash-overlay"></div>

<main class="dash-main" id="dashMain">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold text-dark m-0">Class Management</h3>
            <p class="text-muted small m-0">Quản lý danh sách lớp học và phân công giảng viên.</p>
        </div>
        <a th:href="@{/manager/class/create}" class="btn btn-primary shadow-sm fw-bold rounded-pill px-4">
            <i class="bi bi-plus-lg me-1"></i> Tạo lớp mới
        </a>
    </div>

    <div class="card mb-4 border-0 shadow-sm">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-5">
                    <label class="form-label small fw-bold text-secondary">Tìm kiếm</label>
                    <div class="input-group input-group-sm">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" id="searchInput" class="form-control border-start-0 bg-light" placeholder="Tên lớp, khóa học...">
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-secondary">Trạng thái</label>
                    <select id="statusFilter" class="form-select form-select-sm bg-light">
                        <option value="">Tất cả</option>
                        <option value="Pending">Pending</option>
                        <option value="Open">Open</option>
                        <option value="Closed">Closed</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button type="button" onclick="loadClassData(0)" class="btn btn-sm btn-primary w-100 fw-bold shadow-sm">
                        <i class="bi bi-filter me-1"></i> Lọc dữ liệu
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4 py-3 text-uppercase small text-muted">ID</th>
                        <th class="py-3 text-uppercase small text-muted">Lớp & Khóa học</th>
                        <th class="py-3 text-uppercase small text-muted">Giảng viên</th>
                        <th class="py-3 text-uppercase small text-muted">Lịch học</th>
                        <th class="py-3 text-uppercase small text-muted">Trạng thái</th>
                        <th class="text-end pe-4 py-3 text-uppercase small text-muted">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody id="classDataBody">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card-footer bg-white py-3 border-0">
            <div class="d-flex justify-content-between align-items-center small text-muted">
                <span id="paginationInfo">Đang tải...</span>
                <nav>
                    <ul class="pagination pagination-sm mb-0" id="paginationButtons"></ul>
                </nav>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        loadClassData(0);
    });

    function loadClassData(pageNo) {
        const pageSize = 10;
        const search = document.getElementById('searchInput').value;
        const status = document.getElementById('statusFilter').value;

        // Đảm bảo API này tồn tại và không bị chặn bởi Security
        let url = `/api/v1/classes/list?pageNo=${pageNo}&pageSize=${pageSize}`;
        if (search) url += `&search=${encodeURIComponent(search)}`;
        if (status) url += `&status=${status}`;

        const tbody = document.getElementById('classDataBody');
        tbody.innerHTML = `<tr><td colspan="6" class="text-center py-5"><div class="spinner-border text-primary spinner-border-sm"></div> Đang tải...</td></tr>`;

        fetch(url)
            .then(res => res.json())
            .then(res => {
                if (res.status === 200 || res.status === 202) {
                    renderTable(res.data.items);
                    renderPagination(res.data.pageNo, res.data.totalPage);
                } else {
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger">Lỗi: ${res.message}</td></tr>`;
                }
            })
            .catch(err => {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger">Không thể kết nối đến máy chủ</td></tr>`;
            });
    }

    function renderTable(classes) {
    const tbody = document.getElementById('classDataBody');
    if (!classes || classes.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center py-5">Không có dữ liệu.</td></tr>`;
        return;
    }

    tbody.innerHTML = classes.map(c => `
        <tr>
            <td class="ps-4 text-muted small">#${c.classId}</td>
            <td>
                <div class="d-flex align-items-center">
                    <div class="bg-primary bg-opacity-10 rounded p-2 me-3">
                        <i class="bi bi-door-open text-primary"></i>
                    </div>
                    <div>
                        <div class="fw-bold text-dark">${c.className || 'N/A'}</div>
                        <div class="small text-muted">${c.courseName || 'Khóa học trống'}</div>
                    </div>
                </div>
            </td>
            <td class="small fw-semibold">${c.teacherName || 'Chưa phân công'}</td>
            <td class="small">${c.schedule || 'N/A'}<br><span class="text-muted">${c.slotTime || ''}</span></td>
            <td><span class="badge ${getStatusBadge(c.status || 'Pending')}">${c.status || 'Pending'}</span></td>
            <td class="text-end pe-4">
                <a href="/manager/class/detail/${c.classId}" class="btn btn-sm btn-outline-info border-0"><i class="bi bi-eye"></i></a>
                <a href="/manager/class/edit/${c.classId}" class="btn btn-sm btn-outline-primary border-0"><i class="bi bi-pencil-square"></i></a>
            </td>
        </tr>
    `).join('');
}

    function getStatusBadge(status) {
        switch(status) {
            case 'Open': return 'bg-success bg-opacity-10 text-success';
            case 'Pending': return 'bg-warning bg-opacity-10 text-warning';
            default: return 'bg-secondary bg-opacity-10 text-secondary';
        }
    }

    function renderPagination(currentPage, totalPages) {
        document.getElementById('paginationInfo').innerText = `Trang ${currentPage + 1} / ${totalPages || 1}`;
        const container = document.getElementById('paginationButtons');
        if (totalPages <= 1) { container.innerHTML = ''; return; }

        let html = '';
        html += `<li class="page-item ${currentPage === 0 ? 'disabled' : ''}">
                    <a class="page-link shadow-none" href="javascript:void(0)" onclick="loadClassData(${currentPage - 1})">Trước</a>
                 </li>`;
        for (let i = 0; i < totalPages; i++) {
            html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                        <a class="page-link shadow-none" href="javascript:void(0)" onclick="loadClassData(${i})">${i + 1}</a>
                     </li>`;
        }
        html += `<li class="page-item ${currentPage + 1 >= totalPages ? 'disabled' : ''}">
                    <a class="page-link shadow-none" href="javascript:void(0)" onclick="loadClassData(${currentPage + 1})">Sau</a>
                 </li>`;
        container.innerHTML = html;
    }
</script>
</body>

</html>
