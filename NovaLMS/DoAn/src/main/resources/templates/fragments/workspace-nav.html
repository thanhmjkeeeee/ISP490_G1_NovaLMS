<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="workspace-tabs(activeTab)">
    <style>
        .workspace-tabs .nav-link {
            border: none;
            background: #fff;
            color: #64748b;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 12px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .workspace-tabs .nav-link:hover {
            background: #f1f5f9;
            color: #0f172a;
        }

        .workspace-tabs .nav-link.active {
            background: #2563eb !important;
            color: #fff !important;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }
    </style>
    
    <ul class="nav nav-pills workspace-tabs d-flex flex-nowrap overflow-auto mb-4" id="workspaceTabs" style="gap: 5px;">
        <li class="nav-item flex-shrink-0">
            <a class="nav-link" th:classappend="${activeTab == 'classes'} ? 'active' : ''" th:href="@{/teacher/workspace(tab='classes')}">
                <i class="bi bi-journal-text me-1"></i>Danh sách Lớp
            </a>
        </li>
        <li class="nav-item flex-shrink-0">
            <a class="nav-link" th:classappend="${activeTab == 'schedule'} ? 'active' : ''" th:href="@{/teacher/workspace(tab='schedule')}">
                <i class="bi bi-calendar-week me-1"></i>Lịch dạy
            </a>
        </li>
        <li class="nav-item flex-shrink-0">
            <a class="nav-link" th:classappend="${activeTab == 'quiz'} ? 'active' : ''" th:href="@{/teacher/workspace(tab='quiz')}">
                <i class="bi bi-patch-question me-1"></i>Quản lý Quiz
            </a>
        </li>
        <li class="nav-item flex-shrink-0">
            <a class="nav-link" th:classappend="${activeTab == 'assignment'} ? 'active' : ''" th:href="@{/teacher/workspace(tab='assignment')}">
                <i class="bi bi-file-earmark-code me-1"></i>Quản lý Assignment
            </a>
        </li>
        <li class="nav-item flex-shrink-0">
            <a class="nav-link" th:classappend="${activeTab == 'grading'} ? 'active' : ''" th:href="@{/teacher/workspace(tab='grading')}">
                <i class="bi bi-pencil-square me-1"></i>Chấm bài
            </a>
        </li>
        <li class="nav-item flex-shrink-0">
            <a class="nav-link" th:classappend="${activeTab == 'graded'} ? 'active' : ''" th:href="@{/teacher/workspace(tab='graded')}">
                <i class="bi bi-check2-circle me-1"></i>Kết quả đã chấm
            </a>
        </li>
        <li class="nav-item flex-shrink-0">
            <a class="nav-link" th:classappend="${activeTab == 'requests'} ? 'active' : ''" th:href="@{/teacher/workspace(tab='requests')}" style="color: #dc3545;">
                <i class="bi bi-exclamation-octagon-fill me-1"></i>Yêu cầu mở khóa
            </a>
        </li>
    </ul>
</div>

</body>
</html>
