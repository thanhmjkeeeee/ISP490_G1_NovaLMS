<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!-- FRAGMENT 1: PUBLIC HEADER-->

<header th:fragment="header-fragment(currentPage)"
        id="header" class="header d-flex align-items-center sticky-top">
    <div class="container-fluid container-xl position-relative d-flex align-items-center">

        <a th:href="@{/}" class="logo d-flex align-items-center text-decoration-none" style="min-width: 240px;">
            <img src="https://res.cloudinary.com/decqv3ed0/image/upload/v1775378558/image-Photoroom_a2hwez.png"
                 alt="Nova LMS Logo"
                 style="height: 45px; transform: scale(4); transform-origin: left center; pointer-events: none;">
        </a>

        <nav id="navmenu" class="navmenu flex-grow-1">
            <ul class="d-flex align-items-center w-100">
                <li><a th:href="@{/}"
                       th:classappend="${currentPage == 'index'} ? 'active'">Trang chủ</a></li>
                <li><a th:href="@{/classes}"
                       th:classappend="${currentPage == 'class'} ? 'active'">Lịch khai giảng</a></li>
                <li><a th:href="@{/courses}"
                       th:classappend="${currentPage == 'courses'} ? 'active'">Khóa học</a></li>

                <li class="dropdown" sec:authorize="isAuthenticated()" style="margin-left: auto !important;">
                    <a href="#" class="d-flex align-items-center text-decoration-none" style="gap: 8px;">
                        <img th:src="${userProfile?.avatarUrl ?: '/assets/img/person/person-m-2.webp'}"
                             style="width: 36px; height: 36px; object-fit: cover; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);"
                             alt="Avatar">
                        <span sec:authentication="name" class="fw-bold text-white">User</span>
                        <i class="bi bi-chevron-down toggle-dropdown text-white" style="font-size: 0.8rem;"></i>
                    </a>

                    <ul class="custom-user-dropdown shadow-sm">
                        <li sec:authorize="hasRole('ROLE_STUDENT')">
                            <a th:href="@{/student/dashboard}">
                                <i class="bi bi-speedometer2 text-muted"></i> <span>Bảng điều khiển</span>
                            </a>
                        </li>
                        <li sec:authorize="hasRole('ROLE_TEACHER')">
                            <a th:href="@{/teacher/dashboard}">
                                <i class="bi bi-speedometer2 text-muted"></i> <span>Bảng điều khiển</span>
                            </a>
                        </li>
                        <li sec:authorize="hasRole('ROLE_ADMIN')">
                            <a th:href="@{/admin/dashboard}">
                                <i class="bi bi-speedometer2 text-muted"></i> <span>Quản trị hệ thống</span>
                            </a>
                        </li>
                        <li sec:authorize="hasRole('ROLE_MANAGER')">
                            <a th:href="@{/manager/dashboard}">
                                <i class="bi bi-speedometer2 text-muted"></i> <span>Bảng điều khiển</span>
                            </a>
                        </li>
                        <li sec:authorize="hasRole('ROLE_EXPERT')">
                            <a th:href="@{/expert/dashboard}">
                                <i class="bi bi-speedometer2 text-muted"></i> <span>Bảng điều khiển</span>
                            </a>
                        </li>

                        <li><hr class="dropdown-divider mx-2 my-1"></li>

                        <li>
                            <a th:href="@{/profile}" th:classappend="${activePage == 'profile'} ? 'active'">
                                <i class="bi bi-person-circle text-muted"></i> <span>Hồ sơ cá nhân</span>
                            </a>
                        </li>

                        <li>
                            <form th:action="@{/logout}" method="post" class="m-0 p-0">
                                <button type="submit" class="btn-logout">
                                    <i class="bi bi-box-arrow-right text-muted"></i> <span>Đăng xuất</span>
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
            <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
        </nav>

        <a sec:authorize="!isAuthenticated()" class="btn-getstarted"
           th:href="@{/login}">Đăng nhập</a>
        <a sec:authorize="!isAuthenticated()" class="btn-getstarted" th:href="@{/register.html}"
           style="padding: 8px 20px;">
            Đăng ký
        </a>

    </div>
</header>


<!-- FRAGMENT 2: DASHBOARD HEADER-->
<header th:fragment="dash-header(pageTitle, breadcrumb)"
        id="header" class="header d-flex align-items-center sticky-top"
        style="z-index:997;">
    <div class="container-fluid d-flex align-items-center px-3">

        <!-- Logo — giữ nguyên như public header -->
        <a th:href="@{/}" class="logo d-flex align-items-center text-decoration-none" style="min-width: 240px;">
            <img src="https://res.cloudinary.com/decqv3ed0/image/upload/v1775378558/image-Photoroom_a2hwez.png"
                 alt="Nova LMS Logo"
                 style="height: 45px; transform: scale(4); transform-origin: left center; pointer-events: none;">
        </a>

        <!-- Nút toggle sidebar (chỉ có ở dashboard) -->
        <button class="sidebar-toggle-btn" id="sidebarToggle" title="Mở/đóng menu">
            <i class="bi bi-list"></i>
        </button>

        <!-- Page title + breadcrumb ở vị trí giữa header -->
        <div class="dash-header-page-info me-auto">
            <p class="dash-header-page-title" th:text="${pageTitle}">Tổng quan</p>
            <p class="dash-header-breadcrumb" th:if="${breadcrumb != null}">
                <a th:href="@{/}">Nova LMS</a>
                <i class="bi bi-chevron-right" style="font-size:0.65rem;"></i>
                <span th:text="${breadcrumb}">Tổng quan</span>
            </p>
        </div>

        <!-- Controls bên phải -->
        <div class="d-flex align-items-center gap-2">

            <!-- Notification bell -->
<!--            <button class="dash-notif-btn" title="Thông báo">-->
<!--                <i class="bi bi-bell"></i>-->
<!--                <span class="dash-notif-dot"></span>-->
<!--            </button>-->

            <!-- User dropdown -->
            <div class="dash-user-menu">
                <button class="dash-user-btn" id="userMenuToggle" type="button">
                    <img th:src="${userProfile?.avatarUrl ?: '/assets/img/person/person-m-2.webp'}"
                         alt="Avatar"
                         class="rounded-circle"
                         style="width: 40px; height: 40px; object-fit: cover;">
                    <div>
                        <span class="u-name" sec:authentication="name">User</span>
                        <span class="u-role">
                            <span sec:authorize="hasRole('ROLE_ADMIN')">Quản trị viên</span>
                            <span sec:authorize="hasRole('ROLE_MANAGER')">Quản lý</span>
                            <span sec:authorize="hasRole('ROLE_TEACHER')">Giảng viên</span>
                            <span sec:authorize="hasRole('ROLE_EXPERT')">Chuyên gia</span>
                            <span sec:authorize="hasRole('ROLE_STUDENT')">Học viên</span>
                        </span>
                    </div>
                    <i class="bi bi-chevron-down"
                       style="font-size:0.7rem;color:#9ca3af;margin-left:2px;"></i>
                </button>

                <div class="dash-user-dropdown" id="userMenuDropdown">
                    <a th:href="@{/profile}">
                        <i class="bi bi-person-circle"></i> Hồ sơ cá nhân
                    </a>
<!--                    <a th:href="@{/settings}">-->
<!--                        <i class="bi bi-gear"></i> Cài đặt-->
<!--                    </a>-->
                    <hr>
                    <form th:action="@{/logout}" method="post" style="margin:0">
                        <button type="submit" class="logout-item">
                            <i class="bi bi-box-arrow-right"></i> Đăng xuất
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</header>


<!--FRAGMENT 3: DASHBOARD JS-->
<th:block th:fragment="dash-scripts">
    <script>
        (function () {
            // ── User dropdown ──
            var dropdown = document.getElementById('userMenuDropdown');
            document.addEventListener('click', function (e) {
                if (dropdown && !dropdown.contains(e.target)) {
                    dropdown.classList.remove('show');
                }
            });

            // ── Sidebar toggle ──
            var sidebarBtn = document.getElementById('sidebarToggle');
            var sidebar    = document.getElementById('dashSidebar');
            var dashMain   = document.getElementById('dashMain');
            var overlay    = document.getElementById('dashOverlay');

            if (!sidebarBtn || !sidebar) return;

            sidebarBtn.addEventListener('click', function () {
                var isMobile = window.innerWidth <= 991;
                if (isMobile) {
                    sidebar.classList.toggle('mobile-open');
                    if (overlay) overlay.classList.toggle('show');
                } else {
                    sidebar.classList.toggle('collapsed');
                    if (dashMain) dashMain.classList.toggle('sidebar-collapsed');
                }
            });

            if (overlay) {
                overlay.addEventListener('click', function () {
                    sidebar.classList.remove('mobile-open');
                    overlay.classList.remove('show');
                });
            }
        })();
    </script>
</th:block>

</body>
</html>
