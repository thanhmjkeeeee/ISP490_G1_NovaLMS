<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:with="isDashboard=true">

<head th:replace="~{fragments/head :: common-head(pageTitle='Hồ sơ cá nhân')}"></head>

<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Hồ sơ cá nhân', breadcrumb='Tài khoản')}"></header>

<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='profile')}"></aside>
<div th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<main class="dash-main d-flex flex-column" id="dashMain">

    <div class="dash-page-header">
        <h2 class="dash-page-title">Thông tin cá nhân</h2>
        <p class="dash-page-subtitle">Quản lý thông tin và bảo mật tài khoản của bạn</p>
    </div>

    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="row g-4">
        <div class="col-xl-4">
            <div class="dash-card text-center h-100 d-flex flex-column justify-content-center align-items-center py-5">

                <img th:src="@{${userProfile.avatarUrl != null ? userProfile.avatarUrl : '/assets/img/person/person-1.jpg'}}"
                     alt="Profile" class="rounded-circle mb-3 shadow-sm"
                     style="width: 130px; height: 130px; object-fit: cover; border: 4px solid #e2e8f0;">

                <h4 th:text="${userProfile.fullName}" class="fw-bold mb-1" style="color: var(--dash-text-primary);">Tên User</h4>

                <p class="text-muted mb-4" style="font-size: 0.9rem;">
                    <span sec:authorize="hasRole('ROLE_ADMIN')">Quản trị viên</span>
                    <span sec:authorize="hasRole('ROLE_MANAGER')">Quản lý</span>
                    <span sec:authorize="hasRole('ROLE_TEACHER')">Giảng viên</span>
                    <span sec:authorize="hasRole('ROLE_EXPERT')">Chuyên gia</span>
                    <span sec:authorize="hasRole('ROLE_STUDENT')">Học viên</span>
                </p>

                <form id="avatarForm" th:action="@{/profile/upload-avatar}" method="POST" enctype="multipart/form-data">
                    <input type="file" id="avatarInput" name="file" accept="image/png, image/jpeg, image/jpg" style="display: none;" onchange="document.getElementById('avatarForm').submit();">
                    <button type="button" class="btn btn-sm px-4 rounded-pill fw-bold" style="background-color: var(--dash-accent); color: #fff;" onclick="document.getElementById('avatarInput').click();">
                        <i class="bi bi-camera me-1"></i> Đổi ảnh đại diện
                    </button>
                </form>

            </div>
        </div>

        <div class="col-xl-8">
            <div class="dash-card h-100">
                <h5 class="fw-bold border-bottom pb-3 mb-4" style="color: var(--dash-text-primary);">Chi tiết hồ sơ</h5>

                <form th:action="@{/profile/update}" th:object="${userProfile}" method="post">

                    <div class="row mb-3 align-items-center">
                        <label for="email" class="col-md-3 col-form-label fw-medium" style="color: var(--dash-text-secondary); font-size: 0.9rem;">Email đăng nhập <span class="text-danger">*</span></label>
                        <div class="col-md-9">
                            <input name="email" type="email" class="form-control bg-light" id="email" th:field="*{email}" readonly style="color: #64748b; border-color: #e2e8f0;">
                            <small class="text-muted" style="font-size: 0.8rem;">Email dùng để đăng nhập nên không thể thay đổi.</small>
                        </div>
                    </div>

                    <div class="row mb-3 align-items-center">
                        <label for="fullName" class="col-md-3 col-form-label fw-medium" style="color: var(--dash-text-secondary); font-size: 0.9rem;">Họ và Tên <span class="text-danger">*</span></label>
                        <div class="col-md-9">
                            <input name="fullName" type="text" class="form-control" id="fullName" th:field="*{fullName}" required style="border-color: #cbd5e1;">
                        </div>
                    </div>

                    <div class="row mb-3 align-items-center">
                        <label for="mobile" class="col-md-3 col-form-label fw-medium" style="color: var(--dash-text-secondary); font-size: 0.9rem;">Số điện thoại</label>
                        <div class="col-md-9">
                            <input name="mobile" type="text" class="form-control" id="mobile" th:field="*{mobile}" style="border-color: #cbd5e1;" placeholder="Ví dụ: 0987654321">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <label for="note" class="col-md-3 col-form-label fw-medium" style="color: var(--dash-text-secondary); font-size: 0.9rem;">Giới thiệu bản thân</label>
                        <div class="col-md-9">
                            <textarea name="note" class="form-control" id="note" style="height: 120px; border-color: #cbd5e1;" th:field="*{note}" placeholder="Vài nét về kinh nghiệm hoặc mục tiêu học tập của bạn..."></textarea>
                        </div>
                    </div>

                    <div class="text-end mt-4 pt-3 border-top">
                        <button type="reset" class="btn btn-light rounded-pill px-4 me-2 fw-medium border">Hủy</button>
                        <button type="submit" class="btn rounded-pill px-4 fw-medium text-white" style="background-color: var(--dash-accent);">
                            <i class="bi bi-floppy me-1"></i> Lưu thay đổi
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="mt-auto pt-4 pb-2 text-center" style="font-size: 0.85rem; color: #9ca3af;">
        &copy; 2026 Nova LMS - Nền tảng học trực tuyến thông minh.
    </footer>

</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

</body>
</html>
