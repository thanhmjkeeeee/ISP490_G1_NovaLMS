<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán thành công - NovaLMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #e8f5e9, #ffffff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .success-card {
            background: #fff;
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
        }
        .check-icon {
            width: 80px;
            height: 80px;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            animation: pulse 1s ease-in-out;
        }
        .check-icon i {
            font-size: 40px;
            color: #fff;
        }
        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .success-title {
            color: #223a58;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .success-desc {
            color: #6b7280;
            font-size: 0.95rem;
            margin-bottom: 32px;
        }
        .btn-home {
            background: #136ad5;
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 12px 36px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .btn-home:hover {
            background: #0d52b0;
            color: #fff;
        }
        .btn-courses {
            background: #fff;
            color: #136ad5;
            border: 2px solid #136ad5;
            border-radius: 50px;
            padding: 10px 32px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            transition: all 0.2s;
        }
        .btn-courses:hover {
            background: #136ad5;
            color: #fff;
        }
    </style>
</head>
<body>
<div class="success-card">
    <div class="check-icon">
        <i class="bi bi-check-lg"></i>
    </div>
    <h2 class="success-title">Thanh toán thành công!</h2>
    <p class="success-desc">
        Cảm ơn bạn đã mua khóa học tại <strong>NovaLMS</strong>.
        Bạn đã được ghi danh tự động — có thể bắt đầu học ngay!
    </p>

    <a href="/student/my-courses" class="btn-home">
        <i class="bi bi-play-circle-fill"></i> Bắt đầu học ngay
    </a>
    <br>
    <a href="/student/my-enrollments" class="btn-courses">
        <i class="bi bi-clock-history"></i> Theo dõi đăng ký
    </a>
    <br>
    <a href="/student/dashboard" class="btn-courses">
        <i class="bi bi-house"></i> Trang chủ
    </a>
</div>
</body>
</html>
