<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán bị hủy - NovaLMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #fff3e0, #ffffff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cancel-card {
            background: #fff;
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
        }
        .cancel-icon {
            width: 80px;
            height: 80px;
            background: #f59e0b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .cancel-icon i {
            font-size: 40px;
            color: #fff;
        }
        .cancel-title {
            color: #223a58;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .cancel-desc {
            color: #6b7280;
            font-size: 0.95rem;
            margin-bottom: 32px;
        }
        .btn-retry {
            background: #f59e0b;
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 12px 36px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .btn-retry:hover {
            background: #d97706;
            color: #fff;
        }
        .btn-home {
            background: #fff;
            color: #6b7280;
            border: 2px solid #d1d5db;
            border-radius: 50px;
            padding: 10px 32px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            transition: all 0.2s;
        }
        .btn-home:hover {
            background: #f3f4f6;
            color: #374151;
        }
    </style>
</head>
<body>
<div class="cancel-card">
    <div class="cancel-icon">
        <i class="bi bi-x-lg"></i>
    </div>
    <h2 class="cancel-title">Thanh toán đã bị hủy</h2>
    <p class="cancel-desc">
        Thanh toán của bạn đã bị hủy. Đơn đăng ký vẫn còn trong hệ thống
        và bạn có thể thử thanh toán lại bất cứ lúc nào.
    </p>

    <a href="/student/my-enrollments" class="btn-retry">
        <i class="bi bi-credit-card"></i> Thử thanh toán lại
    </a>
    <br>
    <a href="/courses" class="btn-home">
        <i class="bi bi-arrow-left"></i> Quay lại khóa học
    </a>
</div>
</body>
</html>
