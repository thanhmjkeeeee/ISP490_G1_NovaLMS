<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:with="isDashboard=true">

<head th:replace="~{fragments/head :: common-head(pageTitle='Chấm Điểm Bài KT Lớn')}"></head>

<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Teacher Dashboard', breadcrumb='Chấm Điểm Bài KT Lớn')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='workspace')}"></aside>
<div th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<main class="dash-main" id="dashMain">
    <div class="container-fluid px-4 py-3">

    <!-- ── Student / Quiz Info Header ─────────────────────────────────── -->
    <div class="card border-0 shadow-sm rounded-4 mb-4">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-start mb-3">
                <div>
                    <h4 class="fw-bold mb-1" id="studentName">Đang tải...</h4>
                    <div class="text-muted small">
                        <span>Bài: <strong id="quizTitle">—</strong></span>
                        <span class="mx-2">·</span>
                        <span>Lớp: <strong id="className">—</strong></span>
                        <span class="mx-2">·</span>
                        <span>Ngày nộp: <strong id="submittedAt">—</strong></span>
                    </div>
                </div>
                <a th:href="${detail.status == 'GRADED' ? '/teacher/workspace?tab=graded' : '/teacher/workspace?tab=grading'}" 
                   class="btn btn-outline-secondary rounded-pill">
                    <i class="bi bi-arrow-left"></i> Quay lại
                </a>
            </div>

            <!-- Auto-score summary bar -->
            <div class="alert alert-info mb-0 py-3 px-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div class="d-flex align-items-center gap-3">
                    <div class="text-nowrap">
                        <i class="bi bi-lightning-charge-fill text-warning me-1"></i>
                        Điểm tự động (L+R): <strong id="autoScore" class="text-primary">—</strong>
                    </div>
                    <div class="text-nowrap border-start ps-3">
                        Tổng điểm sau chấm: <strong id="totalScore" class="text-primary">—</strong>
                    </div>
                </div>
                <div id="ielts-summary-area" class="d-none">
                    <div class="d-flex align-items-center gap-3">
                        <div class="bg-primary text-white px-4 py-2 rounded-4 fw-bold shadow-sm d-flex flex-column align-items-center" style="min-width: 120px;">
                            <span style="font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8;">Overall Band</span>
                            <div class="d-flex align-items-baseline gap-1">
                                <span id="overall-band-val" style="font-size: 1.4rem; line-height: 1.2;">0.0</span>
                                <span id="overall-max-val" style="font-size: 0.8rem; opacity: 0.7;">/ 9.0</span>
                            </div>
                        </div>
                        <div class="d-flex flex-column gap-1">
                            <div class="small fw-bold text-dark d-flex gap-3" id="skill-breakdown-val">
                                <!-- L | R | W | S Breakdown -->
                            </div>
                            <div class="progress" style="height: 4px; width: 150px; background: rgba(0,0,0,0.05);">
                                <div id="ielts-progress-bar" class="progress-bar bg-primary" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- External Submission Link -->
            <div id="externalSubArea" class="mt-3 p-3 bg-light rounded-4 border d-none">
                <div class="d-flex align-items-center justify-content-between">
                    <div>
                        <div class="fw-bold text-primary mb-1">
                            <i class="bi bi-link-45deg me-1"></i> Link sản phẩm / Dự án (Google Drive, v.v.)
                        </div>
                        <a id="externalLink" href="#" target="_blank" class="text-decoration-none fw-bold fs-5 text-dark">
                             ---
                        </a>
                        <div id="externalNote" class="text-muted small mt-1"></div>
                    </div>
                    <a id="externalLinkBtn" href="#" target="_blank" class="btn btn-primary rounded-pill px-4">
                        <i class="bi bi-box-arrow-up-right me-1"></i> Mở link
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Skill Tabs ──────────────────────────────────────────────────── -->
    <ul class="nav nav-tabs mb-0" id="skillTabs">
        <!-- Tabs injected by JS -->
    </ul>

    <!-- ── Tab Content ─────────────────────────────────────────────────── -->
    <div class="tab-content" id="tabContent">
        <!-- Section content injected by JS -->
    </div>

    <!-- ── Submit ──────────────────────────────────────────────────────── -->
            <div class="card border-0 shadow-sm rounded-4 mt-4" th:if="${detail != null and detail.status != 'GRADED'}">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <div class="text-muted small">
                            <i class="bi bi-info-circle me-1"></i>
                            Điểm LISTENING / READING đã được chấm tự động.
                            Vui lòng nhập điểm cho SPEAKING / WRITING, sau đó nhấn <strong>Lưu điểm chấm</strong>.
                        </div>
                        <button class="btn btn-success btn-lg px-5" id="submitGradeBtn" onclick="submitGrade()">
                            <i class="bi bi-check-circle me-1"></i> Lưu điểm chấm
                        </button>
                    </div>
                </div>
            </div>
    </div>
</main>

<script th:inline="javascript">
// ── Load data ────────────────────────────────────────────────────────────────
const resultId = /*[[${resultId}]]*/ 0;
let gradingData = null;

async function loadDetail() {
    try {
        const resp = await fetch(`/api/v1/teacher/assignment-results/${resultId}`);
        const json = await resp.json();
        if (json.status !== 200) {
            Swal.fire({ icon: 'error', title: 'Lỗi', text: json.message });
            return;
        }
        gradingData = json.data;
        populateHeader(gradingData);
        renderTabs(gradingData.sections);
        renderTabContent(gradingData.sections);

        // Render rubrics
        document.querySelectorAll('.rubric-breakdown').forEach(el => {
            renderRubric(el, el.getAttribute('data-is-teacher') === 'true');
        });
        
        updateIeltSummary();
    } catch (e) {
        Swal.fire({ icon: 'error', title: 'Lỗi', text: 'Không thể tải chi tiết bài nộp.' });
    }
}

function populateHeader(d) {
    document.getElementById('studentName').textContent  = d.studentName  || 'N/A';
    document.getElementById('quizTitle').textContent     = d.quizTitle    || 'N/A';
    document.getElementById('className').textContent     = d.className    || '—';
    document.getElementById('submittedAt').textContent   = d.submittedAt
        ? new Date(d.submittedAt).toLocaleDateString('vi-VN')
        : '—';
    document.getElementById('autoScore').textContent    = d.autoScore ?? 0;
    document.getElementById('totalScore').textContent   = (d.totalScore != null) ? (d.totalScore + ' / ' + (d.totalMaxScore || 0)) : '—';

    // External sub
    if (d.allowExternalSubmission) {
        document.getElementById('externalSubArea').classList.remove('d-none');
        if (d.externalSubmissionLink) {
            const linkEl = document.getElementById('externalLink');
            linkEl.textContent = d.externalSubmissionLink;
            linkEl.href = d.externalSubmissionLink;
            document.getElementById('externalLinkBtn').href = d.externalSubmissionLink;
            document.getElementById('externalNote').textContent = d.externalSubmissionNote || '';
        } else {
            document.getElementById('externalLink').textContent = '(Chưa nộp link)';
            document.getElementById('externalLink').href = '#';
            document.getElementById('externalLinkBtn').classList.add('disabled');
            document.getElementById('externalNote').textContent = '';
        }
    }
}

// ── Tabs ─────────────────────────────────────────────────────────────────────
const SKILL_ICONS = { LISTENING:'🎧', READING:'📖', SPEAKING:'🎤', WRITING:'✍️' };

function renderTabs(sections) {
    const nav = document.getElementById('skillTabs');
    nav.innerHTML = sections.map((s, i) => {
        const active = i === 0 ? 'active' : '';
        const icon   = SKILL_ICONS[s.skill] || '📝';
        const badge  = s.gradingStatus === 'GRADED'     ? '✅' :
                       s.gradingStatus === 'AI_READY'   ? '🎤' :
                       s.gradingStatus === 'AI_PENDING'  ? '⏳'  : '';
        return `<li class="nav-item">
            <button class="nav-link ${active}" data-bs-toggle="tab"
                    data-bs-target="#skill-${s.skill}" type="button">
                ${icon} ${s.skill} ${badge}
            </button>
        </li>`;
    }).join('');
}

function renderTabContent(sections) {
    document.getElementById('tabContent').innerHTML = sections.map((s, i) => {
        const show = i === 0 ? 'show active' : '';
        return `<div class="tab-pane fade ${show}" id="skill-${s.skill}">
            ${renderSection(s)}
        </div>`;
    }).join('');
}

// ── Section renderer ─────────────────────────────────────────────────────────
function renderSection(section) {
    const isAuto   = section.gradingStatus === 'AUTO';
    const hasAi    = section.gradingStatus === 'AI_READY' || section.gradingStatus === 'GRADED';

    let statusBadge;
    if (isAuto) {
        statusBadge = '<span class="badge bg-dark">✅ Tự động</span>';
    } else if (section.gradingStatus === 'GRADED') {
        statusBadge = '<span class="badge bg-success">✅ Đã chấm</span>';
    } else if (section.gradingStatus === 'AI_READY') {
        statusBadge = '<span class="badge bg-warning text-dark">🎤 AI sẵn sàng</span>';
    } else {
        statusBadge = '<span class="badge bg-secondary">⏳ Chờ AI</span>';
    }

    // Build AI info block
    let aiBlock = '';
    if (hasAi && section.aiScore) {
        aiBlock = `
        <div class="alert alert-secondary mb-3 shadow-sm border-0 bg-light-purple">
            <div class="d-flex align-items-center mb-2">
                <span class="fs-5 me-2">🤖</span>
                <strong class="text-primary">AI Grading Result</strong>
            </div>
            <div class="fw-bold mb-1 small">Điểm dự đoán: <span class="badge bg-primary">${section.aiScore}</span></div>
            ${section.aiFeedback ? `<div class="text-muted small mb-2">${section.aiFeedback}</div>` : ''}
            
            ${section.aiRubricJson ? `
                <div class="mt-2">
                    <button class="btn btn-sm btn-outline-primary rounded-pill px-3" type="button" 
                            data-bs-toggle="collapse" data-bs-target="#rubric-${section.skill}">
                        <i class="bi bi-bar-chart-line me-1"></i> Chi tiết Rubric IELTS
                    </button>
                    <div class="collapse mt-2" id="rubric-${section.skill}">
                        <div class="rubric-breakdown bg-white p-3 rounded-4 shadow-sm border"
                             data-rubric="${encodeURIComponent(section.aiRubricJson)}" 
                             data-is-teacher="true">
                        </div>
                    </div>
                </div>
            ` : ''}
        </div>`;
    }

    return `
    <div class="card border-0 shadow-sm rounded-4 mt-3">
        <div class="card-header bg-white border-bottom-0 pt-3 pb-0 px-4">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="fw-bold mb-0">
                    ${SKILL_ICONS[section.skill] || '📝'} ${section.skill}
                </h5>
                ${statusBadge}
            </div>
        </div>
        <div class="card-body p-4">
            ${aiBlock}

            <!-- Question list -->
            <div class="d-flex flex-column gap-3">
                ${section.questions.map((q, qi) => renderQuestion(q, qi, isAuto)).join('')}
            </div>

            <!-- Section subtotal (for manual sections) -->
            ${!isAuto ? `
            <div class="mt-3 p-3 bg-light rounded-3 text-end">
                <strong>Tổng điểm phần này:
                    <span id="subtotal-${section.skill}">0</span> / ${section.maxScore ?? '?'}
                </strong>
            </div>` : ''}
        </div>
    </div>`;
}

// ── Question renderer ────────────────────────────────────────────────────────
function renderQuestion(q, qi, isAutoGraded) {
    const isCorrect = q.isCorrect;
    const correctIcon = isCorrect === true  ? '<span class="badge bg-success">✅ Đúng</span>'
                      : isCorrect === false ? '<span class="badge bg-danger">❌ Sai</span>'
                      : '';

    const scoreVal = q.teacherScore ?? 0;
    const noteVal  = q.teacherNote  || '';

    let answerBlock = '';

    // SPEAKING audio
    if (q.questionType === 'SPEAKING' && q.audioUrl) {
        answerBlock += `
        <div class="mb-2">
            <label class="form-label small fw-semibold text-muted">🎤 File ghi âm:</label>
            <audio controls src="${q.audioUrl}" class="w-100"></audio>
        </div>`;
    }

    // Student answer text
    if (q.studentAnswer) {
        const isAudioUrl = q.questionType === 'SPEAKING' && (q.studentAnswer.includes('http') || q.studentAnswer.includes('cloudinary'));
        if (isAudioUrl) {
            // Already handled or needs audio player if q.audioUrl was missing
            if (!q.audioUrl) {
                const cleanUrl = q.studentAnswer.replace(/['"]/g, '');
                answerBlock += `
                <div class="mb-2">
                    <label class="form-label small fw-semibold text-muted">🎤 File ghi âm:</label>
                    <audio controls src="${cleanUrl}" class="w-100"></audio>
                </div>`;
            }
        } else {
            answerBlock += `
            <div class="alert alert-light mb-0">
                <strong>📝 Câu trả lời:</strong>
                <span class="text-dark">${q.studentAnswer}</span>
            </div>`;
        }
    }

    // Input fields
    let inputBlock;
    if (isAutoGraded) {
        inputBlock = `
        <div class="mt-2">
            <span class="badge ${isCorrect ? 'bg-success' : 'bg-danger'}">
                Điểm: ${scoreVal} / ${q.maxPoints}
            </span>
        </div>`;
    } else {
        const isGraded = (gradingData && gradingData.status === 'GRADED');
        const isWriting = (q.questionType === 'WRITING');
        
        if (isWriting) {
            inputBlock = `
            <div class="mt-3">
                <label class="form-label small fw-bold text-primary"><i class="bi bi-pencil-square me-1"></i> ${gradingData.criteriaLabels ? 'Grading Criteria' : 'IELTS Writing Criteria'} (0-9)</label>
                <div class="row g-2 mb-3">
                    <div class="col-md-3">
                        <label class="small text-muted mb-1">${gradingData.criteriaLabels?.ta || 'Task Achievement'}</label>
                        <input type="number" step="0.5" min="0" max="9" class="form-control rounded-3 writing-ta criteria-input" 
                               data-question-id="${q.questionId}" value="${q.writingTaskAchievement || ''}" ${isGraded ? 'readonly' : ''} oninput="updateWritingOverall(${q.questionId})">
                    </div>
                    <div class="col-md-3">
                        <label class="small text-muted mb-1">${gradingData.criteriaLabels?.cc || 'Coherence and cohesion'}</label>
                        <input type="number" step="0.5" min="0" max="9" class="form-control rounded-3 writing-cc criteria-input" 
                               data-question-id="${q.questionId}" value="${q.writingCoherenceCohesion || ''}" ${isGraded ? 'readonly' : ''} oninput="updateWritingOverall(${q.questionId})">
                    </div>
                    <div class="col-md-3">
                        <label class="small text-muted mb-1">${gradingData.criteriaLabels?.lr || 'Lexical resource'}</label>
                        <input type="number" step="0.5" min="0" max="9" class="form-control rounded-3 writing-lr criteria-input" 
                               data-question-id="${q.questionId}" value="${q.writingLexicalResource || ''}" ${isGraded ? 'readonly' : ''} oninput="updateWritingOverall(${q.questionId})">
                    </div>
                    <div class="col-md-3">
                        <label class="small text-muted mb-1">${gradingData.criteriaLabels?.gra || 'Grammatical range and accuracy'}</label>
                        <input type="number" step="0.5" min="0" max="9" class="form-control rounded-3 writing-gra criteria-input" 
                               data-question-id="${q.questionId}" value="${q.writingGrammarAccuracy || ''}" ${isGraded ? 'readonly' : ''} oninput="updateWritingOverall(${q.questionId})">
                    </div>
                </div>
                <div class="bg-light p-3 rounded-4 mb-3 border-start border-primary border-4 d-flex justify-content-between align-items-center">
                    <div>
                        <span class="text-uppercase small fw-bold text-secondary">Writing Overall Band Score</span>
                        <div class="text-muted small">Tự động tính từ trung bình cộng 4 tiêu chí</div>
                    </div>
                    <div class="text-end">
                        <span class="display-6 fw-bold text-primary" id="overall-writing-${q.questionId}">
                            ${(q.writingTaskAchievement != null) ? ((parseFloat(q.writingTaskAchievement) + parseFloat(q.writingCoherenceCohesion) + parseFloat(q.writingLexicalResource) + parseFloat(q.writingGrammarAccuracy))/4).toFixed(1) : '0.0'}
                        </span>
                    </div>
                </div>
                <div class="row g-3 align-items-end">
                    <div class="col-md-12">
                        <label class="form-label small fw-semibold">Ghi chú & Nhận xét chi tiết</label>
                        <textarea class="form-control teacher-note" rows="3"
                               data-question-id="${q.questionId}"
                               placeholder="Nhận xét cho bài viết này..."
                               ${isGraded ? 'readonly' : ''}>${noteVal}</textarea>
                    </div>
                </div>
            </div>`;
        } else {
            inputBlock = `
            <div class="row g-3 mt-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label small fw-semibold">Điểm giáo viên</label>
                    <input type="number" step="0.5" min="0"
                           max="${q.maxPoints}"
                           class="form-control teacher-score"
                           data-question-id="${q.questionId}"
                           data-max="${q.maxPoints}"
                           value="${scoreVal}"
                           ${isGraded ? 'readonly' : ''}
                           oninput="updateIeltSummary()">
                </div>
                <div class="col-md-9">
                    <label class="form-label small fw-semibold">Ghi chú</label>
                    <input type="text" class="form-control teacher-note"
                           data-question-id="${q.questionId}"
                           value="${noteVal}"
                           placeholder="Nhận xét cho câu trả lời này..."
                           ${isGraded ? 'readonly' : ''}>
                </div>
            </div>`;
        }
    }

    return `
    <div class="border rounded-3 p-3">
        <div class="d-flex justify-content-between align-items-start mb-2">
            <h6 class="mb-0">
                <span class="text-primary me-1">Câu ${qi + 1}</span>
                <span class="badge bg-light text-dark border">${q.maxPoints} điểm</span>
            </h6>
            ${correctIcon}
        </div>
        <p class="mb-2"><strong>Câu hỏi:</strong> ${q.content || '—'}</p>
        ${answerBlock}
        ${inputBlock}
    </div>`;
}

// ── Rubric Helpers ──────────────────────────────────────────────────────────
function bandColor(score) {
    if (score <= 4) return '#dc3545';
    if (score <= 6) return '#ffc107';
    return '#198754';
}
function bandColorCss(score) {
    if (score <= 4) return 'bg-danger';
    if (score <= 6) return 'bg-warning text-dark';
    return 'bg-success';
}
const CRITERION_LABELS = {
    'task_achievement': '📝 Task Achievement',
    'lexical_resource': '📖 Lexical resource',
    'grammatical_range': '🔤 Grammatical range and accuracy',
    'coherence_cohesion': '🔗 Coherence and cohesion',
    'fluency_cohesion': '🎤 Fluency and coherence',
    'pronunciation': '🔊 Pronunciation',
    
    // Dynamic mapping aliases
    'ta': '📝 Task Achievement',
    'lr': '📖 Lexical resource',
    'gra': '🔤 Grammatical range and accuracy',
    'cc': '🔗 Coherence and cohesion'
};

function updateWritingOverall(qId) {
    const ta = parseFloat(document.querySelector(`.writing-ta[data-question-id="${qId}"]`)?.value) || 0;
    const cc = parseFloat(document.querySelector(`.writing-cc[data-question-id="${qId}"]`)?.value) || 0;
    const lr = parseFloat(document.querySelector(`.writing-lr[data-question-id="${qId}"]`)?.value) || 0;
    const gra = parseFloat(document.querySelector(`.writing-gra[data-question-id="${qId}"]`)?.value) || 0;
    
    const avg = (ta + cc + lr + gra) / 4;
    const overallEl = document.getElementById(`overall-writing-${qId}`);
    if (overallEl) overallEl.textContent = avg.toFixed(1);

    updateIeltSummary();
}

function pointsToBand(points, max) {
    if (!max || max <= 0) return 0;
    const ratio = points / max;
    if (ratio >= 0.975) return 9.0;
    if (ratio >= 0.925) return 8.5;
    if (ratio >= 0.875) return 8.0;
    if (ratio >= 0.825) return 7.5;
    if (ratio >= 0.75)  return 7.0;
    if (ratio >= 0.65)  return 6.5;
    if (ratio >= 0.575) return 6.0;
    if (ratio >= 0.5)   return 5.5;
    if (ratio >= 0.4)   return 5.0;
    if (ratio >= 0.3)   return 4.5;
    if (ratio >= 0.2)   return 4.0;
    return 0;
}

function updateIeltSummary() {
    if (!gradingData) return;
    const area = document.getElementById('ielts-summary-area');
    const isIelts = (gradingData.quizCategory && gradingData.quizCategory.toUpperCase() === 'IELTS') || 
                  (gradingData.quizTitle && gradingData.quizTitle.toUpperCase().includes('IELTS')) ||
                  (gradingData.className && gradingData.className.toUpperCase().includes('IELTS'));
    
    if (!isIelts) {
        area.classList.add('d-none');
        return;
    }
    area.classList.remove('d-none');

    const skillBands = { LISTENING: 0, READING: 0, WRITING: 0, SPEAKING: 0 };
    const questions = gradingData.questions || [];
    const sections = gradingData.sections || [];
    const skills = ['LISTENING', 'READING', 'WRITING', 'SPEAKING'];

    skills.forEach(s => {
        let skillQs = [];
        if (sections.length > 0) {
            skillQs = sections.find(sec => sec.skill === s)?.questions || [];
        } else {
            skillQs = questions.filter(q => q.skill === s);
        }
        
        if (skillQs.length === 0) return;

        if (s === 'LISTENING' || s === 'READING') {
            let raw = 0; let max = 0;
            skillQs.forEach(q => {
                if (q.isCorrect) raw += (q.maxPoints || 0);
                max += (q.maxPoints || 0);
            });
            // If max is a band score (<= 9.0), use raw points directly as band. Otherwise map (like for 40 questions)
            skillBands[s] = (max > 0 && max <= 9.0) ? raw : pointsToBand(raw, max);
        } else if (s === 'WRITING') {
            let sum = 0; let count = 0;
            skillQs.forEach(q => {
                const ta = parseFloat(document.querySelector(`.writing-ta[data-question-id="${q.questionId}"]`)?.value) || q.writingTaskAchievement || 0;
                const cc = parseFloat(document.querySelector(`.writing-cc[data-question-id="${q.questionId}"]`)?.value) || q.writingCoherenceCohesion || 0;
                const lr = parseFloat(document.querySelector(`.writing-lr[data-question-id="${q.questionId}"]`)?.value) || q.writingLexicalResource || 0;
                const gra = parseFloat(document.querySelector(`.writing-gra[data-question-id="${q.questionId}"]`)?.value) || q.writingGrammarAccuracy || 0;
                sum += (ta + cc + lr + gra) / 4;
                count++;
            });
            skillBands[s] = count > 0 ? (sum / count) : 0;
        } else if (s === 'SPEAKING') {
            let sum = 0; let count = 0;
            skillQs.forEach(q => {
                const score = parseFloat(document.querySelector(`.teacher-score[data-question-id="${q.questionId}"]`)?.value) || q.teacherScore || 0;
                sum += score; count++;
            });
            skillBands[s] = count > 0 ? (sum / count) : 0;
        }
    });

    document.getElementById('skill-breakdown-val').innerHTML = `
        L: <span class="text-primary">${skillBands.LISTENING.toFixed(1)}</span> | 
        R: <span class="text-primary">${skillBands.READING.toFixed(1)}</span> | 
        W: <span class="text-primary">${skillBands.WRITING.toFixed(1)}</span> | 
        S: <span class="text-primary">${skillBands.SPEAKING.toFixed(1)}</span>
    `;

    const activeSkills = skills.filter(s => {
        // Only include skills that have a score > 0 OR have a max points configuration > 0
        // This prevents empty skills from pulling down the average to 0.5
        const score = skillBands[s] || 0;
        let skillMax = 0;
        if (sections && sections.length > 0) {
            skillMax = sections.find(sec => sec.skill === s)?.maxScore || 0;
        } else {
            const skillQs = questions.filter(q => q.skill === s);
            skillMax = skillQs.length > 0 ? (skillQs[0].maxPoints || skillQs[0].points || 0) : 0;
        }
        return score > 0 || skillMax > 0;
    }).filter(s => skillBands[s] > 0); // Strictly only average skills that have a score for now to fix the user's issue

    const avg = activeSkills.length > 0 ? activeSkills.reduce((acc, s) => acc + skillBands[s], 0) / activeSkills.length : 0;
    const overall = Math.round(avg * 2) / 2;
    
    const overallEl = document.getElementById('overall-band-val');
    if (overallEl) {
        overallEl.textContent = overall.toFixed(1);
        // Color coding
        const parent = overallEl.closest('.bg-primary, .bg-success, .bg-warning');
        if (parent) {
            if (overall >= 7) parent.className = 'bg-success text-white px-4 py-2 rounded-4 fw-bold shadow-sm d-flex flex-column align-items-center';
            else if (overall >= 5) parent.className = 'bg-primary text-white px-4 py-2 rounded-4 fw-bold shadow-sm d-flex flex-column align-items-center';
            else parent.className = 'bg-warning text-dark px-4 py-2 rounded-4 fw-bold shadow-sm d-flex flex-column align-items-center';
        }
    }
    
    const overallMaxEl = document.getElementById('overall-max-val');
    if (overallMaxEl && gradingData.totalMaxScore) {
        overallMaxEl.textContent = `/ ${parseFloat(gradingData.totalMaxScore).toFixed(1)}`;
    }
    
    const progressBar = document.getElementById('ielts-progress-bar');
    if (progressBar) progressBar.style.width = (overall / 9 * 100) + '%';
}

function getCriterionLabel(key) {
    if (gradingData && gradingData.criteriaLabels) {
        if (key === 'task_achievement' || key === 'ta') return '📝 ' + (gradingData.criteriaLabels.ta || 'Task Achievement');
        if (key === 'lexical_resource' || key === 'lr') return '📖 ' + (gradingData.criteriaLabels.lr || 'Lexical Resource');
        if (key === 'grammatical_range' || key === 'gra') return '🔤 ' + (gradingData.criteriaLabels.gra || 'Grammar Range & Accuracy');
        if (key === 'coherence_cohesion' || key === 'cc') return '🔗 ' + (gradingData.criteriaLabels.cc || 'Coherence & Cohesion');
    }
    return CRITERION_LABELS[key] || (key.charAt(0).toUpperCase() + key.slice(1).replace(/_/g, ' '));
}

function renderRubric(container, isTeacher) {
    var rubricJson = container.getAttribute('data-rubric');
    if (!rubricJson || rubricJson === 'null') return;
    
    var decoded;
    try { decoded = decodeURIComponent(rubricJson); } catch(e) { decoded = rubricJson; }

    var parsedData;
    try {
        parsedData = JSON.parse(decoded);
    } catch(e) {
        container.innerHTML = '<div class="alert alert-light small border-0">Không thể hiển thị chi tiết Rubric.</div>';
        return;
    }

    var rubric = (parsedData && parsedData.rubric) ? parsedData.rubric : parsedData;
    if (!rubric || typeof rubric !== 'object' || Object.keys(rubric).length === 0) {
        container.innerHTML = '<p class="text-muted small fst-italic py-2">Dữ liệu Rubric đang được cập nhật...</p>';
        return;
    }

    var html = '<div class="table-responsive"><table class="table table-sm align-middle mb-0">';
    html += '<thead><tr class="small text-muted">' +
        '<th style="width:40%">Tiêu chí IELTS</th>' +
        '<th style="width:15%">Band</th>' +
        '<th style="width:35%">Tiến trình</th>' +
        '<th style="width:10%">Điểm</th></tr></thead><tbody>';
        
    var hasCriteria = false;
    for (var key in rubric) {
        var c = rubric[key];
        if (!c || typeof c.score === 'undefined') continue;
        hasCriteria = true;
        
        var label    = getCriterionLabel(key);
        var maxVal   = c.max || 9;
        var scoreVal = parseFloat(c.score) || 0;
        var pct      = Math.min(100, Math.round((scoreVal / maxVal) * 100));
        var color    = bandColor(scoreVal);
        var colorCls = bandColorCss(scoreVal);
        var bandDisp = c.bandLabel || (scoreVal % 1 === 0 ? String(scoreVal) : scoreVal.toFixed(1));
        
        html += '<tr>' +
            '<td>' +
                '<span class="small fw-bold text-dark d-block">' + label + '</span>' +
                '<div class="text-muted" style="font-size:0.75rem; line-height: 1.2; margin-top: 2px;">' +
                    (c.bandDescription || 'Đang cập nhật mô tả...') +
                '</div>' +
            '</td>' +
            '<td><span class="badge ' + colorCls + ' rounded-pill shadow-sm px-2">' + bandDisp + '</span></td>' +
            '<td>' +
                '<div class="progress rounded-pill" style="height:8px; background-color: #f1f5f9;">' +
                    '<div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" ' +
                         'style="width:' + pct + '%; background-color:' + color + '"></div>' +
                '</div>' +
            '</td>' +
            '<td><span class="small fw-black">' + scoreVal + '/' + maxVal + '</span></td>' +
        '</tr>';
    }

    if (!hasCriteria) {
        container.innerHTML = '<p class="text-muted small fst-italic py-2">Không có dữ liệu tiêu chí.</p>';
        return;
    }
    html += '</tbody></table></div>';

    if (isTeacher) {
        var reasoningHtml = '';
        for (var key in rubric) {
            var c = rubric[key];
            if (c && c.aiReasoning) {
                var label = getCriterionLabel(key);
                reasoningHtml += '<div class="mt-2 p-2 bg-light rounded-3 small border-start border-primary border-4">' +
                    '<strong class="text-primary">' + label + ':</strong> ' +
                    '<span class="text-secondary">' + c.aiReasoning + '</span>' +
                '</div>';
            }
        }
        if (reasoningHtml) {
            html += '<div class="mt-3 pt-2 border-top">' +
                    '<h6 class="fw-bold mb-2 small text-dark"><i class="bi bi-robot me-1"></i>Giải thích từ AI:</h6>' +
                    reasoningHtml +
                '</div>';
        }
    }
    container.innerHTML = html;
}

// ── Submit ───────────────────────────────────────────────────────────────────
function submitGrade() {
    const gradingItems  = [];
    const sectionScores = { LISTENING: 0, READING: 0, SPEAKING: 0, WRITING: 0 };
    let hasError = false;

    // Handle normal teacher-score inputs
    document.querySelectorAll('.teacher-score').forEach(input => {
        if (hasError) return;
        const qId   = parseInt(input.dataset.questionId);
        const valStr = input.value.trim();
        
        if (valStr === "" || isNaN(valStr)) {
            Swal.fire({ icon: 'warning', title: 'Điểm không hợp lệ', text: `Vui lòng nhập điểm số hợp lệ cho câu hỏi số ${qId}.` });
            hasError = true; return;
        }

        const score = parseFloat(valStr);
        const max   = parseFloat(input.dataset.max) || 0;

        if (score < 0 || score > max) {
            Swal.fire({ icon: 'warning', title: 'Điểm không hợp lệ', text: `Điểm cho câu ${qId} phải từ 0 đến ${max}.` });
            hasError = true; return;
        }

        const note  = document.querySelector(`.teacher-note[data-question-id="${qId}"]`)?.value || '';
        gradingItems.push({ questionId: qId, pointsAwarded: score, teacherNote: note });
    });

    // Handle WRITING criteria inputs
    const writingQuestions = new Set();
    document.querySelectorAll('.writing-ta').forEach(input => {
        if (hasError) return;
        const qId = parseInt(input.dataset.questionId);
        writingQuestions.add(qId);
        
        const ta = parseFloat(input.value) || 0;
        const cc = parseFloat(document.querySelector(`.writing-cc[data-question-id="${qId}"]`)?.value) || 0;
        const lr = parseFloat(document.querySelector(`.writing-lr[data-question-id="${qId}"]`)?.value) || 0;
        const gra = parseFloat(document.querySelector(`.writing-gra[data-question-id="${qId}"]`)?.value) || 0;
        
        const avg = (ta + cc + lr + gra) / 4;
        const note = document.querySelector(`.teacher-note[data-question-id="${qId}"]`)?.value || '';
        
        gradingItems.push({
            questionId: qId,
            pointsAwarded: avg,
            teacherNote: note,
            writingTaskAchievement: ta,
            writingCoherenceCohesion: cc,
            writingLexicalResource: lr,
            writingGrammarAccuracy: gra
        });
    });

    if (hasError) return;

    // Map questions to section scores
    gradingItems.forEach(item => {
        const q = gradingData.sections
            .flatMap(s => s.questions)
            .find(q => q.questionId === item.questionId);
        if (q) {
            const skill = q.questionType === 'SPEAKING' ? 'SPEAKING' : (q.questionType === 'WRITING' ? 'WRITING' : 'LISTENING');
            sectionScores[skill] += item.pointsAwarded;
        }
    });

    if (hasError) return;

    // Include auto-graded section totals
    gradingData.sections.forEach(s => {
        if (s.gradingStatus === 'AUTO') {
            const sum = s.questions.reduce((acc, q) => acc + (parseFloat(q.teacherScore) || 0), 0);
            sectionScores[s.skill] = sum;
        }
    });

    document.getElementById('submitGradeBtn').disabled = true;

    fetch(`/api/v1/teacher/assignment-results/${resultId}/grade`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            sectionScores,
            gradingItems,
            overallNote: '',
            isFinal: true
        })
    }).then(r => r.json()).then(data => {
        if (data.status === 200) {
            Swal.fire({
                icon: 'success',
                title: 'Thành công!',
                text: data.message, // Shows: Đã lưu điểm thành công! Tổng điểm: X
                confirmButtonText: 'Đóng',
                confirmButtonColor: '#0d6efd'
            }).then(() => {
                const targetUrl = gradingData && gradingData.classId 
                    ? `/teacher/workspace?tab=graded&classId=${gradingData.classId}` 
                    : '/teacher/workspace?tab=graded';
                window.location.href = targetUrl;
            });
        } else {
            Swal.fire({
                icon: 'error',
                title: 'Lỗi',
                text: data.message || 'Không rõ nguyên nhân.'
            });
            document.getElementById('submitGradeBtn').disabled = false;
        }
    }).catch(err => {
        console.error(err);
        Swal.fire({
            icon: 'error',
            title: 'Lỗi kết nối',
            text: 'Vui lòng thử lại sau.'
        });
        document.getElementById('submitGradeBtn').disabled = false;
    });
}
