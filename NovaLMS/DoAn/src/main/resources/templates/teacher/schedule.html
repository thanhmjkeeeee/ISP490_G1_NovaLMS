<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:with="isDashboard=true">
<head th:replace="~{fragments/head :: common-head(pageTitle='Lịch dạy')}"></head>
<body class="dashboard-body">
<header th:replace="~{fragments/header :: dash-header(pageTitle='Teacher Dashboard', breadcrumb='Lịch dạy')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='schedule')}"></aside>
<div th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<main class="dash-main" id="dashMain">
    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-header bg-white border-bottom-0 pt-4 px-4"><h5 class="fw-bold mb-2">Lịch dạy của tôi</h5></div>
        <div class="card-body px-4 pb-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light"><tr><th>Lớp</th><th>Khóa học</th><th>Bắt đầu</th><th>Kết thúc</th><th>Lịch</th><th>Trạng thái</th></tr></thead>
                    <tbody id="scheduleBody"><tr><td colspan="6" class="text-center py-4">Đang tải...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>
<script>
async function loadSchedule() {
    const res = await fetch('/teacher/api/schedule');
    const json = await res.json();
    const tbody = document.getElementById('scheduleBody');
    if (json.status !== 200 || !json.data || json.data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">Không có lịch dạy.</td></tr>';
        return;
    }
    tbody.innerHTML = json.data.map(i => `
      <tr>
        <td>${i.className || ''}</td>
        <td>${i.courseName || ''}</td>
        <td>${i.startDate || ''}</td>
        <td>${i.endDate || ''}</td>
        <td>${i.schedule || ''} ${i.slotTime ? '- ' + i.slotTime : ''}</td>
        <td>${i.status || ''}</td>
      </tr>
    `).join('');
}
document.addEventListener('DOMContentLoaded', loadSchedule);
</script>
</body>
</html>
