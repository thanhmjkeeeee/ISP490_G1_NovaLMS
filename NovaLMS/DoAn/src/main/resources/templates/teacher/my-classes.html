<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:with="isDashboard=true">
<head th:replace="~{fragments/head :: common-head(pageTitle='Lớp của tôi')}"></head>
<body class="dashboard-body">
<header th:replace="~{fragments/header :: dash-header(pageTitle='Teacher Dashboard', breadcrumb='Lớp của tôi')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='my-classes')}"></aside>
<div th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<main class="dash-main" id="dashMain">
    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-header bg-white border-bottom-0 pt-4 px-4">
            <h5 class="fw-bold mb-2">Danh sách lớp bạn phụ trách</h5>
        </div>
        <div class="card-body px-4 pb-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Lớp</th>
                        <th>Khóa học</th>
                        <th>Lịch học</th>
                        <th>Học viên</th>
                        <th>Số buổi</th>
                        <th>Quiz</th>
                        <th class="text-end">Hành động</th>
                    </tr>
                    </thead>
                    <tbody id="classesBody">
                    <tr><td colspan="8" class="text-center py-4">Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
            <nav class="mt-3"><ul class="pagination pagination-sm" id="classesPagination"></ul></nav>
        </div>
    </div>
</main>

<!-- Quiz Management Modal -->
<div class="modal fade" id="quizModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Quản lý Quiz - <span id="quizModalClassName"></span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="quizModalBody">
                <div class="text-center py-4"><div class="spinner-border text-primary"></div></div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<script>
async function loadClasses(page = 0) {
    const res = await fetch(`/teacher/api/my-classes?page=${page}&size=10`);
    const json = await res.json();
    const tbody = document.getElementById('classesBody');
    const pag = document.getElementById('classesPagination');

    if (json.status !== 200 || !json.data || !json.data.items || json.data.items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4 text-muted">Không có lớp nào.</td></tr>';
        pag.innerHTML = '';
        return;
    }

    tbody.innerHTML = json.data.items.map((c, idx) => `
        <tr>
            <td>${page * 10 + idx + 1}</td>
            <td class="fw-semibold">${c.className || ''}</td>
            <td>${c.courseName || ''}</td>
            <td>${c.schedule || ''} ${c.slotTime ? '- ' + c.slotTime : ''}</td>
            <td>${c.studentCount || 0}</td>
            <td>${c.numberOfSessions || 0}</td>
            <td>
                <button class="btn btn-sm btn-outline-info rounded-pill" onclick="openQuizModal(${c.classId}, '${(c.className || '').replace(/'/g, "\\'")}')">
                    <i class="bi bi-patch-question me-1"></i>Quiz
                </button>
            </td>
            <td class="text-end">
                <a href="/teacher/sessions?classId=${c.classId}" class="btn btn-sm btn-outline-primary rounded-pill">
                    <i class="bi bi-calendar-event me-1"></i>Quản lý buổi học
                </a>
            </td>
        </tr>
    `).join('');

    const totalPages = json.data.totalPages || 1;
    let html = '';
    html += `<li class="page-item ${page === 0 ? 'disabled' : ''}"><button class="page-link" onclick="loadClasses(${page - 1})">Trước</button></li>`;
    for (let i = 0; i < totalPages; i++) {
        html += `<li class="page-item ${i === page ? 'active' : ''}"><button class="page-link" onclick="loadClasses(${i})">${i + 1}</button></li>`;
    }
    html += `<li class="page-item ${page === totalPages - 1 ? 'disabled' : ''}"><button class="page-link" onclick="loadClasses(${page + 1})">Sau</button></li>`;
    pag.innerHTML = html;
}

async function openQuizModal(classId, className) {
    document.getElementById('quizModalClassName').textContent = className;
    document.getElementById('quizModalBody').innerHTML = '<div class="text-center py-4"><div class="spinner-border text-primary"></div></div>';
    const modal = new bootstrap.Modal(document.getElementById('quizModal'));
    modal.show();

    try {
        const res = await fetch(`/api/v1/teacher/quizzes/class/${classId}`);
        const json = await res.json();
        const body = document.getElementById('quizModalBody');

        if (json.status !== 200 || !json.data || json.data.length === 0) {
            body.innerHTML = '<div class="text-center py-4 text-muted"><i class="bi bi-patch-question fs-1 d-block mb-2"></i>Chưa có quiz nào cho lớp này.</div>';
            return;
        }

        body.innerHTML = json.data.map(q => {
            const isOpen = q.isOpen === true;
            const toggleLabel = isOpen ? 'Đóng Quiz' : 'Mở Quiz';
            const toggleClass = isOpen ? 'btn-warning' : 'btn-success';
            const badge = isOpen
                ? '<span class="badge bg-success"><i class="bi bi-unlock-fill me-1"></i>Đang mở</span>'
                : '<span class="badge bg-secondary"><i class="bi bi-lock-fill me-1"></i>Đang đóng</span>';

            return `
            <div class="card mb-3 border-0 shadow-sm">
                <div class="card-body">
                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <h6 class="fw-bold mb-1">${q.title || 'Quiz không tên'}</h6>
                            <div class="small text-muted">
                                <i class="bi bi-list-task me-1"></i>${q.totalQuestions || 0} câu |
                                <i class="bi bi-stopwatch me-1"></i>${q.timeLimitMinutes ? q.timeLimitMinutes + ' phút' : 'Không giới hạn'} |
                                Trạng thái: <span class="badge bg-info">${q.status}</span> ${badge}
                            </div>
                        </div>
                        <button class="btn btn-sm rounded-pill ${toggleClass} fw-bold"
                                onclick="toggleQuizOpen(${q.quizId}, this)">
                            <i class="bi ${isOpen ? 'bi-lock-fill' : 'bi-unlock-fill'} me-1"></i>${toggleLabel}
                        </button>
                    </div>
                </div>
            </div>`;
        }).join('');
    } catch (e) {
        document.getElementById('quizModalBody').innerHTML =
            '<div class="text-center text-danger py-4">Lỗi tải quiz. Vui lòng thử lại.</div>';
    }
}

async function toggleQuizOpen(quizId, btn) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Đang xử lý...';
    try {
        const res = await fetch(`/api/v1/teacher/quizzes/${quizId}/toggle-open`, { method: 'PATCH' });
        const json = await res.json();
        if (json.status === 200) {
            const isOpen = json.data && json.data.isOpen === true;
            btn.className = `btn btn-sm rounded-pill ${isOpen ? 'btn-warning' : 'btn-success'} fw-bold`;
            btn.innerHTML = `<i class="bi ${isOpen ? 'bi-lock-fill' : 'bi-unlock-fill'} me-1"></i>${isOpen ? 'Đóng Quiz' : 'Mở Quiz'}`;
            const card = btn.closest('.card');
            const badge = card.querySelector('.badge.bg-success, .badge.bg-secondary');
            if (badge) {
                badge.className = isOpen ? 'badge bg-success' : 'badge bg-secondary';
                badge.innerHTML = isOpen
                    ? '<i class="bi bi-unlock-fill me-1"></i>Đang mở'
                    : '<i class="bi bi-lock-fill me-1"></i>Đang đóng';
            }
        } else {
            alert(json.message || 'Lỗi khi đổi trạng thái quiz');
            btn.disabled = false;
        }
    } catch (e) {
        alert('Lỗi kết nối!');
        btn.disabled = false;
    }
}

document.addEventListener('DOMContentLoaded', () => loadClasses(0));
</script>
</body>
</html>
