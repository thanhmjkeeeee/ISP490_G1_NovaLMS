<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:with="isDashboard=true">
<head th:replace="~{fragments/head :: common-head(pageTitle='Quiz Bank')}"></head>
<body class="dashboard-body">
<header th:replace="~{fragments/header :: dash-header(pageTitle='Teacher Dashboard', breadcrumb='Quiz Bank')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='quiz-bank')}"></aside>
<div th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<main class="dash-main" id="dashMain">
    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-header bg-white border-bottom-0 pt-4 px-4"><h5 class="fw-bold mb-2">Quiz theo lớp đang phụ trách</h5></div>
        <div class="card-body px-4 pb-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light"><tr><th>Lớp</th><th>Khóa học</th><th>Số quiz</th><th>Chấm điểm</th></tr></thead>
                    <tbody id="quizBankBody"><tr><td colspan="4" class="text-center py-4">Đang tải...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>
<script>
async function loadQuizBank() {
    const res = await fetch('/teacher/api/quiz-bank');
    const json = await res.json();
    const tbody = document.getElementById('quizBankBody');
    if (json.status !== 200 || !json.data || json.data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-muted">Không có dữ liệu quiz.</td></tr>';
        return;
    }
    tbody.innerHTML = json.data.map(i => `
      <tr>
        <td>${i.className || ''}</td>
        <td>${i.courseName || ''}</td>
        <td>${i.quizCount || 0}</td>
        <td><a class="btn btn-sm btn-primary" href="/teacher/quiz/grading">Đi chấm</a></td>
      </tr>
    `).join('');
}
document.addEventListener('DOMContentLoaded', loadQuizBank);
</script>
</body>
</html>
