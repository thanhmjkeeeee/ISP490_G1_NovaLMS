<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:with="isDashboard=true">
<head th:replace="~{fragments/head :: common-head(pageTitle='Học viên')}"></head>
<body class="dashboard-body">
<header th:replace="~{fragments/header :: dash-header(pageTitle='Teacher Dashboard', breadcrumb='Học viên')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='students')}"></aside>
<div th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<main class="dash-main" id="dashMain">
    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-header bg-white border-bottom-0 pt-4 px-4"><h5 class="fw-bold mb-2">Học viên các lớp của tôi</h5></div>
        <div class="card-body px-4 pb-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light"><tr><th>Học viên</th><th>Email</th><th>SĐT</th><th>Lớp</th><th>Khóa học</th><th>Trạng thái</th></tr></thead>
                    <tbody id="studentsBody"><tr><td colspan="6" class="text-center py-4">Đang tải...</td></tr></tbody>
                </table>
            </div>
            <div id="studentsPagination"></div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>
<script>
async function loadStudents(page = 0) {
    const res = await fetch('/teacher/api/students');
    const json = await res.json();
    const tbody = document.getElementById('studentsBody');
    const pag = document.getElementById('studentsPagination');
    
    if (json.status !== 200 || !json.data || json.data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">Chưa có học viên.</td></tr>';
        pag.innerHTML = '';
        return;
    }
    
    const pageSize = 20;
    const totalPages = Math.ceil(json.data.length / pageSize);
    const pagedItems = json.data.slice(page * pageSize, (page + 1) * pageSize);
    
    tbody.innerHTML = pagedItems.map((i, idx) => `
      <tr>
        <td>${i.studentName || ''}</td>
        <td>${i.email || ''}</td>
        <td>${i.mobile || ''}</td>
        <td>${i.className || ''}</td>
        <td>${i.courseName || ''}</td>
        <td>${i.registrationStatus || ''}</td>
      </tr>
    `).join('');
    
    if (totalPages > 1) {
        let html = `<nav class="mt-4"><ul class="pagination pagination-sm justify-content-center">`;
        html += `<li class="page-item ${page === 0 ? 'disabled' : ''}"><button class="page-link" onclick="loadStudents(${page - 1})">Trước</button></li>`;
        for (let i = 0; i < totalPages; i++) {
            html += `<li class="page-item ${i === page ? 'active' : ''}"><button class="page-link" onclick="loadStudents(${i})">${i + 1}</button></li>`;
        }
        html += `<li class="page-item ${page === totalPages - 1 ? 'disabled' : ''}"><button class="page-link" onclick="loadStudents(${page + 1})">Sau</button></li>`;
        html += `</ul></nav>`;
        pag.innerHTML = html;
    } else {
        pag.innerHTML = '';
    }
}
document.addEventListener('DOMContentLoaded', () => loadStudents(0));
</script>
</body>
</html>
