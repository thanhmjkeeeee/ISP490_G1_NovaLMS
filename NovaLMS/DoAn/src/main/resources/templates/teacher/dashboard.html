<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:with="isDashboard=true">

<head th:replace="~{fragments/head :: common-head(pageTitle='Teacher Dashboard')}"></head>

<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Teacher Dashboard', breadcrumb='Tổng quan')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='dashboard')}"></aside>
<div th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<main class="dash-main" id="dashMain">
    <div class="row g-4 mb-4">
        <!-- Dashboard Stats Placeholder -->
        <div class="col-xl-4 col-md-6">
            <div class="card h-100 p-3 shadow-sm border-0 rounded-4">
                <div class="d-flex align-items-center">
                    <div class="stats-icon text-primary bg-primary bg-opacity-10 rounded-circle p-3 me-3">
                        <i class="bi bi-people-fill fs-4"></i>
                    </div>
                    <div>
                        <h6 class="text-muted fw-bold mb-1">Học viên của tôi</h6>
                        <h3 class="fw-bold mb-0">--</h3>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-xl-4 col-md-6">
            <div class="card h-100 p-3 shadow-sm border-0 rounded-4">
                <div class="d-flex align-items-center">
                    <div class="stats-icon text-success bg-success bg-opacity-10 rounded-circle p-3 me-3">
                        <i class="bi bi-journal-check fs-4"></i>
                    </div>
                    <div>
                        <h6 class="text-muted fw-bold mb-1">Khóa học phụ trách</h6>
                        <h3 class="fw-bold mb-0">--</h3>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-xl-4 col-md-6">
            <div class="card h-100 p-3 shadow-sm border-0 rounded-4">
                <div class="d-flex align-items-center">
                    <div class="stats-icon text-warning bg-warning bg-opacity-10 rounded-circle p-3 me-3">
                        <i class="bi bi-file-earmark-text-fill fs-4"></i>
                    </div>
                    <div>
                        <h6 class="text-muted fw-bold mb-1">Bài cần chấm</h6>
                        <h3 class="fw-bold mb-0">--</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4 d-flex justify-content-between align-items-center">
            <h5 class="fw-bold mb-2">Bài nộp gần đây</h5>
            <a href="/teacher/quiz/grading" class="btn btn-sm btn-outline-primary">Đi tới trang chấm điểm <i class="bi bi-arrow-right"></i></a>
        </div>
        <div class="card-body px-4 pb-4">
            <p class="text-muted mb-0">Truy cập menu chấm bài để đánh giá các câu tự luận của học viên.</p>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

</body>
</html>
