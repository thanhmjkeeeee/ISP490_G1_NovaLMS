<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:with="isDashboard=true">

<head th:replace="~{fragments/head :: common-head(pageTitle='Chấm Điểm Tự Luận')}"></head>

<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Teacher Dashboard', breadcrumb='Chấm Điểm Quiz')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='quiz-bank')}"></aside>
<div th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<main class="dash-main" id="dashMain">
    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
            <h5 class="fw-bold mb-2">📝 Quản lý bài làm Quiz & Yêu cầu giải trình</h5>
            <p class="text-muted small">Quản lý bài tự luận cần chấm điểm và xem xét các yêu cầu xin mở lại bài của học sinh vi phạm.</p>
            
            <ul class="nav nav-tabs nav-tabs-custom border-bottom-0 mt-3" id="gradingTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active fw-bold px-4 py-3" id="all-tab" onclick="switchTab('ALL')" type="button">
                        <i class="bi bi-list-ul me-1"></i> Tất cả bài chờ xử lý
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link fw-bold px-4 py-3 text-danger" id="request-tab" onclick="switchTab('REQUEST')" type="button">
                        <i class="bi bi-exclamation-octagon-fill me-1"></i> Yêu cầu mở khóa bài
                        <span id="requestCountBadge" class="badge bg-danger ms-1" style="display: none;">0</span>
                    </button>
                </li>
            </ul>
        </div>
        <style>
            .nav-tabs-custom .nav-link {
                border: none;
                color: var(--dash-text-secondary);
                background: none;
                border-bottom: 3px solid transparent;
                margin-right: 15px;
                transition: all 0.2s;
            }
            .nav-tabs-custom .nav-link:hover { color: var(--dash-accent); }
            .nav-tabs-custom .nav-link.active {
                color: var(--dash-accent);
                border-bottom-color: var(--dash-accent);
                background: none;
            }
        </style>
        <div class="card-body px-4 pb-4">
            
            <div th:if="${errorMsg != null}" class="alert alert-danger" th:text="${errorMsg}"></div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Bài Kiểm Tra</th>
                            <th>Khóa Học</th>
                            <th>Học Viên</th>
                            <th>Thời Gian Nộp</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody id="gradingTableBody">
                        <tr><td colspan="6" class="text-center py-4"><div class="spinner-border text-primary" role="status"></div></td></tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination Controls -->
            <nav id="gradingPagination" class="mt-4" style="display: none;">
                <ul id="gradingPaginationButtons" class="pagination justify-content-center">
                    <!-- JS sẽ render phân trang ở đây -->
                </ul>
            </nav>
            
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<script>
let currentPage = 0;
let currentQuizType = 'LESSON_QUIZ';
let currentTab = 'ALL'; // 'ALL' or 'REQUEST'

document.addEventListener("DOMContentLoaded", () => {
    loadPendingList(currentPage);
});

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('#gradingTabs .nav-link').forEach(btn => btn.classList.remove('active'));
    if(tab === 'ALL') document.getElementById('all-tab').classList.add('active');
    else document.getElementById('request-tab').classList.add('active');
    loadPendingList(0);
}

async function loadPendingList(page) {
    currentPage = page;
    try {
        const res = await fetch(`/api/v1/teacher/quiz-results/pending?page=${page}&size=50&quizType=${currentQuizType}`);
        const result = await res.json();

        let items = [];
        let totalRequests = 0;

        if(result.status === 200 && result.data && result.data.items) {
            // Calculate total requests for the badge
            totalRequests = result.data.items.filter(i => i.isUnlockRequested).length;
            const badge = document.getElementById('requestCountBadge');
            if(totalRequests > 0) {
                badge.innerText = totalRequests;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }

            // Filter based on tab
            if (currentTab === 'REQUEST') {
                items = result.data.items.filter(i => i.isUnlockRequested);
            } else {
                items = result.data.items;
            }
        }

        let html = '';
        if(items.length > 0) {
            items.forEach((item, index) => {
                const isLocked = item.status === 'LOCKED';
                const timeValue = item.submittedAt || item.startedAt;
                const date = timeValue ? new Date(timeValue).toLocaleString('vi-VN') : 'N/A';
                const gradeUrl = `/teacher/quiz/grading/${item.resultId}`;
                
                let actionHtml = '';
                let statusBadge = '';
                let violationHtml = '';
                
                if (isLocked) {
                    const requestBadge = item.isUnlockRequested 
                        ? `<span class="badge bg-warning text-dark ms-2 shadow-sm"><i class="bi bi-exclamation-circle-fill"></i> HÀNH ĐỘNG CẦN THIẾT: YÊU CẦU MỞ KHÓA</span>`
                        : '';
                    statusBadge = `<span class="badge bg-danger ms-2"><i class="bi bi-shield-lock"></i> Bị khóa</span>${requestBadge}`;
                    actionHtml = `
                        <button onclick="unlockResult(${item.resultId})" class="btn btn-sm ${item.isUnlockRequested ? 'btn-danger' : 'btn-warning'} rounded-pill px-3 fw-bold shadow-sm">
                            <i class="bi bi-unlock"></i> Duyệt Mở Khóa
                        </button>`;
                    
                    let logHtml = '';
                    if (item.violationLog) {
                        const logs = item.violationLog.split('\n').map(l => `<div class="mb-1"><i class="bi bi-clock-history me-1"></i>${l}</div>`).join('');
                        logHtml = `<div class="mt-2 p-2 bg-danger bg-opacity-10 border-start border-3 border-danger small text-danger"><i class="bi bi-exclamation-triangle-fill me-1"></i> <strong>Nhật ký vi phạm:</strong><br>${logs}</div>`;
                    } else {
                        logHtml = `<div class="mt-2 p-2 bg-danger bg-opacity-10 border-start border-3 border-danger small text-danger"><i class="bi bi-exclamation-triangle-fill me-1"></i> <strong>Nhật ký vi phạm:</strong><br>Hệ thống tự động khóa sau 3 lần thoát tab.</div>`;
                    }
                    
                    let appealHtml = '';
                    if (item.isUnlockRequested && item.studentAppealReason) {
                        appealHtml = `
                            <div class="mt-2 p-2 bg-warning bg-opacity-10 border-start border-3 border-warning small">
                                <i class="bi bi-chat-left-dots-fill me-1"></i> <strong>Giải trình của học sinh:</strong><br>
                                <span class="fst-italic text-dark">"${item.studentAppealReason}"</span>
                            </div>`;
                    }
                    violationHtml = logHtml + appealHtml;
                } else {
                    actionHtml = `<a href="${gradeUrl}" class="btn btn-sm btn-primary rounded-pill px-3">Chấm Định Tính <i class="bi bi-arrow-right"></i></a>`;
                }

                html += `
                    <tr>
                        <td>${page * 10 + index + 1}</td>
                        <td>
                            <div class="fw-bold text-dark">${item.quizTitle}</div>
                            ${statusBadge}
                            ${violationHtml}
                        </td>
                        <td><span class="badge bg-secondary">${item.courseName || 'N/A'}</span></td>
                        <td>
                            <div class="d-flex flex-column">
                                <span class="fw-semibold">${item.studentName}</span>
                                <span class="small text-muted">${item.studentEmail}</span>
                            </div>
                        </td>
                        <td><span class="small text-muted"><i class="bi bi-clock me-1"></i>${date}</span></td>
                        <td>${actionHtml}</td>
                    </tr>
                `;
            });
            renderPagination(result.data.totalPages, page);
        } else {
            html = `<tr><td colspan="6" class="text-center py-5 text-muted"><i class="bi bi-cup fs-1 d-block mb-3"></i> Tạm thời không có bài nào cần chấm.</td></tr>`;
            document.getElementById('gradingPagination').style.display = 'none';
        }
        document.getElementById('gradingTableBody').innerHTML = html;

    } catch(e) {
        document.getElementById('gradingTableBody').innerHTML = `<tr><td colspan="6" class="text-center text-danger py-4">Lỗi kết nối khi tải dữ liệu.</td></tr>`;
    }
}

async function unlockResult(resultId) {
    const result = await Swal.fire({
        title: 'Xác nhận mở khóa?',
        text: "Học sinh sẽ được phép làm lại bài Quiz này. Bản ghi vi phạm hiện tại sẽ bị xóa để học sinh bắt đầu lượt mới.",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#dc3545',
        cancelButtonColor: '#6c757d',
        confirmButtonText: 'Đồng ý mở khóa',
        cancelButtonText: 'Hủy'
    });

    if (result.isConfirmed) {
        try {
            const res = await fetch(`/api/v1/teacher/quiz-results/${resultId}/unlock`, { method: 'POST' });
            const data = await res.json();
            if (data.status === 200) {
                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'success',
                    title: 'Đã mở khóa bài làm thành công!',
                    showConfirmButton: false,
                    timer: 3000
                });
                loadPendingList(currentPage);
            } else {
                Swal.fire('Lỗi!', data.message || 'Không thể mở khóa', 'error');
            }
        } catch(e) {
            Swal.fire('Lỗi!', 'Lỗi kết nối server', 'error');
        }
    }
}

function renderPagination(totalPages, currentPageIdx) {
    const nav = document.getElementById('gradingPagination');
    if (totalPages <= 1) {
        nav.style.display = 'none';
        return;
    }
    nav.style.display = 'block';
    NovaPagination.render('gradingPaginationButtons', totalPages, currentPageIdx, 'loadPendingList');
}
</script>

</body>
</html>
