<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:with="isDashboard=true">

<head th:replace="~{fragments/head :: common-head(pageTitle='Kết Quả Đã Chấm')}"></head>

<body class="dashboard-body">

<header th:replace="~{fragments/header :: dash-header(pageTitle='Teacher Dashboard', breadcrumb='Kết Quả Đã Chấm')}"></header>
<aside th:replace="~{fragments/sidebar :: dash-sidebar(activePage='grading-results')}"></aside>
<div th:replace="~{fragments/sidebar :: dash-overlay}"></div>

<main class="dash-main" id="dashMain">
    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
            <h5 class="fw-bold mb-2">Kết quả bài đã chấm xong</h5>
            <p class="text-muted">Danh sách các bài quiz/assignment đã hoàn tất chấm điểm. Nhấn vào một dòng để xem chi tiết.</p>

            <!-- Quiz Type Filter Tabs -->
            <ul class="nav nav-tabs mt-3" id="quizTypeTabs">
                <li class="nav-item">
                    <a class="nav-link active" href="#" data-type="LESSON_QUIZ">
                        📝 Bài tập nhỏ (Quiz)
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-type="ASSIGNMENT">
                        📋 Bài kiểm tra lớn
                    </a>
                </li>
            </ul>
        </div>
        <div class="card-body px-4 pb-4">

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Bài Kiểm Tra</th>
                            <th>Học Viên</th>
                            <th>Ngày nộp</th>
                            <th>Ngày chấm</th>
                            <th>Điểm</th>
                            <th>Kết quả</th>
                            <th>Xem chi tiết</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTableBody">
                        <tr><td colspan="8" class="text-center py-4"><div class="spinner-border text-primary" role="status"></div></td></tr>
                    </tbody>
                </table>
            </div>

            <nav id="resultsPagination" class="mt-4" style="display: none;">
                <ul id="resultsPaginationButtons" class="pagination justify-content-center"></ul>
            </nav>

        </div>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: dash-scripts}"></th:block>
<th:block th:replace="~{fragments/header :: dash-scripts}"></th:block>

<script>
let currentPage = 0;
let currentQuizType = 'LESSON_QUIZ';

document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll('#quizTypeTabs .nav-link').forEach(tab => {
        tab.addEventListener('click', (e) => {
            e.preventDefault();
            document.querySelectorAll('#quizTypeTabs .nav-link').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentQuizType = tab.dataset.type;
            loadGradedList(0);
        });
    });

    loadGradedList(currentPage);
});

async function loadGradedList(page) {
    currentPage = page;
    try {
        const res = await fetch(`/api/v1/teacher/quiz-results/graded?page=${page}&size=10`);
        const result = await res.json();

        let html = '';
        if (result.status === 200 && result.data && result.data.items && result.data.items.length > 0) {
            const filtered = result.data.items.filter(item => item.quizType === currentQuizType);

            if (filtered.length === 0) {
                html = `<tr><td colspan="8" class="text-center py-5 text-muted">
                    <i class="bi bi-clipboard-check fs-1 d-block mb-3"></i>
                    Chưa có bài nào thuộc loại này.
                </td></tr>`;
            } else {
                filtered.forEach((item, index) => {
                    const submittedDate = item.submittedAt
                        ? new Date(item.submittedAt).toLocaleString('vi-VN')
                        : '—';
                    const gradedDate = item.gradedAt
                        ? new Date(item.gradedAt).toLocaleString('vi-VN')
                        : '—';
                    const detailUrl = currentQuizType === 'ASSIGNMENT'
                        ? `/teacher/assignment/grading/${item.resultId}`
                        : `/teacher/quiz/grading/${item.resultId}`;
                    const passed = item.passed;
                    const pct = item.percentage;

                    const resultBadge = passed
                        ? '<span class="badge bg-success rounded-pill px-3 py-2 fw-bold"><i class="bi bi-check-circle me-1"></i>Đạt</span>'
                        : '<span class="badge bg-danger rounded-pill px-3 py-2 fw-bold"><i class="bi bi-x-circle me-1"></i>Chưa đạt</span>';

                    const scoreColor = passed ? 'text-success' : 'text-danger';
                    const scoreDisplay = pct !== null && pct !== undefined
                        ? `<span class="fw-bold ${scoreColor}">${item.score}/${item.maxScore}</span>
                           <span class="small text-muted">(${pct}%)</span>`
                        : `<span class="text-muted">—</span>`;

                    html += `
                    <tr>
                        <td>${page * 10 + index + 1}</td>
                        <td>
                            <div class="fw-bold text-dark">${item.quizTitle || '—'}</div>
                            <div class="small text-muted">${item.courseName || '—'}</div>
                        </td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center"
                                     style="width:36px;height:36px;font-size:0.8rem;font-weight:700;">
                                    ${(item.studentName || '?').charAt(0).toUpperCase()}
                                </div>
                                <div>
                                    <div class="fw-semibold small">${item.studentName || '—'}</div>
                                    <div class="extra-small text-muted">${item.studentEmail || ''}</div>
                                </div>
                            </div>
                        </td>
                        <td><span class="small text-muted"><i class="bi bi-clock me-1"></i>${submittedDate}</span></td>
                        <td><span class="small text-muted"><i class="bi bi-check2-all me-1"></i>${gradedDate}</span></td>
                        <td>${scoreDisplay}</td>
                        <td>${resultBadge}</td>
                        <td>
                            <a href="${detailUrl}" class="btn btn-sm btn-outline-primary rounded-pill px-3">
                                <i class="bi bi-eye me-1"></i> Xem chi tiết
                            </a>
                        </td>
                    </tr>`;
                });

                renderPagination(result.data.totalPages, page);
            }
        } else {
            html = `<tr><td colspan="8" class="text-center py-5 text-muted">
                <i class="bi bi-clipboard-check fs-1 d-block mb-3"></i>
                Chưa có bài nào đã chấm xong.
            </td></tr>`;
            document.getElementById('resultsPagination').style.display = 'none';
        }
        document.getElementById('resultsTableBody').innerHTML = html;

    } catch(e) {
        document.getElementById('resultsTableBody').innerHTML =
            `<tr><td colspan="8" class="text-center text-danger py-4">Lỗi kết nối khi tải dữ liệu.</td></tr>`;
    }
}

function renderPagination(totalPages, currentPageIdx) {
    const nav = document.getElementById('resultsPagination');
    if (totalPages <= 1) {
        nav.style.display = 'none';
        return;
    }
    nav.style.display = 'block';
    NovaPagination.render('resultsPaginationButtons', totalPages, currentPageIdx, 'loadGradedList');
}
</script>

</body>
</html>
