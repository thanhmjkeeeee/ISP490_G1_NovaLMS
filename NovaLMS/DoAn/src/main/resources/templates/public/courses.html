<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: common-head('Khóa học')}">
</head>

<body class="courses-page bg-light">

<header th:replace="~{fragments/header :: header-fragment('courses')}"></header>

<main class="main" id="publicCoursesWrapper">
  <div class="page-title light-background shadow-sm pb-4 mb-5 border-bottom">
    <div class="container d-lg-flex justify-content-between align-items-center pt-4">
      <h1 class="mb-2 mb-lg-0 fw-bold">Khóa học</h1>
      <nav class="breadcrumbs">
        <ol class="mb-0">
          <li><a th:href="@{/}" class="text-decoration-none">Trang chủ</a></li>
          <li class="current text-primary fw-medium">Khóa học</li>
        </ol>
      </nav>
    </div>
  </div>

  <section id="courses-2" class="courses-2 section pt-0">
    <div class="container" data-aos="fade-up" data-aos-delay="100">
      <div class="row g-4">
        <div class="col-lg-3">
          <div class="bg-white p-4 rounded-4 shadow-sm pub-sidebar-sticky" data-aos="fade-right" data-aos-delay="100">
            <h5 class="fw-bold mb-4 text-primary border-bottom pb-2">
              <i class="bi bi-funnel-fill me-2"></i>Lọc khóa học
            </h5>
            <div class="filter-group">
              <h6 class="fw-bold text-dark mb-3">Thể loại</h6>
              <div class="d-flex flex-column gap-2">
                <label class="pub-filter-label">
                  <input type="radio" name="categoryId" value="" class="pub-filter-radio d-none" th:checked="${selectedCat == null}">
                  <span class="pub-filter-box d-flex align-items-center p-2 rounded-3 cursor-pointer">
                    <i class="bi bi-grid-fill me-2"></i> Tất cả
                  </span>
                </label>
                <label class="pub-filter-label" th:each="cat : ${categories}">
                  <input type="radio" name="categoryId" th:value="${cat.settingId}" class="pub-filter-radio d-none" th:checked="${selectedCat == cat.settingId}">
                  <span class="pub-filter-box d-flex align-items-center p-2 rounded-3 cursor-pointer">
                    <i class="bi bi-tag me-2"></i> <span th:text="${cat.name}">Category</span>
                  </span>
                </label>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-9">
          <div class="bg-white p-3 rounded-4 shadow-sm mb-4 d-flex flex-wrap justify-content-between align-items-center gap-3">
            <div class="position-relative flex-grow-1" style="max-width: 400px;">
              <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
              <input type="text" id="searchInput" class="form-control rounded-pill ps-5 py-2 border-0 bg-light" placeholder="Tìm kiếm khóa học...">
            </div>
            <div class="d-flex align-items-center gap-2">
              <label for="sortSelect" class="text-muted small fw-bold mb-0 text-nowrap">Sắp xếp:</label>
              <select id="sortSelect" class="form-select border-0 bg-light rounded-pill py-2 cursor-pointer shadow-none">
                <option value="newest">Mới nhất</option>
                <option value="price_asc">Giá: Thấp đến cao</option>
                <option value="price_desc">Giá: Cao đến thấp</option>
              </select>
            </div>
          </div>

          <div class="row g-4" id="courseContainer"></div>

          <nav class="mt-5" aria-label="Pagination">
            <ul id="pagination-container" class="pagination justify-content-center gap-2"></ul>
          </nav>
        </div>
      </div>
    </div>
  </section>
</main>

<footer th:replace="~{fragments/footer :: common-footer}"></footer>
<th:block th:replace="~{fragments/footer :: common-scripts}"></th:block>

<script th:inline="javascript">
  let currentPage = 0;
  let currentTotalPages = 0;
  let debounceTimer = null;
  let abortController = null;

  // CẦN THIẾT: Định nghĩa các đường dẫn mặc định để tránh lỗi undefined
  const DEFAULT_COURSE_IMAGE = '/assets/img/default-course.png';
  const DEFAULT_AVATAR = '/assets/img/default-avatar.png';

  const showSkeleton = () => {
    const container = document.getElementById('courseContainer');
    document.getElementById('pagination-container').innerHTML = '';
    container.innerHTML = Array(4).fill(0).map(() => `
      <div class="col-lg-6 col-md-6">
        <div class="pub-course-card border-0 shadow-sm">
          <div class="pub-skeleton" style="height: 200px; width: 100%; border-radius: 16px 16px 0 0;"></div>
          <div class="pub-course-content">
            <div class="pub-skeleton mb-3" style="height: 24px; width: 40%;"></div>
            <div class="pub-skeleton mb-2" style="height: 20px; width: 90%;"></div>
            <div class="pub-skeleton mb-4" style="height: 14px; width: 100%;"></div>
            <div class="pub-skeleton mt-auto rounded-pill" style="height: 42px; width: 100%;"></div>
          </div>
        </div>
      </div>`).join('');
  };

  const loadCourses = async (page = 0) => {
    currentPage = page;
    const keyword = document.getElementById('searchInput')?.value.trim() || '';
    const sortValue = document.getElementById('sortSelect')?.value || 'newest';
    const selectedCategory = document.querySelector('input[name="categoryId"]:checked')?.value || '';

    let url = `/api/v1/public/courses/filter?page=${page}&size=6&sortBy=${sortValue}`;
    if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;
    if (selectedCategory) url += `&categoryId=${selectedCategory}`;

    if (abortController) abortController.abort();
    abortController = new AbortController();

    showSkeleton();

    try {
      const response = await fetch(url, { signal: abortController.signal });
      if (!response.ok) throw new Error('Lỗi mạng');

      const jsonResponse = await response.json();
      const pageData = jsonResponse.data;
      const courses = pageData.items;
      currentTotalPages = pageData.totalPages;

      const container = document.getElementById('courseContainer');

      if (!courses || courses.length === 0) {
        container.innerHTML = `<div class="col-12 text-center py-5 bg-white rounded-4 shadow-sm">
            <i class="bi bi-journal-x text-muted" style="font-size: 4rem;"></i>
            <h4 class="fw-bold mt-3 text-dark">Không tìm thấy khóa học nào</h4>
          </div>`;
        renderPagination(0);
        return;
      }

      container.innerHTML = courses.map((course, index) => {
        // 1. Xử lý hiển thị Giá
        let priceHtml = '';
        if (course.price != null && course.price > 0) {
          const formattedPrice = course.price.toLocaleString('vi-VN');
          if (course.sale != null && course.sale > 0) {
            const salePrice = (course.price - course.sale).toLocaleString('vi-VN');
            priceHtml = `<span class="text-decoration-line-through text-muted small me-2">${formattedPrice} đ</span>
                         <span class="h5 fw-bold text-primary mb-0">${salePrice} đ</span>`;
          } else {
            priceHtml = `<span class="h5 fw-bold text-primary mb-0">${formattedPrice} đ</span>`;
          }
        } else {
          priceHtml = `<span class="h5 fw-bold text-success mb-0">Miễn phí</span>`;
        }

        // 2. Xử lý nội dung & Ảnh (ĐÃ FIX: Xóa khai báo trùng tên và lặp thẻ img)
        let shortDesc = course.description || 'Chưa có mô tả chi tiết.';
        if (shortDesc.length > 90) shortDesc = shortDesc.substring(0, 90) + '...';

        const expertAvatar = (course.expert && course.expert.avatarUrl) ? course.expert.avatarUrl : DEFAULT_AVATAR;
        const expertName = course.expert ? course.expert.fullName : 'Hệ thống';
        const finalImageUrl = (course.imageUrl && course.imageUrl.trim() !== '') ? course.imageUrl : DEFAULT_COURSE_IMAGE;
        const detailUrl = '/course/details/' + course.courseId;

        return `
          <div class="col-lg-6 col-md-6 pub-fade-in" style="animation-delay: ${index * 50}ms">
            <div class="pub-course-card shadow-sm">
              <a href="${detailUrl}" class="text-decoration-none d-block text-reset">
              <div class="pub-course-img-wrap">
                <img src="${finalImageUrl}"
                     onerror="this.onerror=null; this.src='${DEFAULT_COURSE_IMAGE}';"
                     alt="Course Image">
                <span class="position-absolute top-0 start-0 bg-primary text-white px-3 py-1 m-3 rounded-pill small fw-bold shadow-sm">
                  ${course.categoryName || 'Khác'}
                </span>
              </div>
              </a>
              <div class="pub-course-content">
                <h5 class="fw-bold mb-2 text-truncate" title="${course.courseName}">
                  <a href="${detailUrl}" class="text-dark text-decoration-none">${course.courseName}</a>
                </h5>
                <p class="text-muted small mb-4 flex-grow-1">${shortDesc}</p>
                <div class="d-flex justify-content-between align-items-center mb-4 pt-3 border-top">
                  <div>${priceHtml}</div>
                </div>
                <div class="d-flex align-items-center mb-4">
                  <img src="${expertAvatar}"
                       onerror="this.onerror=null; this.src='${DEFAULT_AVATAR}';"
                       class="rounded-circle me-2 border" width="32" height="32" alt="Avatar">
                  <span class="small fw-bold text-secondary">${expertName}</span>
                </div>
                <a href="${detailUrl}" class="pub-btn-course mt-auto">Xem chi tiết <i class="bi bi-arrow-right ms-1"></i></a>
              </div>
            </div>
          </div>`;
      }).join('');

      renderPagination(currentTotalPages);

    } catch (error) {
      if (error.name !== 'AbortError') {
        console.error("Fetch error:", error);
      }
    }
  };

  const renderPagination = (totalPages) => {
    const paginationContainer = document.getElementById('pagination-container');
    if (totalPages <= 1) { paginationContainer.innerHTML = ''; return; }

    let html = `<li class="page-item ${currentPage === 0 ? 'disabled' : ''}">
        <button class="page-link rounded-circle border-0 text-dark shadow-sm" onclick="loadCourses(${currentPage - 1})">
          <i class="bi bi-chevron-left"></i>
        </button></li>`;

    for (let i = 0; i < totalPages; i++) {
      html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
          <button class="page-link rounded-circle border-0 shadow-sm ${i === currentPage ? 'bg-primary text-white' : 'text-dark'}" onclick="loadCourses(${i})">
            ${i + 1}
          </button></li>`;
    }

    html += `<li class="page-item ${currentPage + 1 >= totalPages ? 'disabled' : ''}">
        <button class="page-link rounded-circle border-0 text-dark shadow-sm" onclick="loadCourses(${currentPage + 1})">
          <i class="bi bi-chevron-right"></i>
        </button></li>`;

    paginationContainer.innerHTML = html;
  };

  document.addEventListener('DOMContentLoaded', () => {
    loadCourses(0);
    document.querySelectorAll('.pub-filter-radio').forEach(radio => {
      radio.addEventListener('change', () => loadCourses(0));
    });
    document.getElementById('sortSelect').addEventListener('change', () => loadCourses(0));
    document.getElementById('searchInput').addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => loadCourses(0), 400);
    });
  });
</script>

</body>
</html>
