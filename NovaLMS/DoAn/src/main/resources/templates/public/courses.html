<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: common-head('Courses')}">
</head>

<body class="courses-page">

<header th:replace="~{fragments/header :: header-fragment('courses')}"></header>

<main class="main">
  <div class="page-title light-background">
    <div class="container d-lg-flex justify-content-between align-items-center">
      <h1 class="mb-2 mb-lg-0">Courses</h1>
      <nav class="breadcrumbs">
        <ol>
          <li><a th:href="@{/}">Home</a></li>
          <li class="current">Courses</li>
        </ol>
      </nav>
    </div>
  </div>

  <section id="courses-2" class="courses-2 section">
    <div class="container" data-aos="fade-up" data-aos-delay="100">
      <div class="row">

        <div class="col-lg-3">
          <div class="course-filters" data-aos="fade-right" data-aos-delay="100">
            <h4 class="filter-title">Lọc khóa học</h4>

            <div class="filter-group">
              <h5>Thể loại</h5>
              <div class="filter-options">

                <label class="filter-checkbox">
                  <input type="radio" name="categoryId" value=""
                         th:checked="${selectedCat == null}"
                         onchange="loadCourses()">
                  <span class="checkmark"></span>
                  Tất cả
                </label>

                <label class="filter-checkbox" th:each="cat : ${categories}">
                  <input type="radio" name="categoryId"
                         th:value="${cat.settingId}"
                         th:checked="${selectedCat == cat.settingId}"
                         onchange="loadCourses()">
                  <span class="checkmark"></span>
                  <span th:text="${cat.name}">Category Name</span>
                </label>

              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-9">

          <div class="courses-header" data-aos="fade-left" data-aos-delay="100">
            <div class="search-box">
              <i class="bi bi-search"></i>
              <input type="text" id="searchInput" placeholder="Search courses..." oninput="loadCourses()">
            </div>

            <div class="sort-dropdown">
              <select id="sortSelect" onchange="loadCourses()">
                <option value="newest">Sort by: Mới nhất</option>
                <option value="price_asc">Price: Thấp đến cao</option>
                <option value="price_desc">Price: Cao đến thấp</option>
              </select>
            </div>
          </div>

          <div class="courses-grid">
            <div class="row" id="courseContainer">
              <!-- Courses will be loaded here via AJAX -->

              <div class="col-12 text-center py-5" id="loadingState">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">Đang tải...</p>
              </div>

              <div class="col-lg-6 col-md-6" th:each="course : ${courseList}">
                <div class="course-card">

                  <div class="course-image">
                    <img th:src="${course.imageUrl != null ? course.imageUrl : '/assets/img/default-course.jpg'}"
                         alt="Course Image" class="img-fluid">
                  </div>

                  <div class="course-content">
                    <div class="course-meta">
                      <span class="category" th:text="${course.categoryName}">Category</span>
                    </div>

                    <h3 th:text="${course.courseName}">Course Title</h3>
                    <p th:text="${#strings.abbreviate(course.description, 100)}">Short description...</p>

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div th:if="${course.price != null && course.price > 0}" th:with="saleAmount=${course.sale != null ? course.sale : 0}">
                            <span th:if="${saleAmount > 0}" class="text-decoration-line-through text-muted small me-2"
                                  th:text="${#numbers.formatDecimal(course.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                            </span>
                            <span class="h5 fw-bold text-primary mb-0"
                                  th:text="${#numbers.formatDecimal(course.price - saleAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                            </span>
                            <span th:if="${saleAmount > 0}" class="badge bg-danger ms-1"
                                  th:text="'-' + ${#numbers.formatDecimal(saleAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                            </span>
                        </div>
                        <span class="h5 fw-bold text-success mb-0"
                              th:if="${course.price == null || course.price == 0}">
                            Free
                        </span>
                    </div>

                    <div class="instructor-info" th:if="${course.expert != null}">
                      <img th:src="${course.expert.avatarUrl != null ? course.expert.avatarUrl : '/assets/img/default-avatar.png'}"
                           alt="Instructor" class="instructor-avatar">
                      <span class="instructor-name" th:text="${course.expert.fullName}">Expert Name</span>
                    </div>

                    <a th:href="@{/course/details/{id}(id=${course.courseId})}" class="btn-course">Xem chi tiết</a>
                  </div>
                </div>
              </div>

              <div class="col-12 text-center mt-5" th:if="${#lists.isEmpty(courseList)}">
                <h3>Không tìm thấy khóa học nào.</h3>
                <p>Vui lòng thử điều chỉnh bộ lọc hoặc từ khóa tìm kiếm.</p>
              </div>

            </div>
          </div>

          <!-- Pagination -->
          <div class="mt-4" id="pagination-container"></div>
        </div>
      </div>
    </div>
  </section>

</main>

<footer th:replace="~{fragments/footer :: common-footer}"></footer>
<th:block th:replace="~{fragments/footer :: common-scripts}"></th:block>

<script th:inline="javascript">
  // Biến toàn cục cho phân trang
  let currentPage = 0;
  let currentTotalPages = 0;

  // Kiểm tra xem user đã đăng nhập chưa
  var isAuthenticated = /*[[${#authorization.expression('isAuthenticated()')}]]*/ false;

  function loadCourses(page = 0) {
    currentPage = page;

    // 1. Lấy giá trị từ các bộ lọc
    const keyword = document.getElementById('searchInput')?.value || '';
    const sortValue = document.getElementById('sortSelect')?.value || 'newest';
    const selectedCategory = document.querySelector('input[name="categoryId"]:checked');
    const categoryId = (selectedCategory && selectedCategory.value !== "") ? selectedCategory.value : '';

    // 2. URL gọi đến @RestController
    let url = `/api/v1/public/courses/filter?page=${page}&size=6&sortBy=${sortValue}`;
    if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;
    if (categoryId) url += `&categoryId=${categoryId}`;

    // 3. Gọi Fetch API
    fetch(url)
            .then(response => {
              if (!response.ok) {
                throw new Error('Network response was not ok');
              }
              return response.json();
            })
            .then(jsonResponse => {
              // Lấy dữ liệu từ ResponseData (field 'data' chứa PageResponse)
              const pageData = jsonResponse.data;
              const courses = pageData.items;
              currentTotalPages = pageData.totalPages;

              const container = document.getElementById('courseContainer');

              // Xóa sạch nội dung cũ (trừ loading state)
              const loadingState = document.getElementById('loadingState');
              container.innerHTML = '';
              if (loadingState) container.appendChild(loadingState);

              // Nếu mảng rỗng
              if (!courses || courses.length === 0) {
                container.innerHTML = `
            <div class="col-12 text-center mt-5">
              <h3>Không tìm thấy khóa học nào.</h3>
              <p>Vui lòng thử điều chỉnh bộ lọc hoặc từ khóa tìm kiếm.</p>
            </div>`;
                renderPagination(0);
                return;
              }

              // 4. Duyệt qua mảng JSON và tạo chuỗi HTML
              let htmlContent = '';
              courses.forEach(course => {

                // Xử lý giá tiền và sale
                let priceHtml = '';
                if (course.price != null && course.price > 0) {
                  const formattedPrice = course.price.toLocaleString('vi-VN');
                  if (course.sale != null && course.sale > 0) {
                    const salePrice = (course.price - course.sale).toLocaleString('vi-VN');
                    const saleAmount = course.sale.toLocaleString('vi-VN');
                    priceHtml = `<span class="text-decoration-line-through text-muted small me-2">${formattedPrice} đ</span>
                                 <span class="h5 fw-bold text-primary mb-0">${salePrice} đ</span>
                                 <span class="badge bg-danger ms-1">-${saleAmount} đ</span>`;
                  } else {
                    priceHtml = `<span class="h5 fw-bold text-primary mb-0">${formattedPrice} đ</span>`;
                  }
                } else {
                  priceHtml = `<span class="h5 fw-bold text-success mb-0">Free</span>`;
                }

                // Xử lý mô tả ngắn
                let shortDesc = course.description ? course.description : '';
                if (shortDesc.length > 100) {
                  shortDesc = shortDesc.substring(0, 100) + '...';
                }

                // Xử lý thông tin giảng viên
                let expertHtml = '';
                if (course.expert != null) {
                  const avatar = course.expert.avatarUrl ? course.expert.avatarUrl : '/assets/img/default-avatar.png';
                  expertHtml = `<div class="instructor-info">
                    <img src="${avatar}" alt="Instructor" class="instructor-avatar">
                    <span class="instructor-name">${course.expert.fullName}</span>
                  </div>`;
                }

                const imageUrl = course.imageUrl ? course.imageUrl : '/assets/img/default-course.jpg';

                htmlContent += `
            <div class="col-lg-6 col-md-6">
              <div class="course-card">
                <div class="course-image">
                  <img src="${imageUrl}" alt="Course Image" class="img-fluid">
                </div>
                <div class="course-content">
                  <div class="course-meta">
                    <span class="category">${course.categoryName}</span>
                  </div>
                  <h3>${course.courseName}</h3>
                  <p>${shortDesc}</p>
                  <div class="d-flex justify-content-between align-items-center mb-3">
                      ${priceHtml}
                  </div>
                  ${expertHtml}
                  <a href="/course/details/${course.courseId}" class="btn-course">Xem chi tiết</a>
                </div>
              </div>
            </div>`;
              });

              // 5. Đẩy toàn bộ HTML mới vào container
              container.innerHTML = htmlContent;

              // 6. Vẽ phân trang
              renderPagination(currentTotalPages);

              // 7. Ẩn loading
              if (loadingState) loadingState.style.display = 'none';
            })
            .catch(error => {
              console.error('Error loading courses:', error);
              const loadingState = document.getElementById('loadingState');
              if (loadingState) loadingState.style.display = 'none';
            });
  }

  function renderPagination(totalPages) {
    let paginationHtml = '';

    if (totalPages <= 1) return;

    // Previous button
    paginationHtml += `<li class="page-item ${currentPage === 0 ? 'disabled' : ''}">
      <a class="page-link" href="javascript:void(0)" onclick="loadCourses(${currentPage - 1})">Trước</a>
    </li>`;

    // Page numbers
    for (let i = 0; i < totalPages; i++) {
      paginationHtml += `<li class="page-item ${i === currentPage ? 'active' : ''}">
        <a class="page-link" href="javascript:void(0)" onclick="loadCourses(${i})">${i + 1}</a>
      </li>`;
    }

    // Next button
    paginationHtml += `<li class="page-item ${currentPage + 1 >= totalPages ? 'disabled' : ''}">
      <a class="page-link" href="javascript:void(0)" onclick="loadCourses(${currentPage + 1})">Sau</a>
    </li>`;

    const paginationContainer = document.getElementById('pagination-container');
    if (paginationContainer) {
      paginationContainer.innerHTML = `<ul class="pagination justify-content-center">${paginationHtml}</ul>`;
    }
  }

  // Initial load
  document.addEventListener('DOMContentLoaded', function() {
    loadCourses(0);
  });
</script>

</body>
</html>
