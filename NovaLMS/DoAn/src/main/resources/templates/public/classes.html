<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: common-head('Classes')}"></head>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<body class="classes-page" style="background-color: #f4f7fb; font-family: 'Inter', sans-serif; font-size: 0.95rem;">

<!-- Biến toàn cục xác định trạng thái đăng nhập -->
<script th:inline="javascript">
    var isAuthenticated = /*[[${#authorization.expression('isAuthenticated()')}]]*/ false;
</script>

<header th:replace="~{fragments/header :: header-fragment('classes')}"></header>

<main class="main pt-5 pb-5">
    <div class="container">

        <div class="text-center mb-5">
            <h2 class="fw-bold mb-2" style="color: #0f172a; letter-spacing: -0.5px;">Lịch khai giảng</h2>
            <p class="text-secondary fs-6">Lựa chọn chương trình phù hợp và bắt đầu hành trình học tập của bạn</p>
        </div>

        <div class="row">
            <div class="col-12">

                <div class="card border-0 shadow-sm rounded-4 mb-4">
                    <div class="card-body p-4">
                        <div class="row">
                            <div class="col-md-4 mb-3 mb-md-0">
                                <label class="fw-bold text-primary mb-2 text-uppercase" style="font-size: 0.85rem;">Chương trình</label>
                                <select id="categorySelect" class="form-select border-0 bg-light rounded-3 py-2 shadow-none" onchange="loadClasses(0)">
                                    <option value="">Tất cả chương trình</option>
                                    <option th:each="cat : ${categories}"
                                            th:value="${cat.settingId}"
                                            th:text="${cat.name}"
                                            th:selected="${cat.settingId == selectedCat}"> </option>
                                </select>
                            </div>
                            <div class="col-md-8 mb-3 mb-md-0">
                                <label class="fw-bold text-primary mb-2 text-uppercase" style="font-size: 0.85rem;">Tìm kiếm</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0 rounded-start-3 text-muted"><i class="bi bi-search"></i></span>
                                    <input type="text" id="keywordSearch" class="form-control border-0 bg-light rounded-end-3 py-2 shadow-none" placeholder="Nhập tên khóa học hoặc giảng viên..." onkeyup="if(event.key === 'Enter') loadClasses(0)">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-none d-lg-flex align-items-center header-row shadow-sm rounded-pill p-3 mb-3 fw-bold text-center">
                    <div class="col-2 text-start ps-4 text-uppercase text-secondary" style="font-size: 0.8rem; letter-spacing: 0.5px;">Khoá học</div>
                    <div class="col-2 text-uppercase text-secondary" style="font-size: 0.8rem; letter-spacing: 0.5px;">Chương trình</div>
                    <div class="col-2 text-start text-uppercase text-secondary" style="font-size: 0.8rem; letter-spacing: 0.5px;">Lớp / Giảng viên</div>
                    <div class="col-2 text-uppercase text-secondary" style="font-size: 0.8rem; letter-spacing: 0.5px;">Giờ học</div>
                    <div class="col-2 text-uppercase text-secondary" style="font-size: 0.8rem; letter-spacing: 0.5px;">Ngày khai giảng</div>
                    <div class="col-2"></div>
                </div>

                <div class="class-list-container" id="class-list-wrapper">
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>

                <nav aria-label="Page navigation" class="mt-4" id="pagination-container"></nav>

            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: common-footer}"></footer>
<th:block th:replace="~{fragments/footer :: common-scripts}"></th:block>

<style>
    .cursor-pointer { cursor: pointer; }
    .transition-all { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .hover-shadow { border: 1px solid rgba(0,0,0,0.05); }
    .hover-shadow:hover {
        transform: translateY(-4px);
        box-shadow: 0 15px 35px rgba(0,0,0,0.05) !important;
        border-color: rgba(59, 130, 246, 0.2);
    }
    .header-row { background: linear-gradient(to right, #ffffff, #f8fafc); border: 1px solid rgba(255,255,255,0.6); }
    .btn-register {
        background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        color: white;
        border: none;
        transition: all 0.3s ease;
    }
    .btn-register:hover {
        background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(220, 38, 38, 0.25) !important;
        color: white;
    }
    .form-select.border-0:focus {
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        border: 1px solid #3b82f6 !important;
        background-color: #ffffff !important;
    }

    /* CSS cho nút phân trang */
    .page-link { cursor: pointer; }
    .page-link:hover:not(.disabled) {
        background-color: #1a237e !important;
        color: white !important;
    }

    /* Responsive cho màn hình nhỏ */
    @media (max-width: 991.98px) {
        .class-row-item .col-lg-2 {
            text-align: left !important;
            padding-bottom: 0.5rem;
            border-bottom: 1px dashed #eee;
        }
        .class-row-item .col-lg-2:last-child {
            border-bottom: none;
        }
        .class-row-item .col-6 {
            padding-bottom: 0;
            border-bottom: none;
        }
    }
</style>

<script>
    let currentPage = 0;
    const pageSize = 10;

    // Load dữ liệu lần đầu ngay khi trang load xong
    document.addEventListener("DOMContentLoaded", function() {
        loadClasses(0);
    });

    function loadClasses(pageNo) {
        currentPage = pageNo;
        const categoryId = document.getElementById('categorySelect').value;
        const keyword = document.getElementById('keywordSearch').value;

        // Xóa danh sách cũ và hiện loading để người dùng biết đang tải
        document.getElementById('class-list-wrapper').innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>';

        let url = `/api/v1/classes/public-list?pageNo=${pageNo}&pageSize=${pageSize}`;
        if (categoryId) {
            url += `&categoryId=${categoryId}`;
        }
        if (keyword) {
            url += `&keyword=${encodeURIComponent(keyword)}`;
        }

        fetch(url)
            .then(response => response.json())
            .then(res => {
                // Kiểm tra status 200 từ JSON bạn gửi
                if(res.status === 200) {
                    renderClasses(res.data.items); // items là mảng chứa 3 lớp học bạn đã gửi
                    renderPagination(res.data.totalPage);
                }
            })
            .catch(error => {
                console.error("Lỗi:", error);
                document.getElementById('class-list-wrapper').innerHTML = '<div class="alert alert-danger">Không thể tải dữ liệu</div>';
            });
    }

    // 2. VẼ DANH SÁCH LỚP HỌC LÊN HTML BẰNG JAVASCRIPT
    function renderClasses(classes) {
        const container = document.getElementById('class-list-wrapper');

        if (!classes || classes.length === 0) {
            container.innerHTML = `
                <div class="alert alert-warning text-center rounded-4 shadow-sm py-4">
                    <i class="bi bi-info-circle fs-4 d-block mb-2"></i>
                    Hiện tại chưa có lớp học nào đang mở đăng ký.
                </div>`;
            return;
        }

        let html = '';
        classes.forEach(clazz => {
            html += `
                <div class="card border-0 shadow-sm rounded-4 mb-3 class-row-item hover-shadow transition-all bg-white">
                    <div class="card-body p-3 p-lg-4">
                        <div class="row align-items-center text-center text-lg-center">
                            <div class="col-lg-2 col-6 mb-3 mb-lg-0 text-start">
                                <h6 class="fw-bold text-dark mb-0 d-flex align-items-center fs-6">
                                    <i class="bi bi-book-half text-primary me-2"></i> <span>${clazz.courseTitle || ''}</span>
                                </h6>
                            </div>

                            <div class="col-lg-2 col-6 mb-3 mb-lg-0">
                                <span class="badge bg-light text-primary border border-primary-subtle px-3 py-1 rounded-pill fw-semibold shadow-sm">${clazz.categoryName || ''}</span>
                            </div>

                            <div class="col-lg-2 col-12 mb-3 mb-lg-0 text-start">
                                <ul class="list-unstyled mb-0 d-flex flex-column gap-1">
                                    ${clazz.className ? `<li class="text-secondary"><i class="bi bi-people-fill me-1 text-muted"></i> <strong class="text-dark">${clazz.className}</strong></li>` : ''}
                                    ${clazz.teacherName ? `<li class="text-secondary"><i class="bi bi-person-badge me-1 text-muted"></i> GV: <strong class="text-dark">${clazz.teacherName}</strong></li>` : ''}
                                </ul>
                            </div>

                            <div class="col-lg-2 col-6 mb-3 mb-lg-0">
                                ${clazz.schedule ? `<div class="fw-bold text-dark"><i class="bi bi-calendar-week me-1"></i> ${clazz.schedule}</div>` : ''}
                                ${clazz.slotTime ? `<div class="text-muted small mt-1"><i class="bi bi-clock me-1"></i> ${clazz.slotTime}</div>` : ''}
                            </div>

                            <div class="col-lg-2 col-6 mb-3 mb-lg-0">
                                ${clazz.startDate ? `<div class="fw-bold fs-6" style="color: #059669;"><i class="bi bi-calendar-check me-1"></i> ${clazz.startDate}</div>` : ''}
                            </div>

                            <div class="col-lg-2 col-12 text-lg-end mt-2 mt-lg-0">
                                ${isAuthenticated
                                    ? `<a href="/enroll/${clazz.classId}" class="btn btn-register rounded-pill px-3 py-1 w-100 w-lg-auto fw-bold shadow-sm" style="font-size: 0.9rem;">Đăng ký ngay <i class="bi bi-arrow-right ms-1"></i></a>`
                                    : `<a href="/login.html?redirect=/enroll/${clazz.classId}" class="btn btn-register rounded-pill px-3 py-1 w-100 w-lg-auto fw-bold shadow-sm" style="font-size: 0.9rem;">Đăng ký ngay <i class="bi bi-arrow-right ms-1"></i></a>`
                                }
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    // 3. VẼ THANH PHÂN TRANG
    function renderPagination(totalPages) {
        const paginationContainer = document.getElementById('pagination-container');

        if (!totalPages || totalPages <= 1) {
            paginationContainer.innerHTML = '';
            return;
        }

        let html = '<ul class="pagination justify-content-center">';

        // Nút Trước
        html += `<li class="page-item ${currentPage === 0 ? 'disabled' : ''}">
                    <a class="page-link shadow-sm rounded-start-pill border-0 me-1 text-primary" onclick="loadClasses(${currentPage - 1})">
                        <i class="bi bi-chevron-left"></i> Trước
                    </a>
                 </li>`;

        // Các số trang
        for (let i = 0; i < totalPages; i++) {
            const activeClass = (currentPage === i) ? 'bg-primary text-white' : 'text-primary bg-white';
            html += `<li class="page-item">
                        <a class="page-link shadow-sm border-0 mx-1 rounded-circle fw-bold ${activeClass}"
                           onclick="loadClasses(${i})"
                           style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">${i + 1}</a>
                     </li>`;
        }

        // Nút Sau
        html += `<li class="page-item ${currentPage === totalPages - 1 ? 'disabled' : ''}">
                    <a class="page-link shadow-sm rounded-end-pill border-0 ms-1 text-primary" onclick="loadClasses(${currentPage + 1})">
                        Sau <i class="bi bi-chevron-right"></i>
                    </a>
                 </li>`;

        html += '</ul>';
        paginationContainer.innerHTML = html;
    }
</script>

</body>
</html>
