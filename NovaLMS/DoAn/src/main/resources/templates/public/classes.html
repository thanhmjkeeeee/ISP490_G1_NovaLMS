<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: common-head('Classes')}"></head>

<body class="classes-page" style="background-color: #f8f9fa;">

<!-- Biến toàn cục xác định trạng thái đăng nhập -->
<script th:inline="javascript">
    var isAuthenticated = /*[[${#authorization.expression('isAuthenticated()')}]]*/ false;
</script>

<header th:replace="~{fragments/header :: header-fragment('classes')}"></header>

<main class="main pt-5 pb-5">
    <div class="container">

        <h2 class="fw-bold mb-4" style="color: #1a237e;">Lịch khai giảng</h2>

        <div class="row">
            <div class="col-12">

                <div class="card border-0 shadow-sm rounded-4 mb-4">
                    <div class="card-body p-4">
                        <div class="row">
                            <div class="col-md-4 mb-3 mb-md-0">
                                <label class="fw-bold text-primary mb-2">Chương trình:</label>
                                <select id="categorySelect" class="form-select border-0 bg-light rounded-3 py-2" onchange="loadClasses(0)">
                                    <option value="">Tất cả</option>
                                    <option th:each="cat : ${categories}"
                                            th:value="${cat.settingId}"
                                            th:text="${cat.name}"
                                            th:selected="${cat.settingId == selectedCat}"> </option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-none d-lg-flex align-items-center bg-white shadow-sm rounded-pill p-3 mb-3 fw-bold text-center" style="color: #1a237e;">
                    <div class="col-2 text-start ps-4">Khoá học</div>
                    <div class="col-2">Chương trình</div>
                    <div class="col-2 text-start">Lớp / Giảng viên</div>
                    <div class="col-2">Giờ học</div>
                    <div class="col-2">Ngày khai giảng</div>
                    <div class="col-2"></div>
                </div>

                <div class="class-list-container" id="class-list-wrapper">
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>

                <nav aria-label="Page navigation" class="mt-4" id="pagination-container"></nav>

            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: common-footer}"></footer>
<th:block th:replace="~{fragments/footer :: common-scripts}"></th:block>

<style>
    .cursor-pointer { cursor: pointer; }
    .transition-all { transition: all 0.3s ease; }
    .hover-shadow:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.08) !important;
    }

    /* CSS cho nút phân trang */
    .page-link { cursor: pointer; }
    .page-link:hover:not(.disabled) {
        background-color: #1a237e !important;
        color: white !important;
    }

    /* Responsive cho màn hình nhỏ */
    @media (max-width: 991.98px) {
        .class-row-item .col-lg-2 {
            text-align: left !important;
            padding-bottom: 0.5rem;
            border-bottom: 1px dashed #eee;
        }
        .class-row-item .col-lg-2:last-child {
            border-bottom: none;
        }
        .class-row-item .col-6 {
            padding-bottom: 0;
            border-bottom: none;
        }
    }
</style>

<script>
    let currentPage = 0;
    const pageSize = 10;

    // Load dữ liệu lần đầu ngay khi trang load xong
    document.addEventListener("DOMContentLoaded", function() {
        loadClasses(0);
    });

    function loadClasses(pageNo) {
        currentPage = pageNo;
        const categoryId = document.getElementById('categorySelect').value;

        // Xóa danh sách cũ và hiện loading để người dùng biết đang tải
        document.getElementById('class-list-wrapper').innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>';

        let url = `/api/v1/classes/public-list?pageNo=${pageNo}&pageSize=${pageSize}`;
        if (categoryId) {
            url += `&categoryId=${categoryId}`;
        }

        fetch(url)
            .then(response => response.json())
            .then(res => {
                // Kiểm tra status 200 từ JSON bạn gửi
                if(res.status === 200) {
                    renderClasses(res.data.items); // items là mảng chứa 3 lớp học bạn đã gửi
                    renderPagination(res.data.totalPage);
                }
            })
            .catch(error => {
                console.error("Lỗi:", error);
                document.getElementById('class-list-wrapper').innerHTML = '<div class="alert alert-danger">Không thể tải dữ liệu</div>';
            });
    }

    // 2. VẼ DANH SÁCH LỚP HỌC LÊN HTML BẰNG JAVASCRIPT
    function renderClasses(classes) {
        const container = document.getElementById('class-list-wrapper');

        if (!classes || classes.length === 0) {
            container.innerHTML = `
                <div class="alert alert-warning text-center rounded-4 shadow-sm py-4">
                    <i class="bi bi-info-circle fs-4 d-block mb-2"></i>
                    Hiện tại chưa có lớp học nào đang mở đăng ký.
                </div>`;
            return;
        }

        let html = '';
        classes.forEach(clazz => {
            html += `
                <div class="card border-0 shadow-sm rounded-4 mb-3 class-row-item hover-shadow transition-all">
                    <div class="card-body p-3 p-lg-4">
                        <div class="row align-items-center text-center text-lg-center">
                            <div class="col-lg-2 col-6 mb-3 mb-lg-0 text-start">
                                <h6 class="fw-bold text-primary mb-0 d-flex align-items-center">
                                    <span>${clazz.courseTitle || ''}</span>
                                </h6>
                            </div>

                            <div class="col-lg-2 col-6 mb-3 mb-lg-0">
                                <span class="fw-bold text-primary">${clazz.categoryName || ''}</span>
                            </div>

                            <div class="col-lg-2 col-12 mb-3 mb-lg-0 text-start small">
                                <ul class="list-unstyled mb-0">
                                    ${clazz.className ? `<li>• Lớp: <strong>${clazz.className}</strong></li>` : ''}
                                    ${clazz.teacherName ? `<li>• GV: <strong>${clazz.teacherName}</strong></li>` : ''}
                                </ul>
                            </div>

                            <div class="col-lg-2 col-6 mb-3 mb-lg-0 small">
                                ${clazz.schedule ? `<div class="fw-bold text-dark">${clazz.schedule}</div>` : ''}
                                ${clazz.slotTime ? `<div class="text-muted">${clazz.slotTime}</div>` : ''}
                            </div>

                            <div class="col-lg-2 col-6 mb-3 mb-lg-0 small">
                                ${clazz.startDate ? `<div class="fw-bold text-dark">${clazz.startDate}</div>` : ''}
                            </div>

                            <div class="col-lg-2 col-12 text-lg-end mt-2 mt-lg-0">
                                ${isAuthenticated
                                    ? `<a href="/enroll/${clazz.classId}" class="btn btn-danger rounded-pill px-4 py-2 w-100 w-lg-auto fw-bold shadow-sm">Đăng ký</a>`
                                    : `<a href="/login.html?redirect=/enroll/${clazz.classId}" class="btn btn-danger rounded-pill px-4 py-2 w-100 w-lg-auto fw-bold shadow-sm">Đăng ký</a>`
                                }
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    // 3. VẼ THANH PHÂN TRANG
    function renderPagination(totalPages) {
        const paginationContainer = document.getElementById('pagination-container');

        if (!totalPages || totalPages <= 1) {
            paginationContainer.innerHTML = '';
            return;
        }

        let html = '<ul class="pagination justify-content-center">';

        // Nút Trước
        html += `<li class="page-item ${currentPage === 0 ? 'disabled' : ''}">
                    <a class="page-link shadow-sm rounded-start-pill border-0 me-1 text-primary" onclick="loadClasses(${currentPage - 1})">
                        <i class="bi bi-chevron-left"></i> Trước
                    </a>
                 </li>`;

        // Các số trang
        for (let i = 0; i < totalPages; i++) {
            const activeClass = (currentPage === i) ? 'bg-primary text-white' : 'text-primary bg-white';
            html += `<li class="page-item">
                        <a class="page-link shadow-sm border-0 mx-1 rounded-circle fw-bold ${activeClass}"
                           onclick="loadClasses(${i})"
                           style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">${i + 1}</a>
                     </li>`;
        }

        // Nút Sau
        html += `<li class="page-item ${currentPage === totalPages - 1 ? 'disabled' : ''}">
                    <a class="page-link shadow-sm rounded-end-pill border-0 ms-1 text-primary" onclick="loadClasses(${currentPage + 1})">
                        Sau <i class="bi bi-chevron-right"></i>
                    </a>
                 </li>`;

        html += '</ul>';
        paginationContainer.innerHTML = html;
    }
</script>

</body>
</html>
