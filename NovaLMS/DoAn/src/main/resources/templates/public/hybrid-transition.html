<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: common-head(pageTitle='Chuyển phần')}"></head>

<body class="bg-light d-flex flex-column min-vh-100">

<header th:replace="~{fragments/header :: header-fragment(currentPage='hybrid-entry')}"></header>

<main class="main my-5 flex-grow-1">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6">

        <th:block th:if="${transition != null}">

          <!-- Completed quiz result -->
          <div class="card shadow-lg border-0 rounded-4 mb-4 overflow-hidden" th:if="${transition.currentResult != null}">
            <div class="card-header bg-primary text-white text-center py-4">
              <h3 class="fw-bold mb-1">
                <i class="bi bi-check-circle-fill me-2"></i>
                Hoàn Thành "<span th:text="${transition.currentResult.quizTitle}">Quiz</span>"!
              </h3>
            </div>
            <div class="card-body p-5 text-center">
              <div class="mb-4">
                <div class="display-1 fw-bold text-primary mb-2"
                     th:text="${#numbers.formatDecimal(transition.currentResult.correctRate, 1, 0)} + '%'">
                  85%
                </div>
                <div class="text-muted fs-5">
                  <span th:text="${transition.currentResult.score}">17</span> /
                  <span th:text="${transition.currentResult.totalPoints}">20</span> câu đúng
                </div>
              </div>

              <div class="d-flex justify-content-center gap-3 mb-4">
                <span class="badge bg-success bg-opacity-10 text-success px-4 py-2 rounded-pill fs-6">
                  <i class="bi bi-award me-1"></i>
                  CEFR: <strong th:text="${transition.currentResult.suggestedLevel}">B1</strong>
                </span>
              </div>

              <!-- Progress dots -->
              <div class="d-flex justify-content-center gap-2 mt-3">
                <th:block th:each="i : ${#numbers.sequence(1, transition.totalQuizzes)}">
                  <div class="rounded-circle d-flex align-items-center justify-content-center"
                       style="width:32px; height:32px;"
                       th:classappend="${i <= transition.completedQuizzes} ? 'bg-success text-white' : (${i == transition.completedQuizzes + 1} ? 'bg-primary text-white' : 'bg-light text-muted border')">
                    <i class="bi" th:classappend="${i <= transition.completedQuizzes} ? 'bi-check' : (${i == transition.completedQuizzes + 1} ? 'bi-play-fill' : 'bi-dash')"></i>
                  </div>
                </th:block>
              </div>
              <p class="text-muted small mt-2 mb-0">
                Đã hoàn thành <span th:text="${transition.completedQuizzes}">1</span> /
                <span th:text="${transition.totalQuizzes}">3</span> phần
              </p>
            </div>
          </div>

          <!-- CTA Buttons -->
          <div class="text-center">
            <th:block th:if="${!transition.lastQuiz}">
              <p class="text-muted mb-4 fs-5">Sẵn sàng cho phần tiếp theo?</p>
              <a th:href="@{'/hybrid/' + ${transition.sessionId} + '/quiz/' + ${transition.nextQuizIndex}}"
                 class="btn btn-primary btn-lg rounded-pill px-5 py-3 fw-bold shadow">
                Tiếp Tục <i class="bi bi-arrow-right ms-2"></i>
              </a>
            </th:block>

            <th:block th:if="${transition.lastQuiz}">
              <p class="text-success mb-4 fs-5">
                <i class="bi bi-stars me-1"></i>Bạn đã hoàn thành tất cả các phần!
              </p>
              <a th:href="@{'/hybrid/' + ${transition.sessionId} + '/results'}"
                 class="btn btn-success btn-lg rounded-pill px-5 py-3 fw-bold shadow">
                <i class="bi bi-bar-chart me-2"></i>Xem Kết Quả Tổng Hợp
              </a>
            </th:block>
          </div>

          <!-- Abandon -->
          <div class="text-center mt-4">
            <a th:href="@{/}" class="text-muted small">
              <i class="bi bi-x-circle me-1"></i>Thoát — kết quả sẽ không được lưu cho các phần chưa làm
            </a>
          </div>

        </th:block>

        <!-- Error state -->
        <th:block th:if="${error != null}">
          <div class="alert alert-danger text-center py-4">
            <i class="bi bi-exclamation-triangle display-6 d-block mb-3"></i>
            <p th:text="${error}">Lỗi</p>
            <a th:href="@{/hybrid-entry}" class="btn btn-outline-danger mt-2">Quay lại</a>
          </div>
        </th:block>

      </div>
    </div>
  </div>
</main>

<footer th:replace="~{fragments/footer :: common-footer}"></footer>
<th:block th:replace="~{fragments/footer :: common-scripts}"></th:block>

</body>
</html>
